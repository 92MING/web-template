	<style id="builtin-minipaint-modern-ui">
		:root {

		html,

		body.builtin-modern {

			--mp-panel-strong: #f8fafc;

		}
		body.builtin-modern.builtin-compact .right_mobile_menu {

		}
		body.builtin-modern.builtin-compact .sidebar_left {

		}
		body.builtin-modern.builtin-compact .sidebar_right.active {

		}
		@media (prefers-color-scheme: dark) {
			body.builtin-modern:not(.builtin-light) {

				--mp-panel: #171d25;
				--mp-panel-strong: #202834;
				--mp-line: #303a48;
				--mp-line-soft: #26303d;
				--mp-text: #edf2f8;
				--mp-muted: #a3adbb;

			body.builtin-modern .sidebar_left {

			}
			body.builtin-modern .sidebar_right .block {

			body.builtin-modern .ui_toggle_button,
			body.builtin-modern input,
			body.builtin-modern select {

			}

	<script id="builtin-minipaint-modern-runtime">
		(function () {
			var CREDIT_TEXT = "This embedded editor is modified from miniPaint (MIT).";
			function inferTheme() {
				var params = new URLSearchParams(window.location.search);
				var requested = params.get("theme") || params.get("builtin_theme");
				if (requested === "light" || requested === "dark") return requested;
				try {
					var parentDoc = window.parent && window.parent !== window ? window.parent.document : null;
					var explicit = parentDoc && (parentDoc.documentElement.dataset.theme || parentDoc.body.dataset.theme);
					if (explicit === "light" || explicit === "dark") return explicit;
					if (parentDoc && (parentDoc.documentElement.classList.contains("dark") || parentDoc.body.classList.contains("dark"))) {
						return "dark";
					}
				} catch (_err) {}
				return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
			}
			function applyTheme(theme) {
				document.body.classList.add("builtin-modern");
				document.body.classList.toggle("builtin-dark", theme === "dark");
				document.body.classList.toggle("builtin-light", theme !== "dark");
			}
			function applyCompact() {
				var width = window.innerWidth || document.documentElement.clientWidth || 0;
				document.body.classList.toggle("builtin-compact", width < 980);
			}
			function applyThemeFromContext() {
				applyTheme(inferTheme());
			}
			function addAboutCredit() {
				var contents = document.querySelectorAll(".ajs-content, .popup_content, .dialog_content");
				for (var i = 0; i < contents.length; i += 1) {
					var content = contents[i];
					if (content.querySelector(".builtin-minipaint-credit")) continue;
					if (!/miniPaint|ViliusL|Vilius/i.test(content.textContent || "")) continue;
					var credit = document.createElement("div");
					credit.className = "builtin-minipaint-credit";
					credit.textContent = CREDIT_TEXT;
					content.appendChild(credit);
				}
			}
			function init() {
				applyThemeFromContext();
				applyCompact();
				window.__builtinMiniPaintCredit = CREDIT_TEXT;
				var observer = new MutationObserver(addAboutCredit);
				observer.observe(document.body, { childList: true, subtree: true });
				addAboutCredit();
				window.addEventListener("resize", applyCompact);
			}
			window.addEventListener("message", function (event) {
				if (event.origin !== window.location.origin) return;
				if (!event.data || event.data.type !== "builtin-minipaint-theme") return;
				applyTheme(event.data.theme === "dark" ? "dark" : "light");
			});
			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", init);
			} else {
				init();
			}
		})();
	</script>

<body>
	<div class="wrapper">

		<nav aria-label="Main Menu" class="main_menu" id="main_menu"></nav>
		
		<div class="submenu">
			<a class="logo" href="#">miniPaint</a>
			<div class="block attributes" id="action_attributes"></div>
			<button class="undo_button" id="undo_button" type="button">
				<span class="sr_only">Undo</span>
			</button>
		</div>
		
		<div class="sidebar_left" id="tools_container"></div>


		<div class="middle_area" id="middle_area">

			<canvas class="ruler_left" id="ruler_left"></canvas>
			<canvas class="ruler_top" id="ruler_top"></canvas>

			<div class="main_wrapper" id="main_wrapper">
				<div class="canvas_wrapper" id="canvas_wrapper">
					<div id="mouse"></div>
					<div class="transparent-grid" id="canvas_minipaint_background"></div>
					<canvas id="canvas_minipaint">
						<div class="trn error">
							Your browser does not support canvas or JavaScript is not enabled.
						</div>
					</canvas>
				</div>
			</div>
		</div>

		<div class="sidebar_right">
			<div class="preview block">
				<h2 class="trn toggle" data-target="toggle_preview">Preview</h2>
				<div id="toggle_preview"></div>
			</div>
			
			<div class="colors block">
				<h2 class="trn toggle" data-target="toggle_colors">Colors</h2>
				<div class="content" id="toggle_colors"></div>
			</div>
			
			<div class="block" id="info_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_info">Information</h2>
				<div class="content" id="toggle_info"></div>
			</div>
			
			<div class="details block" id="details_base">
				<h2 class="trn toggle toggle-full" data-target="toggle_details">Layer details</h2>
				<div class="content details-content" id="toggle_details"></div>
			</div>
			
			<div class="layers block">
				<h2 class="trn">Layers</h2>
				<div class="content" id="layers_base"></div>
			</div>
		</div>
	</div>
	<div class="mobile_menu">
		<button class="left_mobile_menu" id="left_mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
		<button class="right_mobile_menu" id="mobile_menu_button" type="button">
			<span class="sr_only">Toggle Menu</span>
		</button>
	</div>
	<div class="hidden" id="tmp"></div>
	<div id="popups"></div>
