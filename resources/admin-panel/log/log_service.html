<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>服务日志分析</title>
  <link rel="stylesheet" href="/vendor/tailwindcss/tailwind.css"/>
  <link rel="stylesheet" href="/html-assets/css/log-shared.css"/>
  <script src="/vendor/chart/chart.js"></script>
  <script src="/html-assets/js/page-controls.js"></script>
</head>
<body class="log-page">
  <div id="page-banner" class="log-banner info log-hidden"></div>

  <div class="log-card" style="padding:0">
    <div class="log-header">
      <div>
        <div class="log-header-title">服务日志分析</div>
      </div>
      <div class="log-tab-bar">
        <button class="log-tab-btn active" data-tab="overview" onclick="switchTab('overview')">概览</button>
        <button class="log-tab-btn" data-tab="timeline" onclick="switchTab('timeline')">时段趋势</button>
        <button class="log-tab-btn" data-tab="logs" onclick="switchTab('logs')">调用记录</button>
      </div>
    </div>
    <div style="padding:0 16px 14px">
      <details class="log-fold log-card" open>
        <summary><div><div class="log-fold-title">分析条件</div></div></summary>
        <div class="log-fold-body log-filter-grid cols-7">
          <div>
            <label class="log-label">时间范围</label>
            <select id="f-hours" class="log-select">
              <option value="1">最近 1 小时</option>
              <option value="6">最近 6 小时</option>
              <option value="24" selected>最近 24 小时</option>
              <option value="72">最近 3 天</option>
              <option value="168">最近 7 天</option>
            </select>
          </div>
          <div>
            <label class="log-label">时间粒度</label>
            <select id="f-bucket" class="log-select">
              <option value="5">5 分钟</option>
              <option value="15">15 分钟</option>
              <option value="30">30 分钟</option>
              <option value="60" selected>1 小时</option>
              <option value="180">3 小时</option>
              <option value="720">12 小时</option>
            </select>
          </div>
          <div>
            <label class="log-label">分析维度</label>
            <select id="f-group" class="log-select" onchange="refreshAnalytics()">
              <option value="service_kind" selected>服务类别</option>
              <option value="operation">操作</option>
              <option value="client_class">客户端</option>
            </select>
          </div>
          <div>
            <label class="log-label">趋势指标</label>
            <select id="f-metric" class="log-select" onchange="refreshAnalytics()">
              <option value="total" selected>总调用量</option>
              <option value="success">成功数</option>
              <option value="failure">失败数</option>
              <option value="avg_duration_ms">平均耗时</option>
            </select>
          </div>
          <div>
            <label class="log-label">状态过滤</label>
            <select id="f-success" class="log-select">
              <option value="">全部</option>
              <option value="true">仅成功</option>
              <option value="false">仅失败</option>
            </select>
          </div>
          <div>
            <label class="log-label">服务过滤</label>
            <input id="f-service-kind" class="log-input" placeholder="如 completion / embedding"/>
          </div>
          <div class="flex items-end gap-2">
            <button class="log-btn log-btn-primary w-full" onclick="loadAll()">刷新分析</button>
          </div>
        </div>
      </details>
    </div>
  </div>

  <div class="log-metrics">
    <div class="log-card log-metric"><div class="log-metric-title">总调用量</div><div id="m-total" class="log-metric-value">—</div><div id="m-window" class="log-metric-sub">—</div></div>
    <div class="log-card log-metric"><div class="log-metric-title">成功率</div><div id="m-success-rate" class="log-metric-value text-emerald-600">—</div><div id="m-success-detail" class="log-metric-sub">—</div></div>
    <div class="log-card log-metric"><div class="log-metric-title">平均耗时</div><div id="m-avg-duration" class="log-metric-value text-indigo-600">—</div><div id="m-p95-duration" class="log-metric-sub">P95：—</div></div>
    <div class="log-card log-metric"><div class="log-metric-title">主导维度</div><div id="m-top-group" class="log-metric-value" style="color:var(--log-text)">—</div><div id="m-unique-groups" class="log-metric-sub">—</div></div>
  </div>

  <div id="tab-overview" class="log-tab-panel active flex flex-col gap-3">
    <details class="log-card log-fold" open>
      <summary><div><div class="log-fold-title">维度统计表</div></div></summary>
      <div class="log-fold-body">
        <div class="log-scroll-panel log-scroll-panel-lg">
          <table class="log-table">
            <thead><tr><th>分组</th><th>调用量</th><th>成功</th><th>失败</th><th>成功率</th><th>平均耗时</th><th>最后调用</th></tr></thead>
            <tbody id="group-tbody"></tbody>
          </table>
        </div>
      </div>
    </details>
    <details class="log-card log-fold">
      <summary><div><div class="log-fold-title">概览图表</div></div></summary>
      <div class="log-fold-body">
        <div class="log-chart-grid">
          <div class="log-card log-chart-card"><div class="log-section-title">成功 / 失败比例</div><div class="log-chart-wrap"><canvas id="status-chart" height="92"></canvas><div id="status-chart-state" class="log-chart-empty log-hidden"></div></div></div>
          <div class="log-card log-chart-card"><div class="log-section-title">维度排行</div><div class="log-chart-wrap"><canvas id="group-chart" height="92"></canvas><div id="group-chart-state" class="log-chart-empty log-hidden"></div></div></div>
        </div>
      </div>
    </details>
  </div>

  <div id="tab-timeline" class="log-tab-panel flex flex-col gap-3">
    <details class="log-card log-fold" open>
      <summary><div><div class="log-fold-title">时段统计</div></div></summary>
      <div class="log-fold-body">
        <div class="log-scroll-panel log-scroll-panel-md">
          <table class="log-table">
            <thead><tr><th>时段</th><th>总调用</th><th>成功</th><th>失败</th><th>平均耗时</th></tr></thead>
            <tbody id="timeline-tbody"></tbody>
          </table>
        </div>
      </div>
    </details>
    <details class="log-card log-fold">
      <summary><div><div class="log-fold-title">时段趋势图</div></div></summary>
      <div class="log-fold-body">
        <div class="log-chart-grid">
          <div class="log-card log-chart-card"><div class="log-section-title">按时段趋势</div><div class="log-chart-wrap"><canvas id="timeline-chart" height="128"></canvas><div id="timeline-chart-state" class="log-chart-empty log-hidden"></div></div></div>
          <div class="log-card log-chart-card"><div class="log-section-title">Top 维度时段对比</div><div class="log-chart-wrap"><canvas id="timeline-group-chart" height="128"></canvas><div id="timeline-group-chart-state" class="log-chart-empty log-hidden"></div></div></div>
        </div>
      </div>
    </details>
  </div>

  <div id="tab-logs" class="log-tab-panel flex flex-col gap-3">
    <details class="log-card log-fold" open>
      <summary><div><div class="log-fold-title">调用记录过滤</div></div></summary>
      <div class="log-fold-body log-filter-grid cols-6">
        <div>
          <label class="log-label">服务类别</label>
          <input id="q-service" class="log-input" placeholder="如 completion"/>
        </div>
        <div>
          <label class="log-label">操作</label>
          <input id="q-operation" class="log-input" placeholder="如 complete"/>
        </div>
        <div>
          <label class="log-label">客户端</label>
          <input id="q-client" class="log-input" placeholder="如 OpenAIClient"/>
        </div>
        <div>
          <label class="log-label">分页大小</label>
          <select id="q-limit" class="log-select" onchange="renderLogsPage(0)">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="300">300</option>
          </select>
        </div>
        <div class="flex items-end gap-2">
          <button class="log-btn log-btn-secondary w-full" onclick="applyLogFilters()">查询记录</button>
        </div>
        <div class="flex items-end gap-2">
          <div id="logs-page-info" style="font-size:11px;color:var(--log-text-muted)">—</div>
        </div>
      </div>
    </details>
    <div class="log-card log-card-toolbar">
      <div class="flex gap-2">
        <button id="logs-prev-btn" class="log-pager-btn" onclick="renderLogsPage(logPageIndex - 1)">上一页</button>
        <button id="logs-next-btn" class="log-pager-btn" onclick="renderLogsPage(logPageIndex + 1)">下一页</button>
      </div>
    </div>
    <details class="log-card log-fold" open>
      <summary><div><div class="log-fold-title">调用记录表</div></div></summary>
      <div class="log-fold-body">
        <div class="log-scroll-panel log-scroll-panel-xl">
          <table class="log-table">
            <thead><tr><th>时间</th><th>服务</th><th>操作</th><th>客户端</th><th>状态</th><th>耗时</th><th>详情</th></tr></thead>
            <tbody id="logs-tbody"></tbody>
          </table>
        </div>
      </div>
    </details>
  </div>

  <div id="detail-modal" class="log-modal-overlay" onclick="if(event.target===this)closeDetail()">
    <div class="log-modal-box">
      <div class="flex items-center justify-between gap-3">
        <div style="font-size:15px;font-weight:800">调用详情</div>
        <button class="log-btn log-btn-secondary" onclick="closeDetail()">关闭</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

<script>
'use strict';

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const COLORS = ['#4f46e5','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#64748b'];
const CACHE_PREFIX = 'proj-log-ui';
const ANALYTICS_CAP = 1800;
let serviceLogs = [];
let filteredLogs = [];
let allTableLogs = [];
let tableLogs = [];
let charts = { status:null, group:null, timeline:null, timelineGroup:null };
let activeTab = 'overview';
let serverMeta = null;
let analyticsTruncated = false;
let logPageIndex = 0;

function setBanner(kind, message) {
  const el = document.getElementById('page-banner');
  if (!message) {
    el.className = 'log-banner info log-hidden';
    el.textContent = '';
    return;
  }
  el.className = `log-banner ${kind || 'info'}`;
  el.textContent = message;
}

function cleanupOldCache(instanceUuid) {
  const prefix = `${CACHE_PREFIX}:`;
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith(prefix)) continue;
    if (!key.startsWith(`${prefix}${instanceUuid}:`)) localStorage.removeItem(key);
  }
}

function cacheKey(name) {
  if (!serverMeta?.instance_uuid) return null;
  return `${CACHE_PREFIX}:${serverMeta.instance_uuid}:${name}`;
}

function readCache(name) {
  const key = cacheKey(name);
  if (!key) return null;
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.instance_uuid !== serverMeta.instance_uuid || (parsed.expires_at && parsed.expires_at < Date.now())) {
      localStorage.removeItem(key);
      return null;
    }
    return parsed.data ?? null;
  } catch {
    return null;
  }
}

function writeCache(name, data, ttlMs) {
  const key = cacheKey(name);
  if (!key) return;
  try {
    localStorage.setItem(key, JSON.stringify({ instance_uuid: serverMeta.instance_uuid, expires_at: Date.now() + ttlMs, data }));
  } catch {}
}

async function ensureServerMeta() {
  if (serverMeta) return serverMeta;
  const resp = await fetch('/admin/api/logs/meta');
  if (!resp.ok) throw new Error(await resp.text());
  serverMeta = await resp.json();
  cleanupOldCache(serverMeta.instance_uuid);
  return serverMeta;
}

function setChartState(canvasId, stateId, message) {
  const canvas = document.getElementById(canvasId);
  const state = document.getElementById(stateId);
  if (message) {
    canvas.classList.add('log-hidden');
    state.classList.remove('log-hidden');
    state.textContent = message;
  } else {
    canvas.classList.remove('log-hidden');
    state.classList.add('log-hidden');
    state.textContent = '';
  }
}

function setTbodyState(id, colspan, message) {
  document.getElementById(id).innerHTML = `<tr><td colspan="${colspan}" class="text-center py-6" style="color:var(--log-text-muted)">${esc(message)}</td></tr>`;
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.log-tab-btn[data-tab]').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.log-tab-panel').forEach(el => el.classList.toggle('active', el.id === 'tab-' + tab));
}

function hoursToWindow(hours) {
  const now = Date.now();
  return { sinceMs: now - hours * 3600 * 1000, untilMs: now };
}

function formatDuration(ms) {
  if (!Number.isFinite(ms)) return '—';
  if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
  return Math.round(ms) + 'ms';
}

function percentile(values, ratio) {
  if (!values.length) return 0;
  const sorted = [...values].sort((a, b) => a - b);
  const idx = Math.min(sorted.length - 1, Math.max(0, Math.ceil(sorted.length * ratio) - 1));
  return sorted[idx];
}

function parseLogDate(log) {
  const raw = log?.created_at;
  if (!raw) return null;
  const d = new Date(raw);
  return Number.isNaN(d.getTime()) ? null : d;
}

function filterCurrentLogs() {
  const hours = Number(document.getElementById('f-hours').value || 24);
  const success = document.getElementById('f-success').value;
  const serviceKind = document.getElementById('f-service-kind').value.trim().toLowerCase();
  const { sinceMs, untilMs } = hoursToWindow(hours);
  filteredLogs = serviceLogs.filter(log => {
    const dt = parseLogDate(log);
    if (!dt) return false;
    const ts = dt.getTime();
    if (ts < sinceMs || ts > untilMs) return false;
    if (success === 'true' && !log.success) return false;
    if (success === 'false' && log.success) return false;
    if (serviceKind && !String(log.service_kind || '').toLowerCase().includes(serviceKind)) return false;
    return true;
  });
  return { hours, sinceMs, untilMs };
}

function aggregateGroups(groupBy) {
  const map = new Map();
  filteredLogs.forEach(log => {
    const key = String(log[groupBy] || '—');
    if (!map.has(key)) {
      map.set(key, { group:key, call_count:0, success_count:0, failure_count:0, durations:[], last_called_at:null });
    }
    const row = map.get(key);
    row.call_count += 1;
    if (log.success) row.success_count += 1; else row.failure_count += 1;
    if (Number.isFinite(log.duration_ms)) row.durations.push(Number(log.duration_ms));
    const dt = parseLogDate(log);
    if (dt) {
      const iso = dt.toISOString();
      if (!row.last_called_at || iso > row.last_called_at) row.last_called_at = iso;
    }
  });
  return [...map.values()].map(row => ({
    ...row,
    avg_duration_ms: row.durations.length ? row.durations.reduce((a,b)=>a+b,0) / row.durations.length : 0,
    success_rate: row.call_count ? row.success_count / row.call_count : 0,
  })).sort((a, b) => b.call_count - a.call_count || (b.last_called_at || '').localeCompare(a.last_called_at || ''));
}

function buildTimeline(bucketMinutes, groupBy) {
  const metric = document.getElementById('f-metric').value;
  const groups = aggregateGroups(groupBy).slice(0, 5).map(row => row.group);
  const buckets = new Map();
  filteredLogs.forEach(log => {
    const dt = parseLogDate(log);
    if (!dt) return;
    const rounded = new Date(dt);
    rounded.setSeconds(0, 0);
    const mins = rounded.getMinutes();
    rounded.setMinutes(Math.floor(mins / bucketMinutes) * bucketMinutes);
    const bucketKey = rounded.toISOString();
    if (!buckets.has(bucketKey)) {
      buckets.set(bucketKey, { bucket:bucketKey, total:0, success:0, failure:0, durations:[], groups:new Map() });
    }
    const row = buckets.get(bucketKey);
    row.total += 1;
    if (log.success) row.success += 1; else row.failure += 1;
    if (Number.isFinite(log.duration_ms)) row.durations.push(Number(log.duration_ms));
    const g = String(log[groupBy] || '—');
    if (groups.includes(g)) {
      if (!row.groups.has(g)) row.groups.set(g, { total:0, success:0, failure:0, durations:[] });
      const grow = row.groups.get(g);
      grow.total += 1;
      if (log.success) grow.success += 1; else grow.failure += 1;
      if (Number.isFinite(log.duration_ms)) grow.durations.push(Number(log.duration_ms));
    }
  });
  const rows = [...buckets.values()].sort((a, b) => a.bucket.localeCompare(b.bucket)).map(row => ({
    bucket: row.bucket,
    total: row.total,
    success: row.success,
    failure: row.failure,
    avg_duration_ms: row.durations.length ? row.durations.reduce((a,b)=>a+b,0) / row.durations.length : 0,
    groups: Object.fromEntries([...row.groups.entries()].map(([k, v]) => [k, {
      total: v.total,
      success: v.success,
      failure: v.failure,
      avg_duration_ms: v.durations.length ? v.durations.reduce((a,b)=>a+b,0) / v.durations.length : 0,
    }]))
  }));
  return { rows, groups, metric };
}

function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); charts[key] = null; }
}

function renderSummaryCards(groupRows, hours) {
  const total = filteredLogs.length;
  const successCount = filteredLogs.filter(x => x.success).length;
  const failureCount = total - successCount;
  const durations = filteredLogs.map(x => Number(x.duration_ms)).filter(Number.isFinite);
  const avgDuration = durations.length ? durations.reduce((a,b)=>a+b,0) / durations.length : 0;
  const p95 = percentile(durations, 0.95);
  const top = groupRows[0];
  document.getElementById('m-total').textContent = String(total);
  document.getElementById('m-window').textContent = `最近 ${hours} 小时`;
  document.getElementById('m-success-rate').textContent = total ? (successCount * 100 / total).toFixed(1) + '%' : '—';
  document.getElementById('m-success-detail').textContent = `${successCount} 成功 / ${failureCount} 失败`;
  document.getElementById('m-avg-duration').textContent = formatDuration(avgDuration);
  document.getElementById('m-p95-duration').textContent = `P95：${formatDuration(p95)}`;
  document.getElementById('m-top-group').textContent = top ? top.group : '—';
  document.getElementById('m-unique-groups').textContent = `${groupRows.length} 个分组`;
}

function renderStatusChart() {
  destroyChart('status');
  const successCount = filteredLogs.filter(x => x.success).length;
  const failureCount = filteredLogs.length - successCount;
  if (!filteredLogs.length) {
    setChartState('status-chart', 'status-chart-state', '当前时间范围内暂无统计数据');
    return;
  }
  setChartState('status-chart', 'status-chart-state', '');
  const ctx = document.getElementById('status-chart').getContext('2d');
  charts.status = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels:['成功','失败'],
      datasets:[{
        data:[successCount, failureCount],
        backgroundColor:['#10b981','#ef4444'],
        borderColor:'#fff',
        borderWidth:2,
        radius:'78%',
      }]
    },
    options: {
      maintainAspectRatio:false,
      cutout:'70%',
      plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, boxHeight:10, font:{ size:10 }, padding:8 } } }
    }
  });
}

function renderGroupChart(groupRows) {
  destroyChart('group');
  const topRows = groupRows.slice(0, 10);
  if (!topRows.length) {
    setChartState('group-chart', 'group-chart-state', '当前没有可展示的维度排行');
    return;
  }
  setChartState('group-chart', 'group-chart-state', '');
  const ctx = document.getElementById('group-chart').getContext('2d');
  charts.group = new Chart(ctx, {
    type: 'bar',
    data: { labels: topRows.map(x => x.group), datasets:[{ label:'调用量', data: topRows.map(x => x.call_count), backgroundColor: COLORS.slice(0, topRows.length), borderRadius: 6, maxBarThickness:12 }] },
    options: {
      maintainAspectRatio:false,
      indexAxis:'y',
      plugins:{ legend:{ display:false } },
      scales:{ x:{ beginAtZero:true, ticks:{ font:{ size:10 } } }, y:{ ticks:{ font:{ size:10 } } } }
    }
  });
}

function renderGroupTable(groupRows) {
  const tbody = document.getElementById('group-tbody');
  if (!groupRows.length) {
    setTbodyState('group-tbody', 7, '当前时间范围内暂无服务调用记录');
    return;
  }
  tbody.innerHTML = groupRows.map(row => `
    <tr>
      <td class="font-semibold">${esc(row.group)}</td>
      <td>${row.call_count}</td>
      <td class="text-emerald-600">${row.success_count}</td>
      <td class="text-red-500">${row.failure_count}</td>
      <td>${(row.success_rate * 100).toFixed(1)}%</td>
      <td class="log-mono" style="color:var(--log-text-muted)">${esc(formatDuration(row.avg_duration_ms))}</td>
      <td style="color:var(--log-text-muted)">${row.last_called_at ? esc(new Date(row.last_called_at).toLocaleString('zh-CN')) : '—'}</td>
    </tr>`).join('');
}

function renderTimelineCharts(groupBy) {
  destroyChart('timeline');
  destroyChart('timelineGroup');
  const bucketMinutes = Number(document.getElementById('f-bucket').value || 60);
  const metric = document.getElementById('f-metric').value;
  const timeline = buildTimeline(bucketMinutes, groupBy);
  const labels = timeline.rows.map(row => new Date(row.bucket).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }));

  if (!timeline.rows.length) {
    setChartState('timeline-chart', 'timeline-chart-state', '暂无可分析的时段数据');
    setChartState('timeline-group-chart', 'timeline-group-chart-state', '暂无可分析的维度时段数据');
    setTbodyState('timeline-tbody', 5, '暂无可分析的时段数据');
    return;
  }
  setChartState('timeline-chart', 'timeline-chart-state', '');
  setChartState('timeline-group-chart', 'timeline-group-chart-state', '');

  charts.timeline = new Chart(document.getElementById('timeline-chart').getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: ({ total:'总调用量', success:'成功数', failure:'失败数', avg_duration_ms:'平均耗时(ms)' }[metric] || metric),
        data: timeline.rows.map(row => row[metric]),
        borderColor:'#4f46e5', backgroundColor:'rgba(79,70,229,.12)', fill:true, tension:.25, pointRadius:2
      }]
    },
    options: { scales:{ y:{ beginAtZero:true } } }
  });

  const datasets = timeline.groups.map((group, idx) => ({
    label: group,
    data: timeline.rows.map(row => (row.groups[group] ? row.groups[group][metric] : 0)),
    borderColor: COLORS[idx % COLORS.length],
    backgroundColor: COLORS[idx % COLORS.length] + '22',
    fill:false,
    tension:.2,
    pointRadius:2
  }));
  charts.timelineGroup = new Chart(document.getElementById('timeline-group-chart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: { scales:{ y:{ beginAtZero:true } }, plugins:{ legend:{ position:'bottom' } } }
  });

  const tbody = document.getElementById('timeline-tbody');
  tbody.innerHTML = timeline.rows.map(row => `
    <tr>
      <td>${esc(new Date(row.bucket).toLocaleString('zh-CN'))}</td>
      <td>${row.total}</td>
      <td class="text-emerald-600">${row.success}</td>
      <td class="text-red-500">${row.failure}</td>
      <td class="log-mono">${esc(formatDuration(row.avg_duration_ms))}</td>
    </tr>`).join('');
}

function renderLogsTable(logs) {
  tableLogs = logs;
  const tbody = document.getElementById('logs-tbody');
  if (!logs.length) {
    setTbodyState('logs-tbody', 7, '无匹配记录');
    return;
  }
  tbody.innerHTML = logs.map((log, idx) => `
    <tr>
      <td class="log-mono" style="color:var(--log-text-muted)">${esc(parseLogDate(log)?.toLocaleString('zh-CN') || '—')}</td>
      <td>${esc(log.service_kind || '—')}</td>
      <td class="font-semibold">${esc(log.operation || '—')}</td>
      <td>${esc(log.client_class || '—')}</td>
      <td><span class="log-badge ${log.success ? 'log-badge-ok' : 'log-badge-fail'}">${log.success ? '成功' : '失败'}</span></td>
      <td class="log-mono">${esc(formatDuration(Number(log.duration_ms)))}</td>
      <td><button class="text-indigo-600 font-semibold" onclick="showDetail(${idx})">查看</button></td>
    </tr>`).join('');
}

function showDetail(idx) {
  const log = tableLogs[idx] || null;
  if (!log) return;
  const body = document.getElementById('detail-body');
  const pairs = [
    ['时间', parseLogDate(log)?.toLocaleString('zh-CN') || '—'],
    ['服务类别', log.service_kind],
    ['操作', log.operation],
    ['客户端', log.client_class],
    ['状态', log.success ? '成功' : '失败'],
    ['耗时', formatDuration(Number(log.duration_ms))],
    ['请求字符数', log.request_chars],
    ['响应字符数', log.response_chars],
    ['PID', log.pid],
  ];
  let html = '';
  pairs.forEach(([label, value]) => {
    if (value == null || value === '') return;
    html += `<div class="log-modal-label">${esc(label)}</div><div class="log-modal-val">${esc(String(value))}</div>`;
  });
  if (log.error_type || log.error_message) {
    html += `<div class="log-modal-label">错误</div><div class="log-modal-val text-red-600">${esc(log.error_type || '')}${log.error_message ? '：' + esc(log.error_message) : ''}</div>`;
  }
  ['request','response','metadata'].forEach(key => {
    if (log[key] == null) return;
    const val = typeof log[key] === 'string' ? log[key] : JSON.stringify(log[key], null, 2);
    html += `<div class="log-modal-label">${esc(key)}</div><div class="log-modal-val log-mono">${esc(val)}</div>`;
  });
  body.innerHTML = html;
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detail-modal').style.display = 'none';
}

function refreshAnalytics() {
  const groupBy = document.getElementById('f-group').value;
  const { hours } = filterCurrentLogs();
  const groupRows = aggregateGroups(groupBy);
  renderSummaryCards(groupRows, hours);
  renderStatusChart();
  renderGroupChart(groupRows);
  renderGroupTable(groupRows);
  renderTimelineCharts(groupBy);
  applyLogFilters(false);
  const baseMsg = analyticsTruncated
    ? `分析基于最近 ${serviceLogs.length} 条调用样本，结果为近似值。`
    : `分析基于当前时间窗口内 ${serviceLogs.length} 条调用记录。`;
  setBanner(analyticsTruncated ? 'warn' : 'info', `${baseMsg} 后端缓存作用域：${serverMeta?.cache_scope || 'unknown'}。`);
}

function logsCacheName() {
  const hours = Number(document.getElementById('f-hours').value || 24);
  const success = document.getElementById('f-success').value || 'all';
  const serviceKind = document.getElementById('f-service-kind').value.trim().toLowerCase() || '-';
  return `service:analytics:${hours}:${success}:${serviceKind}`;
}

async function loadAll(forceFresh = false) {
  await ensureServerMeta();
  const hours = Number(document.getElementById('f-hours').value || 24);
  const limit = Math.min(ANALYTICS_CAP, Math.max(400, hours * 160));
  const success = document.getElementById('f-success').value;
  const serviceKind = document.getElementById('f-service-kind').value.trim();
  const { sinceMs, untilMs } = hoursToWindow(hours);
  const cacheName = logsCacheName();
  const cached = readCache(cacheName);
  if (!forceFresh && cached) {
    serviceLogs = cached.rows || [];
    analyticsTruncated = !!cached.truncated;
    refreshAnalytics();
  }
  const params = new URLSearchParams({ limit: String(limit), since: String(sinceMs / 1000), until: String(untilMs / 1000) });
  if (success) params.set('success', success);
  if (serviceKind) params.set('service_kind', serviceKind);
  try {
    if (!cached) setBanner('info', '服务日志分析加载中…');
    const resp = await fetch('/admin/api/logs/service/logs?' + params.toString());
    if (!resp.ok) throw new Error(await resp.text());
    serviceLogs = await resp.json();
    analyticsTruncated = serviceLogs.length >= limit;
    writeCache(cacheName, { rows: serviceLogs, truncated: analyticsTruncated }, 45000);
    refreshAnalytics();
  } catch (err) {
    if (!cached) {
      serviceLogs = [];
      filteredLogs = [];
      refreshAnalytics();
    }
    setBanner('err', `服务日志加载失败：${err.message || err}`);
  }
}

function applyLogFilters(resetPage = true) {
  const service = document.getElementById('q-service').value.trim().toLowerCase();
  const operation = document.getElementById('q-operation').value.trim().toLowerCase();
  const client = document.getElementById('q-client').value.trim().toLowerCase();
  const subset = filteredLogs.filter(log => {
    if (service && !String(log.service_kind || '').toLowerCase().includes(service)) return false;
    if (operation && !String(log.operation || '').toLowerCase().includes(operation)) return false;
    if (client && !String(log.client_class || '').toLowerCase().includes(client)) return false;
    return true;
  }).sort((a, b) => (parseLogDate(b)?.getTime() || 0) - (parseLogDate(a)?.getTime() || 0));
  allTableLogs = subset;
  if (resetPage) logPageIndex = 0;
  renderLogsPage(logPageIndex);
}

function renderLogsPage(pageIndex) {
  const pageSize = Number(document.getElementById('q-limit').value || 100);
  const maxPage = Math.max(0, Math.ceil(allTableLogs.length / pageSize) - 1);
  logPageIndex = Math.max(0, Math.min(pageIndex, maxPage));
  const start = logPageIndex * pageSize;
  const page = allTableLogs.slice(start, start + pageSize);
  renderLogsTable(page);
  document.getElementById('logs-prev-btn').disabled = logPageIndex <= 0;
  document.getElementById('logs-next-btn').disabled = logPageIndex >= maxPage;
  document.getElementById('logs-page-info').textContent = allTableLogs.length
    ? `第 ${logPageIndex + 1} / ${maxPage + 1} 页，共 ${allTableLogs.length} 条匹配记录`
    : '当前没有匹配记录';
}

window.addEventListener('beforeunload', () => Object.keys(charts).forEach(destroyChart));

loadAll(false);
</script>
</body>
</html>
