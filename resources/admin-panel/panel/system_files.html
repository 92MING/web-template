    function renderDelimitedPreview(text, delimiter) {
      const lines = String(text || '').split(/\r?\n/).filter((line) => line.length > 0).slice(0, 61);
      if (!lines.length) {
        return renderPreviewEmpty('文件为空', '当前文本文件没有可显示内容。');
      }
      const rows = lines.map((line) => line.split(delimiter));
      const maxCols = rows.reduce((count, row) => Math.max(count, row.length), 0);
      return `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                ${Array.from({ length: maxCols }, (_, col) => `<th>${escapeHtml(columnLabel(col + 1))}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${rows.map((row, rowIndex) => `<tr><td>${escapeHtml(rowIndex + 1)}</td>${Array.from({ length: maxCols }, (_, col) => `<td>${escapeHtml(row[col] ?? '')}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDocxPreviewShell(previewId) {
      return `
        <div class="docx-preview-shell">
          <div class="docx-preview-toolbar">
            <div class="flex flex-wrap items-center gap-2 text-xs text-slate-500">
              <span class="chip">DOCX</span>
              <span class="chip">预览</span>
            </div>
          </div>
          <div id="${previewId}" class="docx-preview-stage">
            <div class="docx-preview-loading">
              <div class="spinner"></div>
              <div class="font-semibold">正在加载 DOCX 预览...</div>
            </div>
          </div>
        </div>`;
    }

    async function fetchOfficePreviewPayload(entry) {
      const response = await fetch(buildFileUrl('/admin/api/system/files/office-preview', entry.relative_path));
      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.detail || `HTTP ${response.status}`);
      }
      return response.json();
    }

    async function renderDocxFallback(container, entry, reason) {
      try {
        const payload = await fetchOfficePreviewPayload(entry);
        payload.warnings = [
          reason ? `DOCX 排版预览失败，已自动切换到结构化预览：${reason}` : 'DOCX 排版预览失败，已自动切换到结构化预览。',
          ...((Array.isArray(payload.warnings) ? payload.warnings : []).filter(Boolean)),
        ];
        container.innerHTML = renderOfficePreview(payload);
        initOfficePreviewBindings();
      } catch (error) {
        container.innerHTML = renderPreviewEmpty('DOCX 预览失败', error?.message || '结构化回退也失败了，请直接下载原文件。');
      }
    }

    async function mountDocxPreview(previewId, entry) {
      const container = document.getElementById(previewId);
      if (!container) return;
      try {
        if (!window.docx || typeof window.docx.renderAsync !== 'function') {
          throw new Error('DOCX 渲染库未加载');
        }
        const response = await fetch(buildFileUrl('/admin/api/system/files/raw', entry.relative_path));
        if (!response.ok) {
          throw new Error(await response.text() || `HTTP ${response.status}`);
        }
        const blob = await response.blob();
        container.innerHTML = '';
        await window.docx.renderAsync(blob, container, null, {
          inWrapper: true,
          breakPages: true,
          useBase64URL: true,
          ignoreLastRenderedPageBreak: false,
        });
      } catch (error) {
        await renderDocxFallback(container, entry, error?.message || '无法渲染文档');
      }
    }

    function setActiveOfficePage(previewId, pageIndex) {
      const root = document.getElementById(previewId);
      if (!root) return;
      root.querySelectorAll('[data-office-nav]').forEach((button) => {
        const active = String(button.getAttribute('data-office-nav') || '') === String(pageIndex || '');
        button.classList.toggle('active', active);
      });
    }

    function officeVisibleNavButtons(root) {
      return Array.from(root.querySelectorAll('[data-office-nav]')).filter((button) => !button.hidden);
    }

    function openOfficePdfPage(previewId, pageIndex) {
      const root = document.getElementById(previewId);
      if (!root) return;
      const frame = root.querySelector('[data-office-pdf-frame]');
      const pdfUrl = root.getAttribute('data-pdf-url') || '';
      if (!(frame instanceof HTMLIFrameElement) || !pdfUrl) return;
      root.setAttribute('data-current-page', String(Number(pageIndex || 1)));
      frame.src = `${pdfUrl}#page=${Number(pageIndex || 1)}&zoom=page-fit`;
      setActiveOfficePage(previewId, pageIndex);
    }

    function jumpToOfficePage(previewId, pageIndex) {
      const root = document.getElementById(previewId);
      if (!root) return;
      if (root.hasAttribute('data-pdf-url')) {
        openOfficePdfPage(previewId, pageIndex);
        return;
      }
      const page = root.querySelector(`[data-office-page="${String(pageIndex)}"]`);
      if (!page) return;
      setActiveOfficePage(previewId, pageIndex);
      page.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function stepOfficePreviewPage(previewId, direction) {
      const root = document.getElementById(previewId);
      if (!root) return;
      const buttons = officeVisibleNavButtons(root);
      if (!buttons.length) return;
      const pages = buttons.map((button) => Number(button.getAttribute('data-office-nav') || 0)).filter(Boolean);
      const current = Number(root.getAttribute('data-current-page') || pages[0] || 1);
      const currentIndex = Math.max(0, pages.indexOf(current));
      const nextIndex = Math.max(0, Math.min(pages.length - 1, currentIndex + direction));
      const targetPage = pages[nextIndex] || pages[0];
      root.setAttribute('data-current-page', String(targetPage));
      jumpToOfficePage(previewId, targetPage);
    }

    function filterOfficePreviewPages(previewId, keyword) {
      const root = document.getElementById(previewId);
      if (!root) return;
      const needle = String(keyword || '').trim().toLowerCase();
      const pages = Array.from(root.querySelectorAll('[data-office-page]'));
      let visible = 0;
      pages.forEach((page) => {
        const haystack = String(page.getAttribute('data-search') || '').toLowerCase();
        const matched = !needle || haystack.includes(needle);
        page.hidden = !matched;
        if (matched) visible += 1;
      });
      root.querySelectorAll('[data-office-nav]').forEach((button) => {
        const haystack = String(button.getAttribute('data-search') || '').toLowerCase();
        button.hidden = !!needle && !haystack.includes(needle);
      });
      const counter = root.querySelector('[data-role="office-visible-count"]');
      if (counter) counter.textContent = `${visible}/${pages.length}`;
      const empty = root.querySelector('[data-role="office-empty-filter"]');
      if (empty) empty.hidden = visible !== 0;
      const firstVisibleNav = root.querySelector('[data-office-nav]:not([hidden])');
      if (firstVisibleNav) {
        const pageIndex = firstVisibleNav.getAttribute('data-office-nav') || '1';
        root.setAttribute('data-current-page', pageIndex);
        setActiveOfficePage(previewId, pageIndex);
        if (root.hasAttribute('data-pdf-url')) {
          openOfficePdfPage(previewId, pageIndex);
        }
      }
    }

    function initOfficePreviewBindings() {
      document.querySelectorAll('[data-office-pdf-root]').forEach((root) => {
        const firstButton = root.querySelector('[data-office-nav]');
        if (!firstButton) return;
        const pageIndex = firstButton.getAttribute('data-office-nav') || '1';
        root.setAttribute('data-current-page', pageIndex);
        openOfficePdfPage(root.id, pageIndex);
      });
    }

    function officePageThumbnail(page, pageLabel, isPresentation) {
      const items = Array.isArray(page?.items) ? page.items : [];
      const image = items.find((item) => item?.kind === 'image' && item?.src);
      if (isPresentation && image?.src) {
        return `<div class="office-nav-thumb"><img src="${escapeAttr(image.src)}" alt="${escapeAttr(`${pageLabel} ${page.index || ''}`)}" /><span class="office-nav-thumb-badge">${escapeHtml(page.index)}</span></div>`;
      }
      if (isPresentation) {
        return `<div class="office-nav-thumb"><div class="office-nav-thumb-fallback"><div class="big">${escapeHtml(page.index)}</div></div></div>`;
      }
      return '';
    }

    function renderOfficePdfPreview(payload) {
      const pages = Array.isArray(payload?.pages) ? payload.pages : [];
      const previewId = `office-pdf-preview-${Math.random().toString(36).slice(2, 10)}`;
      const pageLabel = payload?.page_label || '页';
      const warnings = Array.isArray(payload?.warnings) ? payload.warnings.filter(Boolean) : [];
      const supportLevel = payload?.support_level || 'best_effort';
      const formatName = String(payload?.format || 'office').toUpperCase();
      const pdfUrl = String(payload?.pdf_url || '');
      const nav = pages.map((page) => {
        const pageIndex = Number(page?.index || 0);
        const title = String(page?.title || `${pageLabel} ${pageIndex}`);
        const thumbnailUrl = String(page?.thumbnail_url || '');
        return `<button type="button" class="office-nav-btn office-nav-card" data-office-nav="${escapeAttr(pageIndex)}" data-search="${escapeAttr(title)}" onclick="document.getElementById('${previewId}')?.setAttribute('data-current-page', '${pageIndex}');openOfficePdfPage('${previewId}', ${pageIndex})"><div class="office-nav-thumb">${thumbnailUrl ? `<img loading="lazy" src="${escapeAttr(thumbnailUrl)}" alt="${escapeAttr(title)}" />` : `<div class="office-nav-thumb-fallback"><div class="big">${escapeHtml(pageIndex)}</div></div>`}<span class="office-nav-thumb-badge">${escapeHtml(pageIndex)}</span></div><div class="office-nav-card-body"><strong>${escapeHtml(pageLabel)} ${escapeHtml(pageIndex)}</strong><div class="office-nav-title">${escapeHtml(title)}</div></div></button>`;
      }).join('');
      return `<div class="office-preview-layout presentation" id="${previewId}" data-office-pdf-root="1" data-pdf-url="${escapeAttr(pdfUrl)}"><aside class="office-preview-sidebar"><div class="text-sm font-semibold">页面导航</div><div class="text-xs mt-1 text-slate-500">预览使用缓存 PDF，左侧为缩略页目录。</div><input class="search-input mt-3" type="search" placeholder="筛选页标题..." oninput="filterOfficePreviewPages('${previewId}', this.value)" /><div class="text-xs mt-2 text-slate-500">显示 <span data-role="office-visible-count">${pages.length}/${pages.length}</span> ${escapeHtml(pageLabel)}</div><div class="office-preview-nav">${nav}</div><div class="preview-empty" data-role="office-empty-filter" hidden><div class="text-sm font-semibold">没有匹配页面</div><div class="text-xs">请修改筛选词后重试。</div></div></aside><div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="office-pill">${escapeHtml(formatName)}</span><span class="office-pill ${supportLevel === 'stable' ? 'ok' : 'warn'}">${escapeHtml(officeSupportLabel(supportLevel))}</span><span class="office-pill">PDF 预览</span></div><div class="office-summary-grid"><span class="office-pill">${escapeHtml(payload?.page_count || 0)} ${escapeHtml(pageLabel)}</span></div><div class="office-summary-actions"><button type="button" class="btn" onclick="stepOfficePreviewPage('${previewId}', -1)">上一${escapeHtml(pageLabel)}</button><button type="button" class="btn" onclick="stepOfficePreviewPage('${previewId}', 1)">下一${escapeHtml(pageLabel)}</button></div>${warnings.map((text) => `<div class="office-warning">${escapeHtml(text)}</div>`).join('')}</div><iframe class="office-pdf-frame" data-office-pdf-frame src="about:blank" title="${escapeAttr(payload?.name || 'Office PDF preview')}"></iframe></div></div>`;
    }

    function renderOfficeSpreadsheetPreview(payload) {
      const pages = Array.isArray(payload?.pages) ? payload.pages : [];
      const previewId = `office-preview-${Math.random().toString(36).slice(2, 10)}`;
      const pageLabel = payload?.page_label || '工作表';
      const warnings = Array.isArray(payload?.warnings) ? payload.warnings.filter(Boolean) : [];
      const supportLevel = payload?.support_level || 'best_effort';
      const formatName = String(payload?.format || 'office').toUpperCase();
      if (!pages.length) {
        return `<div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="office-pill">${escapeHtml(formatName)}</span><span class="office-pill ${supportLevel === 'stable' ? 'ok' : 'warn'}">${escapeHtml(officeSupportLabel(supportLevel))}</span><span class="office-pill">表格</span></div>${warnings.map((text) => `<div class="office-warning">${escapeHtml(text)}</div>`).join('')}${renderPreviewEmpty('未提取到可预览工作表', '该表格可以下载，但当前未解析出可展示内容。')}</div>`;
      }
      const nav = pages.map((page) => {
        const title = String(page?.title || page?.sheet_name || `${pageLabel} ${page?.index || ''}`);
        const excerpt = String(page?.excerpt || '');
        const searchText = [pageLabel, page?.index, title, excerpt].join(' ');
        return `<button type="button" class="office-nav-btn" data-office-nav="${escapeAttr(page.index)}" data-search="${escapeAttr(searchText)}" onclick="jumpToOfficePage('${previewId}', ${Number(page.index || 0)})"><strong>${escapeHtml(title)}</strong><div class="office-nav-title">${escapeHtml(page.row_count || 0)} 行 · ${escapeHtml(page.column_count || 0)} 列</div><small>${escapeHtml(excerpt || '无摘要')}</small><div class="office-nav-meta"><span>${escapeHtml(page.preview_rows?.length || 0)} 行预览</span>${page.truncated ? '<span>已裁剪</span>' : ''}</div></button>`;
      }).join('');
      const html = pages.map((page) => {
        const rows = Array.isArray(page?.preview_rows) ? page.preview_rows : [];
        const maxCols = rows.reduce((count, row) => Math.max(count, Array.isArray(row) ? row.length : 0), 0);
        const title = String(page?.title || page?.sheet_name || `${pageLabel} ${page?.index || ''}`);
        const excerpt = String(page?.excerpt || '');
        const metaBits = [`${Number(page?.row_count || 0)} 行`, `${Number(page?.column_count || 0)} 列`];
        if (page?.truncated) metaBits.push(`仅预览前 ${Number(page?.preview_row_limit || 0)} 行 / ${Number(page?.preview_col_limit || 0)} 列`);
        const table = rows.length
          ? `<div class="office-sheet-table-wrap"><table class="office-sheet-table"><thead><tr><th class="sheet-row-head">#</th>${Array.from({ length: maxCols }, (_, col) => `<th>${escapeHtml(columnLabel(col + 1))}</th>`).join('')}</tr></thead><tbody>${rows.map((row, rowIndex) => `<tr><th class="sheet-row-head">${escapeHtml(rowIndex + 1)}</th>${Array.from({ length: maxCols }, (_, col) => `<td>${escapeHtml(Array.isArray(row) ? (row[col] ?? '') : '')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`
          : '<div class="text-sm text-slate-500">该工作表没有可展示内容。</div>';
        return `<section class="office-page" data-office-page="${escapeAttr(page.index)}" data-search="${escapeAttr([pageLabel, page?.index, title, excerpt].join(' '))}"><div class="office-page-title">${escapeHtml(pageLabel)} ${escapeHtml(page.index)}</div><div class="office-page-heading">${escapeHtml(title)}</div><div class="office-page-meta">${escapeHtml(metaBits.join(' · '))}</div>${excerpt ? `<div class="text-sm mb-3 text-slate-500">${escapeHtml(excerpt)}</div>` : ''}${table}${page?.truncated ? `<div class="office-sheet-note">当前在线预览已裁剪为前 ${escapeHtml(page.preview_row_limit || 0)} 行、前 ${escapeHtml(page.preview_col_limit || 0)} 列。</div>` : ''}</section>`;
      }).join('');
      return `<div class="office-preview-layout spreadsheet" id="${previewId}" data-office-preview-root="1"><aside class="office-preview-sidebar"><div class="text-sm font-semibold">工作表导航</div><div class="text-xs mt-1 text-slate-500">可按工作表名称或摘要快速筛选。</div><input class="search-input mt-3" type="search" placeholder="筛选工作表..." oninput="filterOfficePreviewPages('${previewId}', this.value)" /><div class="text-xs mt-2 text-slate-500">显示 <span data-role="office-visible-count">${pages.length}/${pages.length}</span> ${escapeHtml(pageLabel)}</div><div class="office-preview-nav">${nav}</div><div class="preview-empty" data-role="office-empty-filter" hidden><div class="text-sm font-semibold">没有匹配工作表</div><div class="text-xs">请修改筛选词后重试。</div></div></aside><div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="office-pill">${escapeHtml(formatName)}</span><span class="office-pill ${supportLevel === 'stable' ? 'ok' : 'warn'}">${escapeHtml(officeSupportLabel(supportLevel))}</span><span class="office-pill">表格</span></div><div class="office-summary-grid"><span class="office-pill">${escapeHtml(payload?.sheet_count || payload?.page_count || 0)} 张工作表</span><span class="office-pill">${escapeHtml(payload?.row_count || 0)} 行</span><span class="office-pill">${escapeHtml(payload?.column_count || 0)} 列</span></div><div class="office-summary-actions"><button type="button" class="btn" onclick="stepOfficePreviewPage('${previewId}', -1)">上一${escapeHtml(pageLabel)}</button><button type="button" class="btn" onclick="stepOfficePreviewPage('${previewId}', 1)">下一${escapeHtml(pageLabel)}</button></div>${warnings.map((text) => `<div class="office-warning">${escapeHtml(text)}</div>`).join('')}</div><div class="office-preview">${html}</div></div></div>`;
    }

    function renderOfficePreview(payload) {
      if (payload?.preview_mode === 'pdf') {
        return renderOfficePdfPreview(payload);
      }
      if (payload?.kind === 'spreadsheet') {
        return renderOfficeSpreadsheetPreview(payload);
      }
      const pages = Array.isArray(payload?.pages) ? payload.pages : [];
      const previewId = `office-preview-${Math.random().toString(36).slice(2, 10)}`;
      const pageLabel = payload?.page_label || '页';
      const warnings = Array.isArray(payload?.warnings) ? payload.warnings.filter(Boolean) : [];
      const supportLevel = payload?.support_level || 'best_effort';
      const formatName = String(payload?.format || 'office').toUpperCase();
      const isPresentation = payload?.kind === 'presentation';
      if (!pages.length) {
        return `<div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="office-pill">${escapeHtml(formatName)}</span><span class="office-pill ${supportLevel === 'stable' ? 'ok' : 'warn'}">${escapeHtml(officeSupportLabel(supportLevel))}</span><span class="office-pill">${escapeHtml(isPresentation ? '演示文稿' : '文档')}</span></div>${warnings.map((text) => `<div class="office-warning">${escapeHtml(text)}</div>`).join('')}${renderPreviewEmpty('未提取到可预览内容', '该 Office 文档可以下载，但当前未解析出可展示页面。')}</div>`;
      }
      const nav = pages.map((page) => {
        const excerpt = String(page?.excerpt || '');
        const title = String(page?.title || `${pageLabel} ${page?.index || ''}`);
        const itemCount = Number(page?.item_count || 0);
        const imageCount = Number(page?.image_count || 0);
        const searchText = [pageLabel, page?.index, title, excerpt].join(' ');
        const thumb = officePageThumbnail(page, pageLabel, isPresentation);
        const meta = `<div class="office-nav-meta"><span>${escapeHtml(itemCount)} 个片段</span><span>${escapeHtml(imageCount)} 张图片</span></div>`;
        if (isPresentation) {
          return `<button type="button" class="office-nav-btn office-nav-card" data-office-nav="${escapeAttr(page.index)}" data-search="${escapeAttr(searchText)}" onclick="jumpToOfficePage('${previewId}', ${Number(page.index || 0)})">${thumb}<div class="office-nav-card-body"><strong>${escapeHtml(pageLabel)} ${escapeHtml(page.index)}</strong><div class="office-nav-title">${escapeHtml(title)}</div><small>${escapeHtml(excerpt || '无文字摘要')}</small>${meta}</div></button>`;
        }
        return `<button type="button" class="office-nav-btn" data-office-nav="${escapeAttr(page.index)}" data-search="${escapeAttr(searchText)}" onclick="jumpToOfficePage('${previewId}', ${Number(page.index || 0)})"><strong>${escapeHtml(pageLabel)} ${escapeHtml(page.index)}</strong><div class="office-nav-title">${escapeHtml(title)}</div><small>${escapeHtml(excerpt || '无文字摘要')}</small>${meta}</button>`;
      }).join('');
      const html = pages.map((page) => {
        const items = Array.isArray(page?.items) ? page.items : [];
        const excerpt = String(page?.excerpt || '');
        const title = String(page?.title || `${pageLabel} ${page?.index || ''}`);
        const metaBits = [];
        if (Number(page?.text_count || 0) > 0) metaBits.push(`${page.text_count} 段文本`);
        if (Number(page?.image_count || 0) > 0) metaBits.push(`${page.image_count} 张图片`);
        const inner = items.map((item) => {
          if (item?.kind === 'image' && item?.src) {
            return `<img src="${escapeAttr(item.src)}" alt="${escapeAttr(`${pageLabel} ${page.index || ''}`)}" />`;
          }
          if (item?.kind === 'markdown') {
            return `<div class="md-preview">${renderMarkdownSafe(String(item.text || ''))}</div>`;
          }
          return '';
        }).join('');
        return `<section class="office-page" data-office-page="${escapeAttr(page.index)}" data-search="${escapeAttr([pageLabel, page?.index, title, excerpt].join(' '))}"><div class="office-page-title">${escapeHtml(pageLabel)} ${escapeHtml(page.index)}</div><div class="office-page-heading">${escapeHtml(title)}</div><div class="office-page-meta">${escapeHtml(metaBits.join(' · ') || '无结构化摘要')}</div>${excerpt ? `<div class="text-sm mb-2 text-slate-500">${escapeHtml(excerpt)}</div>` : ''}${inner || '<div class="text-sm text-slate-500">该页无可展示内容。</div>'}</section>`;
      }).join('');
      return `<div class="office-preview-layout ${isPresentation ? 'presentation' : 'document'}" id="${previewId}" data-office-preview-root="1"><aside class="office-preview-sidebar"><div class="text-sm font-semibold">页面导航</div><div class="text-xs mt-1 text-slate-500">${isPresentation ? '以缩略卡片浏览幻灯片，并可快速跳转。' : '以纸张视图浏览文档，并可按摘要快速跳转。'}</div><input class="search-input mt-3" type="search" placeholder="筛选页面内容..." oninput="filterOfficePreviewPages('${previewId}', this.value)" /><div class="text-xs mt-2 text-slate-500">显示 <span data-role="office-visible-count">${pages.length}/${pages.length}</span> ${escapeHtml(pageLabel)}</div><div class="office-preview-nav">${nav}</div><div class="preview-empty" data-role="office-empty-filter" hidden><div class="text-sm font-semibold">没有匹配页面</div><div class="text-xs">请修改筛选词后重试。</div></div></aside><div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="office-pill">${escapeHtml(formatName)}</span><span class="office-pill ${supportLevel === 'stable' ? 'ok' : 'warn'}">${escapeHtml(officeSupportLabel(supportLevel))}</span><span class="office-pill">${escapeHtml(isPresentation ? '演示文稿' : '文档')}</span></div><div class="office-summary-grid"><span class="office-pill">${escapeHtml(payload?.page_count || 0)} ${escapeHtml(pageLabel)}</span><span class="office-pill">${escapeHtml(payload?.text_item_count || 0)} 段文本</span><span class="office-pill">${escapeHtml(payload?.image_item_count || 0)} 张图片</span></div><div class="office-summary-actions"><button type="button" class="btn" onclick="stepOfficePreviewPage('${previewId}', -1)">上一${escapeHtml(pageLabel)}</button><button type="button" class="btn" onclick="stepOfficePreviewPage('${previewId}', 1)">下一${escapeHtml(pageLabel)}</button></div>${warnings.map((text) => `<div class="office-warning">${escapeHtml(text)}</div>`).join('')}</div><div class="office-preview">${html}</div></div></div>`;
    }

    function renderTextPreview(entry, data) {
      state.textPreview = { entryPath: entry.relative_path, ...data };
      const mimeType = String(data.mime_type || entry.mime_type || '').toLowerCase();
      const extension = fileExt(entry);
      const warnings = [];
      if (data.truncated) warnings.push('已截断');
      if (data.encoding) warnings.push(`编码: ${data.encoding}`);
      const note = warnings.length
        ? `<div class="preview-note${data.truncated ? ' warn' : ''}">${warnings.map((item) => escapeHtml(item)).join(' · ')}</div>`
        : '';
      setPreviewHtml(`${note}${renderCodePreview(data.content || '', extension, mimeType)}`);
      document.getElementById('meta-mime').textContent = data.mime_type || entry.mime_type || '文本';
    }

    async function loadPreview(entry) {
      const requestId = ++state.previewRequestId;
      setPreviewHtml(`<div class="preview-empty"><div class="spinner"></div><div class="text-sm font-semibold text-slate-700 dark:text-slate-200">正在载入预览...</div></div>`);

      const mimeType = String(entry.mime_type || '').toLowerCase();
      const extension = fileExt(entry);
      const rawUrl = buildFileUrl('/admin/api/system/files/raw', entry.relative_path);

      if (isImage(mimeType, extension)) {
        setPreviewHtml(`<div class="preview-media flex h-full items-center justify-center"><img class="max-h-[560px] max-w-full rounded-xl border border-slate-200 dark:border-white/10" src="${rawUrl}" alt="${escapeAttr(entry.name)}" /></div>`);
        return;
      }

      if (isPdf(mimeType, extension)) {
        setPreviewHtml(`<iframe class="preview-frame" src="${rawUrl}" title="${escapeAttr(entry.name)}"></iframe>`);
        return;
      }

      if (isVideo(mimeType, extension)) {
        setPreviewHtml(`<div class="preview-media"><video controls src="${rawUrl}"></video></div>`);
        return;
      }

      if (isAudio(mimeType, extension)) {
        setPreviewHtml(`<div class="preview-media"><audio controls src="${rawUrl}"></audio></div>`);
        return;
      }

      if (isHtmlFile(mimeType, extension)) {
        const response = await fetch(rawUrl);
        if (!response.ok) throw new Error('HTML 预览失败');
        const text = await response.text();
        if (requestId !== state.previewRequestId) return;
        setPreviewHtml(`<iframe class="preview-frame" sandbox="" srcdoc="${escapeAttr(text)}" title="${escapeAttr(entry.name)}"></iframe>`);
        return;
      }

      if (isDelimitedText(mimeType, extension)) {
        const response = await fetch(rawUrl);
        if (!response.ok) throw new Error('表格文本预览失败');
        const text = await response.text();
        if (requestId !== state.previewRequestId) return;
        setPreviewHtml(renderDelimitedPreview(text, extension === 'tsv' ? '\t' : ','));
        return;
      }

      if (isDocxPreviewable(extension)) {
        const previewId = `docx-preview-${Math.random().toString(36).slice(2, 10)}`;
        setPreviewHtml(renderDocxPreviewShell(previewId));
        await mountDocxPreview(previewId, entry);
        return;
      }

      if (isOfficeDoc(extension)) {
        const payload = await fetchOfficePreviewPayload(entry);
        if (requestId !== state.previewRequestId) return;
        setPreviewHtml(renderOfficePreview(payload));
        initOfficePreviewBindings();
        return;
      }

      if (isMarkdown(extension)) {
        const response = await fetch(rawUrl);
        if (!response.ok) throw new Error('Markdown 预览失败');
        const text = await response.text();
        if (requestId !== state.previewRequestId) return;
        setPreviewHtml(`<div class="md-preview">${renderMarkdownSafe(text)}</div>`);
        return;
      }

      if (isText(mimeType, extension)) {
        const data = await fetchTextPreview(entry, 200000);
        if (requestId !== state.previewRequestId) return;
        renderTextPreview(entry, data);
        return;
      }

      setPreviewHtml(renderPreviewEmpty('无法预览此文件类型', '该文件类型暂不支持内联预览，请使用下载操作查看。'));
    }

    function bindEditorEvents() {
      const area = document.getElementById('editor-area');
      const stat = document.getElementById('editor-stats');
      if (!area || !stat) return;
      const updateStats = () => {
        const dirty = area.value !== state.editor.original;
        stat.textContent = `${area.value.length} 字符 · ${area.value.split(/\r?\n/).length} 行${dirty ? ' · 未保存' : ''}`;
      };
      area.addEventListener('input', updateStats);
      area.addEventListener('keydown', (event) => {
        if (event.key !== 'Tab') return;
        event.preventDefault();
        const start = area.selectionStart;
        const end = area.selectionEnd;
        area.value = area.value.slice(0, start) + '  ' + area.value.slice(end);
        area.selectionStart = area.selectionEnd = start + 2;
        updateStats();
      });
      updateStats();
      area.focus();
    }

    async function openEditor() {
      if (!state.selected || !canEditEntry(state.selected)) return;
      const entry = state.selected;
      setStatus('正在载入完整文本...', true);
      const data = await fetchTextPreview(entry, 0);
      state.textPreview = { entryPath: entry.relative_path, ...data };
      const encoding = String(data.encoding || '').includes('(') ? 'utf-8' : (data.encoding || 'utf-8');
      const overlay = document.getElementById('files-edit-modal');
      const area = document.getElementById('editor-modal-area');
      const titleEl = document.getElementById('editor-modal-title');
      const encEl = document.getElementById('editor-modal-encoding');
      area.value = String(data.content || '');
      // textarea normalizes \r\n -> \n; capture canonical form to avoid spurious dirty state
      state.editor = {
        active: true,
        path: entry.relative_path,
        original: area.value,
        encoding,
      };
      titleEl.textContent = entry.name;
      titleEl.title = entry.relative_path;
      encEl.textContent = `编码: ${encoding}`;
      overlay.classList.remove('hidden');
      document.body.classList.add('editor-modal-open');
      bindEditorEvents();
      setStatus('编辑中', true);
    }

    function closeEditorModal() {
      const overlay = document.getElementById('files-edit-modal');
      overlay.classList.add('hidden');
      document.body.classList.remove('editor-modal-open');
    }

    async function cancelEditor() {
      if (!confirmDiscardEditor()) return;
      resetEditorState();
      closeEditorModal();
      updateActionButtons();
      setStatus('已退出', true);
    }

    function findRowByPath(relativePath) {
      return Array.from(document.querySelectorAll('.entry-selectable')).find((row) => row.dataset.relativePath === relativePath) || null;
    }

    async function saveEditor() {
      if (!state.selected || !state.editor.active) return;
      const area = document.getElementById('editor-modal-area');
      if (!area) return;
      const response = await fetch(buildFileUrl('/admin/api/system/files/text', state.selected.relative_path), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: area.value, encoding: state.editor.encoding || 'utf-8' }),
      });
      if (!response.ok) {
        throw new Error(await response.text() || '保存失败');
      }
      resetEditorState();
      closeEditorModal();
      updateActionButtons();
      await loadDirectory(state.path, { preserveSelectionPath: state.selected.relative_path, skipConfirm: true, suppressStatus: true });
      setStatus('文件已保存', true);
    }

    async function loadDirectory(path, options = {}) {
      if (!options.skipConfirm && !confirmDiscardEditor()) return false;
      const targetRoot = options.root || state.root;
      const targetPath = path != null ? path : document.getElementById('path-input').value.trim();
      setStatus('正在读取目录...', true);
      const response = await fetch(`${httpUrl('/admin/api/system/files/list')}?${queryString(targetRoot, targetPath)}`);
      if (!response.ok) throw new Error(await response.text() || '目录读取失败');
      const data = await response.json();
      state.root = targetRoot;
      state.path = data.current_path || '';
      state.entries = data.entries || [];
      recordHistory(state.root, state.path, options.historyMode || 'push');
      updatePathUi();
      renderBreadcrumb();
      renderTable();
      const preserveSelectionPath = options.preserveSelectionPath || '';
      const preservedEntry = preserveSelectionPath ? state.entries.find((entry) => entry.relative_path === preserveSelectionPath) : null;
      if (preservedEntry) {
        const row = findRowByPath(preserveSelectionPath);
        if (row) {
          selectEntry(preservedEntry, row);
        } else {
          clearSelection('未选择项目');
        }
      } else {
        clearSelection('未选择项目');
      }
      if (!options.suppressStatus) setStatus('目录已刷新', true);
      return true;
    }

    async function uploadFiles(files, targetPath = state.path) {
      if (!files || !files.length) return;
      const form = new FormData();
      form.append('root', state.root);
      form.append('path', targetPath || '');
      for (const file of files) form.append('files', file);
      setStatus(`正在上传 ${files.length} 个文件...`, true);
      const response = await fetch(httpUrl('/admin/api/system/files/upload'), { method: 'POST', body: form });
      if (!response.ok) throw new Error(await response.text() || '上传失败');
      await loadDirectory(state.path);
      setStatus(`上传完成，共 ${files.length} 个文件`, true);
    }

    function initDropUpload() {
      const shell = document.getElementById('workspace-shell');
      if (!shell) return;
      let dragDepth = 0;
      const hasFiles = (event) => Array.from(event.dataTransfer?.types || []).includes('Files');
      shell.addEventListener('dragenter', (event) => {
        if (!hasFiles(event)) return;
        event.preventDefault();
        dragDepth += 1;
        shell.classList.add('dragover');
      });
      shell.addEventListener('dragover', (event) => {
        if (!hasFiles(event)) return;
        event.preventDefault();
        shell.classList.add('dragover');
      });
      shell.addEventListener('dragleave', (event) => {
        if (!hasFiles(event)) return;
        event.preventDefault();
        dragDepth = Math.max(0, dragDepth - 1);
        if (!dragDepth) shell.classList.remove('dragover');
      });
      shell.addEventListener('drop', async (event) => {
        if (!hasFiles(event)) return;
        event.preventDefault();
        dragDepth = 0;
        shell.classList.remove('dragover');
        const files = Array.from(event.dataTransfer?.files || []);
        if (!files.length) return;
        try {
          await uploadFiles(files);
        } catch (error) {
          setStatus(error.message || '上传失败', false);
        }
      });
    }

    async function createFolder(parentPath = state.path) {
      const name = window.prompt('请输入新文件夹名称');
      if (!name) return;
      const form = new FormData();
      form.append('root', state.root);
      form.append('path', parentPath || '');
      form.append('name', name);
      setStatus('正在创建文件夹...', true);
      const response = await fetch(httpUrl('/admin/api/system/files/mkdir'), { method: 'POST', body: form });
      if (!response.ok) throw new Error(await response.text() || '创建文件夹失败');
      await loadDirectory(state.path);
      setStatus('文件夹已创建', true);
    }

    async function deleteSelected() {
      if (!state.selected) return;
      const isDir = !!state.selected.is_dir;
      const confirmed = window.confirm(`确认删除${isDir ? '目录' : '文件'}“${state.selected.relative_path}”吗？${isDir ? ' 非空目录将递归删除。' : ''}`);
      if (!confirmed) return;
      const params = new URLSearchParams();
      params.set('root', state.root);
      params.set('path', state.selected.relative_path);
      if (isDir) params.set('recursive', 'true');
      setStatus(`正在删除${isDir ? '目录' : '文件'}...`, true);
      const response = await fetch(`${httpUrl('/admin/api/system/files/item')}?${params.toString()}`, { method: 'DELETE' });
      if (!response.ok) throw new Error(await response.text() || '删除失败');
      await loadDirectory(state.path);
      setStatus('删除完成', true);
    }

    async function loadConfig() {
      const response = await fetch(httpUrl('/admin/api/system/tools/config'));
      if (!response.ok) throw new Error('无法读取系统工具配置');
      const config = await response.json();
      state.config = config;
      state.root = config.default_root;
      state.path = '';

      const rootSelect = document.getElementById('root-select');
      rootSelect.innerHTML = '';
      config.roots.forEach((item) => {
        const option = document.createElement('option');
        option.value = item.key;
        option.textContent = `${item.label} · ${item.path}`;
        option.selected = item.key === config.default_root;
        rootSelect.appendChild(option);
      });
      updatePathUi();
      renderBreadcrumb();
    }

    document.getElementById('root-select').addEventListener('change', async (event) => {
      if (event.target.value === state.root) return;
      if (!confirmDiscardEditor()) {
        event.target.value = state.root;
        return;
      }
      try {
        await loadDirectory('', { skipConfirm: true, root: event.target.value });
      } catch (error) {
        event.target.value = state.root;
        setStatus(error.message || '目录读取失败', false);
      }
    });

    document.getElementById('path-input').addEventListener('keydown', async (event) => {
      if (event.key !== 'Enter') return;
      try {
        await loadDirectory(document.getElementById('path-input').value.trim(), { root: state.root });
      } catch (error) {
        setStatus(error.message || '目录读取失败', false);
      }
    });

    document.getElementById('search-input').addEventListener('input', (event) => {
      if (state.editor.active && !confirmDiscardEditor()) {
        event.target.value = state.filterText;
        return;
      }
      state.filterText = event.target.value || '';
      refreshWorkspaceSummary();
      resetEditorState();
      renderTable();
      clearSelection('筛选后请重新选择项目');
      syncSearchFilterBadge();
    });

    function syncSearchFilterBadge() {
      const btn = document.getElementById('search-filter-btn');
      const badge = document.getElementById('search-filter-badge');
      if (!btn || !badge) return;
      let count = 0;
      if (state.searchType) count += 1;
      if (state.searchWildcard) count += 1;
      btn.classList.toggle('has-active', count > 0);
      badge.textContent = String(count);
      badge.style.display = count ? 'inline-flex' : 'none';
    }

    function setSearchFilterOpen(open) {
      state.searchFilterOpen = !!open;
      const pop = document.getElementById('search-filter-popover');
      const btn = document.getElementById('search-filter-btn');
      if (pop) pop.classList.toggle('is-open', state.searchFilterOpen);
      if (btn) btn.setAttribute('aria-expanded', state.searchFilterOpen ? 'true' : 'false');
      if (state.searchFilterOpen) {
        const sel = document.getElementById('search-type-select');
        const wc = document.getElementById('search-wildcard');
        if (sel) sel.value = state.searchType || '';
        if (wc) wc.checked = !!state.searchWildcard;
      }
    }

    function applySearchFilters() {
      refreshWorkspaceSummary();
      renderTable();
      clearSelection('筛选后请重新选择项目');
      syncSearchFilterBadge();
    }

    document.getElementById('search-filter-btn').addEventListener('click', (event) => {
      event.stopPropagation();
      setSearchFilterOpen(!state.searchFilterOpen);
    });
    document.getElementById('search-type-select').addEventListener('change', (event) => {
      state.searchType = event.target.value || '';
      try { localStorage.setItem('proj_system_files_search_type', state.searchType); } catch {}
      applySearchFilters();
    });
    document.getElementById('search-wildcard').addEventListener('change', (event) => {
      state.searchWildcard = !!event.target.checked;
      try { localStorage.setItem('proj_system_files_search_wc', state.searchWildcard ? '1' : '0'); } catch {}
      applySearchFilters();
    });
    document.getElementById('search-filter-reset').addEventListener('click', () => {
      state.searchType = '';
      state.searchWildcard = false;
      try { localStorage.setItem('proj_system_files_search_type', ''); localStorage.setItem('proj_system_files_search_wc', '0'); } catch {}
      const sel = document.getElementById('search-type-select');
      const wc = document.getElementById('search-wildcard');
      if (sel) sel.value = '';
      if (wc) wc.checked = false;
      applySearchFilters();
    });
    document.getElementById('search-filter-close').addEventListener('click', () => setSearchFilterOpen(false));
    document.addEventListener('click', (event) => {
      if (!state.searchFilterOpen) return;
      const pop = document.getElementById('search-filter-popover');
      const btn = document.getElementById('search-filter-btn');
      if (pop && !pop.contains(event.target) && btn && !btn.contains(event.target)) {
        setSearchFilterOpen(false);
      }
    });
    syncSearchFilterBadge();

    document.querySelectorAll('.file-view-btn').forEach((button) => {
      button.addEventListener('click', () => {
        setFileView(button.dataset.fileView || 'list');
      });
    });

    document.getElementById('preview-toggle-btn').addEventListener('click', (event) => {
      event.stopPropagation();
      togglePreviewCollapsed();
    });

    document.querySelectorAll('.detail-tab').forEach((button) => {
      button.addEventListener('click', async () => {
        try {
          await switchDetailView(button.dataset.detailView || 'preview');
        } catch (error) {
          setStatus(error.message || '切换详情面板失败', false);
        }
      });
    });

    document.getElementById('browser-more-btn').addEventListener('click', (event) => {
      event.stopPropagation();
      const rect = event.currentTarget.getBoundingClientRect();
      showBrowserContextMenu({
        clientX: rect.right - 8,
        clientY: rect.bottom + 6,
        preventDefault() {},
        stopPropagation() {},
      });
    });

    document.getElementById('detail-more-btn').addEventListener('click', (event) => {
      event.stopPropagation();
      showSelectionContextMenu(event.currentTarget);
    });

    document.getElementById('detail-save-btn').addEventListener('click', async () => {
      try {
        await saveEditor();
      } catch (error) {
        setStatus(error.message || '保存失败', false);
      }
    });

    document.getElementById('detail-cancel-btn').addEventListener('click', async () => {
      try {
        await cancelEditor();
      } catch (error) {
        setStatus(error.message || '取消编辑失败', false);
      }
    });

    document.getElementById('editor-modal-save').addEventListener('click', async () => {
      try {
        await saveEditor();
      } catch (error) {
        setStatus(error.message || '保存失败', false);
      }
    });
    document.getElementById('editor-modal-cancel').addEventListener('click', async () => {
      try {
        await cancelEditor();
      } catch (error) {
        setStatus(error.message || '取消编辑失败', false);
      }
    });
    document.querySelector('#files-edit-modal .files-edit-modal-backdrop').addEventListener('click', async () => {
      try {
        await cancelEditor();
      } catch (error) {
        setStatus(error.message || '取消编辑失败', false);
      }
    });

    document.getElementById('extract-modal-cancel').addEventListener('click', closeExtractModal);
    document.querySelector('#files-extract-modal .files-edit-modal-backdrop').addEventListener('click', closeExtractModal);
    document.getElementById('extract-modal-run').addEventListener('click', () => {
      runExtractFromModal().catch((err) => setStatus(err.message || '解压失败', false));
    });
    document.addEventListener('keydown', (event) => {
      const overlay = document.getElementById('files-extract-modal');
      if (!overlay || overlay.classList.contains('hidden')) return;
      if (event.key === 'Escape') {
        event.preventDefault();
        closeExtractModal();
      } else if (event.key === 'Enter' && !event.shiftKey) {
        const tag = (event.target?.tagName || '').toLowerCase();
        if (tag !== 'textarea') {
          event.preventDefault();
          runExtractFromModal().catch((err) => setStatus(err.message || '解压失败', false));
        }
      }
    });
    document.addEventListener('keydown', (event) => {
      const overlay = document.getElementById('files-edit-modal');
      if (overlay.classList.contains('hidden')) return;
      if (event.key === 'Escape') {
        event.preventDefault();
        cancelEditor().catch((error) => setStatus(error.message || '取消编辑失败', false));
      } else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
        event.preventDefault();
        saveEditor().catch((error) => setStatus(error.message || '保存失败', false));
      }
    });

    document.getElementById('selection-more-btn').addEventListener('click', (event) => {
      event.stopPropagation();
      showSelectionContextMenu(event.currentTarget);
    });

    ['file-list-shell', 'workspace-table-scroll', 'file-card-shell', 'file-card-grid', 'list-panel'].forEach((id) => {
      const element = document.getElementById(id);
      if (!element) return;
      element.addEventListener('contextmenu', (event) => {
        if (event.target.closest('.entry-selectable')) return;
        showBrowserContextMenu(event);
      });
    });

    document.getElementById('files-context-menu').addEventListener('click', (event) => {
      event.stopPropagation();
    });

    document.addEventListener('click', () => {
      closeFilesContextMenu();
    });

    window.addEventListener('blur', closeFilesContextMenu);
    window.addEventListener('scroll', closeFilesContextMenu, true);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeFilesContextMenu();
    });

    window.addEventListener('resize', () => {
      closeFilesContextMenu();
      syncPreviewCollapsed();
    });

    window.addEventListener('beforeunload', (event) => {
      if (!hasUnsavedEditorChanges()) return;
      event.preventDefault();
      event.returnValue = '';
    });

    window.addEventListener('proj-language-change', () => {
      applyStaticTranslations();
      refreshWorkspaceSummary();
      syncPreviewCollapsed();
    });

    document.getElementById('refresh-btn').addEventListener('click', async () => {
      try {
        await loadDirectory(state.path, { root: state.root, historyMode: 'replace' });
      } catch (error) {
        setStatus(error.message || '刷新失败', false);
      }
    });

    document.getElementById('back-btn').addEventListener('click', async () => {
      try {
        await navigateHistory(-1);
      } catch (error) {
        setStatus(error.message || '无法返回上一个目录', false);
      }
    });

    document.getElementById('forward-btn').addEventListener('click', async () => {
      try {
        await navigateHistory(1);
      } catch (error) {
        setStatus(error.message || '无法前进到下一个目录', false);
      }
    });

    document.getElementById('mkdir-btn').addEventListener('click', async () => {
      try {
        await createFolder(state.path);
      } catch (error) {
        setStatus(error.message || '创建文件夹失败', false);
      }
    });

    document.getElementById('upload-btn').addEventListener('click', () => {
      pickUploadFiles(state.path);
    });

    const wireSelectionAction = (id, handler) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', async () => {
        try { await handler(); } catch (error) { setStatus(error.message || '操作失败', false); }
      });
    };
    wireSelectionAction('rename-icon-btn', () => state.selected ? renameEntry(state.selected) : null);
    wireSelectionAction('copy-icon-btn', () => state.selected ? setClipboard(state.selected, 'copy') : null);
    wireSelectionAction('cut-icon-btn', () => state.selected ? setClipboard(state.selected, 'cut') : null);
    wireSelectionAction('paste-icon-btn', () => state.clipboard ? pasteClipboardInto(state.path) : null);
    wireSelectionAction('extract-icon-btn', () => state.selected ? extractEntry(state.selected) : null);
    wireSelectionAction('delete-icon-btn', () => state.selected ? deleteSelected() : null);

    document.getElementById('upload-input').addEventListener('change', async (event) => {
      const files = Array.from(event.target.files || []);
      event.target.value = '';
      try {
        await uploadFiles(files, state.uploadTargetPath || state.path);
      } catch (error) {
        setStatus(error.message || '上传失败', false);
      } finally {
        state.uploadTargetPath = state.path;
      }
    });

    document.getElementById('open-btn').addEventListener('click', async () => {
      try {
        await openSelected();
      } catch (error) {
        setStatus(error.message || '打开失败', false);
      }
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      downloadEntry(state.selected);
    });

    document.getElementById('delete-btn').addEventListener('click', async () => {
      try {
        await deleteSelected();
      } catch (error) {
        setStatus(error.message || '删除失败', false);
      }
    });

    document.getElementById('edit-btn').addEventListener('click', async () => {
      try {
        await openEditor();
      } catch (error) {
        setStatus(error.message || '打开编辑失败', false);
      }
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      try {
        await saveEditor();
      } catch (error) {
        setStatus(error.message || '保存失败', false);
      }
    });

    document.getElementById('cancel-btn').addEventListener('click', async () => {
      try {
        await cancelEditor();
      } catch (error) {
        setStatus(error.message || '取消编辑失败', false);
      }
    });

    syncFileView();
    syncDetailView();
    syncPreviewCollapsed();
    applyStaticTranslations();
    refreshWorkspaceSummary();
    updateNavigationButtons();
    initDropUpload();
    initPreviewResizer();
    initTableColumnResizer();

    loadConfig()
      .then(() => loadDirectory('', { historyMode: 'replace' }))
      .catch((error) => {
        clearSelection('初始化失败');
        setStatus(error.message || '初始化失败', false);
      });
  </script>
</body>
</html>
