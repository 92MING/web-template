  <script>
    'use strict';

    window.I18N = Object.assign({}, window.I18N || {}, {
      'files.kicker': { 'zh-cn': 'System Files', en: 'System Files' },
      'files.title': { 'zh-cn': '文件管理器', 'zh-tw': '檔案管理器', en: 'File Manager' },
      'files.pageTitle': { 'zh-cn': '系统文件', 'zh-tw': '系統檔案', en: 'System Files' },
      'files.status.loading': { 'zh-cn': '等待载入', 'zh-tw': '等待載入', en: 'Loading' },
      'files.drop.enabled': { 'zh-cn': '拖放上传已开启', 'zh-tw': '拖放上傳已開啟', en: 'Drag and drop enabled' },
      'files.quickFilter': { 'zh-cn': 'Quick Filter', en: 'Quick Filter' },
      'files.search.placeholder': { 'zh-cn': '按名称、后缀或相对路径筛选', 'zh-tw': '按名稱、副檔名或相對路徑篩選', en: 'Filter by name, extension, or relative path' },
      'files.directoryContext': { 'zh-cn': 'Directory Context', en: 'Directory Context' },
      'files.root': { 'zh-cn': '根目录', 'zh-tw': '根目錄', en: 'Root' },
      'files.currentPath': { 'zh-cn': '当前路径', 'zh-tw': '目前路徑', en: 'Current Path' },
      'files.path.placeholder': { 'zh-cn': '留空表示根目录', 'zh-tw': '留空表示根目錄', en: 'Leave empty for the root directory' },
      'files.nav.back': { 'zh-cn': '后退', 'zh-tw': '返回', en: 'Back' },
      'files.nav.forward': { 'zh-cn': '前进', 'zh-tw': '前進', en: 'Forward' },
      'files.primaryActions': { 'zh-cn': 'Primary Actions', en: 'Primary Actions' },
      'files.up': { 'zh-cn': '上级目录', 'zh-tw': '上層目錄', en: 'Up' },
      'files.refresh': { 'zh-cn': '刷新', 'zh-tw': '重新整理', en: 'Refresh' },
      'files.mkdir': { 'zh-cn': '新建文件夹', 'zh-tw': '新增資料夾', en: 'New Folder' },
      'files.upload': { 'zh-cn': '上传文件', 'zh-tw': '上傳檔案', en: 'Upload' },
      'files.resize': { 'zh-cn': '拖拽调整详情宽度', 'zh-tw': '拖曳調整詳情寬度', en: 'Resize detail width' },
      'files.drop.title': { 'zh-cn': '释放文件以上传到当前目录', 'zh-tw': '放開檔案以上傳到目前目錄', en: 'Drop files to upload into the current directory' },
      'files.drop.body': { 'zh-cn': '', 'zh-tw': '', en: '' },
      'files.currentDirectory': { 'zh-cn': '当前目录', 'zh-tw': '目前目錄', en: 'Current Directory' },
      'files.directoryContents': { 'zh-cn': '目录内容', 'zh-tw': '目錄內容', en: 'Directory Contents' },
      'files.view.list': { 'zh-cn': '列表', 'zh-tw': '列表', en: 'List' },
      'files.view.cards': { 'zh-cn': '缩略图', 'zh-tw': '縮圖', en: 'Thumbnails' },
      'files.details': { 'zh-cn': '详情', 'zh-tw': '詳情', en: 'Details' },
      'files.preview': { 'zh-cn': '预览', 'zh-tw': '預覽', en: 'Preview' },
      'files.meta': { 'zh-cn': '属性', 'zh-tw': '屬性', en: 'Properties' },
      'files.edit': { 'zh-cn': '编辑', 'zh-tw': '編輯', en: 'Edit' },
      'files.empty.title': { 'zh-cn': '从左侧选择文件或目录', 'zh-tw': '從左側選擇檔案或目錄', en: 'Choose a file or folder from the left' },
      'files.empty.body': { 'zh-cn': '', 'zh-tw': '', en: '' }
    });

    function currentLang() {
      return typeof window.PageControls?.getLang === 'function' ? window.PageControls.getLang() : (document.documentElement.dataset.projLang || 'zh-cn');
    }

    function uiKey(key, fallbackZh = '', fallbackEn = '') {
      const table = window.I18N || {};
      const entry = table[key];
      if (!entry) return currentLang() === 'en' ? fallbackEn : fallbackZh;
      const lang = currentLang();
      return entry[lang] || entry['zh-cn'] || entry.en || fallbackZh || fallbackEn || key;
    }

    function uiText(zh, en) {
      return currentLang() === 'en' ? en : zh;
    }

    function applyStaticTranslations() {
      document.title = uiKey('files.pageTitle', '系统文件', 'System Files');
      const searchInput = document.getElementById('search-input');
      const pathInput = document.getElementById('path-input');
      if (searchInput) searchInput.placeholder = uiKey('files.search.placeholder', '按名称、后缀或相对路径筛选', 'Filter by name, extension, or relative path');
      if (pathInput) pathInput.placeholder = uiKey('files.path.placeholder', '留空表示根目录', 'Leave empty for the root directory');
      const navBack = document.getElementById('back-btn');
      const navForward = document.getElementById('forward-btn');
      const resizer = document.getElementById('workspace-resizer');
      if (navBack) {
        const label = uiKey('files.nav.back', '后退', 'Back');
        navBack.title = label;
        navBack.setAttribute('aria-label', label);
      }
      if (navForward) {
        const label = uiKey('files.nav.forward', '前进', 'Forward');
        navForward.title = label;
        navForward.setAttribute('aria-label', label);
      }
      if (resizer) {
        const label = uiKey('files.resize', '拖拽调整详情宽度', 'Resize detail width');
        resizer.title = label;
        resizer.setAttribute('aria-label', label);
      }
    }

    const sharedUi = window.StorageUI || null;
    const storageIcons = window.StorageIcons || null;
    const FILE_VIEW_STORAGE_KEY = 'proj_system_files_view';
    const PREVIEW_COLLAPSE_STORAGE_KEY = 'proj_system_files_preview_collapsed';
    const PREVIEW_DETAIL_WIDTH_STORAGE_KEY = 'proj_system_files_preview_width';
    const state = {
      config: null,
      root: '',
      path: '',
      entries: [],
      selected: null,
      filterText: '',
      searchType: (function() { try { return localStorage.getItem('proj_system_files_search_type') || ''; } catch { return ''; } })(),
      searchWildcard: (function() { try { return localStorage.getItem('proj_system_files_search_wc') === '1'; } catch { return false; } })(),
      searchFilterOpen: false,
      previewRequestId: 0,
      textPreview: null,
      detailView: 'preview',
      previewCollapsed: (function() {
        try {
          const raw = localStorage.getItem(PREVIEW_COLLAPSE_STORAGE_KEY);
          if (raw === null) return true;
          return raw === '1';
        } catch {
          return true;
        }
      })(),
      detailWidth: (function() {
        try {
          const raw = Number(localStorage.getItem(PREVIEW_DETAIL_WIDTH_STORAGE_KEY) || 500);
          return Number.isFinite(raw) ? raw : 500;
        } catch {
          return 500;
        }
      })(),
      fileView: (function() {
        try {
          const raw = localStorage.getItem(FILE_VIEW_STORAGE_KEY);
          if (raw === 'list' || raw === 'small' || raw === 'medium' || raw === 'large') return raw;
          if (raw === 'cards') return 'medium';
          return 'list';
        } catch {
          return 'list';
        }
      })(),
      history: [],
      historyIndex: -1,
      resize: {
        active: false,
        startX: 0,
        startWidth: 500,
      },
      uploadTargetPath: '',
      clipboard: null,
      editor: {
        active: false,
        path: '',
        original: '',
        encoding: 'utf-8',
      },
    };

    function httpUrl(path) {
      return typeof window.projResolveUrl === 'function' ? window.projResolveUrl(path) : path;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(text) {
      return escapeHtml(text).replace(/'/g, '&#39;');
    }

    function icon(name, size = 16, cls = '') {
      if (storageIcons && typeof storageIcons.icon === 'function') {
        return storageIcons.icon(name, size, cls);
      }
      return '';
    }

    function fmtBytes(value) {
      const bytes = Number(value || 0);
      if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let size = bytes;
      let idx = 0;
      while (size >= 1024 && idx < units.length - 1) {
        size /= 1024;
        idx += 1;
      }
      return `${size.toFixed(size >= 10 || idx === 0 ? 0 : 1)} ${units[idx]}`;
    }

    function formatDateTime(value, compact = false) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return compact
        ? date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
        : date.toLocaleString('zh-CN');
    }

    function columnLabel(index) {
      let value = Number(index || 0);
      if (!Number.isFinite(value) || value <= 0) return '';
      let label = '';
      while (value > 0) {
        const remainder = (value - 1) % 26;
        label = String.fromCharCode(65 + remainder) + label;
        value = Math.floor((value - 1) / 26);
      }
      return label;
    }

    function rootInfo() {
      return state.config ? state.config.roots.find((item) => item.key === state.root) || null : null;
    }

    function displayPath(relativePath = state.path) {
      const info = rootInfo();
      const base = info?.label || state.root || '/';
      return `${base}${relativePath ? `/${relativePath}` : '/'}`;
    }

    function absolutePath(relativePath = '') {
      const base = String(rootInfo()?.path || rootInfo()?.label || state.root || '/').replace(/[\\/]+$/, '');
      const suffix = String(relativePath || '').replace(/^[\\/]+/, '');
      return suffix ? `${base}/${suffix}` : (base || '/');
    }

    function sameLocation(left, right) {
      if (!left || !right) return false;
      return String(left.root || '') === String(right.root || '') && String(left.path || '') === String(right.path || '');
    }

    function updateNavigationButtons() {
      const backButton = document.getElementById('back-btn');
      const forwardButton = document.getElementById('forward-btn');
      if (backButton) backButton.disabled = state.historyIndex <= 0;
      if (forwardButton) forwardButton.disabled = state.historyIndex < 0 || state.historyIndex >= state.history.length - 1;
    }

    function recordHistory(root, path, mode = 'push') {
      const location = { root: String(root || ''), path: String(path || '') };
      if (mode === 'skip') {
        updateNavigationButtons();
        return;
      }
      if (mode === 'replace') {
        if (state.historyIndex >= 0) {
          state.history[state.historyIndex] = location;
        } else {
          state.history = [location];
          state.historyIndex = 0;
        }
        updateNavigationButtons();
        return;
      }
      const current = state.history[state.historyIndex];
      if (sameLocation(current, location)) {
        updateNavigationButtons();
        return;
      }
      state.history = state.history.slice(0, state.historyIndex + 1);
      state.history.push(location);
      state.historyIndex = state.history.length - 1;
      updateNavigationButtons();
    }

    async function navigateHistory(delta) {
      const nextIndex = state.historyIndex + delta;
      const target = state.history[nextIndex];
      if (!target) return;
      const ok = await loadDirectory(target.path, {
        root: target.root,
        historyMode: 'skip',
      });
      if (!ok) return;
      state.historyIndex = nextIndex;
      updateNavigationButtons();
    }

    function clampDetailWidth(width) {
      const workspaceMain = document.getElementById('workspace-main');
      const totalWidth = workspaceMain ? workspaceMain.clientWidth : window.innerWidth;
      const minWidth = 340;
      const maxWidth = Math.max(minWidth, Math.min(820, totalWidth - 280));
      const nextWidth = Math.round(Number(width || 500));
      return Math.max(minWidth, Math.min(maxWidth, nextWidth));
    }

    function syncPreviewWidth() {
      const workspaceMain = document.getElementById('workspace-main');
      if (!workspaceMain) return;
      const enabled = !state.previewCollapsed;
      if (!enabled) {
        workspaceMain.style.removeProperty('--detail-width');
        return;
      }
      state.detailWidth = clampDetailWidth(state.detailWidth);
      workspaceMain.style.setProperty('--detail-width', `${state.detailWidth}px`);
    }

    function setDetailWidth(width, options = {}) {
      state.detailWidth = clampDetailWidth(width);
      if (options.persist !== false) {
        try {
          localStorage.setItem(PREVIEW_DETAIL_WIDTH_STORAGE_KEY, String(state.detailWidth));
        } catch {}
      }
      syncPreviewWidth();
    }

    function startPreviewResize(event) {
      if (event.button !== 0 || state.previewCollapsed) return;
      if (event.target && event.target.closest && event.target.closest('.workspace-resizer-toggle')) return;
      event.preventDefault();
      state.resize.active = true;
      state.resize.startX = event.clientX;
      state.resize.startWidth = clampDetailWidth(state.detailWidth);
      document.body.classList.add('workspace-resizing');
    }

    function onPreviewResize(event) {
      if (!state.resize.active) return;
      const width = state.resize.startWidth + (state.resize.startX - event.clientX);
      setDetailWidth(width, { persist: false });
    }

    function stopPreviewResize() {
      if (!state.resize.active) return;
      state.resize.active = false;
      document.body.classList.remove('workspace-resizing');
      try {
        localStorage.setItem(PREVIEW_DETAIL_WIDTH_STORAGE_KEY, String(state.detailWidth));
      } catch {}
    }

    function initPreviewResizer() {
      const resizer = document.getElementById('workspace-resizer');
      if (!resizer) return;
      resizer.addEventListener('pointerdown', startPreviewResize);
      window.addEventListener('pointermove', onPreviewResize);
      window.addEventListener('pointerup', stopPreviewResize);
      window.addEventListener('pointercancel', stopPreviewResize);
      window.addEventListener('blur', stopPreviewResize);
    }

    const TABLE_COLUMN_STORAGE_KEY = 'proj_system_files_table_columns';
    const DEFAULT_TABLE_COLUMNS = { name: 320, type: 140, size: 100, modified: 170 };
    const MIN_TABLE_COLUMN = 64;

    function readTableColumnWidths() {
      try {
        const raw = JSON.parse(localStorage.getItem(TABLE_COLUMN_STORAGE_KEY) || 'null');
        if (raw && typeof raw === 'object') {
          const result = { ...DEFAULT_TABLE_COLUMNS };
          for (const key of Object.keys(DEFAULT_TABLE_COLUMNS)) {
            const value = Number(raw[key]);
            if (Number.isFinite(value) && value >= MIN_TABLE_COLUMN) result[key] = value;
          }
          return result;
        }
      } catch {}
      return { ...DEFAULT_TABLE_COLUMNS };
    }

    function applyTableColumnWidths(widths) {
      const colgroup = document.getElementById('file-table-colgroup');
      if (!colgroup) return;
      colgroup.querySelectorAll('col').forEach((col) => {
        const key = col.dataset.col;
        if (key && widths[key]) col.style.width = `${widths[key]}px`;
      });
    }

    function initTableColumnResizer() {
      const widths = readTableColumnWidths();
      applyTableColumnWidths(widths);
      const handles = document.querySelectorAll('.workspace-table .col-resizer');
      handles.forEach((handle) => {
        handle.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const key = handle.dataset.resizeCol;
          const col = document.querySelector(`#file-table-colgroup col[data-col="${key}"]`);
          if (!col) return;
          const startX = event.clientX;
          const startWidth = col.getBoundingClientRect().width || widths[key] || DEFAULT_TABLE_COLUMNS[key];
          handle.classList.add('dragging');
          document.body.style.cursor = 'col-resize';
          const onMove = (ev) => {
            const next = Math.max(MIN_TABLE_COLUMN, Math.round(startWidth + (ev.clientX - startX)));
            widths[key] = next;
            col.style.width = `${next}px`;
          };
          const onUp = () => {
            handle.classList.remove('dragging');
            document.body.style.cursor = '';
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
            window.removeEventListener('pointercancel', onUp);
            try { localStorage.setItem(TABLE_COLUMN_STORAGE_KEY, JSON.stringify(widths)); } catch {}
          };
          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp);
          window.addEventListener('pointercancel', onUp);
        });
        handle.addEventListener('dblclick', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const key = handle.dataset.resizeCol;
          if (!key) return;
          widths[key] = DEFAULT_TABLE_COLUMNS[key];
          applyTableColumnWidths(widths);
          try { localStorage.setItem(TABLE_COLUMN_STORAGE_KEY, JSON.stringify(widths)); } catch {}
        });
      });
    }

    function refreshWorkspaceSummary() {
      const summaryRoot = document.querySelector('#summary-root strong');
      const summaryPath = document.querySelector('#summary-path strong');
      const summaryFilter = document.querySelector('#summary-filter strong');
      if (summaryRoot) summaryRoot.textContent = rootInfo()?.label || '-';
      if (summaryPath) summaryPath.textContent = state.path || '/';
      if (summaryFilter) summaryFilter.textContent = state.filterText.trim() || uiText('无', 'None');
      const browserLocation = document.getElementById('browser-location');
      if (browserLocation) browserLocation.textContent = absolutePath(state.path);
      const dropTarget = document.getElementById('drop-target-path');
      if (dropTarget) {
        dropTarget.textContent = displayPath(state.path);
      }
    }

    function renderQuickRoots() {
      const wrap = document.getElementById('quick-roots');
      if (!wrap || !state.config) return;
      const order = { workspace: 0, home: 1, desktop: 2, downloads: 3, documents: 4, server: 5 };
      const items = [...(state.config.roots || [])]
        .filter((item) => Object.prototype.hasOwnProperty.call(order, item.key))
        .sort((a, b) => (order[a.key] ?? 99) - (order[b.key] ?? 99));
      wrap.classList.toggle('hidden', items.length <= 1);
      wrap.innerHTML = '';
      items.forEach((item) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `quick-root-btn ${item.key === state.root ? 'active' : ''}`;
        button.textContent = item.label;
        button.addEventListener('click', async () => {
          if (item.key === state.root && !state.path) return;
          if (!confirmDiscardEditor()) return;
          try {
            await loadDirectory('', { skipConfirm: true, root: item.key });
          } catch (error) {
            setStatus(error.message || '目录读取失败', false);
          }
        });
        wrap.appendChild(button);
      });
    }

    function syncPreviewToggleButton() {
      const button = document.getElementById('preview-toggle-btn');
      if (!button) return;
      const collapsed = !!state.previewCollapsed;
      button.textContent = collapsed ? '‹' : '›';
      button.title = collapsed ? uiText('展开预览', 'Expand Preview') : uiText('收起预览', 'Collapse Preview');
      button.setAttribute('aria-label', button.title);
      button.setAttribute('aria-pressed', collapsed ? 'false' : 'true');
    }

    function syncPreviewCollapsed() {
      const collapsed = state.previewCollapsed;
      const workspaceMain = document.querySelector('.workspace-main');
      if (workspaceMain) workspaceMain.classList.toggle('preview-collapsed', collapsed);
      syncPreviewWidth();
      syncPreviewToggleButton();
    }

    function setPreviewCollapsed(collapsed) {
      state.previewCollapsed = !!collapsed;
      try {
        localStorage.setItem(PREVIEW_COLLAPSE_STORAGE_KEY, state.previewCollapsed ? '1' : '0');
      } catch {}
      syncPreviewCollapsed();
    }

    function togglePreviewCollapsed() {
      setPreviewCollapsed(!state.previewCollapsed);
    }

    function syncFileView() {
      const isCardView = state.fileView !== 'list';
      document.getElementById('file-list-shell').classList.toggle('hidden', isCardView);
      document.getElementById('file-card-shell').classList.toggle('hidden', !isCardView);
      const grid = document.getElementById('file-card-grid');
      if (grid) grid.className = `file-card-grid mode-${state.fileView === 'list' ? 'medium' : state.fileView}`;
      document.querySelectorAll('.file-view-btn').forEach((button) => {
        button.classList.toggle('active', button.dataset.fileView === state.fileView);
      });
      if (storageIcons && typeof storageIcons.mount === 'function') {
        storageIcons.mount(document.getElementById('file-view-switch'));
      }
    }

    function setFileView(view) {
      const allowed = ['list', 'small', 'medium', 'large'];
      state.fileView = allowed.includes(view) ? view : 'list';
      try {
        localStorage.setItem(FILE_VIEW_STORAGE_KEY, state.fileView);
      } catch {}
      syncFileView();
    }

    function updateDetailSummary(entry) {
      document.getElementById('summary-kind').textContent = entry ? entryTypeLabel(entry) : '-';
      document.getElementById('summary-size').textContent = entry && !entry.is_dir ? fmtBytes(entry.size) : '-';
      document.getElementById('summary-updated').textContent = entry?.modified_at ? formatDateTime(entry.modified_at, true) : '-';
    }

    function syncDetailView() {
      const hasSelection = !!state.selected;
      document.getElementById('detail-empty-state').classList.toggle('hidden', hasSelection || state.detailView !== 'preview');
      document.getElementById('detail-panel-preview').classList.toggle('hidden', !hasSelection || state.detailView === 'meta');
      document.getElementById('detail-panel-meta').classList.toggle('hidden', !hasSelection || state.detailView !== 'meta');
      document.querySelectorAll('.detail-tab').forEach((button) => {
        button.classList.toggle('active', button.dataset.detailView === state.detailView);
      });
    }

    async function switchDetailView(view, options = {}) {
      if (view === 'edit') {
        if (!state.selected || state.selected.is_dir || !canEditEntry(state.selected)) return;
        if (state.editor.active && state.editor.path === state.selected.relative_path) {
          state.detailView = 'edit';
          syncDetailView();
          return;
        }
        await openEditor();
        return;
      }
      if (state.editor.active && state.detailView === 'edit' && !options.skipConfirm) {
        if (!confirmDiscardEditor()) return;
        resetEditorState();
        updateActionButtons();
      }
      state.detailView = view;
      syncDetailView();
      if (view === 'preview' && state.selected && !state.selected.is_dir && options.reloadPreview !== false) {
        await loadPreview(state.selected);
      }
    }

    function setStatus(message, ok = true) {
      const el = document.getElementById('page-status');
      el.textContent = message;
      el.style.color = ok ? '#475569' : '#b91c1c';
    }

    function queryString(root, path) {
      const params = new URLSearchParams();
      params.set('root', root);
      params.set('path', path || '');
      return params.toString();
    }

    function buildFileUrl(basePath, relativePath, extraParams = {}) {
      const params = new URLSearchParams();
      params.set('root', state.root);
      params.set('path', relativePath || '');
      Object.entries(extraParams).forEach(([key, value]) => {
        if (value === undefined || value === null || value === '') return;
        params.set(key, String(value));
      });
      return `${httpUrl(basePath)}?${params.toString()}`;
    }

    function fileExt(entry) {
      return String(entry?.extension || '').replace(/^\./, '').toLowerCase();
    }

    function entryMimeType(entry) {
      return String(entry?.mime_type || '').toLowerCase();
    }

    function entryVisualLabel(entry) {
      if (entry.is_dir) return 'DIR';
      const ext = fileExt(entry);
      if (ext) return ext.toUpperCase();
      const mimeType = entryMimeType(entry);
      if (mimeType.startsWith('image/')) return 'IMG';
      if (mimeType.startsWith('video/')) return 'VID';
      if (mimeType.startsWith('audio/')) return 'AUD';
      return 'FILE';
    }

    function entryTypeLabel(entry) {
      if (!entry) return '-';
      if (entry.is_dir) return '目录';
      const mimeType = String(entry.mime_type || '').trim();
      if (mimeType) return mimeType;
      const ext = fileExt(entry);
      return ext ? `${ext.toUpperCase()} 文件` : '文件';
    }

    function entryIconHtml(entry, size = 18, cls = '') {
      if (storageIcons && typeof storageIcons.iconForFile === 'function') {
        return storageIcons.iconForFile({
          name: entry?.name,
          extension: entry?.extension,
          mime_type: entry?.mime_type,
          is_dir: entry?.is_dir,
        }, size, cls);
      }
      return icon(entry?.is_dir ? 'folder' : 'file', size, cls);
    }

    function renderEntryPlaceholder(entry, variant) {
      const isCard = variant === 'card';
      const label = entryVisualLabel(entry);
      const baseClass = isCard ? 'file-card-placeholder' : 'table-file-visual';
      const iconSize = isCard ? 36 : 20;
      return `<span class="${baseClass}">${entryIconHtml(entry, iconSize)}<span class="${isCard ? 'file-card-badge' : 'table-file-badge'}">${escapeHtml(label)}</span></span>`;
    }

    function renderEntryVisual(entry, variant = 'card') {
      const mimeType = entryMimeType(entry);
      const extension = fileExt(entry);
      const rawUrl = buildFileUrl('/admin/api/system/files/raw', entry.relative_path);
      if (entry.is_dir) return renderEntryPlaceholder(entry, variant);
      if (isImage(mimeType, extension)) {
        const cls = variant === 'card' ? 'file-card-thumb' : 'table-file-thumb';
        return `<span class="${variant === 'card' ? 'file-card-placeholder' : 'table-file-visual'}"><img class="${cls}" loading="lazy" src="${rawUrl}" alt="${escapeAttr(entry.name)}" /><span class="${variant === 'card' ? 'file-card-badge' : 'table-file-badge'}">${escapeHtml(entryVisualLabel(entry))}</span></span>`;
      }
      if (variant === 'card' && isVideo(mimeType, extension)) {
        return `<span class="file-card-placeholder"><video class="file-card-video" preload="metadata" muted playsinline src="${rawUrl}"></video><span class="file-card-badge">${escapeHtml(entryVisualLabel(entry))}</span></span>`;
      }
      return renderEntryPlaceholder(entry, variant);
    }

    function renderEntriesEmpty() {
      return `<div class="entry-empty-state">${icon('folder', 40)}<div class="text-sm font-semibold text-slate-700 dark:text-slate-200">当前目录没有匹配项目</div><div class="text-xs">调整筛选词、切换目录或上传新文件后再试。</div></div>`;
    }

    function renderCards(entries) {
      const grid = document.getElementById('file-card-grid');
      if (!grid) return;
      if (!entries.length) {
        grid.innerHTML = renderEntriesEmpty();
        return;
      }
      grid.innerHTML = '';
      entries.forEach((entry) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = `file-card entry-selectable ${state.selected?.relative_path === entry.relative_path ? 'active' : ''}`;
        card.dataset.relativePath = entry.relative_path;
        card.innerHTML = `
          <div class="file-card-visual">${renderEntryVisual(entry, 'card')}</div>
          <div class="file-card-body">
            <div class="file-card-heading">
              <div class="file-card-title" title="${escapeAttr(entry.name)}">${escapeHtml(entry.name)}</div>
            </div>
            <div class="file-card-meta">
              <span>${escapeHtml(entry.is_dir ? '目录' : fmtBytes(entry.size))}</span>
              <span>${escapeHtml(entry.modified_at ? formatDateTime(entry.modified_at, true) : '未记录')}</span>
            </div>
          </div>`;
        card.addEventListener('click', () => selectEntry(entry, card));
        card.addEventListener('dblclick', async () => {
          selectEntry(entry, card);
          await openSelected();
        });
        card.addEventListener('contextmenu', (event) => {
          selectEntry(entry, card);
          showEntryContextMenu(event, entry);
        });
        grid.appendChild(card);
      });
    }

    function isImage(mimeType, extension) {
      return String(mimeType || '').startsWith('image/') || ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp', 'ico', 'avif'].includes(extension);
    }

    function isPdf(mimeType, extension) {
      return String(mimeType || '').includes('pdf') || extension === 'pdf';
    }

    function isVideo(mimeType, extension) {
      return String(mimeType || '').startsWith('video/') || ['mp4', 'webm', 'ogg', 'mov', 'avi', 'mkv'].includes(extension);
    }

    function isAudio(mimeType, extension) {
      return String(mimeType || '').startsWith('audio/') || ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a', 'wma'].includes(extension);
    }

    function isHtmlFile(mimeType, extension) {
      return String(mimeType || '').includes('html') || ['html', 'htm'].includes(extension);
    }

    function isDelimitedText(mimeType, extension) {
      return extension === 'csv' || extension === 'tsv' || String(mimeType || '').includes('csv') || String(mimeType || '').includes('tab-separated');
    }

    function isMarkdown(extension) {
      return ['md', 'markdown', 'mdown'].includes(extension);
    }

    function isText(mimeType, extension) {
      if (String(mimeType || '').startsWith('text/')) return true;
      if (/json|xml|yaml|javascript|css|toml|sql|x-sh/.test(String(mimeType || ''))) return true;
      return ['txt', 'json', 'xml', 'yaml', 'yml', 'js', 'ts', 'jsx', 'tsx', 'py', 'rb', 'go', 'rs', 'java', 'c', 'cpp', 'h', 'hpp', 'css', 'html', 'htm', 'sh', 'bash', 'zsh', 'fish', 'toml', 'ini', 'cfg', 'conf', 'env', 'sql', 'graphql', 'proto', 'csv', 'tsv', 'log', 'md', 'markdown', 'vue', 'svelte', 'scss', 'less', 'sass', 'lua', 'php', 'pl', 'r', 'swift', 'kt', 'kts', 'dart', 'scala', 'groovy', 'ps1', 'bat', 'cmd', 'dockerfile', 'makefile'].includes(extension);
    }

    function isDocxPreviewable(extension) {
      return extension === 'docx';
    }

    function isOfficeDoc(extension) {
      return ['doc', 'docx', 'odt', 'wps', 'pages', 'hwp', 'hwpx', 'ppt', 'pptx', 'key', 'xls', 'xlsx', 'xlsm', 'xltx', 'xltm', 'ods', 'numbers'].includes(extension);
    }

    function canEditEntry(entry) {
      return !!entry && !entry.is_dir && isText(entry.mime_type || '', fileExt(entry));
    }

    function officeSupportLabel(level) {
      return level === 'stable' ? '稳定预览' : '尽力预览';
    }

    function renderPreviewEmpty(title, detail) {
      return `
        <div class="preview-empty">
          <svg fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7.75A2.75 2.75 0 016.75 5h10.5A2.75 2.75 0 0120 7.75v8.5A2.75 2.75 0 0117.25 19H6.75A2.75 2.75 0 014 16.25v-8.5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h8M8 14h5"/></svg>
          <div class="text-sm font-semibold text-slate-700 dark:text-slate-200">${escapeHtml(title)}</div>
          <div class="max-w-md text-xs leading-6">${escapeHtml(detail)}</div>
        </div>`;
    }

    function renderMarkdownSafe(text) {
      if (typeof marked !== 'undefined' && sharedUi && typeof sharedUi.sanitizeMarkdownHtml === 'function') {
        return sharedUi.sanitizeMarkdownHtml(marked.parse(String(text || '')));
      }
      return `<pre class="mono whitespace-pre-wrap break-words text-xs leading-6 text-slate-800 dark:text-slate-100">${escapeHtml(String(text || ''))}</pre>`;
    }

    function renderCodePreview(text, extension, mimeType) {
      const raw = String(text || '');
      if (mimeType.includes('json') || extension === 'json') {
        try {
          const pretty = JSON.stringify(JSON.parse(raw), null, 2);
          if (typeof hljs !== 'undefined') {
            return `<pre><code class="hljs">${hljs.highlight(pretty, { language: 'json' }).value}</code></pre>`;
          }
          return `<pre class="mono whitespace-pre-wrap break-words text-xs leading-6 text-slate-800 dark:text-slate-100">${escapeHtml(pretty)}</pre>`;
        } catch {
          // fall through
        }
      }

      if (typeof hljs !== 'undefined') {
        const langMap = {
          py: 'python',
          js: 'javascript',
          ts: 'typescript',
          jsx: 'javascript',
          tsx: 'typescript',
          rb: 'ruby',
          go: 'go',
          rs: 'rust',
          java: 'java',
          c: 'c',
          cpp: 'cpp',
          h: 'c',
          hpp: 'cpp',
          css: 'css',
          html: 'xml',
          htm: 'xml',
          xml: 'xml',
          json: 'json',
          yaml: 'yaml',
          yml: 'yaml',
          sh: 'bash',
          bash: 'bash',
          sql: 'sql',
          md: 'markdown',
          php: 'php',
          lua: 'lua',
          swift: 'swift',
          kt: 'kotlin',
          dart: 'dart',
          scala: 'scala',
          groovy: 'groovy',
          ps1: 'powershell',
          dockerfile: 'dockerfile',
          toml: 'ini',
          ini: 'ini',
        };
        const language = langMap[extension] || 'plaintext';
        try {
          return `<pre><code class="hljs">${hljs.highlight(raw, { language }).value}</code></pre>`;
        } catch {
          return `<pre><code class="hljs">${hljs.highlightAuto(raw).value}</code></pre>`;
        }
      }

      return `<pre class="mono whitespace-pre-wrap break-words text-xs leading-6 text-slate-800 dark:text-slate-100">${escapeHtml(raw)}</pre>`;
    }

    function updatePathUi() {
      document.getElementById('root-select').value = state.root;
      document.getElementById('path-input').value = state.path;
      document.getElementById('meta-root').textContent = rootInfo()?.label || '-';
      refreshWorkspaceSummary();
      renderQuickRoots();
      updateNavigationButtons();
    }

    function renderBreadcrumb() {
      const wrap = document.getElementById('breadcrumb');
      wrap.innerHTML = '';
      const info = rootInfo();
      const segments = state.path ? state.path.split('/').filter(Boolean) : [];
      const items = [{ label: info ? info.label : state.root, path: '' }];
      segments.forEach((segment, index) => {
        items.push({ label: segment, path: segments.slice(0, index + 1).join('/') });
      });
      items.forEach((item) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'crumb';
        button.textContent = item.label || '/';
        button.addEventListener('click', async () => {
          try {
            await loadDirectory(item.path, { root: state.root });
          } catch (error) {
            setStatus(error.message || '目录读取失败', false);
          }
        });
        wrap.appendChild(button);
      });
    }

    function resetEditorState() {
      state.editor = {
        active: false,
        path: '',
        original: '',
        encoding: 'utf-8',
      };
    }

    function setPreviewHtml(html) {
      document.getElementById('preview-box').innerHTML = html;
    }

    function hasUnsavedEditorChanges() {
      if (!state.editor.active) return false;
      const area = document.getElementById('editor-modal-area');
      return !!area && area.value !== state.editor.original;
    }

    function confirmDiscardEditor() {
      if (!hasUnsavedEditorChanges()) return true;
      return window.confirm('当前有未保存的文本修改，确定放弃吗？');
    }

    function findEntryByPath(relativePath) {
      return state.entries.find((entry) => entry.relative_path === relativePath) || null;
    }

    function focusEntry(entry) {
      if (!entry) return null;
      const row = findRowByPath(entry.relative_path);
      if (state.selected?.relative_path !== entry.relative_path) {
        selectEntry(entry, row);
      }
      return row;
    }

    async function copyPathToClipboard(value, successMessage = '路径已复制') {
      try {
        await navigator.clipboard.writeText(String(value || ''));
        setStatus(successMessage, true);
      } catch {
        setStatus('复制路径失败', false);
      }
    }

    function pickUploadFiles(targetPath = state.path) {
      state.uploadTargetPath = targetPath || '';
      document.getElementById('upload-input').click();
    }

    async function openEntry(entry) {
      if (!entry) return;
      focusEntry(entry);
      await openSelected();
    }

    async function openEntryMeta(entry) {
      if (!entry) return;
      focusEntry(entry);
      await switchDetailView('meta');
      if (state.previewCollapsed) setPreviewCollapsed(false);
    }

    async function openEntryEditor(entry) {
      if (!entry || !canEditEntry(entry)) return;
      focusEntry(entry);
      await openEditor();
    }

    function downloadEntry(entry) {
      if (!entry || entry.is_dir) return;
      window.open(buildFileUrl('/admin/api/system/files/download', entry.relative_path), '_blank', 'noopener');
    }

    async function deleteEntry(entry) {
      if (!entry) return;
      focusEntry(entry);
      await deleteSelected();
    }

    function setClipboard(entry, mode) {
      if (!entry) return;
      state.clipboard = {
        mode,
        root: state.root,
        path: entry.relative_path,
        name: entry.name,
        is_dir: !!entry.is_dir,
      };
      setStatus(`已${mode === 'cut' ? '剪切' : '复制'} ${entry.name}`, true);
      updateActionButtons();
    }

    async function renameEntry(entry) {
      if (!entry) return;
      const next = window.prompt('请输入新名称', entry.name);
      if (!next || next === entry.name) return;
      setStatus('正在重命名...', true);
      const response = await fetch(httpUrl('/admin/api/system/files/rename'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ root: state.root, path: entry.relative_path, new_name: next }),
      });
      if (!response.ok) throw new Error(await response.text() || '重命名失败');
      const parts = entry.relative_path.split('/');
      parts[parts.length - 1] = next;
      await loadDirectory(state.path, { preserveSelectionPath: parts.join('/'), skipConfirm: true, suppressStatus: true });
      setStatus('重命名完成', true);
    }

    async function pasteClipboardInto(targetDir) {
      if (!state.clipboard) return;
      const clip = state.clipboard;
      const isMove = clip.mode === 'cut';
      let overwrite = false;
      const url = httpUrl(isMove ? '/admin/api/system/files/move' : '/admin/api/system/files/copy');
      const send = async () => fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source_root: clip.root,
          source_path: clip.path,
          target_root: state.root,
          target_dir: targetDir || '',
          target_name: clip.name,
          overwrite,
        }),
      });
      setStatus(isMove ? '正在移动...' : '正在复制...', true);
      let response = await send();
      if (response.status === 409) {
        if (!window.confirm(`目标已存在“${clip.name}”，是否覆盖？`)) {
          setStatus('已取消粘贴', true);
          return;
        }
        overwrite = true;
        response = await send();
      }
      if (!response.ok) throw new Error(await response.text() || '粘贴失败');
      if (isMove) state.clipboard = null;
      const newPath = (targetDir ? targetDir + '/' : '') + clip.name;
      await loadDirectory(state.path, { preserveSelectionPath: newPath, skipConfirm: true, suppressStatus: true });
      setStatus(isMove ? '移动完成' : '复制完成', true);
    }

    async function extractEntry(entry) {
      if (!entry || entry.is_dir) return;
      const overlay = document.getElementById('files-extract-modal');
      const titleEl = document.getElementById('extract-modal-title');
      const targetEl = document.getElementById('extract-modal-target');
      const extractorEl = document.getElementById('extract-modal-extractor');
      const overwriteEl = document.getElementById('extract-modal-overwrite');
      const errorEl = document.getElementById('extract-modal-error');
      const runBtn = document.getElementById('extract-modal-run');
      titleEl.textContent = entry.relative_path;
      titleEl.title = entry.relative_path;
      targetEl.value = '';
      overwriteEl.checked = false;
      errorEl.style.display = 'none';
      errorEl.textContent = '';
      extractorEl.innerHTML = '<option value="auto">检测中…</option>';
      extractorEl.disabled = true;
      runBtn.disabled = true;
      overlay.classList.remove('hidden');
      document.body.classList.add('editor-modal-open');

      let preview = null;
      try {
        const params = new URLSearchParams({ root: state.root, path: entry.relative_path });
        const resp = await fetch(httpUrl(`/admin/api/system/files/extract-preview?${params.toString()}`));
        if (!resp.ok) throw new Error(await resp.text() || '检测失败');
        preview = await resp.json();
      } catch (err) {
        errorEl.textContent = `无法检测压缩包: ${err.message || err}`;
        errorEl.style.display = '';
        return;
      }
      if (!preview?.supported || !Array.isArray(preview.extractors) || !preview.extractors.length) {
        errorEl.textContent = preview?.kind ? `当前环境未找到可用的 ${preview.kind} 解压器。` : '不支持的压缩包格式。';
        errorEl.style.display = '';
        return;
      }
      targetEl.value = preview.default_target_dir || '';
      extractorEl.innerHTML = '';
      const autoOpt = document.createElement('option');
      autoOpt.value = 'auto';
      autoOpt.textContent = `自动选择（${preview.extractors[0]}）`;
      extractorEl.appendChild(autoOpt);
      preview.extractors.forEach((label) => {
        const opt = document.createElement('option');
        opt.value = label;
        opt.textContent = label === 'python' ? 'Python 子进程（回退）' : label;
        extractorEl.appendChild(opt);
      });
      extractorEl.value = 'auto';
      extractorEl.disabled = false;
      runBtn.disabled = false;
    }

    function closeExtractModal() {
      const overlay = document.getElementById('files-extract-modal');
      overlay.classList.add('hidden');
      document.body.classList.remove('editor-modal-open');
    }

    async function runExtractFromModal() {
      const errorEl = document.getElementById('extract-modal-error');
      const runBtn = document.getElementById('extract-modal-run');
      errorEl.style.display = 'none';
      errorEl.textContent = '';
      if (!state.selected || state.selected.is_dir) {
        errorEl.textContent = '请先选择一个压缩包文件。';
        errorEl.style.display = '';
        return;
      }
      const entry = state.selected;
      const targetDir = (document.getElementById('extract-modal-target').value || '').trim();
      const extractor = document.getElementById('extract-modal-extractor').value || 'auto';
      const overwrite = !!document.getElementById('extract-modal-overwrite').checked;
      runBtn.disabled = true;
      setStatus('正在解压...', true);
      try {
        const response = await fetch(httpUrl('/admin/api/system/files/extract'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            root: state.root,
            path: entry.relative_path,
            target_dir: targetDir,
            overwrite,
            extractor,
          }),
        });
        if (response.status === 409) {
          errorEl.textContent = '目标目录已存在；勾选“覆盖”后再试，或更换目标目录。';
          errorEl.style.display = '';
          return;
        }
        if (!response.ok) {
          throw new Error(await response.text() || '解压失败');
        }
        const data = await response.json().catch(() => ({}));
        const targetPath = data?.target_path || '';
        const extractorUsed = data?.extractor ? `（${data.extractor}）` : '';
        closeExtractModal();
        await loadDirectory(state.path, { preserveSelectionPath: targetPath, skipConfirm: true, suppressStatus: true });
        setStatus(`解压完成${extractorUsed}`, true);
      } catch (err) {
        errorEl.textContent = err.message || '解压失败';
        errorEl.style.display = '';
      } finally {
        runBtn.disabled = false;
      }
    }

    function closeFilesContextMenu() {
      const menu = document.getElementById('files-context-menu');

      menu.innerHTML = '';

    }

    function showFilesContextMenu(x, y, config) {
      const menu = document.getElementById('files-context-menu');
      if (!menu) return;
      menu.innerHTML = '';

      if (config?.title) {
        const head = document.createElement('div');
        head.className = 'files-context-menu-head';
        head.innerHTML = `
          <div class="files-context-menu-kicker">${escapeHtml(config.kicker || 'Actions')}</div>
          <div class="files-context-menu-title">${escapeHtml(config.title)}</div>`;
        menu.appendChild(head);
      }

      (config?.items || []).forEach((item) => {
        if (!item || item.hidden) return;
        if (item.separator) {
          const separator = document.createElement('div');
          separator.className = 'files-context-menu-sep';
          menu.appendChild(separator);
          return;
        }
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `files-context-menu-item${item.danger ? ' danger' : ''}`;
        button.disabled = !!item.disabled;
        button.innerHTML = `
          <span class="files-context-menu-icon">${icon(item.icon || 'file', 16)}</span>
          <span class="files-context-menu-copy">
            <span class="files-context-menu-label">${escapeHtml(item.label)}</span>
            ${item.meta ? `<span class="files-context-menu-meta">${escapeHtml(item.meta)}</span>` : ''}
          </span>`;
        button.addEventListener('click', async (event) => {
          event.stopPropagation();
          if (item.disabled) return;
          closeFilesContextMenu();
          try {
            await item.action?.();
          } catch (error) {
            setStatus(error.message || '操作失败', false);
          }
        });
        menu.appendChild(button);
      });

      menu.classList.remove('hidden');
      menu.style.visibility = 'hidden';
      menu.style.left = '0px';
      menu.style.top = '0px';
      requestAnimationFrame(() => {
        const rect = menu.getBoundingClientRect();
        const left = Math.max(8, Math.min(x, window.innerWidth - rect.width - 8));
        const top = Math.max(8, Math.min(y, window.innerHeight - rect.height - 8));
        menu.style.left = `${left}px`;
        menu.style.top = `${top}px`;
        menu.style.visibility = 'visible';
      });
    }

      items.push({ icon: 'trash', label: entry.is_dir ? '删除目录' : '删除文件', meta: entry.is_dir ? '递归删除目录内容' : '从当前目录中移除该文件', danger: true, action: () => deleteEntry(entry) });
      showFilesContextMenu(event.clientX, event.clientY, {

    function visibleEntries() {
      const keyword = state.filterText.trim();
      const lower = keyword.toLowerCase();
      const wildcard = state.searchWildcard && keyword;
      let matcher = null;
      if (wildcard) {
        const escaped = keyword.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*').replace(/\?/g, '.');
        try { matcher = new RegExp('^' + escaped + '$', 'i'); } catch { matcher = null; }
      }
      const typeFilter = state.searchType;
      return state.entries.filter((entry) => {
        if (typeFilter && entryKindGroup(entry) !== typeFilter) return false;
        if (!keyword) return true;
        if (matcher) return matcher.test(entry.name);
        const haystack = `${entry.name} ${entry.relative_path} ${entry.mime_type || ''} ${entry.extension || ''}`.toLowerCase();
        return haystack.includes(lower);
      });
    }

    function entryKindGroup(entry) {
      if (!entry) return 'other';
      if (entry.is_dir) return 'folder';
      const ext = fileExt(entry);
      const mime = entryMimeType(entry);
      if (isImage(mime, ext)) return 'image';
      if (isVideo(mime, ext)) return 'video';
      if (isAudio(mime, ext)) return 'audio';
      if (isPdf(mime, ext)) return 'pdf';
      if (['zip','tar','gz','tgz','rar','7z','bz2','xz','zst','lz4'].includes(ext)) return 'archive';
      if (['doc','docx','odt','wps','rtf','pages','hwp','hwpx'].includes(ext)) return 'document';
      if (['xls','xlsx','xlsm','xltx','xltm','ods','numbers','csv','tsv'].includes(ext)) return 'spreadsheet';
      if (['ppt','pptx','odp','key'].includes(ext)) return 'presentation';
      if (['js','ts','jsx','tsx','py','rb','go','rs','java','c','cpp','h','hpp','cs','php','swift','kt','kts','dart','scala','groovy','lua','pl','r','sh','bash','zsh','fish','sql','graphql','proto','vue','svelte','scss','less','sass','json','yaml','yml','toml','ini','xml','dockerfile','makefile'].includes(ext)) return 'code';
      if (isText(mime, ext)) return 'text';
      return 'other';
    }

    function selectEntry(entry, row) {
      const hadSelection = !!state.selected;
      const previous = state.selected;
      if (previous && previous.relative_path !== entry.relative_path && !confirmDiscardEditor()) {
        return;
      }
      state.selected = entry;
      state.textPreview = null;
      state.detailView = 'preview';
      resetEditorState();
      document.querySelectorAll('.entry-selectable').forEach((item) => item.classList.remove('active'));
      row?.classList.add('active');
      document.getElementById('selected-count').textContent = entry.is_dir ? '已选目录' : '已选文件';
      document.getElementById('preview-title').textContent = entry.name;
      document.getElementById('preview-title').title = entry.name;
      document.getElementById('meta-path').textContent = entry.relative_path;
      document.getElementById('meta-size').textContent = entry.is_dir ? '-' : fmtBytes(entry.size);
      document.getElementById('meta-mime').textContent = entry.is_dir ? '目录' : (entry.mime_type || entry.extension || '文件');
      document.getElementById('meta-mode').textContent = entry.mode || '-';
      document.getElementById('meta-modified').textContent = entry.modified_at ? formatDateTime(entry.modified_at) : '-';
      document.getElementById('meta-root').textContent = rootInfo()?.label || '-';
      updateDetailSummary(entry);
      updateActionButtons();
      syncDetailView();
      if (!hadSelection && state.previewCollapsed) setPreviewCollapsed(false);

      if (entry.is_dir) {
        setPreviewHtml(`
          <div class="space-y-3">
            <div class="text-sm font-semibold text-slate-800 dark:text-slate-100">目录已选中</div>
            <div class="chip mono">${escapeHtml(entry.relative_path || rootInfo()?.label || state.root)}</div>

          </div>`);
        return;
      }
      loadPreview(entry).catch((error) => {
        setPreviewHtml(renderPreviewEmpty('预览失败', error.message || '无法读取当前文件内容。'));
      });
    }

    async function openSelected() {

        return;

      state.detailView = 'preview';
      syncDetailView();
      if (state.previewCollapsed) setPreviewCollapsed(false);
      await loadPreview(state.selected);

    async function fetchTextPreview(entry, limit = 200000) {
      const response = await fetch(buildFileUrl('/admin/api/system/files/text', entry.relative_path, { limit }));
      if (!response.ok) throw new Error('文本预览失败');
      return response.json();
