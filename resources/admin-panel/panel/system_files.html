<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系统文件</title>
  <link rel="stylesheet" href="/vendor/tailwindcss/tailwind.css" />
  <link rel="stylesheet" href="/vendor/highlight/highlight.css" />
  <style>
    html {
      font-size: 11px;
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      display: flex;
      overflow: hidden;
      background: var(--proj-page-bg);
      color: var(--proj-page-text);
      font-family: "IBM Plex Sans", "Segoe UI Variable Text", "Microsoft YaHei UI", sans-serif;
      font-size: 12px;
    }
    .workspace-page {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      overflow: hidden;
      padding: 0;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .panel {
      background: var(--proj-page-surface);
      border: 1px solid var(--proj-page-border);
      box-shadow: var(--proj-page-shadow);
      border-radius: 16px;
    }
    .field {
      width: 100%;
      height: 32px;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-input);
      color: var(--proj-page-text);
      padding: 0 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .field:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.52);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.22);
    }
    .btn {
      min-height: 30px;
      border-radius: 9px;
      border: 1px solid var(--proj-page-border);
      padding: 0 9px;
      font-size: 10px;
      font-weight: 700;
      background: var(--proj-page-surface-strong);
      color: var(--proj-page-text);
      transition: background .12s ease, border-color .12s ease, opacity .12s ease;
    }
    .btn:hover { border-color: var(--proj-page-border-strong); opacity: .96; }
    .btn-primary {
      background: #4f46e5;
      border-color: rgba(99, 102, 241, 0.4);
      color: #fff;
    }
    .btn-danger {
      background: rgba(239, 68, 68, 0.12);
      color: #b91c1c;
    }
    .mono { font-family: Consolas, "Cascadia Mono", "JetBrains Mono", monospace; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-strong);
      min-height: 22px;
      padding: 0 8px;
      font-size: 10px;
      font-weight: 700;
      color: var(--proj-page-muted);
    }
    .workspace-shell {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 4px 6px 6px;
      box-sizing: border-box;
    }
    .workspace-header {
      position: relative;
      z-index: 20;
      padding: 6px 8px;
      display: grid;
      gap: 4px;
      background: color-mix(in srgb, var(--proj-page-surface) 96%, transparent 4%);
    }
    .workspace-header-top {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .workspace-title-block {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .workspace-kicker {
      display: none;
    }
    .workspace-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 800;
      min-width: 0;
    }
    .workspace-title svg {
      width: 18px;
      height: 18px;
      color: #4f46e5;
      flex-shrink: 0;
    }
    .workspace-subtitle {
      display: none;
    }
    .workspace-header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      align-items: center;
    }
    .workspace-header-actions #selected-count,
    .workspace-header-actions #drop-mode-chip {
      display: none;
    }
    .workspace-header-actions .chip {
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .workspace-toolbar {
      display: grid;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 12px;
      border: none;
      background: color-mix(in srgb, #6366f1 6%, var(--proj-page-surface) 94%);
    }
    .workspace-toolbar-grid {
      display: grid;
      grid-template-columns: auto minmax(116px, 152px) minmax(0, 1fr) minmax(168px, 0.9fr);
      gap: 4px;
      align-items: end;
    }
    .workspace-nav-block,
    .workspace-root-block,
    .workspace-path-block,
    .workspace-search-block {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .workspace-root-block .field,
    .workspace-path-block .field {
      height: 34px;
    }
    .workspace-nav-actions {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface);
    }
    .workspace-nav-btn {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-strong);
      color: var(--proj-page-text);
      transition: background .12s ease, border-color .12s ease, opacity .12s ease;
    }
    .workspace-nav-btn:hover:not(:disabled) {
      background: rgba(79, 70, 229, 0.1);
      border-color: rgba(79, 70, 229, 0.18);
    }
    .workspace-nav-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }
    .workspace-nav-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .workspace-search-input {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-input);
      color: var(--proj-page-muted);
      padding: 0 6px 0 10px;
      position: relative;
    }
    .workspace-search-input input {
      width: 100%;
      min-width: 0;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--proj-page-text);
      font-size: 11px;
      font-weight: 600;
    }
    .workspace-search-filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      padding: 0 6px;
      border-radius: 7px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--proj-page-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: background .12s ease, color .12s ease, border-color .12s ease;
    }
    .workspace-search-filter-btn:hover { color: #4f46e5; background: rgba(79,70,229,0.08); }
    .workspace-search-filter-btn.has-active {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.12);
      border-color: rgba(79, 70, 229, 0.24);
    }
    .workspace-search-filter-btn .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 14px;
      height: 14px;
      padding: 0 4px;
      border-radius: 999px;
      background: #4f46e5;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
    }
    .workspace-search-popover {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 80;
      min-width: 260px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: color-mix(in srgb, var(--proj-page-surface) 100%, #ffffff 0%);
      background-color: var(--proj-page-surface);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(8px);
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .workspace-search-popover.is-open { display: flex; }
    .workspace-search-popover-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--proj-page-text);
    }
    .workspace-search-popover-row label {
      flex: 0 0 56px;
      color: var(--proj-page-muted);
      font-weight: 600;
    }
    .workspace-search-popover-row select {
      flex: 1 1 auto;
      height: 26px;
      padding: 0 6px;
      border-radius: 7px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-input);
      color: var(--proj-page-text);
      font-size: 11px;
    }
    .workspace-search-popover-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--proj-page-text);
      cursor: pointer;
    }
    .workspace-search-popover-toggle input { margin: 0; }
    .workspace-search-popover-hint {
      font-size: 10px;
      color: var(--proj-page-muted);
      line-height: 1.4;
    }
    .workspace-search-popover-foot {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      padding-top: 4px;
      border-top: 1px dashed var(--proj-page-border);
    }
    .workspace-search-popover-foot button {
      height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface);
      color: var(--proj-page-text);
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .workspace-search-popover-foot button.primary {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }
    .workspace-control-grid {
      display: grid;
      grid-template-columns: minmax(148px, 188px) minmax(0, 1fr);
      gap: 8px;
    }
    .workspace-control-grid label {
      display: grid;
      gap: 4px;
    }
    .workspace-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      align-items: center;
    }
    .workspace-actions .btn {
      min-height: 28px;
      padding: 0 9px;
    }
    .workspace-browser-actions {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .workspace-browser-actions .btn {
      min-height: 26px;
      padding: 0 8px;
    }
    .workspace-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 8px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface);
      color: var(--proj-page-text);
      cursor: pointer;
      transition: background .12s ease, color .12s ease, border-color .12s ease;
    }
    .workspace-icon-btn:hover {
      background: color-mix(in srgb, #6366f1 10%, var(--proj-page-surface) 90%);
      color: #4f46e5;
      border-color: rgba(79, 70, 229, 0.32);
    }
    .workspace-icon-btn.primary {
      color: #fff;
      background: #4f46e5;
      border-color: #4f46e5;
    }
    .workspace-icon-btn.primary:hover {
      background: #4338ca;
      border-color: #4338ca;
      color: #fff;
    }
    .workspace-icon-btn svg { display: block; }
    .workspace-summary {
      display: none;
    }
    .workspace-quick-roots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .quick-root-btn {
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-strong);
      color: var(--proj-page-text);
      font-size: 10px;
      font-weight: 700;
    }
    .quick-root-btn.active {
      background: rgba(79, 70, 229, 0.14);
      border-color: rgba(79, 70, 229, 0.28);
      color: #4338ca;
    }
    .summary-chip strong {
      color: var(--proj-page-text);
      font-weight: 700;
    }
    .selection-bar {
      display: none !important;
    }
    .selection-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    .selection-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--proj-page-text);
    }
    .selection-subtitle {
      display: none;
    }
    .selection-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }
    .context-menu-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-strong);
      font-size: 10px;
      font-weight: 700;
      color: var(--proj-page-text);
    }
    .context-menu-btn:hover {
      background: rgba(79, 70, 229, 0.08);
      border-color: rgba(79, 70, 229, 0.22);
    }
    .context-menu-btn.active {
      background: rgba(79, 70, 229, 0.14);
      border-color: rgba(79, 70, 229, 0.3);
      color: #4338ca;
    }
    .workspace-main {
      --detail-width: 430px;
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 8px minmax(320px, var(--detail-width));
      gap: 0;
      align-items: stretch;
      border-radius: 14px;
      background: transparent;
      overflow: hidden;
    }
    .workspace-main.preview-collapsed {
      grid-template-columns: minmax(0, 1fr) 8px 0;
    }
    .workspace-main.preview-collapsed .workspace-detail-pane {
      display: none;
    }
    .workspace-resizer {
      position: relative;
      align-self: stretch;
      width: 8px;
      border: none;
      background: transparent;
      cursor: col-resize;
      user-select: none;
      touch-action: none;
      padding: 0;
      margin: 0;
    }
    .workspace-resizer::before {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: var(--proj-page-border);
      transition: width .12s ease, background .12s ease;
    }
    .workspace-resizer:hover::before,
    .workspace-main.workspace-resizing .workspace-resizer::before {
      width: 2px;
      background: rgba(79, 70, 229, 0.55);
    }
    .workspace-main.preview-collapsed .workspace-resizer {
      cursor: pointer;
    }
    .workspace-resizer-toggle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--proj-page-border-strong, var(--proj-page-border));
      background: var(--proj-page-surface);
      color: var(--proj-page-muted);
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      font-size: 11px;
      line-height: 1;
      z-index: 2;
    }
    .workspace-resizer-toggle:hover {
      color: var(--proj-page-text);
      border-color: rgba(79, 70, 229, 0.55);
    }
    body.workspace-resizing {
      cursor: col-resize;
      user-select: none;
    }
    body.workspace-resizing * {
      cursor: col-resize !important;
    }
    .workspace-list-shell,
    .workspace-detail-pane {
      min-height: 0;
      padding: 6px;
    }
    .workspace-list-shell {
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-radius: 12px;
      border: none;
      background: transparent;
      box-shadow: none;
    }
    .workspace-panel-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }
    .workspace-panel-head .crumbs {
      flex: 1 1 auto;
      min-width: 0;
    }
    .workspace-panel-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--proj-page-text);
    }
    .workspace-panel-subtitle {
      font-size: 11px;
      color: var(--proj-page-muted);
      line-height: 1.5;
      margin-top: 2px;
    }
    body[data-proj-embedded="1"] .workspace-panel-head > div:first-child {
      display: none;
    }
    .workspace-panel-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
      flex: 0 0 auto;
    }
    .workspace-explorer-bar {
      display: none;
    }
    .workspace-explorer-copy {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .workspace-explorer-label {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-strong);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--proj-page-muted);
    }
    .workspace-explorer-path {
      min-width: 0;
      flex: 1 1 280px;
      font-size: 12px;
      color: var(--proj-page-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .workspace-explorer-hint {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
      color: var(--proj-page-muted);
    }
    .workspace-explorer-hint strong {
      color: var(--proj-page-text);
      font-weight: 700;
    }
    .file-view-switch {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 1px;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface);
    }
    .file-view-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 26px;
      padding: 0;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--proj-page-muted);
      cursor: pointer;
      transition: background .12s ease, color .12s ease, border-color .12s ease;
    }
    .file-view-btn:hover { color: #4f46e5; }
    .file-view-btn svg { display: block; }
    .file-view-btn.active {
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.12);
      border-color: rgba(79, 70, 229, 0.24);
    }
    .workspace-table-shell {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      border-radius: 10px;
      border: none;
      background: transparent;
      box-shadow: none;
    }
    .workspace-table-scroll {
      height: 100%;
      overflow: auto;
    }
    .workspace-table {
      width: 100%;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 10.5px;
      table-layout: fixed;
    }
    .workspace-table th,
    .workspace-table td {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .workspace-table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .workspace-table .col-resizer {
      position: absolute;
      top: 0;
      right: 0;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
      background: transparent;
      transition: background .15s ease;
    }
    .workspace-table .col-resizer:hover,
    .workspace-table .col-resizer.dragging {
      background: color-mix(in srgb, #6366f1 32%, transparent 68%);
    }
    .workspace-table th {
      position: relative;
    }
    .workspace-card-shell {
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 10px;
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 4px 2px;
      overflow: auto;
    }
    .file-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 4px;
    }
    .file-card-grid.mode-small {
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 3px;
    }
    .file-card-grid.mode-small .file-card-visual { height: 56px; border-radius: 8px; }
    .file-card-grid.mode-small .file-card { padding: 4px; gap: 2px; border-radius: 8px; }
    .file-card-grid.mode-small .file-card-title { font-size: 11px; }
    .file-card-grid.mode-small .file-card-meta { display: none; }
    .file-card-grid.mode-medium {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 4px;
    }
    .file-card-grid.mode-medium .file-card-visual { height: 84px; }
    .file-card-grid.mode-large {
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 6px;
    }
    .file-card-grid.mode-large .file-card { padding: 7px; gap: 5px; border-radius: 12px; }
    .file-card-grid.mode-large .file-card-visual { height: 132px; border-radius: 12px; }
    .file-card-grid.mode-large .file-card-title { font-size: 13px; }
    .file-card {
      display: grid;
      gap: 3px;
      padding: 5px;
      border-radius: 10px;
      border: none;
      background: color-mix(in srgb, #6366f1 4%, var(--proj-page-surface) 96%);

      height: 28px;
      border-radius: 999px;
      border: 3px solid color-mix(in srgb, var(--proj-page-border) 84%, transparent 16%);
      border-top-color: #4f46e5;
      animation: spin .9s linear infinite;
    }
    .docx-preview-stage .docx-wrapper {
      padding: 8px 0 0;
      background: transparent;
      box-shadow: none;
    }
    .docx-preview-stage section.docx {
      margin-bottom: 20px;
      border-radius: 12px;
    }
    .office-preview-layout {
      display: grid;
      grid-template-columns: minmax(210px, 250px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .office-preview-sidebar {
      position: sticky;
      top: 0;
      border: 1px solid var(--proj-page-border);
      border-radius: 14px;
      padding: 12px;
      background: var(--proj-page-surface);
    }
    .office-preview-sidebar .search-input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-input);
      color: var(--proj-page-text);
      padding: 9px 11px;
      font-size: 12px;
    }
    .office-preview-nav {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 420px;
      overflow: auto;
    }
    .office-nav-btn {
      width: 100%;
      border: 1px solid var(--proj-page-border);
      border-radius: 12px;
      background: transparent;
      color: var(--proj-page-text);
      text-align: left;
      padding: 10px 11px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .office-nav-btn:hover {
      background: var(--proj-page-hover);
      border-color: rgba(79, 70, 229, 0.35);
    }
    .office-nav-btn.active {
      background: rgba(79, 70, 229, 0.1);
      border-color: rgba(79, 70, 229, 0.45);
      box-shadow: inset 0 0 0 1px rgba(79, 70, 229, 0.18);
    }
    .office-nav-btn strong { display: block; }
    .office-nav-title {
      margin-top: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--proj-page-text);
    }
    .office-nav-btn small {
      display: block;
      margin-top: 4px;
      color: var(--proj-page-muted);
      line-height: 1.45;
    }
    .office-nav-card {
      padding: 0;
      overflow: hidden;
    }
    .office-nav-card-body { padding: 10px 12px 12px; }
    .office-nav-thumb {
      height: 108px;
      border-bottom: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .office-nav-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .office-nav-thumb-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      min-width: 28px;
      height: 28px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      padding: 0 8px;
    }
    .office-nav-thumb-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--proj-page-muted);
    }
    .office-nav-thumb-fallback .big {
      font-size: 28px;
      font-weight: 800;
      color: var(--proj-page-text);
    }
    .office-nav-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .office-nav-meta span {
      font-size: 11px;
      color: var(--proj-page-muted);
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--proj-page-surface-strong);
    }
    .office-preview-main {
      display: grid;
      gap: 14px;
    }
    .office-summary {
      border: 1px solid var(--proj-page-border);
      border-radius: 14px;
      padding: 14px 15px;
      background: var(--proj-page-surface);
    }
    .office-summary-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .office-summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .office-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--proj-page-border);
      background: var(--proj-page-surface-strong);
      color: var(--proj-page-text);
    }
    .office-pill.warn {
      background: rgba(245, 158, 11, 0.1);
      color: #92400e;
      border-color: rgba(245, 158, 11, 0.32);
    }
    .office-pill.ok {
      background: rgba(16, 185, 129, 0.12);
      color: #047857;
      border-color: rgba(16, 185, 129, 0.28);
    }
    .office-warning {
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid rgba(245, 158, 11, 0.32);
      background: rgba(245, 158, 11, 0.1);
      color: #92400e;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
    }
    .office-preview {
      display: grid;
      gap: 14px;
    }
    .office-pdf-frame {
      width: 100%;
      min-height: 860px;
      border: 1px solid var(--proj-page-border);
      border-radius: 16px;
      background: #3f3f46;
    }
    .office-page {
      border: 1px solid var(--proj-page-border);
      border-radius: 14px;
      padding: 15px;
      background: var(--proj-page-surface);
    }
    .office-page[hidden] { display: none !important; }
    .office-page-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--proj-page-muted);
      margin-bottom: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .office-page-heading {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }
    .office-page-meta {
      font-size: 12px;
      color: var(--proj-page-muted);
      margin: 6px 0 10px;
    }
    .office-page img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--proj-page-border);
      margin-top: 10px;
    }
    .office-preview-layout.document .office-preview {
      justify-items: center;
    }
    .office-preview-layout.document .office-page {
      width: min(860px, 100%);
      min-height: 760px;
      padding: 34px 42px;
      border-radius: 10px;
      background: #fff;
      color: #1f2937;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
    }
    html.dark .office-preview-layout.document .office-page { box-shadow: 0 16px 34px rgba(2, 6, 23, 0.45); border: 1px solid rgba(148, 163, 184, 0.32); }
    .office-preview-layout.document .office-page .md-preview { font-size: 14px; }
    .office-preview-layout.presentation .office-page {
      background: linear-gradient(180deg, color-mix(in srgb, var(--proj-page-surface) 96%, white 4%), color-mix(in srgb, var(--proj-page-surface-strong) 92%, white 8%));
    }
    .office-preview-layout.spreadsheet .office-page { padding: 14px; }
    .office-sheet-table-wrap {
      overflow: auto;
      border: 1px solid var(--proj-page-border);
      border-radius: 12px;
      background: var(--proj-page-surface);
    }
    .office-sheet-table {
      width: 100%;
      min-width: 540px;
      border-collapse: collapse;
      font-size: 12px;
    }
    .office-sheet-table th,
    .office-sheet-table td {
      border-bottom: 1px solid var(--proj-page-border);
      border-right: 1px solid var(--proj-page-border);
      padding: 7px 9px;
      vertical-align: top;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .office-sheet-table thead th {
      position: sticky;
      top: 0;
      background: var(--proj-page-surface);
      z-index: 1;
    }
    .office-sheet-table .sheet-row-head {
      position: sticky;
      left: 0;
      min-width: 48px;
      text-align: right;
      color: var(--proj-page-muted);
      font-weight: 700;
      background: var(--proj-page-surface-strong);
      z-index: 1;
    }
    .office-sheet-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--proj-page-muted);
    }
    .spinner {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--proj-page-border) 82%, transparent 18%);
      border-top-color: #4f46e5;
      animation: spin .8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .icon-folder {
      color: #0f766e;
      font-weight: 800;
    }
    .icon-file {
      color: var(--proj-page-muted);
      font-weight: 700;
    }
    @media (max-width: 1279px) {
      .workspace-header {
        position: static;
      }
      .workspace-main {
        grid-template-columns: minmax(0, 1fr) 4px minmax(280px, var(--detail-width));
      }
    }
    @media (max-width: 960px) {
      .workspace-header-top {
        align-items: flex-start;
      }
      .workspace-header-actions {
        justify-content: flex-start;
      }
      .workspace-toolbar-grid,
      .meta-grid {
        grid-template-columns: 1fr;
      }
      .workspace-nav-actions,
      .workspace-actions {
        justify-content: flex-start;
      }
      .workspace-explorer-hint {
        justify-content: flex-start;
      }
      .office-preview-layout {
        grid-template-columns: 1fr;
      }
      .office-preview-sidebar {
        position: static;
      }
      .preview-frame,
      .office-pdf-frame {
        min-height: 620px;
      }
      .file-card-grid {
        grid-template-columns: repeat(auto-fill, minmax(156px, 1fr));
      }
      .workspace-panel-tools {
        width: 100%;
        justify-content: flex-start;
      }
    }
    * { scrollbar-width: thin; scrollbar-color: #64748b transparent; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: #64748b; border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script src="/vendor/highlight/highlight.js"></script>
  <script src="/vendor/marked/marked.min.js"></script>
  <script src="/vendor/jszip/jszip.min.js"></script>
  <script src="/vendor/docx-preview/docx-preview.min.js"></script>
  <script src="/html-assets/js/storage-icons.js"></script>

</head>
<body>
  <main class="workspace-page">
    <div class="workspace-shell" id="workspace-shell">
      <header class="panel workspace-header">
        <div class="workspace-header-top">
          <div class="workspace-title-block">
            <div class="workspace-kicker" data-i18n="files.kicker">System Files</div>
            <div class="min-w-0">
              <h1 class="workspace-title">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7.75A2.75 2.75 0 015.75 5h4.69a2 2 0 011.41.59l1.41 1.41a2 2 0 001.42.59h3.56A2.75 2.75 0 0121 10.34v7.91A2.75 2.75 0 0118.25 21H5.75A2.75 2.75 0 013 18.25V7.75z"></path></svg>
                <span data-i18n="files.title">文件管理器</span>
              </h1>
            </div>
          </div>
          <div class="workspace-header-actions">
            <div id="page-status" class="chip" data-i18n="files.status.loading">等待载入</div>
            <div id="entry-count" class="chip">0 项</div>
            <div id="selected-count" class="chip hidden">未选择</div>
            <div id="drop-mode-chip" class="chip hidden" data-i18n="files.drop.enabled">拖放上传已开启</div>
          </div>
        </div>

        <div class="workspace-toolbar">
          <div class="workspace-toolbar-grid">
            <div class="workspace-nav-block">
              <div class="workspace-nav-actions" role="group" aria-label="目录导航">
                <button id="back-btn" class="workspace-nav-btn" type="button" title="后退" aria-label="后退">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m15 18-6-6 6-6"></path></svg>
                  <span class="sr-only">后退</span>
                </button>
                <button id="forward-btn" class="workspace-nav-btn" type="button" title="前进" aria-label="前进">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="m9 18 6-6-6-6"></path></svg>
                  <span class="sr-only">前进</span>
                </button>
              </div>
            </div>

            <div class="workspace-root-block">
              <select id="root-select" class="field" title="根目录"></select>
            </div>

            <div class="workspace-path-block">
              <input id="path-input" class="field mono" data-i18n-placeholder="files.path.placeholder" placeholder="留空表示根目录" />
            </div>

            <div class="workspace-search-block">
              <div class="workspace-search-input">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
                <input id="search-input" data-i18n-placeholder="files.search.placeholder" placeholder="按名称、后缀或相对路径筛选" />
                <button type="button" id="search-filter-btn" class="workspace-search-filter-btn" title="进阶过滤" aria-label="进阶过滤" aria-expanded="false">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h12l-4.5 6v4l-3 1.5V9z"/></svg>
                  <span id="search-filter-badge" class="badge" style="display:none">0</span>
                </button>
                <div id="search-filter-popover" class="workspace-search-popover" role="dialog" aria-label="搜索过滤">
                  <div class="workspace-search-popover-row">
                    <label for="search-type-select">类型</label>
                    <select id="search-type-select">
                      <option value="">全部</option>
                      <option value="folder">目录</option>
                      <option value="image">图片</option>
                      <option value="video">视频</option>
                      <option value="audio">音频</option>
                      <option value="pdf">PDF</option>
                      <option value="document">文档</option>
                      <option value="spreadsheet">表格</option>
                      <option value="presentation">演示</option>
                      <option value="archive">压缩包</option>
                      <option value="code">代码</option>
                      <option value="text">文本</option>
                      <option value="other">其他</option>
                    </select>
                  </div>
                  <label class="workspace-search-popover-toggle"><input type="checkbox" id="search-wildcard" /><span>Wildcard 模式 (支持 * ?)</span></label>
                  <div class="workspace-search-popover-hint">勾选后，搜索词将按通配符匹配名称；未勾选时仍为子串过滤。</div>
                  <div class="workspace-search-popover-foot">
                    <button type="button" id="search-filter-reset">重置</button>
                    <button type="button" id="search-filter-close" class="primary">完成</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
          <div id="quick-roots" class="workspace-quick-roots"></div>
        </div>
      </header>

      <div class="workspace-drop-hint" id="workspace-drop-hint">
        <div>
          <div class="text-sm font-semibold" data-i18n="files.drop.title">释放文件以上传到当前目录</div>
          <div id="drop-target-path" class="mono mt-2 text-xs opacity-80">/</div>
        </div>
      </div>

      <section id="selection-bar" class="panel selection-bar hidden">
        <div class="selection-copy">
          <div id="selection-title" class="selection-title">未选择项目</div>
          <div id="selection-subtitle" class="selection-subtitle"></div>
        </div>
        <div class="selection-actions">
          <button id="edit-btn" type="button" class="btn hidden">编辑</button>
          <button id="save-btn" type="button" class="btn btn-primary hidden">保存</button>
          <button id="cancel-btn" type="button" class="btn hidden">取消</button>
          <button id="open-btn" type="button" class="btn hidden">打开</button>
          <button id="rename-btn" type="button" class="btn hidden" title="重命名">重命名</button>
          <button id="copy-btn" type="button" class="btn hidden" title="复制到剪贴板">复制</button>
          <button id="cut-btn" type="button" class="btn hidden" title="剪切到剪贴板">剪切</button>
          <button id="paste-btn" type="button" class="btn hidden" title="粘贴到当前目录">粘贴</button>
          <button id="extract-btn" type="button" class="btn hidden" title="解压到同名目录">解压</button>
          <button id="download-btn" type="button" class="btn hidden">下载</button>
          <button id="selection-more-btn" type="button" class="context-menu-btn hidden">更多</button>
          <button id="delete-btn" type="button" class="btn btn-danger hidden">删除</button>
        </div>
      </section>

      <section class="workspace-main" id="workspace-main">
        <div class="panel workspace-list-shell" id="list-panel">
          <div class="workspace-panel-head">
            <div id="breadcrumb" class="crumbs"></div>
            <div class="workspace-panel-tools">
              <div class="file-view-switch" id="file-view-switch" role="group" aria-label="视图模式">
                <button type="button" class="file-view-btn active" data-file-view="list" title="详细列表" aria-label="详细列表">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/></svg>
                </button>
                <button type="button" class="file-view-btn" data-file-view="small" title="小图标" aria-label="小图标">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="3" height="3" rx="0.6"/><rect x="6.5" y="2" width="3" height="3" rx="0.6"/><rect x="11" y="2" width="3" height="3" rx="0.6"/><rect x="2" y="6.5" width="3" height="3" rx="0.6"/><rect x="6.5" y="6.5" width="3" height="3" rx="0.6"/><rect x="11" y="6.5" width="3" height="3" rx="0.6"/><rect x="2" y="11" width="3" height="3" rx="0.6"/><rect x="6.5" y="11" width="3" height="3" rx="0.6"/><rect x="11" y="11" width="3" height="3" rx="0.6"/></svg>
                </button>
                <button type="button" class="file-view-btn" data-file-view="medium" title="中图标" aria-label="中图标">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="5" height="5" rx="0.8"/><rect x="9" y="2" width="5" height="5" rx="0.8"/><rect x="2" y="9" width="5" height="5" rx="0.8"/><rect x="9" y="9" width="5" height="5" rx="0.8"/></svg>
                </button>
                <button type="button" class="file-view-btn" data-file-view="large" title="大图标" aria-label="大图标">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="5.5" height="5.5" rx="1"/><rect x="8.5" y="2" width="5.5" height="5.5" rx="1"/><rect x="2" y="8.5" width="12" height="5.5" rx="1"/></svg>
                </button>
              </div>
              <div class="workspace-browser-actions">
                <button id="refresh-btn" class="workspace-icon-btn" type="button" title="刷新" aria-label="刷新">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 3v5h-5"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 21v-5h5"/></svg>
                </button>
                <button id="mkdir-btn" class="workspace-icon-btn" type="button" title="新建文件夹" aria-label="新建文件夹">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5A1.5 1.5 0 0 1 4.5 6h4l2 2h9A1.5 1.5 0 0 1 21 9.5v8A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 11v6M9 14h6"/></svg>
                </button>
                <button id="upload-btn" class="workspace-icon-btn primary" type="button" title="上传文件" aria-label="上传文件">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4"/><path stroke-linecap="round" stroke-linejoin="round" d="m6 10 6-6 6 6"/><path stroke-linecap="round" stroke-linejoin="round" d="M4 20h16"/></svg>
                </button>
                <input id="upload-input" type="file" class="hidden" multiple />
              </div>
