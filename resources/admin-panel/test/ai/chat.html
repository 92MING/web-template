// Client status panel (Sec 5.3) — fetch /ai/services/{kind} and render
// ══════════════════════════════════════════════════════════════════════════════
const CLIENT_STATUS_POLL_MS = 30000;
let _clientStatusPollTimer = null;
const TAB_TO_KIND = { default: 'completion', 'openai': 'completion' };

function _classifyClientState(client) {
  const now = Date.now() / 1000;
  if (client.cooldown_until && client.cooldown_until > now) return 'cooling';
  if (!client.available) return 'error';
  return 'available';
}

function _formatSpeed(v) {
  const n = Number(v) || 0;
  if (n <= 0) return '–';
  if (n >= 1) return n.toFixed(2);
  return n.toFixed(3);
}

function _renderClientCard(client, instanceKey) {
  const state = _classifyClientState(client);
  const stateLabel = { available: '可用', cooling: '冷却', error: '错误' }[state];
  const card = document.createElement('div');
  card.className = 'client-card';
  const errAttr = client.last_error ? ` title="${String(client.last_error).replace(/"/g, '&quot;')}"` : '';
  const mc = client.max_concurrent == null ? '∞' : client.max_concurrent;
  card.innerHTML = `
    <div class="client-card-header">
      <span class="client-card-key" title="${client.key}">${client.key}</span>
      <span class="client-state-badge ${state}"${errAttr}>${stateLabel}</span>
    </div>
    <div class="client-card-instance">instance: ${instanceKey} · ${client.type}</div>
    <div class="client-card-meta">
      <span>inflight: ${client.inflight}/${mc}</span>
      <span>score: ${(Number(client.score) || 0).toFixed(2)}</span>
      <span>ok: ${client.success_count}</span>
      <span>fail: ${client.fail_count}</span>
      <span>speed: ${_formatSpeed(client.speed_ewma)}</span>
      <span>lvl: ${client.strategy_lvl}</span>
    </div>`;
  return card;
}

async function refreshClientStatusPanel() {
  const panel = document.getElementById('client-status-panel');
  if (!panel) return;
  const grid = document.getElementById('client-status-grid');
  const empty = document.getElementById('client-status-empty');
  const summaryText = document.getElementById('client-status-panel-summary-text');
  const kind = TAB_TO_KIND[currentTab] || 'completion';
  try {
    const r = await fetch(window.projAiApiPath(`/ai/services/${kind}`));
    if (!r.ok) {
      summaryText.textContent = `Client 状态 · 加载失败 (HTTP ${r.status})`;
      grid.innerHTML = '';
      empty.style.display = 'none';
      return;
    }
    const data = await r.json();
    const instances = data?.instances || {};
    grid.innerHTML = '';
    let total = 0; let healthy = 0;
    for (const [instKey, inst] of Object.entries(instances)) {
      for (const ckey of (inst.clients || [])) {
        const c = data.clients?.[ckey];
        if (!c) continue;
        total += 1;
        if (c.available) healthy += 1;
        grid.appendChild(_renderClientCard(c, instKey));
      }
    }
    if (total === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
      summaryText.textContent = `Client 状态 · ${kind} (无实例)`;
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
      summaryText.textContent = `Client 状态 · ${kind} ${healthy}/${total} 可用`;
    }
  } catch (e) {
    summaryText.textContent = 'Client 状态 · 网络错误';
  }
}

function startClientStatusPolling() {
  if (_clientStatusPollTimer != null) return;
  void refreshClientStatusPanel();
  _clientStatusPollTimer = setInterval(() => { void refreshClientStatusPanel(); }, CLIENT_STATUS_POLL_MS);
}

// ══════════════════════════════════════════════════════════════════════════════
// Markdown Rendering (lightweight)
// ══════════════════════════════════════════════════════════════════════════════
function renderMarkdown(text) {
  if (!text) return '';
  const codeBlocks = [];
  let s = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const i = codeBlocks.length;
    codeBlocks.push({ lang, code: escapeHtml(code.replace(/\n$/, '')) });
    return `\x00CODEBLOCK${i}\x00`;
  });
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/&lt;code&gt;(.*?)&lt;\/code&gt;/g, '<code>$1</code>');
  s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  s = s.replace(/^---$/gm, '<hr/>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  s = s.replace(/^(\|.+\|)\n(\|[-|: ]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  s = s.replace(/\n{2,}/g, '</p><p>');
  s = '<p>' + s + '</p>';
  s = s.replace(/<p><\/p>/g, '');
  s = s.replace(/([^>])\n([^<])/g, '$1<br/>$2');
  s = s.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i) => {
    const b = codeBlocks[i];
    return `<pre><button class="copy-code" onclick="copyCode(this)">复制</button><code class="language-${b.lang || 'text'}">${b.code}</code></pre>`;
  });
  return s;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function copyCode(btn) {
  const code = btn.nextElementSibling ? btn.nextElementSibling.textContent : '';
  navigator.clipboard.writeText(code).then(() => { btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1500); });
}

function richBlockLabel(component) {
  return component === 'markdown'
    ? 'Markdown'
    : component === 'mermaid'
      ? 'Mermaid'
      : component === 'latex'
        ? 'LaTeX'
        : component === 'tikz'
          ? 'TikZ'
          : component;
}

function normalizeAssistantContent(content) {
  if (Array.isArray(content)) return content;
  if (content && typeof content === 'object') {
    if (Array.isArray(content.blocks)) return content.blocks;
    if (Array.isArray(content.parts)) return content.parts;
    if (Array.isArray(content.content)) return content.content;
    if (typeof content.content === 'string') return content.content;
    if (typeof content.text === 'string') return content.text;
    if (typeof content.markdown === 'string') return [{ component: 'markdown', data: content.markdown }];
    if (typeof content.component === 'string' && typeof content.data === 'string') return [content];
  }
  return content == null ? '' : String(content);
}

function splitLatexDisplayBlocks(text) {
  const source = String(text || '');
  const re = /(?:^|\n)\$\$\n?([\s\S]+?)\n?\$\$(?=\n|$)/g;
  const blocks = [];
  let lastIndex = 0;
  let match;
  while ((match = re.exec(source))) {
    const matched = match[0];
    const start = match.index;
    const end = start + matched.length;
    const markdownChunk = source.slice(lastIndex, start);
    if (markdownChunk) blocks.push({ component: 'markdown', data: markdownChunk });
    blocks.push({ component: 'latex', data: String(match[1] || '').trim() });
    lastIndex = end;
  }
  const tail = source.slice(lastIndex);
  if (tail) blocks.push({ component: 'markdown', data: tail });
  return blocks.length ? blocks : [{ component: 'markdown', data: source }];
}

function appendMarkdownBlock(blocks, text) {
  if (!text) return;
  splitLatexDisplayBlocks(text).forEach((block) => {
    if (!block.data) return;
    if (block.component === 'markdown' && blocks.length && blocks[blocks.length - 1].component === 'markdown') {
      blocks[blocks.length - 1].data += block.data;
    } else {
      blocks.push(block);
    }
  });
}

function buildBlocksFromText(text) {
  const source = String(text || '');
  if (!source) return [];
  const blocks = [];
  const re = /```([\w-]+)?\n([\s\S]*?)```|<script\s+type=["']text\/tikz["']>([\s\S]*?)<\/script>/gi;
  let lastIndex = 0;
  let match;
  while ((match = re.exec(source))) {
    appendMarkdownBlock(blocks, source.slice(lastIndex, match.index));
    if (match[3] != null) {
      blocks.push({ component: 'tikz', data: String(match[3] || '').trim() });
    } else {
      const lang = String(match[1] || '').trim().toLowerCase();
      const code = String(match[2] || '').replace(/\n$/, '');
      if (lang === 'mermaid') {
        blocks.push({ component: 'mermaid', data: code });
      } else if (lang === 'tikz') {
        blocks.push({ component: 'tikz', data: code });
      } else if (['latex', 'tex', 'math', 'katex'].includes(lang)) {
        blocks.push({ component: 'latex', data: code });
      } else {
        appendMarkdownBlock(blocks, match[0]);
      }
    }
    lastIndex = re.lastIndex;
  }
  appendMarkdownBlock(blocks, source.slice(lastIndex));
  return blocks.filter(block => String(block.data || '').trim());
}

function blocksFromPart(part) {
  if (part == null) return [];
  if (typeof part === 'string') return buildBlocksFromText(part);
  if (Array.isArray(part)) return part.flatMap(blocksFromPart);
  if (typeof part !== 'object') return buildBlocksFromText(String(part));
  const component = String(part.component || part.type || '').trim().toLowerCase();
  if (!component && typeof part.markdown === 'string') return [{ component: 'markdown', data: part.markdown }];
  const data = part.data ?? part.text ?? part.content ?? part.value ?? '';
  if (component === 'text') return buildBlocksFromText(String(data || ''));
  if (component === 'markdown_text') return [{ component: 'markdown', data: String(data || '') }];
  if (RICH_COMPONENTS.has(component)) return [{ component, data: String(data || '') }];
  if (typeof data === 'string' && data) return buildBlocksFromText(data);
  return buildBlocksFromText(JSON.stringify(part, null, 2));
}

function buildAssistantRenderBlocks(content) {
  const normalized = normalizeAssistantContent(content);
  if (typeof normalized === 'string') return buildBlocksFromText(normalized);
  if (Array.isArray(normalized)) return normalized.flatMap(blocksFromPart);
  return buildBlocksFromText(JSON.stringify(normalized, null, 2));
}

function renderFallbackBlock(block) {
  if (block.component === 'markdown') {
    return `<section class="rich-block rich-block-markdown"><div class="rich-block-body">${renderMarkdown(block.data)}</div></section>`;
  }
  return `<section class="rich-block rich-block-${block.component}"><div class="rich-block-head"><span>${escapeHtml(richBlockLabel(block.component))}</span></div><div class="rich-block-body"><pre><button class="copy-code" onclick="copyCode(this)">复制</button><code class="language-${escapeHtml(block.component)}">${escapeHtml(block.data)}</code></pre></div></section>`;
}

function renderAssistantFallbackHtml(content) {
  const blocks = buildAssistantRenderBlocks(content);
  if (!blocks.length) return '';
  return blocks.map(renderFallbackBlock).join('');
}

async function requestRenderedHtml(component, data) {
  const payloadText = String(data || '');
  const cacheKey = `${component}::${payloadText}`;
  if (richRenderCache.has(cacheKey)) return richRenderCache.get(cacheKey);
  const requestUrl = new URL(RENDER_HTML_API_URL, window.location.origin);
  requestUrl.searchParams.set('full', 'false');
  const promise = fetch(requestUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(buildRenderRequestData(component, payloadText))
  }).then(async (resp) => {
    if (!resp.ok) {
      throw new Error(await resp.text() || `HTTP ${resp.status}`);
    }
    return String(await resp.text() || '');
  });
  richRenderCache.set(cacheKey, promise);
  try {
    return await promise;
  } catch (error) {
    richRenderCache.delete(cacheKey);
    throw error;
  }
}

async function renderRichBlock(block) {
  try {
    const html = await requestRenderedHtml(block.component, block.data);
    return block.component === 'markdown'
      ? `<section class="rich-block rich-block-markdown"><div class="rich-block-body">${html}</div></section>`
      : `<section class="rich-block rich-block-${block.component}"><div class="rich-block-head"><span>${escapeHtml(richBlockLabel(block.component))}</span></div><div class="rich-block-body">${html}</div></section>`;
  } catch (error) {
    const fallback = renderFallbackBlock(block);
    if (block.component === 'markdown') return fallback;
    return fallback.replace('<div class="rich-block-body">', `<div class="rich-block-body"><div class="rich-render-error">渲染失败，已回退到源码显示。${escapeHtml(error && error.message ? ` ${error.message}` : '')}</div>`);
  }
}

async function enhanceAssistantContent(container, content) {
  const blocks = buildAssistantRenderBlocks(content);
  if (!blocks.length) {
    container.innerHTML = '';
    return;
  }
  const token = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
  container.dataset.renderToken = token;
  const htmlParts = await Promise.all(blocks.map(renderRichBlock));
  if (container.dataset.renderToken !== token) return;
  container.innerHTML = htmlParts.join('');
}

// ══════════════════════════════════════════════════════════════════════════════
// Time formatting
// ══════════════════════════════════════════════════════════════════════════════
function timeStr(d) {
  return (d ? new Date(d) : new Date()).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}
function fmtMs(ms) {
  if (ms == null) return '';
  return ms < 1000 ? ms + 'ms' : (ms / 1000).toFixed(2) + 's';
}

function pickTokenCount(tokenUsage) {
  if (!tokenUsage || typeof tokenUsage !== 'object') return null;
  const preferredKeys = ['output_tokens', 'completion_tokens', 'response_tokens', 'generated_tokens'];
  for (const key of preferredKeys) {
    const value = Number(tokenUsage[key]);
    if (Number.isFinite(value) && value > 0) return value;
  }
  return null;
}

function tokenRateLabel(msg) {
  const outputTokens = pickTokenCount(msg?.token_usage);
  const durationMs = Number(msg?._clientMs ?? msg?.elapsed_ms ?? 0);
  if (!Number.isFinite(outputTokens) || outputTokens <= 0 || !Number.isFinite(durationMs) || durationMs <= 0) {
    return null;
  }
  const rate = outputTokens / Math.max(durationMs / 1000, 0.001);
  return `输出速率 ${rate.toFixed(rate >= 10 ? 1 : 2)} tok/s`;
}

// ══════════════════════════════════════════════════════════════════════════════
// Render Messages
// ══════════════════════════════════════════════════════════════════════════════
function renderAllMessages() {
  $messages.innerHTML = '';
  chatHistory.forEach((msg, idx) => { $messages.appendChild(buildMsgRow(msg, idx)); });
  scrollToBottom();
}

function buildMsgRow(msg, idx) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  row.dataset.idx = idx;

  if (msg.role === 'system' || msg.role === 'error') {
    row.innerHTML = `
      <div class="msg-bubble">
        <div class="msg-actions">${actionButtons(msg, idx)}</div>
        <strong>${msg.role === 'system' ? '系统' : '错误'}</strong>：${escapeHtml(typeof msg.content === 'string' ? msg.content : '[复合内容]')}
        <div class="msg-meta"><span>${timeStr(msg._time)}</span></div>
      </div>`;
    return row;
  }

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = msg.role === 'user' ? 'U' : 'AI';
  row.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = actionButtons(msg, idx);
  bubble.appendChild(actions);

  if (msg._attachments && msg._attachments.length) {
    const ad = document.createElement('div');
    ad.className = 'bubble-attachments';
    msg._attachments.forEach(att => {
      if (att.type === 'image' && att.dataUrl) {
        const img = document.createElement('img');
        img.src = att.dataUrl;
        img.title = att.name;
        img.onclick = () => window.open(att.dataUrl, '_blank');
        ad.appendChild(img);
      } else {
        const sp = document.createElement('span');
        sp.className = 'bubble-attach-file';
        sp.textContent = `附件 · ${att.name} (${formatSize(att.size)})`;
        ad.appendChild(sp);
      }
    });
    bubble.appendChild(ad);
  }

  if (msg.role === 'assistant' && msg.thinkContent) {
    bubble.appendChild(buildThinkBlock(msg.thinkContent, msg._thinkTime));
  }

  const content = document.createElement('div');
  if (msg.role === 'assistant') {
    content.className = 'md-content rich-content';
    content.innerHTML = renderAssistantFallbackHtml(msg.content);
    enhanceAssistantContent(content, msg.content).catch(() => {});
  } else {
    content.style.whiteSpace = 'pre-wrap';
    // Trim trailing whitespace so pre-wrap doesn't render a blank line at the
    // bottom of the user bubble (chat composer commonly leaves a stray '\n').
    const raw = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
    content.textContent = raw.replace(/\s+$/, '');
  }
  bubble.appendChild(content);

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = `<span>${timeStr(msg._time)}</span>`;
  bubble.appendChild(meta);

  if (msg.role === 'assistant' && (msg.elapsed_ms != null || msg.token_usage || msg._clientMs != null)) {
    const footer = document.createElement('div');
    footer.className = 'msg-footer';
    const parts = [];
    if (msg._thinkTime != null) parts.push(`思考 ${fmtMs(msg._thinkTime)}`);
    if (msg.elapsed_ms != null) parts.push(`服务端 ${fmtMs(msg.elapsed_ms)}`);
    if (msg._clientMs != null) parts.push(`客户端 ${fmtMs(msg._clientMs)}`);
    if (msg.token_usage) {
      if (msg.token_usage.input_tokens != null) parts.push(`输入 ${msg.token_usage.input_tokens}`);
      if (msg.token_usage.output_tokens != null) parts.push(`输出 ${msg.token_usage.output_tokens}`);
      const other = Object.entries(msg.token_usage).filter(([k]) => !['input_tokens','output_tokens'].includes(k));
      other.forEach(([k,v]) => parts.push(`${k}: ${v}`));
    }
    const tokenRate = tokenRateLabel(msg);
    if (tokenRate) parts.push(tokenRate);
    footer.innerHTML = parts.map(p => `<span>${p}</span>`).join('');
    bubble.appendChild(footer);
  }

  row.appendChild(bubble);
  return row;
}

function actionButtons(msg, idx) {
  let html = '';
  html += `<button title="复制" onclick="copyMsg(${idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
  if (msg.role === 'user') {
    html += `<button title="编辑" onclick="editMsg(${idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`;
    html += `<button title="重发" onclick="resendMsg(${idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>`;
  }
  html += `<button title="删除" onclick="deleteMsg(${idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>`;
  return html;
}

function buildThinkBlock(thinkText, thinkTime) {
  const block = document.createElement('div');
  block.className = 'think-block';
  const timePart = thinkTime != null ? ` (${(thinkTime/1000).toFixed(1)}s)` : '';
  block.innerHTML = `
    <div class="think-header collapsed" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      <span>思考完成${timePart}</span>
    </div>
    <div class="think-body hidden">${escapeHtml(thinkText)}</div>`;
  return block;
}

// ══════════════════════════════════════════════════════════════════════════════
// Message Actions
// ══════════════════════════════════════════════════════════════════════════════
function copyMsg(idx) {
  const msg = chatHistory[idx];
  const text = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

function deleteMsg(idx) { chatHistory.splice(idx, 1); renderAllMessages(); saveConversations(); }

function editMsg(idx) {
  const msg = chatHistory[idx];
  const text = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
  const row = $messages.querySelector(`.msg-row[data-idx="${idx}"]`);
  if (!row) return;
  const bubble = row.querySelector('.msg-bubble');
  bubble.innerHTML = `
    <textarea class="edit-area">${escapeHtml(text)}</textarea>
    <div class="edit-actions">
      <button style="background:#6366f1;color:#fff;" onclick="submitEdit(${idx})">保存并重发</button>
      <button style="background:#e2e8f0;color:#334155;" onclick="cancelEdit(${idx})">取消</button>
    </div>`;
  bubble.querySelector('.edit-area').focus();
  editingIndex = idx;
}

function cancelEdit(idx) { renderAllMessages(); editingIndex = -1; }

function submitEdit(idx) {
  const textarea = $messages.querySelector(`.msg-row[data-idx="${idx}"] .edit-area`);
  if (!textarea) return;
  const newText = textarea.value.trim();
  if (!newText) return;
  editingIndex = -1;
  chatHistory[idx].content = newText;
  chatHistory.splice(idx + 1);
  renderAllMessages();
  doSend();
}

function resendMsg(idx) {
  if (isGenerating) return;
  chatHistory.splice(idx + 1);
  renderAllMessages();
  doSend();
}

// ══════════════════════════════════════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════════════════════════════════════
function showToast(text) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:8px 20px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:opacity .3s;';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 1800);
}

// ══════════════════════════════════════════════════════════════════════════════
// Attachments — Upload via FileID or inline Base64
// ══════════════════════════════════════════════════════════════════════════════
function handleFiles(files) {
  if (!files || !files.length) return;
  Array.from(files).forEach(f => processFile(f));
  document.getElementById('file-input').value = '';
}

function processFile(file) {
  const reader = new FileReader();
  const isMedia = /^(image|audio|video)\//.test(file.type);
  const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  const isText = /^text\//.test(file.type) || /\.(txt|md|csv|json|py|js|ts|html|css|xml|yaml|yml|log|sh|bat|c|cpp|h|java|rb|go|rs|swift|kt)$/i.test(file.name);

  if (isMedia || isPdf) {
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      let type = 'image';
      if (/^audio\//.test(file.type)) type = 'audio';
      else if (/^video\//.test(file.type)) type = 'video';
      else if (isPdf) type = 'pdf';
      const att = {
        type, name: file.name, size: file.size,
        dataUrl: reader.result, base64, mimeType: file.type,
        file_id: null, uploadStatus: 'pending', rawFile: file,
      };
      pendingAttachments.push(att);
      renderAttachPreviews();
      if (!getSettings().base64Mode) uploadAttachment(att);
    };
    reader.readAsDataURL(file);
  } else if (isText || file.size < 100 * 1024) {
    reader.onload = () => {
      const att = {
        type: 'text', name: file.name, size: file.size,
        textContent: reader.result,
        file_id: null, uploadStatus: 'pending', rawFile: file,
      };
      pendingAttachments.push(att);
      renderAttachPreviews();
      if (!getSettings().base64Mode) uploadAttachment(att);
    };
    reader.readAsText(file);
  } else {
    reader.onload = () => {
      const att = {
        type: 'file', name: file.name, size: file.size,
        dataUrl: reader.result, base64: reader.result.split(',')[1], mimeType: file.type,
        file_id: null, uploadStatus: 'pending', rawFile: file,
      };
      pendingAttachments.push(att);
      renderAttachPreviews();
      if (!getSettings().base64Mode) uploadAttachment(att);
    };
    reader.readAsDataURL(file);
  }
}

async function uploadAttachment(att) {
  att.uploadStatus = 'uploading';
  renderAttachPreviews();
  try {
    const tokenResp = await fetch(`${_aiApiBase}/upload_temp_file`, { method: 'POST' });
    if (!tokenResp.ok) throw new Error('token HTTP ' + tokenResp.status);
    const tokenData = await tokenResp.json();
    if (att.rawFile.size > tokenData.max_size) {
      throw new Error('File too large (max ' + tokenData.max_size + ' bytes)');
    }
    const formData = new FormData();
    formData.append('file', att.rawFile);
    const resp = await fetch(tokenData.upload_url, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + tokenData.token },
      body: formData,
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    att.file_id = data.file_id;
    att.uploadStatus = 'done';
  } catch (e) {
    att.uploadStatus = 'error';
    att.uploadError = e.message;
  }
  renderAttachPreviews();
}

function renderAttachPreviews() {
  if (!pendingAttachments.length) { $attachPrev.style.display = 'none'; return; }
  $attachPrev.style.display = 'flex';
  const isBase64 = getSettings().base64Mode;
  $attachPrev.innerHTML = pendingAttachments.map((a, i) => {
    const thumbLabel = a.type === 'audio' ? 'AUD' : a.type === 'video' ? 'VID' : a.type === 'pdf' ? 'PDF' : 'TXT';
    const thumb = a.type === 'image' ? `<img src="${a.dataUrl}"/>` : `<div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#e2e8f0;border-radius:6px;font-size:12px;font-weight:700;color:#475569;">${thumbLabel}</div>`;
    const statusCls = a.uploadStatus === 'uploading' ? 'uploading' : a.uploadStatus === 'error' ? 'error' : '';
    let statusText = '';
    if (isBase64) statusText = '(base64 模式)';
    else if (a.uploadStatus === 'done') statusText = '<i class="proj-icon proj-icon-check"></i> 已上传';
    else if (a.uploadStatus === 'uploading') statusText = '上传中...';
    else if (a.uploadStatus === 'error') statusText = '错误: ' + (a.uploadError || '失败');
    else statusText = '';
    return `<div class="attach-item">
      ${thumb}
      <div class="attach-info">
        <span class="name">${escapeHtml(a.name)}</span>
        <span>${formatSize(a.size)}</span>
        <span class="upload-status ${statusCls}">${statusText}</span>
      </div>
      <button class="attach-remove" onclick="removeAttach(${i})"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button>
    </div>`;
  }).join('');
}

function removeAttach(i) { pendingAttachments.splice(i, 1); renderAttachPreviews(); }

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function buildContentParts(text, attachments, base64Mode) {
  if (!attachments || !attachments.length) return text || '';
  const parts = [];
  for (const a of attachments) {
    if (a.type === 'text') {
      parts.push({ type: 'text', text: `[文件: ${a.name}]\n${a.textContent}` });
    } else if (base64Mode || !a.file_id) {
      if (a.type === 'image') {
        parts.push({ type: 'image_url', image_url: { url: `data:${a.mimeType};base64,${a.base64}` } });
      } else {
        parts.push({ type: 'text', text: `[附件: ${a.name}] (${formatSize(a.size)})` });
        if (a.base64) parts.push({ type: a.type, data: a.base64 });
      }
    } else {
      parts.push({ type: 'file', file: a.file_id });
    }
  }
  if (text) parts.push({ type: 'text', text });
  return parts.length === 1 && parts[0].type === 'text' && parts[0].text ? parts[0].text : parts;
}

// ── Paste ─────────────────────────────────
$input.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) processFile(file);
    }
  }
});

// ── Drag & Drop ───────────────────────────
let dragCounter = 0;
document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; $dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; $dropOverlay.classList.remove('active'); } });
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault(); dragCounter = 0; $dropOverlay.classList.remove('active');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

// ══════════════════════════════════════════════════════════════════════════════
// Send Message
// ══════════════════════════════════════════════════════════════════════════════
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function sendMessage() {
  if (isGenerating) return;
  const text = $input.value.trim();
  if (!text && !pendingAttachments.length) return;

  const settings = getSettings();
  const attachClone = pendingAttachments.map(a => ({
    type: a.type, name: a.name, size: a.size,
    dataUrl: a.dataUrl, mimeType: a.mimeType,
  }));
  const content = buildContentParts(text, pendingAttachments, settings.base64Mode);

  chatHistory.push({ role: 'user', content, _time: new Date().toISOString(), _attachments: attachClone });
  pendingAttachments.length = 0;
  renderAttachPreviews();
  $input.value = '';
  $input.style.height = 'auto';
  renderAllMessages();
  if (conversations[activeConvId]) {
    conversations[activeConvId].messages = chatHistory;
    conversations[activeConvId].title = getConvTitle(conversations[activeConvId]);
    renderHistoryList();
  }
  doSend();
}

async function doSend() {
  if (isGenerating) return;
  const settings = getSettings();

  const apiMessages = [];
  if (settings.system) apiMessages.push({ role: 'system', content: settings.system });
  const recentHistory = chatHistory.filter(m => m.role === 'user' || m.role === 'assistant').slice(-memoryLimit);
  recentHistory.forEach(msg => {
    apiMessages.push({ role: msg.role, content: msg.content });
  });

  const body = {
    messages: apiMessages,
    max_tokens: settings.max_tokens,
    reasoning: settings.reasoning,
    stream: settings.stream,
    temperature: settings.temperature,
    top_p: settings.top_p,
    top_k: settings.top_k,
    presence_penalty: settings.presence_penalty,
    frequency_penalty: settings.frequency_penalty,
  };

  if (currentTab !== 'default') {
    const model = $modelSelect.value;
    if (model) body.model = model;
    const ak = (document.getElementById('input-apikey').value || '').trim();
    if (!ak) {
      showToast('请填写 API Key');
      return;
    }
  }

  const apiUrl = getCompletionApiUrl();

  isGenerating = true;
  $btnSend.disabled = true;
  $btnStop.disabled = false;
  $btnStop.style.display = 'flex';
  abortController = new AbortController();
  autoScroll = true;

  const clientStart = performance.now();
  try {
    if (settings.stream) { await doStreamSend(body, clientStart, apiUrl); }
    else { await doNonStreamSend(body, clientStart, apiUrl); }
  } finally {
    isGenerating = false;
    $btnSend.disabled = false;
    $btnStop.disabled = false;
    $btnStop.style.display = 'none';
    abortController = null;
    saveConversations();
  }
}

async function doNonStreamSend(body, clientStart, apiUrl) {
  const placeholderIdx = chatHistory.length;
  chatHistory.push({ role: 'assistant', content: '', _time: new Date().toISOString(), _streaming: true });
  renderAllMessages();
  const row = $messages.querySelector(`.msg-row[data-idx="${placeholderIdx}"]`);
  if (row) {
    const bubble = row.querySelector('.msg-bubble .md-content') || row.querySelector('.msg-bubble div:not(.msg-actions):not(.msg-meta)');
    if (bubble) bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  }

  try {
    const resp = await fetch(apiUrl, getCompletionFetchOptions(body));
    if (!resp.ok) { const errText = await resp.text(); throw new Error(`HTTP ${resp.status}: ${errText}`); }
    const data = await resp.json();
    const clientMs = Math.round(performance.now() - clientStart);
    const msg = chatHistory[placeholderIdx];
    msg.content = currentTab === 'openai' ? extractOpenAILikedMessage(data) : (data.text || '');
    msg.elapsed_ms = data.elapsed_ms;
    msg.token_usage = currentTab === 'openai' ? data.usage : data.token_usage;
    msg._clientMs = clientMs;
    msg._streaming = false;
    renderAllMessages();
  } catch (e) {
    if (e.name === 'AbortError') { chatHistory[placeholderIdx].content = '[已停止]'; }
    else { chatHistory[placeholderIdx].content = '错误: ' + e.message; chatHistory[placeholderIdx].role = 'error'; }
    chatHistory[placeholderIdx]._streaming = false;
    renderAllMessages();
  }
}

async function doStreamSend(body, clientStart, apiUrl) {
  const msgIdx = chatHistory.length;
  chatHistory.push({
    role: 'assistant', content: '', thinkContent: '', _time: new Date().toISOString(),
    _streaming: true, _thinkDone: false, _thinkStart: null, _thinkTime: null,
  });
  renderAllMessages();

  let fullText = '';
  let thinkText = '';
  let thinkStartTime = null;
  let thinkEndTime = null;
  let isThinking = false;
  let lastDoneData = null;

  const row = $messages.querySelector(`.msg-row[data-idx="${msgIdx}"]`);
  if (row) {
    const bubble = row.querySelector('.msg-bubble');
    const existingContent = bubble.querySelector('.md-content');
    const existingMeta = bubble.querySelector('.msg-meta');
    if (existingContent) existingContent.remove();
    let thinkEl = document.createElement('div');
    thinkEl.id = 'live-think';
    thinkEl.className = 'think-block';
    thinkEl.style.display = 'none';
    thinkEl.innerHTML = `
      <div class="think-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        <span>思考中...</span>
      </div>
      <div class="think-body"></div>`;
    bubble.insertBefore(thinkEl, existingMeta);
    let contentEl = document.createElement('div');
    contentEl.id = 'live-content';
    contentEl.className = 'md-content';
    contentEl.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    bubble.insertBefore(contentEl, existingMeta);
  }

  try {
    const resp = await fetch(apiUrl, getCompletionFetchOptions(body));
    if (!resp.ok) { const errText = await resp.text(); throw new Error(`HTTP ${resp.status}: ${errText}`); }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;
        if (jsonStr === '[DONE]') { lastDoneData = lastDoneData || {}; continue; }
        try {
          const d = JSON.parse(jsonStr);
          if (d.error) { fullText += '\n错误: ' + (d.error.message || d.error); updateLiveContent(fullText); continue; }
          if (currentTab === 'openai') {
            const delta = extractOpenAILikedDelta(d);
            if (delta.think) {
              if (!isThinking) { isThinking = true; thinkStartTime = performance.now(); showLiveThink(true); }
              thinkText += delta.think;
              updateLiveThink(thinkText);
            }
            if (delta.text) {
              if (isThinking) { isThinking = false; thinkEndTime = performance.now(); finalizeLiveThink(thinkText, thinkEndTime - thinkStartTime); }
              fullText += delta.text;
              updateLiveContent(fullText);
            }
            if (d.usage) lastDoneData = { token_usage: d.usage };
            continue;
          }
          if (d.done) { lastDoneData = d; continue; }
          if (d.type === 'think') {
            if (!isThinking) { isThinking = true; thinkStartTime = performance.now(); showLiveThink(true); }
            thinkText += (d.data || '');
            updateLiveThink(thinkText);
          } else {
            if (isThinking) { isThinking = false; thinkEndTime = performance.now(); finalizeLiveThink(thinkText, thinkEndTime - thinkStartTime); }
            fullText += (d.data || d.text || '');
            updateLiveContent(fullText);
          }
        } catch {}
      }
      scrollToBottom();
    }
  } catch (e) {
    if (e.name === 'AbortError') { fullText += fullText ? '' : '[已停止]'; }
    else { fullText += '\n错误: ' + e.message; }
  }

  if (isThinking && thinkStartTime) { thinkEndTime = performance.now(); finalizeLiveThink(thinkText, thinkEndTime - thinkStartTime); }

  const clientMs = Math.round(performance.now() - clientStart);
  const msg = chatHistory[msgIdx];
  msg.content = fullText;
  msg.thinkContent = thinkText || null;
  msg._thinkTime = thinkEndTime && thinkStartTime ? Math.round(thinkEndTime - thinkStartTime) : null;
  msg._clientMs = clientMs;
  msg._streaming = false;
  if (lastDoneData) { msg.elapsed_ms = lastDoneData.elapsed_ms; msg.token_usage = lastDoneData.token_usage; }
  renderAllMessages();
}

function showLiveThink(show) { const el = document.getElementById('live-think'); if (el) el.style.display = show ? '' : 'none'; }
function updateLiveThink(text) { const el = document.getElementById('live-think'); if (!el) return; const body = el.querySelector('.think-body'); if (body) body.textContent = text; }
function finalizeLiveThink(text, ms) {
  const el = document.getElementById('live-think'); if (!el) return;
  const header = el.querySelector('.think-header');
  const body = el.querySelector('.think-body');
  if (header) { header.classList.add('collapsed'); header.querySelector('span').textContent = `思考完成 (${(ms/1000).toFixed(1)}s)`; }
  if (body) { body.textContent = text; body.classList.add('hidden'); }
}
function updateLiveContent(text) {
  const el = document.getElementById('live-content');
  if (el) el.innerHTML = renderAssistantFallbackHtml(text);
}

// ══════════════════════════════════════════════════════════════════════════════
// Stop / Clear
// ══════════════════════════════════════════════════════════════════════════════
function stopGeneration() {
  if (!abortController) return;
  $btnStop.disabled = true;
  abortController.abort();
}

function clearChat() {
  if (isGenerating) stopGeneration();
  chatHistory.length = 0;
  renderAllMessages();
  saveConversations();
  showToast('对话已清空');
}
