<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2T 语音转文字</title>
<link rel="stylesheet" href="/vendor/tailwindcss/tailwind.css">
<script src="/html-assets/js/ai-test-shared.js"></script>
<style>
:root {
  --s2t-bg: #edf2f6; --s2t-text: #142033; --s2t-panel: #fff; --s2t-soft: #f7f9fb;
  --s2t-line: #d7dee8; --s2t-accent: #24557a; --s2t-amber-text: #8a611d; --s2t-red-text: #c25a5a;
  --s2t-soft-blue: #eef3f7; --s2t-soft-amber: #f7f1e7; --s2t-soft-red: #fff3f2; --s2t-soft-rec: #fff5f5;
}
html.dark {
  --s2t-bg: #020617; --s2t-text: #e5edf9; --s2t-panel: #0f172a; --s2t-soft: #14223a;
  --s2t-line: #24324a; --s2t-accent: #60a5fa; --s2t-amber-text: #fbbf24; --s2t-red-text: #fca5a5;
  --s2t-soft-blue: rgba(96, 165, 250, 0.15); --s2t-soft-amber: rgba(251, 191, 36, 0.15);
  --s2t-soft-red: rgba(248, 113, 113, 0.15); --s2t-soft-rec: rgba(248, 113, 113, 0.2);
}
.drop-zone { transition: all 0.2s ease; }
.drop-zone.drag-over { border-color: var(--s2t-accent); background: var(--s2t-soft-blue); }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
.recording-pulse { position: relative; }
.recording-pulse::after { content: none; }

body { font-family: "Segoe UI Variable Text", "Segoe UI", "PingFang SC", system-ui, -apple-system, sans-serif; background: var(--s2t-bg); color: var(--s2t-text); }
.drop-zone { transition: border-color .15s ease, background .15s ease; }
.fade-in { animation: none; }
.recording-pulse::after { content: none; animation: none; }
#dropZone:hover { border-color: #9aa9b8; background: var(--s2t-soft); }
.bg-gray-50 { background: var(--s2t-bg) !important; }
.bg-white { background: var(--s2t-panel) !important; }
.bg-indigo-50 { background: var(--s2t-soft-blue) !important; }
.bg-amber-50 { background: var(--s2t-soft-amber) !important; }
.bg-red-50 { background: var(--s2t-soft-red) !important; }
.rounded-xl { border-radius: 10px !important; }
.rounded-lg, .rounded-md { border-radius: 8px !important; }
.shadow-sm { box-shadow: none !important; }
.border-gray-200, .border-gray-300, .border-indigo-100, .border-amber-100, .border-red-200 { border-color: var(--s2t-line) !important; }
.bg-indigo-600 { background: var(--s2t-accent) !important; }
.text-indigo-600, .text-indigo-700 { color: var(--s2t-accent) !important; }
.text-amber-600, .text-amber-700 { color: var(--s2t-amber-text) !important; }
.hover\:bg-indigo-700:hover { background: #1f4868 !important; }
.hover\:bg-gray-50:hover { background: var(--s2t-soft) !important; }
#btnRecord.recording-pulse { border-color: var(--s2t-red-text) !important; background: var(--s2t-soft-rec) !important; box-shadow: none !important; }

/* Fill panel iframe width when embedded, keep centered layout for standalone page. */
body[data-proj-embedded="1"] .max-w-3xl.mx-auto {
  max-width: none !important;
  margin-left: 0 !important;
  margin-right: 0 !important;
  width: 100%;
}
</style>
  <script src="/html-assets/js/page-controls.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="mb-8">
    <a href="/admin/test/ai" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">← AI 测试</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-2">S2T 语音转文字</h1>
    <p class="text-gray-500 text-sm mt-1">独立语音转文字服务 (非 LLM)，支持与 LLM-ASR 对比</p>
  </div>

  <!-- Upload Area -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
    <div class="mb-4 flex flex-wrap items-end gap-3">
      <div class="min-w-[180px] flex-1">
        <label for="serviceInstanceSelect" class="block text-xs font-medium text-gray-600 mb-1">Service Instance</label>
        <select id="serviceInstanceSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white">
          <option value="default">default</option>
        </select>
      </div>
    </div>
    <!-- Drop Zone -->
    <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30">
      <svg class="mx-auto h-10 w-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p class="text-sm text-gray-600 font-medium">拖放音频文件到这里</p>
      <p class="text-xs text-gray-400 mt-1">或点击选择文件</p>
      <input id="fileInput" type="file" accept="audio/*" class="hidden">
    </div>

    <!-- Microphone -->
    <div class="flex items-center justify-center gap-3 mt-4">
      <button id="btnRecord" onclick="toggleRecording()" class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
        <span id="recordIcon" class="w-3 h-3 rounded-full bg-red-500"></span>
        <span id="recordLabel">录音</span>
      </button>
      <span id="recordTimer" class="text-xs text-gray-400 hidden">00:00</span>
    </div>

    <!-- File Info -->
    <div id="fileInfo" class="hidden mt-4 p-3 bg-gray-50 rounded-lg">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3 min-w-0">
          <svg class="h-5 w-5 text-indigo-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
          </svg>
          <div class="min-w-0">
            <p id="fileName" class="text-sm font-medium text-gray-900 truncate"></p>
            <p class="text-xs text-gray-500"><span id="fileSize"></span></p>
          </div>
        </div>
        <button onclick="clearFile()" class="text-gray-400 hover:text-red-500 transition-colors">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <!-- Audio Player -->
      <audio id="audioPlayer" controls class="w-full mt-3 h-10"></audio>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 mt-4">
      <button id="btnSubmit" onclick="runS2T()" disabled class="flex-1 py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-medium rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
        <svg id="s2tSpinner" class="hidden animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span id="s2tLabel">语音转文字</span>
      </button>
      <button id="btnCompare" onclick="runCompare()" disabled class="py-2.5 px-4 bg-white border border-gray-300 hover:bg-gray-50 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed text-gray-700 font-medium rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
        <svg id="compareSpinner" class="hidden animate-spin h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span id="compareLabel"><i class="proj-icon proj-icon-bolt"></i> 对比 LLM-ASR</span>
      </button>
    </div>
  </div>

  <!-- Error -->
  <div id="errorBox" class="hidden mb-6 bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 text-sm fade-in"></div>

  <!-- Single Result -->
  <div id="resultSingle" class="hidden mb-6 fade-in">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 bg-gray-50 border-b border-gray-200">
        <h3 class="text-sm font-semibold text-gray-700">S2T 识别结果</h3>
        <div class="flex items-center gap-2">
          <span id="s2tTime" class="text-xs text-gray-400"></span>
          <button onclick="copyText('s2tText')" class="inline-flex items-center gap-1 text-xs text-indigo-600 hover:text-indigo-800 font-medium">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            复制
          </button>
        </div>
      </div>
      <div class="p-4">
        <div id="s2tText" class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap"></div>
      </div>
    </div>
  </div>

  <!-- Compare Result -->
  <div id="resultCompare" class="hidden mb-6 fade-in">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- S2T Side -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 bg-indigo-50 border-b border-indigo-100">
          <h3 class="text-sm font-semibold text-indigo-700">S2T 服务</h3>
          <div class="flex items-center gap-2">
            <span id="cmpS2tTime" class="text-xs text-indigo-400"></span>
            <button onclick="copyText('cmpS2tText')" class="text-xs text-indigo-600 hover:text-indigo-800">复制</button>
          </div>
        </div>
        <div class="p-4">
          <div id="cmpS2tText" class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap min-h-[60px]"></div>
          <div id="cmpS2tLoading" class="hidden flex items-center gap-2 text-sm text-gray-400">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            识别中...
          </div>
        </div>
      </div>
      <!-- LLM-ASR Side -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 bg-amber-50 border-b border-amber-100">
          <h3 class="text-sm font-semibold text-amber-700">LLM-ASR</h3>
          <div class="flex items-center gap-2">
            <span id="cmpAsrTime" class="text-xs text-amber-400"></span>
            <button onclick="copyText('cmpAsrText')" class="text-xs text-amber-600 hover:text-amber-800">复制</button>
          </div>
        </div>
        <div class="p-4">
          <div id="cmpAsrText" class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap min-h-[60px]"></div>
          <div id="cmpAsrLoading" class="hidden flex items-center gap-2 text-sm text-gray-400">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            识别中...
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// State
let currentFile = null;
let mediaRecorder = null;
let recordChunks = [];
let recordStartTime = null;
let recordTimerInterval = null;
let isRecording = false;

// DOM
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const audioPlayer = document.getElementById('audioPlayer');
const btnSubmit = document.getElementById('btnSubmit');
const btnCompare = document.getElementById('btnCompare');
const serviceInstanceSelect = document.getElementById('serviceInstanceSelect');

AITestShared.loadServiceInstances('s2t', serviceInstanceSelect);

// Drag & drop
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && (f.type.startsWith('audio/') || f.type.startsWith('video/'))) loadFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  currentFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  audioPlayer.src = URL.createObjectURL(file);
  fileInfo.classList.remove('hidden');
  btnSubmit.disabled = false;
  btnCompare.disabled = false;
}

function clearFile() {
  currentFile = null;
  fileInput.value = '';
  audioPlayer.src = '';
  fileInfo.classList.add('hidden');
  btnSubmit.disabled = true;
  btnCompare.disabled = true;
  hideAllResults();
}

function hideAllResults() {
  document.getElementById('resultSingle').classList.add('hidden');
  document.getElementById('resultCompare').classList.add('hidden');
  document.getElementById('errorBox').classList.add('hidden');
}

// Recording
async function toggleRecording() {
  if (isRecording) stopRecording(); else await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recordChunks, { type: 'audio/webm' });
      const file = new File([blob], `recording_${Date.now()}.webm`, { type: 'audio/webm' });
      loadFile(file);
    };
    mediaRecorder.start();
    isRecording = true;
    recordStartTime = Date.now();
    document.getElementById('recordLabel').textContent = '停止';
    document.getElementById('btnRecord').classList.add('recording-pulse', 'border-red-300', 'bg-red-50');
    document.getElementById('recordTimer').classList.remove('hidden');
    recordTimerInterval = setInterval(updateRecordTimer, 500);
  } catch (err) {
    showError('无法访问麦克风: ' + err.message);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  clearInterval(recordTimerInterval);
  document.getElementById('recordLabel').textContent = '录音';
  document.getElementById('btnRecord').classList.remove('recording-pulse', 'border-red-300', 'bg-red-50');
  document.getElementById('recordTimer').classList.add('hidden');
}

function updateRecordTimer() {
  const elapsed = (Date.now() - recordStartTime) / 1000;
  document.getElementById('recordTimer').textContent = formatDuration(elapsed);
}

// S2T only
async function runS2T() {
  if (!currentFile) return;
  hideAllResults();
  setS2TLoading(true);

  const formData = new FormData();
  formData.append('file', currentFile);
  formData.append('service_key', serviceInstanceSelect.value || 'default');
  const startTime = performance.now();

  try {
    const res = await fetch(window.projAiApiPath('/ai/s2t'), { method: 'POST', body: formData });
    const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data = await res.json();
    document.getElementById('s2tText').textContent = data.text || '(空结果)';
    document.getElementById('s2tTime').textContent = `${elapsed}s`;
    document.getElementById('resultSingle').classList.remove('hidden');
  } catch (err) {
    showError(err.message);
  } finally {
    setS2TLoading(false);
  }
}

function setS2TLoading(loading) {
  document.getElementById('s2tSpinner').classList.toggle('hidden', !loading);
  document.getElementById('s2tLabel').textContent = loading ? '识别中...' : '语音转文字';
  btnSubmit.disabled = loading;
  btnCompare.disabled = loading;
}

// Compare mode
async function runCompare() {
  if (!currentFile) return;
  hideAllResults();
  document.getElementById('resultCompare').classList.remove('hidden');

  // Reset panels
  document.getElementById('cmpS2tText').textContent = '';
  document.getElementById('cmpAsrText').textContent = '';
  document.getElementById('cmpS2tTime').textContent = '';
  document.getElementById('cmpAsrTime').textContent = '';
  document.getElementById('cmpS2tLoading').classList.remove('hidden');
  document.getElementById('cmpAsrLoading').classList.remove('hidden');

  const compareSpinner = document.getElementById('compareSpinner');
  const compareLabel = document.getElementById('compareLabel');
  compareSpinner.classList.remove('hidden');
  compareLabel.textContent = '对比中...';
  btnSubmit.disabled = true;
  btnCompare.disabled = true;

  // Run both in parallel
  const formS2T = new FormData();
  formS2T.append('file', currentFile);
  formS2T.append('service_key', serviceInstanceSelect.value || 'default');
  const formASR = new FormData();
  formASR.append('file', currentFile);

  const t0 = performance.now();

  const s2tPromise = fetch(window.projAiApiPath('/ai/s2t'), { method: 'POST', body: formS2T })
    .then(async res => {
      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      if (!res.ok) throw new Error(`S2T HTTP ${res.status}`);
      const data = await res.json();
      document.getElementById('cmpS2tText').textContent = data.text || '(空结果)';
      document.getElementById('cmpS2tTime').textContent = `${elapsed}s`;
      document.getElementById('cmpS2tLoading').classList.add('hidden');
    }).catch(err => {
      document.getElementById('cmpS2tText').textContent = '错误: ' + err.message;
      document.getElementById('cmpS2tText').classList.add('text-red-500');
      document.getElementById('cmpS2tLoading').classList.add('hidden');
    });

  const asrPromise = fetch(window.projAiApiPath('/ai/asr'), { method: 'POST', body: formASR })
    .then(async res => {
      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      if (!res.ok) throw new Error(`ASR HTTP ${res.status}`);
      const data = await res.json();
      document.getElementById('cmpAsrText').textContent = data.text || '(空结果)';
      document.getElementById('cmpAsrTime').textContent = `${elapsed}s`;
      document.getElementById('cmpAsrLoading').classList.add('hidden');
    }).catch(err => {
      document.getElementById('cmpAsrText').textContent = '错误: ' + err.message;
      document.getElementById('cmpAsrText').classList.add('text-red-500');
      document.getElementById('cmpAsrLoading').classList.add('hidden');
    });

  await Promise.allSettled([s2tPromise, asrPromise]);
  compareSpinner.classList.add('hidden');
  compareLabel.textContent = '对比 LLM-ASR';
  btnSubmit.disabled = false;
  btnCompare.disabled = false;
}

// Copy
function copyText(elementId) {
  const text = document.getElementById(elementId).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已复制'));
}

// Error
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '错误: ' + msg;
  box.classList.remove('hidden');
}

// Toast
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50 fade-in';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 1500);
}

// Utilities
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}
</script>
</body>
</html>
