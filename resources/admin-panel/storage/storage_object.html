<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object 存储浏览器</title>
  <link rel="stylesheet" href="/vendor/tailwindcss/tailwind.css" />
  <link rel="stylesheet" href="/vendor/highlight/highlight.css" />
  <link rel="stylesheet" href="/html-assets/css/storage-ui-shared.css" />
  <script src="/vendor/highlight/highlight.js"></script>
  <script src="/vendor/marked/marked.min.js"></script>
  <script src="/vendor/jszip/jszip.min.js"></script>
  <script src="/vendor/docx-preview/docx-preview.min.js"></script>
  <script src="/html-assets/js/storage-ui-shared.js"></script>
  <script src="/html-assets/js/storage-icons.js"></script>
  <style>
    /* ═══ Extra Variables ═══ */
    :root { --hljs-bg:rgba(15,23,42,.04); }
    html.dark { --hljs-bg:rgba(2,6,23,.55); }
    /* ═══ Extra Buttons ═══ */
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-ghost:hover{background:rgba(79,70,229,.04)}
    .btn-xs{padding:1px 5px;font-size:10px;border-radius:3px}

    /* ═══ Layout ═══ */
    .obj-main-split{display:grid;grid-template-columns:minmax(0,1fr) 332px;gap:6px;align-items:start}
    .object-storage-shell{padding:4px 6px 8px}
    .object-workspace-card{padding:6px}
    .object-storage-shell .storage-workspace-shell{gap:4px}
    .object-storage-shell .storage-section-stack{gap:4px}
    .object-storage-shell .storage-section-panel.active{gap:4px}
    .object-storage-shell .storage-header{padding:4px 8px}
    .object-storage-shell .storage-shell-bar{gap:4px}
    .object-storage-shell .storage-detail-card{padding:6px 8px;gap:6px}
    .object-storage-shell .storage-signal-card{padding:5px 7px}
    .object-browser-shell{position:relative;overflow:hidden;gap:6px}
    .object-browser-head{display:grid;gap:6px;padding:0 0 6px}
    .object-mini-note{font-size:12px;line-height:1.55;color:var(--muted)}
    .object-meter-list{display:grid;gap:10px}
    .object-meter-row{display:grid;gap:6px}
    .object-meter-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
    .object-meter-label{font-size:12px;font-weight:800;color:var(--text)}
    .object-meter-meta{font-size:11px;color:var(--muted);text-align:right}
    .object-meter-bar{height:8px;border-radius:999px;background:var(--panel-soft);overflow:hidden}
    .object-meter-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#2563eb 0%,#0f766e 100%)}
    .object-empty-block{padding:16px 14px;border:1px dashed var(--border);border-radius:10px;font-size:12px;line-height:1.55;color:var(--muted);background:color-mix(in srgb,var(--panel) 90%, transparent)}
    .object-compact-meta{font-size:11px;line-height:1.5;color:var(--muted)}
    @media(max-width:1280px){.obj-main-split{grid-template-columns:1fr}}

    .browser-command-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:6px}
    .browser-location-group{display:flex;align-items:center;flex-wrap:wrap;gap:8px;min-width:0;flex:1 1 auto}
    .browser-location-chip{display:inline-flex;align-items:center;min-height:24px;padding:0 8px;border-radius:999px;border:1px solid var(--border);background:var(--panel-soft);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .browser-location-path{min-width:0;flex:1 1 260px;font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .browser-hint{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted)}
    .browser-hint strong{color:var(--text)}
    .object-nav-strip{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:center}
    .object-nav-group{display:flex;align-items:center;gap:4px}
    .object-nav-btn{min-width:24px;height:24px;padding:0 6px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);font-size:12px;font-weight:800;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,color .15s,opacity .15s}
    .object-nav-btn:hover:not(:disabled){background:rgba(79,70,229,.06);border-color:var(--brand);color:var(--brand)}
    .object-nav-btn:disabled{opacity:.42;cursor:not-allowed}
    .object-path-entry{display:flex;align-items:center;gap:8px;min-width:0}
    .object-path-input{min-width:0;flex:1 1 auto}
    .center-path-bar{display:flex;align-items:center;gap:6px;min-height:24px;padding:2px 6px;border:1px solid var(--border);border-radius:8px;background:color-mix(in srgb,var(--panel-soft) 92%, transparent);cursor:text}
    .center-path-bar:hover{border-color:color-mix(in srgb,var(--brand) 32%, var(--border))}
    .center-path-bar.is-editing{cursor:default;background:var(--panel)}
    .center-path-bar .breadcrumb-bar{flex:1 1 auto;min-width:0}
    .center-path-bar .path-edit-form{flex:1 1 auto;display:flex;align-items:center;gap:6px;min-width:0}
    .center-path-bar .path-edit-form .input{flex:1 1 auto;min-width:0}

    /* ═══ Modal ═══ */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;display:flex;align-items:center;justify-content:center}
    .modal-box{background:var(--panel);border-radius:10px;padding:16px;max-width:480px;width:94%;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
    .modal-box.wide{max-width:680px}
    .modal-box.full{max-width:96vw;max-height:96vh;width:96vw;height:96vh;overflow:auto}

    /* ═══ Context Menu ═══ */
    .ctx-menu{position:fixed;z-index:9000;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:0 24px 48px rgba(15,23,42,.18);padding:6px;min-width:228px;max-width:280px;display:none}
    html.dark .ctx-menu{background:color-mix(in srgb,var(--panel) 92%,transparent 8%);box-shadow:0 24px 48px rgba(2,6,23,.46)}
    .ctx-head{display:grid;gap:2px;padding:6px 8px 8px;margin-bottom:4px;border-bottom:1px solid var(--border)}
    .ctx-kicker{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .ctx-title{font-size:12px;font-weight:700;color:var(--text);word-break:break-word}
    .ctx-item{width:100%;padding:8px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:10px;border:0;border-radius:12px;background:transparent;color:var(--text);text-align:left}
    .ctx-item:hover{background:rgba(79,70,229,.08)}
    .ctx-item:disabled{opacity:.45;cursor:not-allowed}
    .ctx-item:disabled:hover{background:transparent}
    .ctx-copy{min-width:0;display:grid;gap:2px;flex:1 1 auto}
    .ctx-label{font-size:12px;font-weight:700;line-height:1.2}
    .ctx-meta{font-size:11px;line-height:1.35;color:var(--muted);word-break:break-word}
    .ctx-sep{height:1px;background:var(--border);margin:4px 8px}

    /* ═══ Breadcrumbs ═══ */
    .breadcrumb-bar{display:flex;flex-wrap:nowrap;align-items:center;gap:2px;font-size:12px;overflow:hidden}
    .breadcrumb-item{padding:2px 6px;border-radius:4px;cursor:pointer;font-weight:600;color:var(--brand);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
    .breadcrumb-item:hover{background:rgba(79,70,229,.06)}
    .breadcrumb-item.current{color:var(--text);cursor:text;font-weight:800;max-width:320px}
    .breadcrumb-sep{color:var(--muted);font-size:10px;user-select:none}
    .breadcrumb-item.drop-target{background:rgba(79,70,229,.12);outline:2px dashed var(--brand)}

    /* ═══ Drop Zone ═══ */
    .drop-overlay{position:absolute;inset:10px;z-index:24;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:2px dashed var(--brand);border-radius:16px;background:color-mix(in srgb,var(--brand) 10%, var(--panel) 90%);color:var(--brand);pointer-events:none;backdrop-filter:blur(2px)}
    .upload-progress{padding:4px 10px;display:flex;align-items:center;gap:8px}
    .upload-progress-inner{flex:1;height:4px;border-radius:999px;background:var(--border);overflow:hidden}
    .upload-progress-bar{height:100%;border-radius:999px;background:var(--brand);width:0%;transition:width .2s}

    /* ═══ File Table (Google Drive) ═══ */
    .file-table{width:100%;min-width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px}
    .file-table th{text-align:left;padding:5px 8px;font-size:10px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);user-select:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.08em;overflow:hidden;text-overflow:ellipsis}
    .file-table td{padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
    .file-table tbody tr{transition:background .1s;cursor:pointer}
    .file-table tbody tr:hover{background:rgba(79,70,229,.04)}
    .file-table tbody tr.active{background:var(--row-active)}
    .file-table tbody tr.selected{background:rgba(79,70,229,.08)}
    .file-table tbody tr.drop-target{background:rgba(79,70,229,.12)!important}
    .file-th-check{width:32px}
    .file-th-name{min-width:200px}
    .file-th-size{width:90px}
    .file-th-type{width:130px}
    .file-th-date{width:150px}
    .file-th-action{width:32px}
    .file-name{display:flex;align-items:center;gap:6px;min-width:0;max-width:100%;font-weight:600}
    .file-name.folder{color:var(--brand)}
    .file-name-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .object-file-icon{--object-accent:var(--brand);--object-soft:rgba(79,70,229,.12);display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;width:20px;height:20px;border-radius:7px;border:1px solid color-mix(in srgb,var(--object-accent) 22%, var(--border));background:color-mix(in srgb,var(--object-soft) 88%, var(--panel) 12%);color:var(--object-accent)}
    .object-file-icon--folder{--object-accent:#2563eb;--object-soft:rgba(37,99,235,.14)}
    .object-file-icon--image{--object-accent:#0f766e;--object-soft:rgba(15,118,110,.14)}
    .object-file-icon--video{--object-accent:#c2410c;--object-soft:rgba(194,65,12,.14)}
    .object-file-icon--audio{--object-accent:#7c3aed;--object-soft:rgba(124,58,237,.14)}
    .object-file-icon--pdf{--object-accent:#dc2626;--object-soft:rgba(220,38,38,.14)}
    .object-file-icon--word{--object-accent:#2563eb;--object-soft:rgba(37,99,235,.14)}
    .object-file-icon--spreadsheet{--object-accent:#15803d;--object-soft:rgba(21,128,61,.14)}
    .object-file-icon--presentation{--object-accent:#ea580c;--object-soft:rgba(234,88,12,.14)}
    .object-file-icon--json{--object-accent:#0f766e;--object-soft:rgba(15,118,110,.14)}
    .object-file-icon--yaml{--object-accent:#0369a1;--object-soft:rgba(3,105,161,.14)}
    .object-file-icon--python{--object-accent:#b45309;--object-soft:rgba(180,83,9,.14)}
    .object-file-icon--archive{--object-accent:#7c2d12;--object-soft:rgba(124,45,18,.14)}
    .object-file-icon--executable{--object-accent:#be123c;--object-soft:rgba(190,18,60,.14)}
    .object-file-icon--binary{--object-accent:#475569;--object-soft:rgba(71,85,105,.16)}
    .object-file-icon--code,.object-file-icon--text{--object-accent:#4f46e5;--object-soft:rgba(79,70,229,.14)}
    .file-meta{color:var(--muted);font-size:11px;white-space:nowrap}
    .sort-btn{cursor:pointer;user-select:none}
    .sort-btn:hover{color:var(--brand)}
    .sort-btn.active-sort{color:var(--brand)}
    .sort-arr{font-size:11px;margin-left:2px}
    .ctx-trigger{cursor:pointer;padding:2px 4px;border-radius:4px;color:var(--muted);font-weight:bold;font-size:14px}
    .ctx-trigger:hover{background:rgba(79,70,229,.06);color:var(--text)}

    /* ═══ File Grid ═══ */
    .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;padding:8px}
    .grid-item{border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;position:relative}
    .grid-item:hover{border-color:var(--brand);box-shadow:0 4px 12px rgba(79,70,229,.1)}
    .grid-item.selected{border-color:var(--brand);background:rgba(79,70,229,.04)}
    .grid-item.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(79,70,229,.2)}
    .grid-thumb{width:100%;height:90px;object-fit:cover;border-radius:6px;background:var(--panel-soft)}
    .grid-thumb-placeholder{display:flex;align-items:center;justify-content:center;height:90px;color:var(--muted)}
    .object-thumb-shell{--object-accent:var(--brand);--object-soft:rgba(79,70,229,.12);position:relative;height:90px;border-radius:10px;overflow:hidden;border:1px solid color-mix(in srgb,var(--object-accent) 18%, var(--border));background:linear-gradient(180deg,color-mix(in srgb,var(--object-soft) 68%, var(--panel) 32%) 0%, color-mix(in srgb,var(--panel-soft) 92%, transparent) 100%)}
    .object-thumb-shell--folder{--object-accent:#2563eb;--object-soft:rgba(37,99,235,.12)}
    .object-thumb-shell--image{--object-accent:#0f766e;--object-soft:rgba(15,118,110,.12)}
    .object-thumb-shell--video{--object-accent:#c2410c;--object-soft:rgba(194,65,12,.12)}
    .object-thumb-shell--audio{--object-accent:#7c3aed;--object-soft:rgba(124,58,237,.12)}
    .object-thumb-shell--pdf{--object-accent:#dc2626;--object-soft:rgba(220,38,38,.12)}
    .object-thumb-shell--word{--object-accent:#2563eb;--object-soft:rgba(37,99,235,.12)}
    .object-thumb-shell--spreadsheet{--object-accent:#15803d;--object-soft:rgba(21,128,61,.12)}
    .object-thumb-shell--presentation{--object-accent:#ea580c;--object-soft:rgba(234,88,12,.12)}
    .object-thumb-shell--json{--object-accent:#0f766e;--object-soft:rgba(15,118,110,.12)}
    .object-thumb-shell--yaml{--object-accent:#0369a1;--object-soft:rgba(3,105,161,.12)}
    .object-thumb-shell--python{--object-accent:#b45309;--object-soft:rgba(180,83,9,.12)}
    .object-thumb-shell--archive{--object-accent:#7c2d12;--object-soft:rgba(124,45,18,.12)}
    .object-thumb-shell--executable{--object-accent:#be123c;--object-soft:rgba(190,18,60,.12)}
    .object-thumb-shell--binary{--object-accent:#475569;--object-soft:rgba(71,85,105,.14)}
    .object-thumb-shell--code,.object-thumb-shell--text{--object-accent:#4f46e5;--object-soft:rgba(79,70,229,.12)}
    .object-thumb-media{display:block;width:100%;height:100%;object-fit:cover;background:var(--panel-soft)}
    .object-thumb-card{height:100%;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-start;padding:10px 10px 12px;text-align:left}
    .object-thumb-ext{display:inline-flex;align-items:center;min-height:20px;padding:0 7px;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid color-mix(in srgb,var(--object-accent) 16%, var(--border));font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--object-accent)}
    .object-thumb-title{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;font-size:11px;font-weight:700;line-height:1.3;word-break:break-word;color:var(--text)}
    .object-thumb-meta{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:color-mix(in srgb,var(--object-accent) 70%, var(--muted) 30%)}
    .object-thumb-badge{position:absolute;right:7px;bottom:7px;display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;border:1px solid color-mix(in srgb,var(--object-accent) 18%, var(--border));background:rgba(255,255,255,.92);color:var(--object-accent);box-shadow:0 4px 12px rgba(15,23,42,.14)}
    .object-thumb-placeholder{height:90px;border-radius:10px;color:var(--object-accent);background:linear-gradient(180deg,color-mix(in srgb,var(--object-soft) 68%, var(--panel) 32%) 0%, color-mix(in srgb,var(--panel-soft) 92%, transparent) 100%)}
    .object-thumb-video-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(180deg,rgba(15,23,42,.1) 0%, rgba(15,23,42,.34) 100%);pointer-events:none}
    .object-thumb-video-overlay .storage-icon{filter:drop-shadow(0 4px 10px rgba(15,23,42,.35))}
    .grid-item-name{font-size:11px;font-weight:600;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .grid-item-check{position:absolute;top:4px;left:4px}

    /* ═══ Filter Chips (Google Drive) ═══ */
    .filter-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:var(--panel-soft);color:var(--muted);font-size:11px;font-weight:500;border:1px solid var(--border)}
    .filter-chip .chip-remove{cursor:pointer;padding:0 2px;border-radius:999px;font-size:10px}
    .filter-chip .chip-remove:hover{color:var(--danger)}

    /* ═══ Detail Pane ═══ */
    .detail-hero{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
    .detail-icon{flex-shrink:0;width:36px;height:36px;border-radius:8px;background:var(--panel-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
    .detail-icon .object-file-icon{width:26px;height:26px;border:none;background:transparent}
    .detail-eyebrow{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .detail-title{font-size:13px;font-weight:800;word-break:break-all}
    .detail-subtitle{font-size:11px;color:var(--muted);word-break:break-all}
    .detail-metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:8px 0}
    .detail-metric{padding:4px 6px;border:1px solid var(--border);border-radius:5px}
    .detail-metric-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .detail-metric-value{font-size:11px;font-weight:700;word-break:break-all}
    .detail-actions{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
    .detail-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
    .detail-preview-shell{margin-top:0;border:1px solid var(--border);border-radius:16px;overflow:hidden;max-height:none;background:color-mix(in srgb,var(--panel) 96%, transparent)}
    .detail-preview-head{display:none}
    .detail-muted{font-size:11px;color:var(--muted)}
    .detail-hint-list{display:grid;gap:4px;margin-top:8px}
    .detail-hint-card{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px}
    .detail-hint-card strong{display:block;margin-bottom:2px}
    .detail-hint-card p{margin:0;color:var(--muted)}
    .detail-path{font-family:'Cascadia Code',Consolas,'Fira Code',monospace;font-size:11px}
    .detail-loading-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
    .detail-loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:12px}
    .detail-empty-preview{padding:12px;text-align:center;color:var(--muted);font-size:12px}
    .workspace-folder-badges{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}

    /* ═══ Office Preview ═══ */
    .office-preview-layout{display:grid;grid-template-columns:240px minmax(0,1fr);gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--panel)}
    .office-preview-layout.presentation{grid-template-columns:260px minmax(0,1fr)}
    .office-preview-sidebar{padding:8px;border-right:1px solid var(--border);overflow-y:auto;max-height:70vh;background:var(--panel-soft)}
    .office-preview-nav{display:flex;flex-direction:column;gap:4px;margin-top:6px}
    .office-nav-btn{display:block;text-align:left;width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;background:var(--panel);color:var(--text);transition:border-color .15s,background .15s}
    .office-nav-btn:hover{border-color:var(--brand);background:rgba(79,70,229,.04)}
    .office-nav-btn.active{border-color:var(--brand);background:rgba(79,70,229,.06);box-shadow:inset 3px 0 0 var(--brand)}
    .office-nav-btn strong{display:block;font-weight:700}
    .office-nav-title{color:var(--muted);font-size:10px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .office-nav-meta{display:flex;gap:8px;font-size:10px;color:var(--muted);margin-top:2px}
    .office-nav-card{display:flex;gap:8px;align-items:flex-start}
    .office-nav-card-body{min-width:0;flex:1}
    .office-nav-thumb{width:80px;height:56px;flex-shrink:0;border-radius:4px;overflow:hidden;border:1px solid var(--border);background:var(--panel-soft);position:relative;display:flex;align-items:center;justify-content:center}
    .office-nav-thumb img{width:100%;height:100%;object-fit:cover}
    .office-nav-thumb-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:10px;gap:2px}
    .office-nav-thumb-fallback .big{font-size:14px;font-weight:800}
    .office-nav-thumb-badge{position:absolute;bottom:2px;right:2px;padding:0 4px;border-radius:3px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:800}
    .office-preview-main{padding:10px;overflow-y:auto;max-height:70vh}
    .office-summary{margin-bottom:10px}
    .office-summary-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .office-summary-actions{display:flex;gap:4px;margin-top:4px}
    .office-warning{margin-top:4px;padding:4px 8px;border-radius:6px;background:#fef3c7;color:#92400e;font-size:11px}
    html.dark .office-warning{background:#78350f;color:#fde68a}
    .office-preview{display:flex;flex-direction:column;gap:12px}
    .office-page{padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}
    .office-page-title{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .office-page-heading{font-size:14px;font-weight:700;margin-top:2px}
    .office-page-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .office-page img{max-width:100%;border-radius:6px;margin:6px 0}
    .office-sheet-table-wrap{overflow-x:auto;margin-top:6px}
    .office-sheet-table{width:100%;border-collapse:collapse;font-size:11px}
    .office-sheet-table th,.office-sheet-table td{border:1px solid var(--border);padding:3px 6px;text-align:left}
    .office-sheet-table th{background:var(--panel-soft);font-weight:700;position:sticky;top:0}
    .sheet-row-head{background:var(--panel-soft);font-weight:700;text-align:center;min-width:36px}
    .office-sheet-note{margin-top:6px;padding:4px 8px;border-radius:6px;background:var(--panel-soft);font-size:11px;color:var(--muted)}
    .office-pdf-frame{width:100%;height:60vh;border:none;border-radius:6px}
    @media(max-width:768px){
      .office-preview-layout,.office-preview-layout.presentation{grid-template-columns:1fr}
      .office-preview-sidebar{max-height:200px;border-right:none;border-bottom:1px solid var(--border)}
    }

    /* ═══ Code Editor ═══ */
    .code-editor{width:100%;min-height:350px;padding:10px;font-family:'Cascadia Code',Consolas,'Fira Code',monospace;font-size:12px;line-height:1.6;border:1px solid var(--border);border-radius:8px;background:var(--hljs-bg);color:var(--text);resize:vertical;outline:none}
    .code-editor:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.15)}

    /* ═══ DOCX Preview ═══ */
    .docx-preview-shell{border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .docx-preview-toolbar{padding:6px 10px;border-bottom:1px solid var(--border);background:var(--panel-soft)}
    .docx-preview-stage{min-height:400px;max-height:70vh;overflow:auto;background:#fff}
    html.dark .docx-preview-stage{background:#1e293b}
    .docx-preview-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--muted)}

    /* ═══ Data Table ═══ */
    .data-table-wrap{overflow-x:auto;max-height:400px}
    .data-table{width:100%;border-collapse:collapse;font-size:11px}
    .data-table th,.data-table td{border:1px solid var(--border);padding:3px 6px;text-align:left}
    .data-table th{background:var(--panel-soft);font-weight:700;position:sticky;top:0}

    /* ═══ Markdown ═══ */
    .md-preview{font-size:13px;line-height:1.7}
    .md-preview h1,.md-preview h2,.md-preview h3{margin:12px 0 6px;font-weight:700}
    .md-preview p{margin:6px 0}
    .md-preview code{padding:1px 4px;border-radius:4px;background:var(--hljs-bg);font-size:12px}
    .md-preview pre{padding:10px;border-radius:6px;background:var(--hljs-bg);overflow-x:auto}
    .md-preview img{max-width:100%;border-radius:6px}

    /* ═══ Preview Container ═══ */
    .preview-container{padding:10px;overflow:auto;max-height:68vh;min-height:320px}
    .preview-container img{display:block;max-width:100%;max-height:64vh;margin:0 auto;border-radius:12px}
    .preview-container iframe{width:100%;height:64vh;border:none;border-radius:12px}
    .preview-container pre{margin:0;font-size:12px;line-height:1.6}
    .preview-container--media,.preview-container--svg{display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--panel-soft) 92%, transparent)}
    .preview-frame--svg{background:#fff}
    html.dark .preview-frame--svg{background:#0f172a}

    /* ═══ Empty State ═══ */
    .empty-state{padding:16px 12px;text-align:center;color:var(--muted);font-size:12px}

    /* ═══ Page Buttons ═══ */
    .page-btn{padding:2px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;cursor:pointer;background:var(--panel);color:var(--text)}
    .page-btn:hover{background:rgba(79,70,229,.06)}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    .page-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}

    /* ═══ Active View Toggle ═══ */
    .active-view{background:var(--brand)!important;color:#fff!important;border-color:var(--brand)!important}

    .explorer-shell{padding:2px}
    .explorer-tabbar{display:flex;align-items:stretch;gap:2px;min-width:0;overflow:auto;overscroll-behavior-x:contain;scroll-snap-type:x proximity;padding:0}
    .explorer-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:3px}
    .explorer-toolbar + .explorer-toolbar{margin-top:1px}
    .explorer-search-row{position:relative;display:flex;align-items:center;gap:6px;min-width:0;flex:1 1 380px}
    .explorer-search-row .input{flex:1 1 auto}
    .object-search-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap}
    .object-search-actions .btn{display:inline-flex;align-items:center;gap:4px}
    .object-search-panel{position:absolute;top:calc(100% + 8px);right:0;z-index:40;width:min(680px,calc(100vw - 32px));padding:10px;border:1px solid var(--border);border-radius:14px;background:color-mix(in srgb,var(--panel) 96%, transparent);box-shadow:0 24px 48px rgba(15,23,42,.16);display:none}
    html.dark .object-search-panel{box-shadow:0 24px 48px rgba(2,6,23,.42)}
    .object-search-panel.is-open{display:block}
    .object-search-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
    .object-search-panel-copy{display:grid;gap:3px;min-width:0}
    .object-search-panel-title{font-size:14px;font-weight:900;color:var(--text)}
      .object-search-panel-meta{display:none}
    .object-search-panel-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px}
    .object-search-panel-stack{display:grid;gap:8px}
    .object-search-panel-row{display:grid;gap:4px}
    .object-search-inline{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px}
    .object-search-range{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px}
    .object-search-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .object-filter-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:color-mix(in srgb,var(--panel-soft) 92%, transparent);font-size:11px;line-height:1.2;color:var(--muted)}
    .object-filter-chip strong{color:var(--text);font-weight:800}
    .object-filter-chip-remove{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:999px;border:0;background:transparent;color:var(--muted);cursor:pointer;padding:0}
    .object-filter-chip-remove:hover{background:rgba(79,70,229,.08);color:var(--text)}
    .object-filter-chip-remove .storage-icon{width:11px;height:11px}
    .explorer-location-row{display:flex;align-items:center;gap:6px;min-width:0;flex:1 1 280px}
    .explorer-location-row .input{flex:1 1 auto}
    .toolbar-mini-label{font-size:10px;font-weight:800;letter-spacing:.08em}
    .object-view-switch{display:inline-flex;align-items:stretch;gap:0}
    .object-view-main-btn{display:inline-flex;align-items:center;gap:6px;padding-inline:8px;border-top-right-radius:0;border-bottom-right-radius:0;min-width:92px;justify-content:flex-start}
    .object-view-menu-btn{width:26px;min-width:26px;padding:0;border-top-left-radius:0;border-bottom-left-radius:0;border-left:none;font-size:10px;justify-content:center}
    .object-view-label{font-size:10px;font-weight:800;white-space:nowrap}
    .object-view-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px}
    .explorer-workbench{display:grid;grid-template-columns:minmax(180px,var(--obj-nav-width,240px)) 8px minmax(0,1fr) 8px minmax(300px,var(--obj-detail-width,380px));gap:0;height:calc(100vh - 200px);min-height:280px;margin-top:4px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:color-mix(in srgb,var(--panel) 96%, transparent);align-items:stretch}
    .explorer-pane{min-width:0;background:var(--panel)}
    .explorer-pane-left{grid-column:1;padding:4px;display:flex;flex-direction:column;gap:4px;min-height:0;overflow:hidden}
    .explorer-pane-right{grid-column:5;padding:4px;display:flex;flex-direction:column;gap:4px;min-height:0;overflow:hidden}
    .explorer-pane-left > *,.explorer-pane-right > *{min-width:0}
    .explorer-pane-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .explorer-center{grid-column:3;position:relative;min-width:0;min-height:0;padding:4px;border-left:1px solid var(--border);border-right:1px solid var(--border);background:color-mix(in srgb,var(--panel) 90%, transparent);display:flex;flex-direction:column;gap:4px;overflow:hidden}
    .explorer-splitter{position:relative;cursor:col-resize;background:linear-gradient(180deg,transparent 0%,color-mix(in srgb,var(--border) 76%, transparent) 20%,color-mix(in srgb,var(--border) 76%, transparent) 80%,transparent 100%)}
    #explorerNavSplitter{grid-column:2}
    #explorerDetailSplitter{grid-column:4}
    .explorer-splitter:hover{background:linear-gradient(180deg,transparent 0%,color-mix(in srgb,var(--brand) 42%, transparent) 20%,color-mix(in srgb,var(--brand) 42%, transparent) 80%,transparent 100%)}
    .explorer-splitter-toggle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:inline-flex;align-items:center;justify-content:center;width:18px;height:52px;padding:0;border:1px solid color-mix(in srgb,var(--border) 88%, transparent);border-radius:10px;background:color-mix(in srgb,var(--panel) 94%, transparent);box-shadow:0 6px 18px rgba(15,23,42,.16);color:var(--muted);font-size:14px;font-weight:800;line-height:1;z-index:2}
    .explorer-splitter-toggle:hover{color:var(--text);border-color:color-mix(in srgb,var(--brand) 34%, var(--border));background:color-mix(in srgb,var(--panel-soft) 92%, transparent)}
    .explorer-splitter-toggle:focus-visible{outline:2px solid color-mix(in srgb,var(--brand) 48%, transparent);outline-offset:2px}
    #explorerNavPane{overflow:hidden}
    #navPaneFolders{flex:1 1 auto;min-height:0;overflow:auto;padding-right:2px}
    #browseInsightList{flex:0 0 auto}
    .explorer-nav-current{display:grid;gap:6px;padding:8px;border:1px solid var(--border);border-radius:12px;background:color-mix(in srgb,var(--panel-soft) 92%, transparent)}
    .explorer-nav-meta{font-size:11px;line-height:1.45;color:var(--muted)}
    .explorer-nav-folder-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
    .explorer-nav-folders{flex:1 1 auto;min-height:0;overflow:auto;padding-right:2px}
    .nav-folder-item{display:flex;align-items:center;gap:6px;width:100%;padding:3px 6px;border:0;border-radius:6px;background:transparent;color:var(--text);font-size:11px;cursor:pointer;text-align:left}
    .nav-folder-item:hover{background:rgba(79,70,229,.06)}
    .nav-folder-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
    .explorer-pane-left .browser-location-path{font-size:13px;font-weight:800}
    #fileListContainer{position:relative;min-height:280px;flex:1 1 auto;display:flex;flex-direction:column;min-width:0;max-width:100%;overflow:auto}
    .file-table,#fileGrid,#emptyState{width:100%}
    .empty-state{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1px dashed var(--border);border-radius:16px;background:color-mix(in srgb,var(--panel-soft) 90%, transparent)}
    .object-detail-pane-body{flex:1 1 auto;min-height:0;overflow:auto;padding-right:2px;display:flex;flex-direction:column}
    .explorer-detail-title{font-size:14px;font-weight:800;color:var(--text);word-break:break-all}
    .object-detail-shell{display:grid;gap:8px}
    .object-detail-toolbar{display:flex;flex-wrap:wrap;gap:4px}
    .object-detail-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
    .object-detail-summary-item{padding:8px 10px;border:1px solid var(--border);border-radius:12px;background:color-mix(in srgb,var(--panel-soft) 92%, transparent);min-width:0}
    .object-detail-summary-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .object-detail-summary-value{margin-top:6px;font-size:12px;font-weight:700;line-height:1.45;word-break:break-all;color:var(--text)}
    .object-detail-tags{display:flex;flex-wrap:wrap;gap:6px}
    .explorer-toolbar .btn,.explorer-toolbar .select,.object-nav-btn{min-height:24px}
    .explorer-toolbar .btn{padding-inline:8px;font-size:12px}
    .explorer-toolbar .select{font-size:12px}
    .object-browser-shell #filterBar,.object-browser-shell #selectionBar{margin-top:4px!important}
    .explorer-workbench.nav-collapsed{grid-template-columns:0 8px minmax(0,1fr) 8px minmax(260px,var(--obj-detail-width,360px))}
    .explorer-workbench.nav-collapsed .explorer-pane-left{display:none}
    .explorer-workbench.detail-collapsed .explorer-pane-right{display:none}
    .explorer-workbench.detail-collapsed{grid-template-columns:minmax(180px,var(--obj-nav-width,240px)) 8px minmax(0,1fr) 8px 0}
    .detail-mode-tabs .storage-workspace-tab{padding:10px 12px}
    .detail-mode-tabs .storage-workspace-tab-title{font-size:12px}
    .explorer-file-grid.mode-small{grid-template-columns:repeat(auto-fill,minmax(92px,1fr))}
    .explorer-file-grid.mode-medium{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .explorer-file-grid.mode-large{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
    .explorer-file-grid.mode-small .grid-thumb,.explorer-file-grid.mode-small .grid-thumb-placeholder,.explorer-file-grid.mode-small .object-thumb-shell,.explorer-file-grid.mode-small .object-thumb-placeholder{height:64px}
    .explorer-file-grid.mode-large .grid-thumb,.explorer-file-grid.mode-large .grid-thumb-placeholder,.explorer-file-grid.mode-large .object-thumb-shell,.explorer-file-grid.mode-large .object-thumb-placeholder{height:136px}
    .bucket-workspace-grid{display:grid;grid-template-columns:minmax(260px,340px) minmax(0,1fr);gap:12px;margin-top:12px}
    .bucket-list{display:grid;gap:8px}
    .bucket-item{width:100%;display:grid;gap:10px;padding:16px 18px;border:1px solid var(--border);border-radius:14px;background:var(--panel-soft);text-align:left;cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s}
    .bucket-item:hover{border-color:var(--brand);box-shadow:0 8px 24px rgba(15,23,42,.08)}
    .bucket-item.active{border-color:var(--brand);background:rgba(79,70,229,.06)}
    .bucket-item-title{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;min-width:0;font-size:13px;font-weight:800;color:var(--text)}
    .bucket-item-name{min-width:0;font-size:16px;line-height:1.2;word-break:break-word}
    .bucket-item-slot{flex:0 0 auto}
    .bucket-item-meta{display:grid;gap:4px;min-width:0;font-size:11px;line-height:1.45;color:var(--muted)}
    .bucket-item-meta-line{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bucket-stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .bucket-stat-card{padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--panel-soft)}
    .bucket-stat-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .bucket-stat-value{margin-top:6px;font-size:18px;font-weight:800;color:var(--text)}
    .database-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px}
    .database-grid .storage-detail-card{align-content:start}
    .database-summary-grid .storage-context-card{display:grid;gap:4px;align-content:start;min-height:88px}
    .explorer-tab,.explorer-tab-add{display:flex;align-items:center;gap:4px;flex:0 0 auto;min-width:clamp(120px,16vw,180px);max-width:min(220px,28vw);padding:4px 8px 3px;border:1px solid transparent;border-bottom-color:transparent;border-radius:8px 8px 0 0;background:color-mix(in srgb,var(--panel-soft) 88%, #0f172a 12%);cursor:pointer;scroll-snap-align:start}
    .explorer-tab:hover,.explorer-tab-add:hover{background:color-mix(in srgb,var(--panel-soft) 94%, white 6%)}
    .explorer-tab.active{background:var(--panel);border-color:var(--border);box-shadow:none}
    .explorer-tab-add{max-width:none;color:var(--text);font-size:12px;font-weight:700;white-space:nowrap}
    .explorer-tab-copy{min-width:0;display:flex;align-items:center;gap:6px;flex:1 1 auto;overflow:hidden}
    .explorer-tab-title{min-width:0;font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .explorer-tab-meta{flex:0 1 auto;min-width:0;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .explorer-tab-close{flex:0 0 auto;width:18px;height:18px;border-radius:999px;border:1px solid transparent;background:transparent;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;padding:0;font-size:14px;line-height:1}
    .explorer-tab-close:hover{border-color:var(--border);color:var(--text)}

    /* ═══ Responsive ═══ */
    @media(max-width:1100px){.file-th-type,.file-type-col{display:none}}
    @media(max-width:640px){
      .object-storage-shell{padding:8px}
      .obj-main-split{grid-template-columns:1fr}
      .browser-hint{justify-content:flex-start}
      .explorer-search-row{flex:1 1 100%}
      .object-search-panel{left:0;right:auto;width:min(100%,calc(100vw - 16px))}
      .object-search-panel-grid,.object-search-inline,.object-search-range{grid-template-columns:1fr}
      .object-nav-strip{grid-template-columns:1fr}
      .object-path-entry{flex-wrap:wrap}
      .bucket-workspace-grid,.database-grid{grid-template-columns:1fr}
      .explorer-workbench{grid-template-columns:1fr;min-height:auto;height:auto}
      .explorer-pane-left,.explorer-pane-right,.explorer-center{border:none;padding:10px}

      .explorer-workbench.nav-collapsed,.explorer-workbench.detail-collapsed{grid-template-columns:1fr}
      .object-detail-summary{grid-template-columns:1fr}
      #searchApplyBtn .btn-label,
      #filterToggleBtn .btn-label,
      #prefixApplyBtn .btn-label,
      #uploadBtn .btn-label,
      #newFolderBtn .btn-label,
      #copySelectionBtn .btn-label,
      #cutSelectionBtn .btn-label,
      #pasteClipboardBtn .btn-label,
      #batchDeleteBtn .btn-label,
      #clearSelectionBtn .btn-label {
        display:none;
      }
      #searchApplyBtn,
      #filterToggleBtn,
      #prefixApplyBtn,
      #uploadBtn,
      #newFolderBtn,
      #copySelectionBtn,
      #cutSelectionBtn,
      #pasteClipboardBtn,
      #batchDeleteBtn,
      #clearSelectionBtn {
        min-width:36px;
        padding:0 10px;
      }
    }
  </style>

<body>
  <!-- Overlay containers -->
  <div id="modalContainer"></div>
  <div id="ctxMenu" class="ctx-menu"></div>

  <div class="object-storage-shell storage-workbench">
    <header class="card storage-header">
      <div class="storage-shell-bar">
        <div id="clientMeta" class="storage-header-meta"></div>
        <div class="storage-client-shell">
          <div class="storage-client-controls">
            <label class="storage-toolbar-label is-wide">
              <span id="clientLabel">Client</span>
              <select id="clientSelector" class="select storage-client-select"></select>
            </label>
            <label class="storage-toolbar-label">
              <span id="autoRefreshLabel">刷新</span>
              <select id="autoRefreshSelect" class="select">
                <option value="0" selected>手动</option>
                <option value="5000">5s</option>
                <option value="10000">10s</option>
                <option value="30000">30s</option>
                <option value="60000">60s</option>
              </select>
            </label>
          </div>
          <div class="storage-toolbar-group storage-client-actions">
            <button id="refreshAllBtn" type="button" class="btn btn-secondary btn-sm" title="刷新"><span data-icon="refresh"></span></button>
            <button id="cleanupBtn" type="button" class="btn btn-secondary btn-sm" title="清理 TTL"><span data-icon="trash"></span></button>
          </div>
        </div>
      </div>
      <div id="clientTabs" class="storage-client-tabs"></div>

  <script>
    /* ─── State ─── */
    const state = {
      client: '', clients: [], config: null,
      prefix: '', query: '',
      filters: {
        pattern: '', recursive: true, tag: '', typeGroup: '', wildcard: false,
        metadataKey: '', metadataValue: '', contentType: '',
        minSize: '', maxSize: '', createdFrom: '', createdTo: ''
      },
      offset: 0, limit: 100, items: [], total: 0,
      breadcrumbs: [], selected: new Set(),
      sortField: 'name', sortDir: 'asc',
      viewMode: 'details', filtersOpen: false,
      autoRefreshMs: Number(localStorage.getItem('obj_auto_refresh_ms') || 0) || 0,
      workspaceSection: 'browse',
      bucketMode: 'details',
      darkMode: false, previewItem: null,
      activePath: '', currentMetaPath: '', dragPath: '',
      lastLatencyMs: 0,
      uploadTargetPrefix: '', createFolderPrefix: '',
      scopeInsights: null,
      history: [], historyIndex: -1,
      clipboard: null,
      buckets: [],
      activeBucketName: '',
      explorerTabs: [],
      activeExplorerTabId: '',
      itemsCache: new Map()
    };

    let searchTimer = null, pendingFiles = [], dragCounter = 0, autoRefreshTimer = null;
    const ui = window.StorageUI || null;
    const si = window.StorageIcons || null;
    const hub = ui ? ui.createAbortHub() : null;
    let loadRev = 0, detailRev = 0, scopeRev = 0;

    /* ─── Low-level helpers ─── */
    function icon(name, size) { return si ? si.icon(name, size || 16) : ''; }
    function escHtml(s) { if (s === null || s === undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }
    function qs(params) {
      const p = new URLSearchParams();
      for (const [k, v] of Object.entries(params)) { if (v !== undefined && v !== null && v !== '') p.set(k, v); }
      if (state.client) p.set('client', state.client);
      return p.toString();
    }
    async function api(path, opts = {}) {
      if (ui && hub) return ui.request(path, opts, hub, opts.scope || 'default');
      const res = await fetch(path, opts);
      if (!res.ok) { let msg = `HTTP ${res.status}`; try { const j = await res.json(); msg = j.detail || j.message || msg; } catch {} throw new Error(msg); }
      const ct = res.headers.get('content-type') || '';
      return ct.includes('application/json') ? res.json() : res;
    }
    function toast(msg, type) {
      const map = { info: 'ok', error: 'err', warn: 'warn' };
      if (ui && ui.showToast) { ui.showToast(msg, map[type] || type || 'ok'); return; }
      console.log('[toast]', type, msg);
    }
    function showModal(html, onShow, sizeClass) {
      const c = document.getElementById('modalContainer');
      c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box ${sizeClass || ''}">${html}</div></div>`;
      if (si) si.mount(c);
      if (onShow) onShow();
    }
    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
    function confirmDialog(title, msg) {
      if (ui && ui.confirmDialog) return ui.confirmDialog(title, msg);
      return Promise.resolve(window.confirm(title + '\n' + (msg || '')));
    }
    function formatSize(bytes) {
      if (bytes === null || bytes === undefined) return '—';
      if (bytes === 0) return '0 B';
      const units = ['B','KB','MB','GB','TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0) + ' ' + units[i];
    }
    function formatDateTime(value, compact) {
      if (!value) return '—';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return compact
        ? d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
        : d.toLocaleString('zh-CN');
    }
    function displayObjectPath(prefix = state.prefix) {
      const value = String(prefix || '').replace(/^\/+/, '');
      return value ? `/${value}` : '/';
    }
    function currentPathLabel() { return displayObjectPath(state.prefix); }
    function refreshCurrentWorkspace() {
      if (state.workspaceSection === 'bucket') return loadBuckets();
      if (state.workspaceSection === 'database' || state.workspaceSection === 'analysis') {
        return Promise.all([loadItems(), loadBuckets()]);
      }
      return loadItems();
    }
    function scheduleAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
      if (!state.autoRefreshMs) return;
      autoRefreshTimer = window.setInterval(() => {
        refreshCurrentWorkspace().catch((error) => console.error('object auto refresh failed', error));
      }, state.autoRefreshMs);
    }
    function normalizePrefixInput(prefix) {
      const raw = String(prefix || '').replace(/\\/g, '/').trim().replace(/^\/+/, '');
      if (!raw) return '';
      return raw.replace(/\/+/g, '/').replace(/\/$/, '') + '/';
    }
    function cloneSerializable(value) {
      if (typeof structuredClone === 'function') return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }
    function samePrefixLocation(left, right) {
      if (left === undefined || left === null || right === undefined || right === null) return false;
      return normalizePrefixInput(left) === normalizePrefixInput(right);
    }
    function parentObjectPrefix(prefix = state.prefix) {
      const parts = normalizePrefixInput(prefix).replace(/\/$/, '').split('/').filter(Boolean);
      parts.pop();
      return parts.length ? parts.join('/') + '/' : '';
    }
    function updateNavigationButtons() {
      const backButton = document.getElementById('browseBackBtn');
      const forwardButton = document.getElementById('browseForwardBtn');
      if (backButton) backButton.disabled = state.historyIndex <= 0;
      if (forwardButton) forwardButton.disabled = state.historyIndex < 0 || state.historyIndex >= state.history.length - 1;
    }
    function recordPrefixHistory(prefix, mode = 'push') {
      const location = normalizePrefixInput(prefix);
      if (mode === 'skip') {
        updateNavigationButtons();
        return;
      }
      if (mode === 'replace') {
        if (state.historyIndex >= 0) state.history[state.historyIndex] = location;
        else { state.history = [location]; state.historyIndex = 0; }
        updateNavigationButtons();
        return;
      }
      const current = state.history[state.historyIndex];
      if (samePrefixLocation(current, location)) {
        updateNavigationButtons();
        return;
      }
      state.history = state.history.slice(0, state.historyIndex + 1);
      state.history.push(location);
      state.historyIndex = state.history.length - 1;
      updateNavigationButtons();
    }
    function syncPrefixInput() {
      const input = document.getElementById('prefixInput');
      if (input && document.activeElement !== input) input.value = state.prefix || '';
      updateNavigationButtons();
    }
    function setPathEditMode(editing) {
      const bar = document.getElementById('centerPathBar');
      const breadcrumbs = document.getElementById('breadcrumbs');
      const form = document.getElementById('pathEditForm');
      const input = document.getElementById('prefixInput');

        return [...parts, `${name}-copy`].filter(Boolean).join('/') + '/';

      const dot = name.lastIndexOf('.');

      return `${dir}${name.slice(0, dot)}-copy${name.slice(dot)}`;

      const navKey = 'obj_nav_width';

        const splitter = document.getElementById(id);

          if (event.target.closest('.explorer-splitter-toggle')) return;
          if (id === 'explorerNavSplitter' && workbench.classList.contains(navCollapsedClass)) return;
          if (id === 'explorerDetailSplitter' && workbench.classList.contains(detailCollapsedClass)) return;
          event.preventDefault();
          const startX = event.clientX;
          const start = Number(localStorage.getItem(key) || workbench.style.getPropertyValue(variable).replace('px', '') || min);
          const move = (nextEvent) => {
            const delta = id === 'explorerNavSplitter' ? nextEvent.clientX - startX : startX - nextEvent.clientX;
            const value = Math.max(min, Math.min(max, start + delta));
            workbench.style.setProperty(variable, `${value}px`);
            localStorage.setItem(key, String(value));
          };
          const up = () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', up);
          };
          window.addEventListener('pointermove', move);
          window.addEventListener('pointerup', up);

    /* ─── Load items ─── */
    async function loadItems(options = {}) {
      const loading = document.getElementById('fileListLoading');
      const showLoading = options.showLoading !== false && !options.background;
      if (showLoading) loading.classList.add('show');
      state.limit = parseInt(document.getElementById('pageSizeSelect').value);
      if (!options.background) {
        state.scopeInsights = emptyScopeInsights(scopeInsightKey());
        renderBucketWorkspace();
      }
      const cacheKey = buildItemsCacheKey();
      if (options.preferCache) {
        const cached = readItemsCache(cacheKey);
        if (cached) {
          applyItemsPayload(cached, { historyMode: options.historyMode || 'skip', latencyMs: cached.lastLatencyMs });
          if (options.revalidate !== false) {
            void loadItems({ ...options, preferCache: false, historyMode: 'skip', background: true, showLoading: false });
          }
          if (showLoading) loading.classList.remove('show');
          return true;
        }
      }
      const revision = ++loadRev;
      const t0 = performance.now();
      try {
        const params = { prefix: state.prefix, limit: state.limit, offset: state.offset };
        const f = state.filters;
        if (f.wildcard && state.query) {
          params.pattern = f.pattern || (/[*?]/.test(state.query) ? state.query : `*${state.query}*`);
        } else {
          if (state.query) params.q = state.query;
          if (f.pattern) params.pattern = f.pattern;
        }
        if (hasSearchCriteria() && f.recursive) params.recursive = true;
        if (f.tag) params.tag = f.tag;
        if (f.typeGroup) params.type_group = f.typeGroup;
        if (f.metadataKey) params.metadata_key = f.metadataKey;
        if (f.metadataValue) params.metadata_value = f.metadataValue;
        if (f.contentType) params.content_type = f.contentType;
        if (f.minSize !== '') params.min_size = f.minSize;
        if (f.maxSize !== '') params.max_size = f.maxSize;
        if (f.createdFrom) params.created_from = f.createdFrom;
        if (f.createdTo) params.created_to = f.createdTo;
        const data = await api('/admin/api/storage/object/items?' + qs(params), { scope: 'items' });
        if (revision !== loadRev) return true;
        const latencyMs = Math.round(performance.now() - t0);
        writeItemsCache(cacheKey, data, latencyMs);
        applyItemsPayload(data, { historyMode: options.historyMode || 'push', latencyMs });
        return true;
      } catch (e) {
        if (!options.background) toast('加载失败: ' + e.message, 'error');
        return false;
      }
      finally { if (showLoading) loading.classList.remove('show'); }
    }

    /* ─── Sort ─── */
    function toggleSort(field) {
      if (state.sortField === field) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      else { state.sortField = field; state.sortDir = 'asc'; }
      sortItems(); renderItems(); updateSortUI();

    function sortItems() {
      const f = state.sortField, d = state.sortDir === 'asc' ? 1 : -1;
      state.items.sort((a, b) => {
        if (a.kind === 'folder' && b.kind !== 'folder') return -1;
        if (a.kind !== 'folder' && b.kind === 'folder') return 1;
        let va = a[f], vb = b[f];
        if (f === 'size') return ((va || 0) - (vb || 0)) * d;
        if (f === 'updated_at') return ((va ? Date.parse(va) || 0 : 0) - (vb ? Date.parse(vb) || 0 : 0)) * d;
        va = (va || '').toString().toLowerCase(); vb = (vb || '').toString().toLowerCase();
        return va < vb ? -d : va > vb ? d : 0;
      });
    }
    function updateSortUI() {
      const map = { sortNameBtn: 'name', sortSizeBtn: 'size', sortTypeBtn: 'content_type', sortDateBtn: 'updated_at' };
      for (const [id, field] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (!el) continue;
        const active = state.sortField === field;
        el.classList.toggle('active-sort', active);
        const arr = el.querySelector('.sort-arr');
        if (arr) arr.textContent = active ? (state.sortDir === 'asc' ? '↑' : '↓') : '↕';
      }
    }

    async function navigateTo(prefix, options = {}) {
      const nextPrefix = normalizePrefixInput(prefix);
      if (samePrefixLocation(state.prefix, nextPrefix) && !options.forceReload) {
        state.prefix = nextPrefix;
        updateSummaryCards();
        return true;
      }
      clearTimeout(searchTimer);
      const previousPrefix = state.prefix;
      const previousOffset = state.offset;
      const previousQuery = state.query;
      const previousActivePath = state.activePath;
      const previousPreviewItem = state.previewItem;
      const previousScopeInsights = state.scopeInsights;
      const searchInput = document.getElementById('searchInput');
      const previousSearchText = searchInput ? searchInput.value : '';
      state.prefix = nextPrefix;
      state.offset = 0;
      state.query = '';
      state.activePath = '';
      state.previewItem = null;
      if (searchInput) searchInput.value = '';
      renderDetailPane();
      updateSummaryCards();
      const ok = await loadItems({ historyMode: options.historyMode || 'push', preferCache: options.preferCache, revalidate: options.revalidate, showLoading: options.showLoading, background: options.background });
      if (ok) { setPathEditMode(false); return true; }
      state.prefix = previousPrefix;
      state.offset = previousOffset;
      state.query = previousQuery;
      state.activePath = previousActivePath;
      state.previewItem = previousPreviewItem;
      state.scopeInsights = previousScopeInsights;
      if (searchInput) searchInput.value = previousSearchText;
      updateSummaryCards();
      renderDetailPane();
      return false;
    }

        html += `<div class="ctx-head"><div class="ctx-kicker">${escHtml(kicker || 'Actions')}</div><div class="ctx-title">${escHtml(title)}</div></div>`;
      }
      (items || []).forEach((item) => {
        if (!item) return;
        if (item.separator) {
          html += '<div class="ctx-sep"></div>';
          return;
        }
        html += ctxItem(item.icon, item.label, item.action, item.style, item.meta, item.disabled);
      });
      menu.innerHTML = html;
      menu.style.display = 'block';
      menu.style.visibility = 'hidden';
      menu.style.left = '0px';
      menu.style.top = '0px';
      if (si) si.mount(menu);
      requestAnimationFrame(() => {
        const rect = menu.getBoundingClientRect();
        menu.style.left = Math.max(8, Math.min(x, window.innerWidth - rect.width - 8)) + 'px';
        menu.style.top = Math.max(8, Math.min(y, window.innerHeight - rect.height - 8)) + 'px';
        menu.style.visibility = 'visible';
      });

    function ctxItem(iconName, label, fn, style, meta, disabled) {
      const id = 'ctx_' + Math.random().toString(36).slice(2);
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.onclick = async () => {
          if (disabled) return;
          document.getElementById('ctxMenu').style.display = 'none';
          await fn?.();
        };
      }, 0);
      return `<button type="button" class="ctx-item" id="${id}" style="${style || ''}" ${disabled ? 'disabled' : ''}><span>${icon(iconName, 16)}</span><span class="ctx-copy"><span class="ctx-label">${escHtml(label)}</span>${meta ? `<span class="ctx-meta">${escHtml(meta)}</span>` : ''}</span></button>`;
    }

    /* ─── Pagination ─── */
    function renderPagination() {
      const info = document.getElementById('pageInfo');
      const btns = document.getElementById('paginationBtns');
      const pages = Math.ceil(state.total / state.limit);
      const cur = Math.floor(state.offset / state.limit) + 1;
      if (pages <= 1) { info.textContent = state.total ? `共 ${state.total} 项` : '—'; btns.innerHTML = ''; return; }
      info.textContent = `共 ${state.total} 项 · 第 ${cur}/${pages} 页`;
      let html = `<button class="page-btn" onclick="goPage(${cur - 1})" ${cur === 1 ? 'disabled' : ''}>‹</button>`;
      pageRange(cur, pages, 3).forEach(p => {
        if (p === '...') html += '<span style="padding:0 4px;color:var(--muted)">…</span>';
        else html += `<button class="page-btn ${p === cur ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
      });
      html += `<button class="page-btn" onclick="goPage(${cur + 1})" ${cur === pages ? 'disabled' : ''}>›</button>`;
      btns.innerHTML = html;
    }
    function goPage(p) {
      const pages = Math.ceil(state.total / state.limit);
      if (p < 1 || p > pages) return;
      state.offset = (p - 1) * state.limit;
      loadItems();
    }
    function pageRange(cur, total, delta) {
      const range = []; const left = Math.max(2, cur - delta); const right = Math.min(total - 1, cur + delta);
      range.push(1);
      if (left > 2) range.push('...');
      for (let i = left; i <= right; i++) range.push(i);
      if (right < total - 1) range.push('...');
      if (total > 1) range.push(total);
      return range;
    }

    function renderPendingFiles() {
      const list = document.getElementById('uploadFileList'); if (!list) return;

    async function submitUpload() {
      if (!pendingFiles.length) return;
      const expire = document.getElementById('uploadExpire')?.value;
      closeModal();
      const bar = document.getElementById('uploadProgressBar');
      const wrap = document.getElementById('uploadProgressWrap');
      const text = document.getElementById('uploadProgressText');
      wrap.style.display = 'block';
      const fd = new FormData();
      pendingFiles.forEach(f => fd.append('files', f));
      fd.append('prefix', state.uploadTargetPrefix || state.prefix);
      if (expire) fd.append('expire_seconds', expire);
      try {
        const xhr = new XMLHttpRequest();
        await new Promise((resolve, reject) => {
          xhr.upload.onprogress = e => { if (e.lengthComputable) { const pct = Math.round(e.loaded / e.total * 100); bar.style.width = pct + '%'; text.textContent = `上传中… ${pct}% (${formatSize(e.loaded)} / ${formatSize(e.total)})`; } };
          xhr.onload = () => { if (xhr.status >= 200 && xhr.status < 300) resolve(); else reject(new Error(`HTTP ${xhr.status}`)); };
          xhr.onerror = () => reject(new Error('网络错误'));
          xhr.open('POST', '/admin/api/storage/object/upload?' + qs({}));
          xhr.send(fd);
        });
        toast(`成功上传 ${pendingFiles.length} 个文件`, 'info');
        pendingFiles = [];
        loadItems();
      } catch (e) { toast('上传失败: ' + e.message, 'error'); }

    /* ─── Drag & drop main area ─── */
    function isFileDragEvent(e) {
      const types = Array.from(e?.dataTransfer?.types || []);
      return types.includes('Files');
    }
    function setCenterDropOverlay(visible, targetPrefix) {
      const overlay = document.getElementById('centerDropOverlay');
      if (!overlay) return;
      overlay.style.display = visible ? 'flex' : 'none';
      const label = document.getElementById('dropOverlayTarget');
      if (label) label.textContent = displayObjectPath(targetPrefix || state.prefix);
    }
    function handleDragOver(e) {
      if (!isFileDragEvent(e)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      dragCounter = 1;
      setCenterDropOverlay(true, state.prefix);
    }
    function handleDragLeave(e) {
      if (!isFileDragEvent(e)) return;
      if (e.relatedTarget && e.currentTarget && e.currentTarget.contains(e.relatedTarget)) return;
      dragCounter--; if (dragCounter <= 0) { setCenterDropOverlay(false, state.prefix); dragCounter = 0; }
    }
    function handleDrop(e) {
      if (!isFileDragEvent(e)) return;
      e.preventDefault(); dragCounter = 0;
      setCenterDropOverlay(false, state.prefix);
      const files = Array.from(e.dataTransfer.files);
      if (!files.length) return;
      pendingFiles = files; doQuickUpload(files);
    }
    async function doQuickUpload(files, targetPrefix = state.prefix) {
      const bar = document.getElementById('uploadProgressBar');
      const wrap = document.getElementById('uploadProgressWrap');
      const text = document.getElementById('uploadProgressText');
      wrap.style.display = 'block';
      const fd = new FormData();
      files.forEach(f => fd.append('files', f));
      fd.append('prefix', targetPrefix || state.prefix);
      try {
        const xhr = new XMLHttpRequest();
        await new Promise((resolve, reject) => {
          xhr.upload.onprogress = e => { if (e.lengthComputable) { const pct = Math.round(e.loaded / e.total * 100); bar.style.width = pct + '%'; text.textContent = `上传中… ${pct}%`; } };
          xhr.onload = () => xhr.status < 300 ? resolve() : reject(new Error(`HTTP ${xhr.status}`));
          xhr.onerror = () => reject(new Error('网络错误'));
          xhr.open('POST', '/admin/api/storage/object/upload?' + qs({}));
          xhr.send(fd);
        });
        toast(`成功上传 ${files.length} 个文件`, 'info');
        loadItems();
      } catch (e) { toast('上传失败: ' + e.message, 'error'); }
      finally { wrap.style.display = 'none'; bar.style.width = '0%'; }

    /* ─── Preview descriptor ─── */
    function describePreviewKind(ct, ext) {
      if (isImage(ct, ext)) return { label: '图片预览', note: '' };
      if (isPdf(ct, ext)) return { label: 'PDF 阅读', note: '' };
      if (isVideo(ct, ext)) return { label: '视频预览', note: '' };
      if (isAudio(ct, ext)) return { label: '音频回放', note: '' };
      if (isHtmlFile(ct, ext)) return { label: 'HTML 渲染', note: '' };
      if (isDelimitedText(ct, ext)) return { label: '表格预览', note: '' };
      if (isDocxPreviewable(ext) || isOfficeDoc(ext)) return { label: 'Office 文档', note: '' };
      if (isMarkdown(ext)) return { label: 'Markdown 渲染', note: '' };
      if (isText(ct, ext)) return { label: '文本高亮', note: '' };
      return { label: '二进制对象', note: '' };
    }

    async function buildPreviewDescriptor(item) {
      const ct = (item.content_type || '').toLowerCase();
      const ext = (item.name.split('.').pop() || '').toLowerCase();
      const url = '/admin/api/storage/object/content?' + qs({ path: item.path });
      const previewMeta = describePreviewKind(ct, ext);
      let body = '';
      let docxPreviewId = '';
      if (ext === 'svg' || ct.includes('svg')) {
        try {
          const res = await fetch(url);
          const text = await res.text();
          body = `<div class="preview-container preview-container--svg"><iframe class="preview-frame preview-frame--svg" srcdoc="${escAttr(text)}" title="${escAttr(item.name)}" sandbox=""></iframe></div>`;
        } catch {
          body = `<div class="preview-container preview-container--media"><img src="${url}" alt="${escAttr(item.name)}" /></div>`;
        }
      } else if (isImage(ct, ext)) {
        body = `<div class="preview-container preview-container--media"><img src="${url}" alt="${escAttr(item.name)}" /></div>`;
      } else if (isPdf(ct, ext)) {
        body = `<div class="preview-container"><iframe class="preview-frame" src="${url}" title="${escAttr(item.name)}" style="width:100%;height:50vh;border:none;border-radius:8px"></iframe></div>`;
      } else if (isVideo(ct, ext)) {
        body = `<div class="preview-container preview-container--media"><video controls src="${url}" style="max-width:100%;max-height:64vh;border-radius:12px"></video></div>`;
      } else if (isAudio(ct, ext)) {
        body = `<div class="preview-container"><audio controls src="${url}" style="width:100%"></audio></div>`;
      } else if (isHtmlFile(ct, ext)) {
        try { const res = await fetch(url); const text = await res.text(); body = `<div class="preview-container"><iframe style="width:100%;height:50vh;border:none;border-radius:8px" sandbox="" srcdoc="${escAttr(text)}"></iframe></div>`; }
        catch { body = '<div class="text-sm" style="color:var(--muted)">加载失败</div>'; }
      } else if (isDelimitedText(ct, ext)) {
        try { const res = await fetch(url); const text = await res.text(); body = renderDelimitedPreview(text, ext === 'tsv' ? '\t' : ','); }
        catch { body = '<div class="text-sm" style="color:var(--muted)">加载失败</div>'; }
      } else if (isDocxPreviewable(ext)) {
        docxPreviewId = `docx-preview-${Math.random().toString(36).slice(2, 10)}`;
        body = renderDocxPreviewShell(docxPreviewId);
      } else if (isOfficeDoc(ext)) {
        try { const payload = await fetchOfficePreviewPayload(item.path); body = renderOfficePreview(payload); }
        catch (e) { body = `<div class="empty-state"><div>${icon('file', 48)}</div><div class="font-semibold mt-2">Office 预览失败</div><div class="text-sm mt-1">${escHtml(e.message || '无法解析该文档')}</div></div>`; }
      } else if (isMarkdown(ext)) {
        try { const res = await fetch(url); const text = await res.text(); const rendered = ui ? ui.sanitizeMarkdownHtml(marked.parse(text)) : marked.parse(text); body = `<div class="preview-container md-preview">${rendered}</div>`; }
        catch { body = '<div class="text-sm" style="color:var(--muted)">加载失败</div>'; }
      } else if (isText(ct, ext)) {
        try {
          const res = await fetch(url); const text = await res.text();
          if ((ct.includes('json') || ext === 'json')) {
            try { const parsed = JSON.parse(text); const pretty = JSON.stringify(parsed, null, 2); body = `<div class="preview-container"><pre><code class="hljs">${hljs.highlight(pretty, { language: 'json' }).value}</code></pre></div>`; } catch {}
          }
          if (!body) {
            const lang = guessLang(ext);
            let highlighted; try { highlighted = hljs.highlight(text, { language: lang }).value; } catch { highlighted = hljs.highlightAuto(text).value; }
            body = `<div class="preview-container"><pre><code class="hljs">${highlighted}</code></pre></div>`;
          }
        } catch { body = '<div class="text-sm" style="color:var(--muted)">加载失败</div>'; }
      } else {
        body = `<div class="empty-state"><div>${icon('file', 48)}</div><div class="font-semibold mt-2">无法预览此文件类型</div><div class="text-sm mt-1">${escHtml(ct || '未知')}</div></div>`;
      }
      const modalSize = isOfficeDoc(ext) ? 'full' : 'wide';
      const onShow = isDocxPreviewable(ext) ? () => mountDocxPreview(docxPreviewId, item) : (isOfficeDoc(ext) ? () => initOfficePreviewBindings() : null);
      return {
        ct,
        ext,
        url,
        body,
        tags: Array.isArray(item.metadata?.tags) ? item.metadata.tags : [],
        onShow,
        modalSize,
        isTextPreviewable: isText(ct, ext),
        previewLabel: previewMeta.label,
        previewNote: previewMeta.note,
      };
    }
