    /* ─── Batch ZIP ─── */
    async function batchDownloadZip() {
      const paths = [...state.selected];
      const files = state.items.filter(i => paths.includes(i.path) && i.kind !== 'folder');
      if (!files.length) { toast('请选择文件 (非文件夹)', 'warn'); return; }
      toast(`正在打包 ${files.length} 个文件…`, 'info');
      try {
        const zip = new JSZip();
        await Promise.all(files.map(async f => {
          const url = f.download_url || ('/admin/api/storage/object/content?' + qs({ path: f.path, download: true }));
          const res = await fetch(url); const blob = await res.blob(); zip.file(f.path, blob);
        }));
        const content = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(content); a.download = 'download.zip';
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
        toast('ZIP 下载完成', 'info');
      } catch (e) { toast('ZIP 打包失败: ' + e.message, 'error'); }
    }

    /* ─── Keyboard shortcuts ─── */
    function setupKeyboard() {
      document.addEventListener('keydown', e => {
        const tag = document.activeElement?.tagName;
        const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
        const modal = document.getElementById('modalContainer')?.querySelector('.modal-overlay');
        if (e.key === 'Escape') {
          if (modal) { closeModal(); return; }
          document.getElementById('ctxMenu').style.display = 'none';
          state.selected.clear(); updateBatchButtons(); renderItems(); return;
        }
        if (e.ctrlKey && e.key === 'u' && !inInput) { e.preventDefault(); showUploadModal(); return; }
        if (e.ctrlKey && e.key === 'n' && !inInput) { e.preventDefault(); showNewFolderModal(); return; }
        if (e.ctrlKey && e.key.toLowerCase() === 'l' && !modal) {
          e.preventDefault();
          const input = document.getElementById('prefixInput');
          input?.focus();
          input?.select();
          return;
        }
        if (e.altKey && e.key === 'ArrowLeft' && !inInput) { e.preventDefault(); navigateHistory(-1); return; }
        if (e.altKey && e.key === 'ArrowRight' && !inInput) { e.preventDefault(); navigateHistory(1); return; }
        if (e.ctrlKey && e.key === 'a' && !inInput) { e.preventDefault(); toggleSelectAll(true); document.getElementById('selectAllCb').checked = true; return; }
        if (e.key === 'Delete' && !inInput) { if (state.selected.size) batchDelete(); return; }
        if (e.key === 'F2' && !inInput) { if (state.selected.size === 1) { const path = [...state.selected][0]; const item = state.items.find(i => i.path === path); if (item) showCopyMoveModal(item, 'move'); } return; }
        if (e.key === 'Backspace' && !inInput) {
          if (state.prefix) navigateTo(parentObjectPrefix());
          return;
        }
      });
    }

    /* ─── Drag move ─── */
    function handleItemDragStart(event, idx) {
      const item = state.items[idx]; if (!item) return;
      state.dragPath = item.path; event.dataTransfer.effectAllowed = 'move'; event.dataTransfer.setData('text/plain', item.path);
    }
    function handleItemDragEnd() { state.dragPath = ''; document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target')); }
    function handleFolderDragOver(event) { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; if (event.currentTarget?.classList) event.currentTarget.classList.add('drop-target'); }
    function handleItemDragOver(event, idx) { const item = state.items[idx]; if (!item || item.kind !== 'folder') return; handleFolderDragOver(event); }
    function handleItemDrop(event, idx) { event.preventDefault(); const item = state.items[idx]; if (!item || item.kind !== 'folder') return; moveDraggedItemTo(item.path); event.currentTarget?.classList?.remove('drop-target'); }
    function handleFolderDrop(event, folderPath) { event.preventDefault(); moveDraggedItemTo(folderPath || ''); event.currentTarget?.classList?.remove('drop-target'); }
    async function moveDraggedItemTo(folderPath) {
      const src = state.dragPath; state.dragPath = '';
      if (!src) return;
      const cleanFolder = folderPath || '';
      const srcTrimmed = src.endsWith('/') ? src.slice(0, -1) : src;
      const baseName = srcTrimmed.split('/').pop() || srcTrimmed;
      const target = `${cleanFolder}${baseName}${src.endsWith('/') ? '/' : ''}`;
      if (!target || target === src) return;
      if (src.endsWith('/') && target.startsWith(src)) { toast('不能将文件夹移动到其自身内部', 'warn'); return; }
      try {
        await api('/admin/api/storage/object/move?' + qs({}), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source_path: src, target_path: target, overwrite: false }) });
        toast(`已移动到 ${cleanFolder || '根目录'}`, 'info'); loadItems();
      } catch (e) { toast('拖拽移动失败: ' + e.message, 'error'); }
    }

    /* ─── Office preview helpers ─── */
    async function fetchOfficePreviewPayload(path) {
      const res = await fetch('/admin/api/storage/object/office-preview?' + qs({ path }));
      if (!res.ok) { const data = await res.json().catch(() => ({})); throw new Error(data.detail || ('HTTP ' + res.status)); }
      return await res.json();
    }
    function renderDocxPreviewShell(previewId) {
      return `<div class="docx-preview-shell"><div class="docx-preview-toolbar"><div class="flex flex-wrap items-center gap-2"><span class="pill pill-sky">DOCX</span><span class="pill pill-emerald">浏览器排版预览</span><span class="text-xs" style="color:var(--muted)">优先使用本地渲染库；失败时自动回退到结构化预览。</span></div></div><div id="${previewId}" class="docx-preview-stage"><div class="docx-preview-loading"><div class="spinner"></div><div class="font-semibold">正在加载 DOCX 预览…</div><div class="text-sm" style="color:var(--muted)">首次打开大文档可能需要几秒。</div></div></div></div>`;
    }
    async function renderDocxFallback(container, item, reason) {
      const fb = String(reason || '').trim();
      try {
        const payload = await fetchOfficePreviewPayload(item.path);
        payload.warnings = [fb ? `DOCX 排版预览失败：${fb}` : 'DOCX 排版预览失败，已自动切换。', ...((Array.isArray(payload.warnings) ? payload.warnings : []).filter(Boolean))];
        container.innerHTML = renderOfficePreview(payload);
        initOfficePreviewBindings();
      } catch (error) {
        container.innerHTML = `<div class="empty-state"><div>${icon('file', 48)}</div><div class="font-semibold mt-2">DOCX 预览失败</div><div class="text-sm mt-1">${escHtml(fb || '排版预览不可用')}</div><div class="text-xs mt-2" style="color:var(--muted)">${escHtml(error?.message || '结构化回退也失败了。')}</div></div>`;
      }
    }
    async function mountDocxPreview(previewId, item) {
      const container = document.getElementById(previewId);
      if (!container) return;
      try {
        if (!window.docx || typeof window.docx.renderAsync !== 'function') throw new Error('DOCX 渲染库未加载');
        const res = await fetch('/admin/api/storage/object/content?' + qs({ path: item.path }));
        if (!res.ok) { const detail = await res.text().catch(() => ''); throw new Error(detail || ('HTTP ' + res.status)); }
        const blob = await res.blob(); container.innerHTML = '';
        await window.docx.renderAsync(blob, container, null, { inWrapper: true, breakPages: true, useBase64URL: true, ignoreLastRenderedPageBreak: false });
      } catch (error) { await renderDocxFallback(container, item, error?.message || '无法渲染文档'); }
    }
    function officeSupportLabel(level) { return level === 'stable' ? '稳定预览' : '尽力预览'; }
    function setActiveOfficePage(previewId, pageIndex) {
      const root = document.getElementById(previewId); if (!root) return;
      root.querySelectorAll('[data-office-nav]').forEach(btn => { btn.classList.toggle('active', String(btn.getAttribute('data-office-nav') || '') === String(pageIndex || '')); });
    }
    function officeVisibleNavButtons(root) { return Array.from(root.querySelectorAll('[data-office-nav]')).filter(btn => !btn.hidden); }
    function jumpToOfficePage(previewId, pageIndex) {
      const root = document.getElementById(previewId); if (!root) return;
      const page = root.querySelector(`[data-office-page="${String(pageIndex)}"]`);
      if (!page) { openOfficePdfPage(previewId, pageIndex); return; }
      setActiveOfficePage(previewId, pageIndex);
      page.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function openOfficePdfPage(previewId, pageIndex) {
      const root = document.getElementById(previewId); if (!root) return;
      const frame = root.querySelector('[data-office-pdf-frame]');
      const pdfUrl = root.getAttribute('data-pdf-url') || '';
      if (!(frame instanceof HTMLIFrameElement) || !pdfUrl) return;
      root.setAttribute('data-current-page', String(Number(pageIndex || 1)));
      frame.src = `${pdfUrl}#page=${Number(pageIndex || 1)}&zoom=page-fit`;
      setActiveOfficePage(previewId, pageIndex);
    }
    function stepOfficePreviewPage(previewId, direction) {
      const root = document.getElementById(previewId); if (!root) return;
      const buttons = officeVisibleNavButtons(root);
      if (!buttons.length) return;
      const pages = buttons.map(btn => Number(btn.getAttribute('data-office-nav') || 0)).filter(Boolean);
      if (root.hasAttribute('data-pdf-url')) {
        const current = Number(root.getAttribute('data-current-page') || pages[0] || 1);
        const idx = pages.indexOf(current);
        const next = Math.max(0, Math.min(pages.length - 1, (idx >= 0 ? idx : 0) + direction));
        root.setAttribute('data-current-page', String(pages[next]));
        openOfficePdfPage(previewId, pages[next]); return;
      }
      const top = root.getBoundingClientRect().top;
      let current = pages[0];
      for (const pageNo of pages) {
        const section = root.querySelector(`[data-office-page="${String(pageNo)}"]`);
        if (!section || section.hidden) continue;
        if (Math.abs(section.getBoundingClientRect().top - top - 20) < 60) { current = pageNo; break; }
      }
      const idx = pages.indexOf(current);
      const next = Math.max(0, Math.min(pages.length - 1, idx + direction));
      jumpToOfficePage(previewId, pages[next]);
    }
    function filterOfficePreviewPages(previewId, keyword) {
      const root = document.getElementById(previewId); if (!root) return;
      const needle = String(keyword || '').trim().toLowerCase();
      const pageEls = Array.from(root.querySelectorAll('[data-office-page]'));
      let visible = 0;
      pageEls.forEach(page => { const matched = !needle || String(page.getAttribute('data-search') || '').toLowerCase().includes(needle); page.hidden = !matched; if (matched) visible++; });
      root.querySelectorAll('[data-office-nav]').forEach(btn => { btn.hidden = !(!needle || String(btn.getAttribute('data-search') || '').toLowerCase().includes(needle)); });
      const counter = root.querySelector('[data-role="office-visible-count"]');
      if (counter) counter.textContent = `${visible}/${pageEls.length}`;
      const empty = root.querySelector('[data-role="office-empty-filter"]');
      if (empty) empty.hidden = visible !== 0;
      const first = root.querySelector('[data-office-page]:not([hidden])');
      if (first) setActiveOfficePage(previewId, first.getAttribute('data-office-page'));
      if (!first && root.hasAttribute('data-pdf-url')) {
        const firstNav = root.querySelector('[data-office-nav]:not([hidden])');
        if (firstNav) { const pi = firstNav.getAttribute('data-office-nav') || '1'; root.setAttribute('data-current-page', pi); openOfficePdfPage(previewId, pi); }
      }
    }
    function bindOfficePreviewScrollSpy(previewId) {
      const root = document.getElementById(previewId);
      if (!root || root.dataset.spyBound === '1') return;
      const scrollHost = root.closest('.modal-box') || window;
      const refreshActive = () => {
        const pages = Array.from(root.querySelectorAll('[data-office-page]')).filter(p => !p.hidden);
        if (!pages.length) return;
        const hostTop = scrollHost === window ? 0 : scrollHost.getBoundingClientRect().top;
        let best = pages[0], bestD = Infinity;
        pages.forEach(p => { const d = Math.abs(p.getBoundingClientRect().top - hostTop - 90); if (d < bestD) { bestD = d; best = p; } });
        setActiveOfficePage(previewId, best.getAttribute('data-office-page'));
      };
      root.dataset.spyBound = '1';
      (scrollHost === window ? window : scrollHost).addEventListener('scroll', refreshActive, { passive: true });
      setTimeout(refreshActive, 0);
    }
    function initOfficePreviewBindings() {
      document.querySelectorAll('[data-office-preview-root]').forEach(root => bindOfficePreviewScrollSpy(root.id));
      document.querySelectorAll('[data-office-pdf-root]').forEach(root => {
        const first = root.querySelector('[data-office-nav]');
        if (first) { const pi = first.getAttribute('data-office-nav') || '1'; root.setAttribute('data-current-page', pi); openOfficePdfPage(root.id, pi); }
      });
    }
    function officePageThumbnail(page, pageLabel, isPresentation) {
      const items = Array.isArray(page?.items) ? page.items : [];
      const image = items.find(i => i?.kind === 'image' && i?.src);
      if (isPresentation && image?.src) return `<div class="office-nav-thumb"><img src="${escAttr(image.src)}" alt="${escAttr(pageLabel + ' ' + (page.index || ''))}" /><span class="office-nav-thumb-badge">${escHtml(page.index)}</span></div>`;
      if (isPresentation) return `<div class="office-nav-thumb"><div class="office-nav-thumb-fallback">${icon('grid', 28)}<div class="big">${escHtml(page.index)}</div></div></div>`;
      return '';
    }

    /* ─── Office rendering ─── */
    function renderOfficePdfPreview(payload) {

        return `<button type="button" class="office-nav-btn office-nav-card" data-office-nav="${escAttr(pi)}" data-search="${escAttr(title)}" onclick="document.getElementById('${pid}')?.setAttribute('data-current-page','${pi}');openOfficePdfPage('${pid}',${pi})"><div class="office-nav-thumb">${thu ? `<img loading="lazy" src="${escAttr(thu)}" alt="${escAttr(title)}" />` : `<div class="office-nav-thumb-fallback">${icon('grid', 28)}<div class="big">${escHtml(pi)}</div></div>`}<span class="office-nav-thumb-badge">${escHtml(pi)}</span></div><div class="office-nav-card-body"><strong>${escHtml(pl)} ${escHtml(pi)}</strong><div class="office-nav-title">${escHtml(title)}</div></div></button>`;
      }).join('');
      return `<div class="office-preview-layout presentation" id="${pid}" data-office-pdf-root="1" data-pdf-url="${escAttr(pdfUrl)}"><aside class="office-preview-sidebar"><div class="text-sm font-semibold">页面导航</div><input class="input mt-3" type="search" placeholder="筛选…" oninput="filterOfficePreviewPages('${pid}',this.value)" /><div class="text-xs mt-2" style="color:var(--muted)"><span data-role="office-visible-count">${pages.length}/${pages.length}</span> ${escHtml(pl)}</div><div class="office-preview-nav">${nav}</div><div class="empty-state" data-role="office-empty-filter" hidden><div class="font-semibold">无匹配</div></div></aside><div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="pill pill-sky">${escHtml(fn)}</span><span class="pill ${sl === 'stable' ? 'pill-emerald' : 'pill-amber'}">${escHtml(officeSupportLabel(sl))}</span><span class="pill pill-indigo">PDF</span></div><div class="office-summary-grid"><span class="pill pill-slate">${escHtml(payload?.page_count || 0)} ${escHtml(pl)}</span></div><div class="office-summary-actions"><button type="button" class="btn btn-ghost btn-sm" onclick="stepOfficePreviewPage('${pid}',-1)">${icon('chevronLeft', 16)} 上一${escHtml(pl)}</button><button type="button" class="btn btn-ghost btn-sm" onclick="stepOfficePreviewPage('${pid}',1)">下一${escHtml(pl)} ${icon('chevronRight', 16)}</button></div>${warn.map(t => `<div class="office-warning">${escHtml(t)}</div>`).join('')}</div><iframe class="office-pdf-frame" data-office-pdf-frame src="about:blank" title="${escAttr(payload?.name || 'PDF')}"></iframe></div></div>`;
    }

    function renderOfficeSpreadsheetPreview(payload) {
      const pages = Array.isArray(payload?.pages) ? payload.pages : [];
      const pid = `office-ss-${Math.random().toString(36).slice(2, 10)}`;
      const pl = payload?.page_label || '工作表';
      const warn = Array.isArray(payload?.warnings) ? payload.warnings.filter(Boolean) : [];
      const sl = payload?.support_level || 'best_effort';
      const fn = String(payload?.format || 'office').toUpperCase();
      if (!pages.length) return `<div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="pill pill-sky">${escHtml(fn)}</span><span class="pill ${sl === 'stable' ? 'pill-emerald' : 'pill-amber'}">${escHtml(officeSupportLabel(sl))}</span></div>${warn.map(t => `<div class="office-warning">${escHtml(t)}</div>`).join('')}<div class="empty-state"><div>${icon('grid', 48)}</div><div class="font-semibold mt-2">未提取到可预览工作表</div></div></div></div>`;
      const nav = pages.map(p => {
        const title = String(p?.title || p?.sheet_name || `${pl} ${p?.index || ''}`);
        const excerpt = String(p?.excerpt || '');
        return `<button type="button" class="office-nav-btn" data-office-nav="${escAttr(p.index)}" data-search="${escAttr([pl, p?.index, title, excerpt].join(' '))}" onclick="jumpToOfficePage('${pid}',${Number(p.index || 0)})"><strong>${escHtml(title)}</strong><div class="office-nav-title">${escHtml(p.row_count || 0)} 行 · ${escHtml(p.column_count || 0)} 列</div><small>${escHtml(excerpt || '无摘要')}</small></button>`;
      }).join('');
      const html = pages.map(p => {
        const rows = Array.isArray(p?.preview_rows) ? p.preview_rows : [];
        const maxCols = rows.reduce((c, r) => Math.max(c, Array.isArray(r) ? r.length : 0), 0);
        const title = String(p?.title || p?.sheet_name || `${pl} ${p?.index || ''}`);
        const metaBits = [`${Number(p?.row_count || 0)} 行`, `${Number(p?.column_count || 0)} 列`];
        if (p?.truncated) metaBits.push(`前 ${p?.preview_row_limit || 0} 行 / ${p?.preview_col_limit || 0} 列`);
        const table = rows.length
          ? `<div class="office-sheet-table-wrap"><table class="office-sheet-table"><thead><tr><th class="sheet-row-head">#</th>${Array.from({ length: maxCols }, (_, col) => `<th>${escHtml(columnLabel(col + 1))}</th>`).join('')}</tr></thead><tbody>${rows.map((row, ri) => `<tr><th class="sheet-row-head">${escHtml(ri + 1)}</th>${Array.from({ length: maxCols }, (_, col) => `<td>${escHtml(Array.isArray(row) ? (row[col] ?? '') : '')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`
          : '<div class="text-sm" style="color:var(--muted)">无内容。</div>';
        return `<section class="office-page" data-office-page="${escAttr(p.index)}" data-search="${escAttr([pl, p?.index, title].join(' '))}" id="${pid}-p-${escAttr(p.index)}"><div class="office-page-title">${escHtml(pl)} ${escHtml(p.index)}</div><div class="office-page-heading">${escHtml(title)}</div><div class="office-page-meta">${escHtml(metaBits.join(' · '))}</div>${table}${p?.truncated ? `<div class="office-sheet-note">在线预览已裁剪为前 ${escHtml(p.preview_row_limit || 0)} 行、前 ${escHtml(p.preview_col_limit || 0)} 列。</div>` : ''}</section>`;
      }).join('');
      return `<div class="office-preview-layout spreadsheet" id="${pid}" data-office-preview-root="1"><aside class="office-preview-sidebar"><div class="text-sm font-semibold">工作表导航</div><input class="input mt-3" type="search" placeholder="筛选…" oninput="filterOfficePreviewPages('${pid}',this.value)" /><div class="text-xs mt-2" style="color:var(--muted)"><span data-role="office-visible-count">${pages.length}/${pages.length}</span> ${escHtml(pl)}</div><div class="office-preview-nav">${nav}</div><div class="empty-state" data-role="office-empty-filter" hidden><div class="font-semibold">无匹配</div></div></aside><div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="pill pill-sky">${escHtml(fn)}</span><span class="pill ${sl === 'stable' ? 'pill-emerald' : 'pill-amber'}">${escHtml(officeSupportLabel(sl))}</span><span class="pill pill-indigo">表格</span></div><div class="office-summary-grid"><span class="pill pill-slate">${escHtml(payload?.sheet_count || payload?.page_count || 0)} 张</span><span class="pill pill-slate">${escHtml(payload?.row_count || 0)} 行</span><span class="pill pill-slate">${escHtml(payload?.column_count || 0)} 列</span></div><div class="office-summary-actions"><button type="button" class="btn btn-ghost btn-sm" onclick="stepOfficePreviewPage('${pid}',-1)">${icon('chevronLeft', 16)} 上一${escHtml(pl)}</button><button type="button" class="btn btn-ghost btn-sm" onclick="stepOfficePreviewPage('${pid}',1)">下一${escHtml(pl)} ${icon('chevronRight', 16)}</button></div>${warn.map(t => `<div class="office-warning">${escHtml(t)}</div>`).join('')}</div><div class="office-preview">${html}</div></div></div>`;
    }

    function renderOfficePreview(payload) {
      if (payload?.preview_mode === 'pdf') return renderOfficePdfPreview(payload);
      if (payload?.kind === 'spreadsheet') return renderOfficeSpreadsheetPreview(payload);
      const pages = Array.isArray(payload?.pages) ? payload.pages : [];
      const pid = `office-${Math.random().toString(36).slice(2, 10)}`;
      const pl = payload?.page_label || '页';
      const warn = Array.isArray(payload?.warnings) ? payload.warnings.filter(Boolean) : [];
      const sl = payload?.support_level || 'best_effort';
      const fn = String(payload?.format || 'office').toUpperCase();
      const isPres = payload?.kind === 'presentation';
      const modeClass = isPres ? 'presentation' : 'document';
      if (!pages.length) return `<div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="pill pill-sky">${escHtml(fn)}</span><span class="pill ${sl === 'stable' ? 'pill-emerald' : 'pill-amber'}">${escHtml(officeSupportLabel(sl))}</span></div>${warn.map(t => `<div class="office-warning">${escHtml(t)}</div>`).join('')}<div class="empty-state"><div>${icon('file', 48)}</div><div class="font-semibold mt-2">未提取到可预览内容</div></div></div></div>`;
      const nav = pages.map(p => {
        const excerpt = String(p?.excerpt || '');
        const title = String(p?.title || `${pl} ${p?.index || ''}`);
        const ic = Number(p?.item_count || 0);
        const imc = Number(p?.image_count || 0);
        const search = [pl, p?.index, title, excerpt].join(' ');
        const thumb = officePageThumbnail(p, pl, isPres);
        const meta = `<div class="office-nav-meta"><span>${ic} 片段</span><span>${imc} 图片</span></div>`;
        if (isPres) return `<button type="button" class="office-nav-btn office-nav-card" data-office-nav="${escAttr(p.index)}" data-search="${escAttr(search)}" onclick="jumpToOfficePage('${pid}',${Number(p.index || 0)})">${thumb}<div class="office-nav-card-body"><strong>${escHtml(pl)} ${escHtml(p.index)}</strong><div class="office-nav-title">${escHtml(title)}</div><small>${escHtml(excerpt || '无摘要')}</small>${meta}</div></button>`;
        return `<button type="button" class="office-nav-btn" data-office-nav="${escAttr(p.index)}" data-search="${escAttr(search)}" onclick="jumpToOfficePage('${pid}',${Number(p.index || 0)})"><strong>${escHtml(pl)} ${escHtml(p.index)}</strong><div class="office-nav-title">${escHtml(title)}</div><small>${escHtml(excerpt || '无摘要')}</small>${meta}</button>`;
      }).join('');
      const html = pages.map(p => {
        const items = Array.isArray(p?.items) ? p.items : [];
        const title = String(p?.title || `${pl} ${p?.index || ''}`);
        const metaBits = [];
        if (Number(p?.text_count || 0) > 0) metaBits.push(`${p.text_count} 段文本`);
        if (Number(p?.image_count || 0) > 0) metaBits.push(`${p.image_count} 张图片`);
        const inner = items.map(i => {
          if (i?.kind === 'image' && i?.src) return `<img src="${escAttr(i.src)}" alt="${escAttr(pl + ' ' + (p.index || ''))}" />`;
          if (i?.kind === 'markdown') { const rendered = typeof marked !== 'undefined' ? (ui ? ui.sanitizeMarkdownHtml(marked.parse(String(i.text || ''))) : marked.parse(String(i.text || ''))) : `<pre>${escHtml(String(i.text || ''))}</pre>`; return `<div class="md-preview">${rendered}</div>`; }
          return '';
        }).join('');
        return `<section class="office-page" data-office-page="${escAttr(p.index)}" data-search="${escAttr([pl, p?.index, title].join(' '))}" id="${pid}-p-${escAttr(p.index)}"><div class="office-page-title">${escHtml(pl)} ${escHtml(p.index)}</div><div class="office-page-heading">${escHtml(title)}</div><div class="office-page-meta">${escHtml(metaBits.join(' · ') || '无结构化摘要')}</div>${inner || '<div class="text-sm" style="color:var(--muted)">无内容</div>'}</section>`;
      }).join('');
      return `<div class="office-preview-layout ${modeClass}" id="${pid}" data-office-preview-root="1"><aside class="office-preview-sidebar"><div class="text-sm font-semibold">页面导航</div><input class="input mt-3" type="search" placeholder="筛选…" oninput="filterOfficePreviewPages('${pid}',this.value)" /><div class="text-xs mt-2" style="color:var(--muted)"><span data-role="office-visible-count">${pages.length}/${pages.length}</span> ${escHtml(pl)}</div><div class="office-preview-nav">${nav}</div><div class="empty-state" data-role="office-empty-filter" hidden><div class="font-semibold">无匹配</div></div></aside><div class="office-preview-main"><div class="office-summary"><div class="flex flex-wrap items-center gap-2"><span class="pill pill-sky">${escHtml(fn)}</span><span class="pill ${sl === 'stable' ? 'pill-emerald' : 'pill-amber'}">${escHtml(officeSupportLabel(sl))}</span><span class="pill pill-indigo">${escHtml(isPres ? '演示文稿' : '文档')}</span></div><div class="office-summary-grid"><span class="pill pill-slate">${escHtml(payload?.page_count || 0)} ${escHtml(pl)}</span><span class="pill pill-slate">${escHtml(payload?.text_item_count || 0)} 文本</span><span class="pill pill-slate">${escHtml(payload?.image_item_count || 0)} 图片</span></div><div class="office-summary-actions"><button type="button" class="btn btn-ghost btn-sm" onclick="stepOfficePreviewPage('${pid}',-1)">${icon('chevronLeft', 16)} 上一${escHtml(pl)}</button><button type="button" class="btn btn-ghost btn-sm" onclick="stepOfficePreviewPage('${pid}',1)">下一${escHtml(pl)} ${icon('chevronRight', 16)}</button></div>${warn.map(t => `<div class="office-warning">${escHtml(t)}</div>`).join('')}</div><div class="office-preview">${html}</div></div></div>`;
    }

    /* ─── Final explorer overrides ─── */
    function setView(mode, noSave) {
      state.viewMode = normalizeViewMode(mode);
      const table = document.getElementById('fileTable');
      const grid = document.getElementById('fileGrid');
      const isDetails = state.viewMode === 'details';
      if (table) table.style.display = isDetails ? '' : 'none';
      if (grid) {
        grid.style.display = isDetails ? 'none' : '';
        grid.className = `file-grid explorer-file-grid mode-${state.viewMode}`;
      }
      syncViewModeControls();
      if (!noSave) localStorage.setItem('obj_view', state.viewMode);
      updateSummaryCards();
    }
    function viewModeSpec(mode = state.viewMode) {
      return {
        details: { label: '详细列表', shortLabel: '列表', icon: 'list' },
        small: { label: '小图标', shortLabel: '网格 S', icon: 'grid' },
        medium: { label: '中图标', shortLabel: '网格 M', icon: 'grid' },
        large: { label: '大图标', shortLabel: '网格 L', icon: 'grid' },
      }[normalizeViewMode(mode)] || { label: '详细列表', shortLabel: '列表', icon: 'list' };
    }
    function syncViewModeControls() {
      const spec = viewModeSpec();
      const main = document.getElementById('viewModeBtn');
      const menu = document.getElementById('viewModeMenuBtn');
      const iconNode = document.getElementById('viewModeBtnIcon');
      const labelNode = document.getElementById('viewModeBtnLabel');
      if (iconNode) iconNode.innerHTML = icon(spec.icon, 16);
      if (labelNode) labelNode.textContent = spec.shortLabel;
      if (main) {
        main.classList.add('active-view');
        main.title = spec.label;
        main.setAttribute('aria-label', `当前视图：${spec.label}`);
      }
      if (menu) menu.title = `切换视图（当前：${spec.label}）`;
      if (si && iconNode?.parentElement) si.mount(iconNode.parentElement);
    }
    function openViewModeMenu(anchor) {
      const rect = anchor.getBoundingClientRect();
      openCtxMenu(rect.left, rect.bottom + 6, '视图模式', 'Browse', [
        { icon: 'list', label: '详细列表', meta: state.viewMode === 'details' ? '当前视图' : '表格列视图', action: () => setView('details') },
        { icon: 'grid', label: '小图标', meta: state.viewMode === 'small' ? '当前视图' : '更紧凑的缩略图', action: () => setView('small') },
        { icon: 'grid', label: '中图标', meta: state.viewMode === 'medium' ? '当前视图' : '默认网格尺寸', action: () => setView('medium') },
        { icon: 'grid', label: '大图标', meta: state.viewMode === 'large' ? '当前视图' : '更大的预览缩略图', action: () => setView('large') },
      ]);
    }
    function showViewModeMenu(event) {
      event.preventDefault();
      event.stopPropagation();
      openViewModeMenu(event.currentTarget || document.getElementById('viewModeBtn'));
    }
    function updateSummaryCards() {
      const el = (id) => document.getElementById(id);
      if (el('summaryTotal')) el('summaryTotal').textContent = String(state.total || 0);
      if (el('summaryPath')) el('summaryPath').textContent = currentPathLabel();
      if (el('summaryBackend')) el('summaryBackend').textContent = state.config?.backend || state.config?.backend_type || '—';
      if (el('summaryLatency')) el('summaryLatency').textContent = state.lastLatencyMs ? state.lastLatencyMs + ' ms' : '—';
      syncPrefixInput();
      syncActiveExplorerTab();
      syncWorkspaceOverview();
      renderBucketWorkspace();
      renderDatabaseWorkspace();
      renderDetailWorkspaceSide();
    }
    async function onClientChange(init, forced) {
      state.client = forced || document.getElementById('clientSelector')?.value || '';
      localStorage.setItem('obj_client', state.client || 'default');
      state.prefix = '';
      state.offset = 0;
      state.selected.clear();
      state.activePath = '';
      state.previewItem = null;
      state.scopeInsights = emptyScopeInsights(scopeInsightKey());
      state.buckets = [];
      state.activeBucketName = '';
      updateBatchButtons();
      renderDetailPane();
      try {
        const cfg = await api('/admin/api/storage/object/config?' + qs({}), { scope: 'config' });
        state.config = cfg;
        const clientMeta = document.getElementById('clientMeta');
        if (clientMeta) clientMeta.innerHTML = `<strong>${escHtml(state.client || 'default')}</strong><span class="storage-db-badge">${escHtml(cfg.backend || cfg.backend_type || '—')}</span>`;
      } catch {}
      renderClientTabs();
      updateSummaryCards();
      await Promise.all([loadItems(), loadBuckets()]);
    }
    function updateBatchButtons() {
      const n = state.selected.size;
      const cb = document.getElementById('selectAllCb');
      if (cb) cb.checked = !!state.items.length && state.items.every((item) => state.selected.has(item.path));
      const bar = document.getElementById('selectionBar');
      if (bar) bar.style.display = n || state.clipboard ? 'block' : 'none';
      document.getElementById('batchDeleteBtn')?.toggleAttribute('disabled', n === 0);
      document.getElementById('batchZipBtn')?.toggleAttribute('disabled', n === 0);
      const cnt = document.getElementById('selectionCount');
      if (cnt) cnt.textContent = `已选 ${n} 项`;
      syncClipboardButtons();
      syncWorkspaceOverview();
    }
    function onItemClick(idx) {
      const item = state.items[idx];
      if (!item) return;
      if (item.kind === 'folder') { navigateTo(item.path, { preferCache: true, revalidate: true }); return; }
      state.activePath = item.path;
      state.previewItem = item;
      renderItems();
      renderDetailPane(item);
      renderDetailWorkspaceSide();
    }
    function renderItems() {
      const tbody = document.getElementById('fileTableBody');
      const grid = document.getElementById('fileGrid');
      const empty = document.getElementById('emptyState');
      if (!state.items.length) {
        if (tbody) tbody.innerHTML = '';
        if (grid) grid.innerHTML = '';
        if (empty) empty.style.display = 'flex';
        return;
      }
      if (empty) empty.style.display = 'none';
      if (tbody) {
        tbody.innerHTML = state.items.map((item, idx) => {
          const isFolder = item.kind === 'folder';
          const sel = state.selected.has(item.path);
          const active = state.activePath === item.path;
          return `<tr class="${sel ? 'selected' : ''} ${active ? 'active' : ''}" draggable="true" onclick="onItemClick(${idx})" ondragstart="handleItemDragStart(event,${idx})" ondragend="handleItemDragEnd()" ondragover="${isFolder ? `handleItemDragOver(event,${idx})` : 'event.preventDefault()'}" ondrop="${isFolder ? `handleItemDrop(event,${idx})` : 'event.preventDefault()'}" oncontextmenu="showContextMenu(event,${idx})"><td><input type="checkbox" class="check" ${sel ? 'checked' : ''} onchange="toggleSelect('${escAttr(item.path)}',this.checked)" onclick="event.stopPropagation()" /></td><td><span class="file-name ${isFolder ? 'folder' : ''}">${getIcon(item)}<span class="file-name-text">${escHtml(item.name)}</span></span></td><td class="file-meta">${isFolder ? '—' : formatSize(item.size)}</td><td class="file-meta file-type-col">${isFolder ? '文件夹' : escHtml(item.content_type || '—')}</td><td class="file-meta">${formatDateTime(item.updated_at || item.created_at, true)}</td><td style="text-align:center"><span class="ctx-trigger" onclick="event.stopPropagation();showContextMenu(event,${idx})">⋮</span></td></tr>`;
        }).join('');
      }
      if (grid) {
        grid.className = `file-grid explorer-file-grid mode-${state.viewMode === 'details' ? 'medium' : state.viewMode}`;
        grid.innerHTML = state.items.map((item, idx) => {
          const isFolder = item.kind === 'folder';
          const sel = state.selected.has(item.path);
          const active = state.activePath === item.path;
          return `<div class="grid-item ${sel ? 'selected' : ''} ${active ? 'active' : ''}" draggable="true" onclick="onItemClick(${idx})" ondragstart="handleItemDragStart(event,${idx})" ondragend="handleItemDragEnd()" ondragover="${isFolder ? `handleItemDragOver(event,${idx})` : 'event.preventDefault()'}" ondrop="${isFolder ? `handleItemDrop(event,${idx})` : 'event.preventDefault()'}" oncontextmenu="showContextMenu(event,${idx})"><input type="checkbox" class="check grid-item-check" ${sel ? 'checked' : ''} onchange="toggleSelect('${escAttr(item.path)}',this.checked)" onclick="event.stopPropagation()" /><div>${renderGridVisual(item)}</div><div class="grid-item-name ${isFolder ? 'folder' : ''}">${escHtml(item.name)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${isFolder ? '文件夹' : formatSize(item.size)}</div></div>`;
        }).join('');
      }
      if (si) { if (tbody) si.mount(tbody); if (grid) si.mount(grid); }
    }
    function showBrowserContextMenu(e) {
      e.preventDefault();
      e.stopPropagation();
      openCtxMenu(e.clientX, e.clientY, currentPathLabel(), 'Workspace', [
        { icon: 'refresh', label: '刷新', meta: '重新读取当前目录', action: () => loadItems() },
        { icon: 'upload', label: '上传到此处', meta: currentPathLabel(), action: () => showUploadModal(state.prefix) },
        { icon: 'folder', label: '新建文件夹', meta: currentPathLabel(), action: () => showNewFolderModal(state.prefix) },
        { separator: true },
        { icon: 'copy', label: '复制当前路径', meta: currentPathLabel(), action: async () => { await navigator.clipboard.writeText(currentPathLabel()); toast('已复制路径'); } },
      ]);
    }
    function showContextMenu(e, idx) {
      e.preventDefault();
      e.stopPropagation();
      const item = state.items[idx];
      if (!item) return;
      const ext = (item.name.split('.').pop() || '').toLowerCase();
      const textEditable = item.kind !== 'folder' && isText((item.content_type || '').toLowerCase(), ext);
      openCtxMenu(e.clientX, e.clientY, item.path, item.kind === 'folder' ? 'Folder' : 'Object', [
        item.kind === 'folder'
          ? { icon: 'folder', label: '打开', meta: item.path, action: () => navigateTo(item.path, { preferCache: true, revalidate: true }) }
          : { icon: 'eye', label: '预览', meta: '在右侧预览面板打开', action: () => { state.activePath = item.path; renderDetailPane(item); renderItems(); } },
        item.kind === 'folder'
          ? { icon: 'plus', label: '在新标签打开', meta: item.path, action: () => { const id = 'tab-' + Math.random().toString(36).slice(2, 8); state.explorerTabs.push({ id, prefix: item.path, title: item.name }); state.activeExplorerTabId = id; navigateTo(item.path, { preferCache: true, revalidate: true }); renderExplorerTabs(); } }
          : { icon: 'save', label: '编辑', meta: textEditable ? '在线编辑文本' : '当前类型不可编辑', disabled: !textEditable, action: () => showEditor(item) },
        { icon: 'copy', label: '复制', meta: '进入剪贴板', action: () => { state.selected = new Set([item.path]); copySelectedToClipboard('copy'); } },
        { icon: 'move', label: '剪切', meta: '移动到其它目录或桶', action: () => { state.selected = new Set([item.path]); copySelectedToClipboard('cut'); } },
        { icon: 'file', label: '复制到…', meta: '手动指定目标路径', action: () => showCopyMoveModal(item, 'copy') },
        { icon: 'move', label: '移动/重命名…', meta: '手动指定目标路径', action: () => showCopyMoveModal(item, 'move') },
        { separator: true },
        { icon: 'tag', label: '元数据', meta: '编辑对象元数据', disabled: item.kind === 'folder', action: () => showMetadataModal(item) },
        { icon: 'trash', label: '删除', meta: '删除该对象或目录', style: 'color:#ef4444', action: () => deleteItem(item) },
      ]);
    }
    function renderDetailItemPanel(item, preview) {
      const metadata = item.metadata || {};
      const tags = Array.isArray(metadata.tags) ? metadata.tags : [];
      const summaryItems = [
        { label: '路径', value: item.path },
        { label: '内容类型', value: item.content_type || '—' },
        { label: '大小', value: formatSize(item.size) },
        { label: '修改时间', value: formatDateTime(item.updated_at || item.created_at) },
      ];
      return `<div class="object-detail-shell"><div class="object-detail-toolbar">${preview.isTextPreviewable ? `<button class="btn btn-ghost btn-sm" onclick="showEditor(findItemByPath('${escAttr(item.path)}'))">${icon('save', 16)} 编辑</button>` : ''}<button class="btn btn-ghost btn-sm" onclick="showMetadataModal(findItemByPath('${escAttr(item.path)}'))">${icon('tag', 16)} 元数据</button><button class="btn btn-ghost btn-sm" onclick="showTTLModal(findItemByPath('${escAttr(item.path)}'))">${icon('history', 16)} 生命周期</button><button class="btn btn-ghost btn-sm" onclick="showCopyMoveModal(findItemByPath('${escAttr(item.path)}'),'move')">${icon('move', 16)} 移动</button><button class="btn btn-ghost btn-sm" onclick="openFullscreenPreview('${escAttr(item.path)}')">${icon('eye', 16)} 全屏</button><a href="${preview.url}" download="${escAttr(item.name)}" class="btn btn-primary btn-sm">${icon('download', 16)} 下载</a></div><div class="detail-preview-shell">${preview.body}</div><div class="object-detail-summary">${summaryItems.map((entry) => `<div class="object-detail-summary-item"><div class="object-detail-summary-label">${escHtml(entry.label)}</div><div class="object-detail-summary-value">${escHtml(entry.value)}</div></div>`).join('')}</div>${tags.length ? `<div class="object-detail-tags">${tags.map((tag) => `<button class="pill pill-violet" onclick="applyTagFilter('${escAttr(tag)}')">${icon('tag', 12)} ${escHtml(tag)}</button>`).join('')}</div>` : ''}</div>`;
    }
    async function renderDetailPane(item) {
      const pane = document.getElementById('detailPaneBody');
      if (!pane) return;
      const activeItem = item || findItemByPath(state.activePath);
      if (!activeItem) {
        state.previewItem = null;
        pane.innerHTML = `<div class="detail-loading-panel"><div class="detail-loading"><span>${icon('file', 18)}</span><span>选择文件预览</span></div></div>`;
        if (si) si.mount(pane);
        renderDetailWorkspaceSide();
        return;
      }
      state.previewItem = activeItem;
      const revision = ++detailRev;
      pane.innerHTML = `<div class="detail-loading-panel"><div class="detail-loading"><span class="spinner"></span><span>加载 ${escHtml(activeItem.name)} 的详情…</span></div></div>`;
      if (si) si.mount(pane);
      try {
        const preview = await buildPreviewDescriptor(activeItem);
        if (revision !== detailRev) return;
        pane.innerHTML = renderDetailItemPanel(activeItem, preview);
        if (si) si.mount(pane);
        if (preview.onShow) preview.onShow();
        renderDetailWorkspaceSide();
      } catch (e) {
        if (revision !== detailRev) return;
        pane.innerHTML = renderDetailItemPanel(activeItem, { url: '/admin/api/storage/object/content?' + qs({ path: activeItem.path }), body: `<div class="detail-empty-preview">预览加载失败：${escHtml(e.message || '未知错误')}</div>`, tags: Array.isArray(activeItem.metadata?.tags) ? activeItem.metadata.tags : [], onShow: null, modalSize: 'wide', isTextPreviewable: false, previewLabel: '对象预览' });
        if (si) si.mount(pane);
        renderDetailWorkspaceSide();
      }
    }
    async function showPreview(item) {
      if (!item) return;
      state.activePath = item.path;
      state.previewItem = item;
      renderItems();
      setWorkspaceSection('browse');
      await renderDetailPane(item);
    }
    function renderDetailWorkspaceSide() {
      const activeItem = findItemByPath(state.activePath);
      setText('detailWorkspaceTitle', activeItem ? activeItem.name : '');
      setText('detailWorkspaceMeta', activeItem
        ? `${activeItem.content_type || '—'} · ${formatSize(activeItem.size)} · ${formatDateTime(activeItem.updated_at || activeItem.created_at, true)}`
        : '');
    }
    let modalBeforeClose = null;
    async function closeModal(force) {
      if (!force && typeof modalBeforeClose === 'function') {
        const ok = await modalBeforeClose();
        if (!ok) return;
      }
      modalBeforeClose = null;
      const root = document.getElementById('modalContainer');
      if (root) root.innerHTML = '';
    }
    async function showEditor(item) {
      if (!item) return;
      const ct = (item.content_type || '').toLowerCase();
      const ext = (item.name.split('.').pop() || '').toLowerCase();
      if (!isText(ct, ext)) {
        if (isOfficeDoc(ext)) { toast('Office 文档当前未接入在线编辑，请先下载后编辑。', 'warn'); return; }
        toast('当前文件不是文本类型，已阻止直接编辑。', 'warn');
        return;
      }
      const url = '/admin/api/storage/object/content?' + qs({ path: item.path });
      let text = '';
      try {
        const res = await fetch(url);
        text = await res.text();
      } catch {
        toast('获取文件内容失败', 'error');
        return;
      }
      const html = `
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold">${icon('save', 18)} 编辑 – ${escHtml(item.name)}</h3>
          <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
        </div>
        <textarea id="editorArea" class="code-editor">${escHtml(text)}</textarea>
        <div class="flex items-center justify-between mt-3">
          <div class="text-xs" style="color:var(--muted)" id="editorCharCount">${text.length} 字符</div>
          <div class="flex gap-2">
            <button class="btn btn-ghost" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveEditor('${escAttr(item.path)}')">${icon('save', 16)} 保存</button>
          </div>
        </div>`;
      showModal(html, () => {
        const area = document.getElementById('editorArea');
        let dirty = false;
        modalBeforeClose = async () => {
          if (!dirty) return true;
          return await confirmDialog('放弃未保存的修改？', '当前编辑内容尚未保存。');
        };
        area?.addEventListener('input', () => {
          dirty = area.value !== text;
          const counter = document.getElementById('editorCharCount');
          if (counter) counter.textContent = area.value.length + ' 字符' + (dirty ? ' · 未保存' : '');
        });
      }, 'wide');
    }
    async function saveEditor(path) {
      const value = document.getElementById('editorArea')?.value;
      if (value === undefined) return;
      try {
        await api('/admin/api/storage/object/content?' + qs({ path }), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'text', value }) });
        modalBeforeClose = null;
        await closeModal(true);
        toast('保存成功', 'info');
        await loadItems();
      } catch (e) {
        toast('保存失败: ' + e.message, 'error');
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      initExplorerWorkbench();
      ensureExplorerTabs();
      renderExplorerTabs();
      document.getElementById('viewModeBtn')?.addEventListener('click', showViewModeMenu);
      document.getElementById('viewModeMenuBtn')?.addEventListener('click', showViewModeMenu);
      syncViewModeControls();
      document.getElementById('copySelectionBtn')?.addEventListener('click', () => copySelectedToClipboard('copy'));
      document.getElementById('cutSelectionBtn')?.addEventListener('click', () => copySelectedToClipboard('cut'));
      document.getElementById('pasteClipboardBtn')?.addEventListener('click', () => pasteClipboard());
      document.querySelectorAll('[data-bucket-mode]').forEach((node) => node.addEventListener('click', () => setBucketMode(node.getAttribute('data-bucket-mode'))));
      document.getElementById('bucketNewBtn')?.addEventListener('click', () => showBucketModal('create'));
      document.getElementById('bucketRefreshBtn')?.addEventListener('click', () => loadBuckets());
      document.getElementById('bucketEditBtn')?.addEventListener('click', () => showBucketModal('edit'));
      document.getElementById('bucketDeleteBtn')?.addEventListener('click', () => deleteActiveBucket());
      syncClipboardButtons();
    });
  </script>
</body>
</html>
