    async function handleRenegotiateNeeded(msg) {
      // Server signals it added tracks — browser creates the offer so Chrome controls
      // codec PT assignments (aiortc's createOffer resets PTs to its own defaults,
      // which Chrome rejects when renegotiating an already-established m-section).
      //
      // The server may also tell us to add recvonly transceivers for server-side tracks
      // that are not yet represented in the browser's SDP.  Without this, the browser's
      // offer would lack m-lines for those tracks and they'd never be negotiated.
      if (!pc || !serverChannel) return;
      try {
        if (msg?.add_transceivers && Array.isArray(msg.add_transceivers)) {
          for (const t of msg.add_transceivers) {
            pc.addTransceiver(t.kind, { direction: 'recvonly' });
          }
          dlog(`renegotiate: added ${msg.add_transceivers.length} recvonly transceivers`);
        }
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        serverChannel.send(JSON.stringify({ type: 'renegotiate_offer', sdp: pc.localDescription.sdp }));
        dlog('renegotiate: offer sent');
      } catch (err) {
        dlog(`renegotiate: error ${err?.message || err}`);
      }
    }

    async function handleRenegotiateAnswer(msg) {
      if (!pc) return;
      trackMidMap.clear();
      if (msg.track_map) {
        for (const [mid, info] of Object.entries(msg.track_map)) {
          trackMidMap.set(mid, info);
        }
      }
      try {
        await pc.setRemoteDescription({ sdp: msg.sdp, type: 'answer' });
        dlog(`renegotiate: answer applied track_count=${trackMidMap.size}`);
      } catch (err) {
        dlog(`renegotiate: error applying answer ${err?.message || err}`);
      }
    }

    function handleServerMessage(raw) {
      let msg;
      try { msg = JSON.parse(raw); }
      catch {
        dlog(`recv parse-failed raw=${String(raw).slice(0, 120)}`);
        return;
      }
      if (!msg || !msg.type) {
        dlog(`recv ignored invalid-shape raw=${rawPreview(raw)}`);
        return;
      }
      dlog(`recv ${msg.type}`);

      if (msg.type === 'renegotiate_needed') {
        handleRenegotiateNeeded(msg);
        return;
      }
      if (msg.type === 'renegotiate_answer') {
        handleRenegotiateAnswer(msg);
        return;
      }

      const cid = msg.candidate_id;
      if (!cid) {
        dlog(`recv ignored missing-candidate type=${msg.type}`);
        return;
      }

      if (msg.type === 'user_connecting' || msg.type === 'user_connected') {
        const isConnecting = msg.type === 'user_connecting';
        addOrUpdateParticipant(cid, { name: msg.name ?? null, ip: msg.ip ?? null, connecting: isConnecting });
        if (msg.type === 'user_connected') {
          const notice = `${getDisplayName(cid, msg.name)} ${t('joined')}`;
          toast(notice);
          renderSystemNotice(notice, msg.time);
        }
        return;
      }
      if (msg.type === 'user_disconnected') {
        removeParticipant(cid);
        // If the disconnected user was a sim user, clean up the simUsers array
        const simIdx = simUsers.findIndex(s => s.candidateId === cid);
        if (simIdx !== -1) {
          const sim = simUsers[simIdx];
          clearInterval(sim.drawInterval);
          if (sim._syllableTimer) clearInterval(sim._syllableTimer);
          try { sim.audioCtx?.close(); } catch {}
          try { sim.pc?.close(); } catch {}
          simUsers.splice(simIdx, 1);
          renderSimUserList();
        }
        let notice = `${getDisplayName(cid, msg.name)} ${t('left')}`;
        if (msg.reason === 'kick') notice = `${getDisplayName(cid, msg.name)} ${t('kicked')}`;
        else if (msg.reason === 'error') notice = `${getDisplayName(cid, msg.name)} ${t('failed')}`;
        toast(notice);
        renderSystemNotice(notice, msg.time);
        return;
      }
      if (msg.type === 'user_set_name') { addOrUpdateParticipant(cid, { name: msg.name ?? null }); return; }
      if (msg.type === 'user_set_mute') { addOrUpdateParticipant(cid, { muted: !!msg.mute, mutedBy: msg.muted_by || null }); if (cid === candidateId && msg.mute && msg.muted_by) { micOn = false; applyMicTrackEnabledState('force-mute'); setControlIcon('ico-mic', 'mic_off'); document.getElementById('btn-mic').classList.toggle('ctrl-btn-on', false); document.getElementById('btn-mic').classList.toggle('ctrl-btn-off', true); toast('你已被管理员强制禁言'); } return; }
      if (msg.type === 'user_set_admin') { addOrUpdateParticipant(cid, { isAdmin: !!msg.is_admin }); applyDebugUi(); return; }
      if (msg.type === 'user_set_deafen') { addOrUpdateParticipant(cid, { deafen: !!msg.deafen }); return; }
      if (msg.type === 'user_set_cam') { addOrUpdateParticipant(cid, { camOn: !!msg.cam_on }); return; }
      if (msg.type === 'user_reaction') { addOrUpdateParticipant(cid, { reaction: (msg.reaction ?? msg.emoji ?? null) }); return; }
      if (msg.type === 'user_msg') {
        renderMessage({
          msg_id: msg.msg_id || createMessageId(),
          sender: getDisplayName(cid, participants.get(cid)?.name),
          text: msg.text || '',
          kind: 'text',
          reply_to: msg.reply_to || null,
          time: msg.time,
        }, false);
        return;
      }
      if (msg.type === 'user_media') {
        pendingMediaMeta.set(msg.filehash, {
          filename: msg.filename || 'file',
          filesize: Number(msg.filesize || 0),
          mediaType: msg.media_type || 'file',
          sender: getDisplayName(cid, participants.get(cid)?.name),
          time: msg.time,
        });
        ensurePendingMediaPlaceholder(msg.filehash);
        updatePendingMediaProgress(msg.filehash);
        tryRenderPendingMedia(msg.filehash);
        return;
      }
      if (msg.type === 'user_media_chunk') {
        const chunkInfo = getPendingChunkInfo(msg.filehash);
        const idx = Number(msg.index || 0);
        if (!chunkInfo.chunks.has(idx)) {
          chunkInfo.receivedBytes += estimateDataUrlBytes(msg.data || '');
        }
        chunkInfo.chunks.set(idx, String(msg.data || ''));
        if (msg.finished) chunkInfo.finishedIndex = Number(msg.index || 0);
        ensurePendingMediaPlaceholder(msg.filehash);
        updatePendingMediaProgress(msg.filehash);
        tryRenderPendingMedia(msg.filehash);
        return;
      }
      if (msg.type === 'user_file_relay') {
        if (msg.action === 'announce_large') {
          remoteLargeFiles.set(msg.filehash, {
            filehash: msg.filehash,
            filename: msg.filename || 'file',
            filesize: Number(msg.filesize || 0),
            mediaType: msg.media_type || 'file',
            chunkSize: Number(msg.chunk_size || LARGE_FILE_CHUNK_SIZE),
            totalChunks: Number(msg.total_chunks || 0),
            senderId: cid,
          });
          renderLargeFileRequestMessage({
            sender: getDisplayName(cid, participants.get(cid)?.name),
            filehash: msg.filehash,
            filename: msg.filename || 'file',
            filesize: Number(msg.filesize || 0),
            mediaType: msg.media_type || 'file',
            time: msg.time,
          }, false);
          return;
        }
        if (msg.action === 'query_sources') {
          if (localLargeFiles.has(msg.filehash)) {
            sendRtcMsg({ type: 'user_file_relay', action: 'source_available', target_id: cid, request_id: msg.request_id, filehash: msg.filehash });
          }
          return;
        }
        if (msg.action === 'source_available') {
          if (msg.target_id === candidateId && incomingLargeTransfers.has(msg.request_id)) {
            incomingLargeTransfers.get(msg.request_id).sources.add(cid);
          }
          return;
        }
        if (msg.action === 'pull_range' || msg.action === 'pull_missing') {
          respondLargeFilePull(msg);
          return;
        }
        if (msg.action === 'push_chunk') {
          if (msg.target_id !== candidateId) return;
          const task = incomingLargeTransfers.get(msg.request_id);
          if (!task || task.filehash !== msg.filehash) return;
          const idx = Number(msg.index || 0);
          if (!task.chunks.has(idx)) {
            task.chunks.set(idx, String(msg.data || ''));
            task.bytes += estimateDataUrlBytes(msg.data || '');
          }
          if (task.chunks.size >= task.totalChunks) {
            finishLargeFileTransfer(msg.request_id);
          }
          return;
        }
      }
      if (msg.type === 'speaker_active') {
        highlightSpeaker(cid);
        return;
      }
      if (msg.type === 'speaker_inactive') {
        const tile = document.getElementById(`tile-${cid}`);
        if (tile) {
          tile.classList.remove('speaking-ring');
          clearTimeout(speakerTimers.get(cid));
          speakerTimers.delete(cid);
        }
        return;
      }
      if (msg.type === 'user_kick' && String(msg.target_id || '') === String(candidateId || '')) {
        toast(t('youKicked'));
        setTimeout(() => { leaveRoom('kicked', t('youKicked')); }, 300);
        return;
      }
      dlog(`recv ignored unknown-type=${msg.type}`);
    }

    function setupDataChannel(ch) {
      if (!ch) {
        dlog('datachannel setup ignored: null channel');
        return;
      }
      if (serverChannel && serverChannel !== ch) {
        dlog(`datachannel replace old=${serverChannel.label || 'n/a'} new=${ch.label || 'n/a'}`);
      }
      serverChannel = ch;
      dlog(`datachannel setup label=${ch.label || 'n/a'} id=${ch.id ?? 'n/a'} ordered=${ch.ordered}`);
      const onOpen = () => dlog(`datachannel open label=${ch.label || 'n/a'} id=${ch.id ?? 'n/a'}`);
      const onClose = () => dlog(`datachannel close label=${ch.label || 'n/a'} id=${ch.id ?? 'n/a'}`);
      let lastRawSig = null;
      let lastRawTs = 0;
      const onMessage = async (ev) => {
        let raw = ev?.data;
        const rawType = raw?.constructor?.name || typeof raw;
        dlog(`dc msg event type=${rawType}`);
        try {
          if (typeof raw === 'string') {
            // keep raw
          } else if (raw instanceof Blob) {
            raw = await raw.text();
          } else if (raw instanceof ArrayBuffer) {
            raw = new TextDecoder().decode(new Uint8Array(raw));
          } else if (ArrayBuffer.isView(raw)) {
            raw = new TextDecoder().decode(new Uint8Array(raw.buffer, raw.byteOffset, raw.byteLength));
          } else if (raw && typeof raw === 'object') {
            raw = JSON.stringify(raw);
          } else {
            raw = String(raw ?? '');
          }
        } catch (e) {
          dlog(`recv decode-failed ${String(e)}`);
          return;
        }
        const rawStr = String(raw ?? '');
        const now = Date.now();
        if (lastRawSig === rawStr && (now - lastRawTs) < 8) {
          dlog(`recv dedup skipped size=${rawStr.length}`);
          return;
        }
        lastRawSig = rawStr;
        lastRawTs = now;
        dlog(`recv raw size=${rawStr.length} preview=${rawPreview(rawStr)}`);
        handleServerMessage(raw);
      };

      serverChannel.onopen = onOpen;
      serverChannel.onclose = onClose;
      serverChannel.onmessage = onMessage;
    }

    async function waitIceDone() {
      await new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        const h = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', h);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', h);
        setTimeout(resolve, 6000);
      });
    }

    async function startSession(mode, wantAudio, wantVideo) {
      dlog(`session start mode=${mode} audio=${wantAudio} video=${wantVideo}`);
      setLoading(t('askPerm'));
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: wantAudio, video: wantVideo });
        dlog(`media granted tracks=${localStream.getTracks().map(t => t.kind).join(',') || 'none'}`);
        await applyMicGain();
        startVAD();
      } catch {
        localStream = new MediaStream();
        dlog('media denied fallback recv-only');
        toast(t('noPermRecvOnly'));
        teardownVAD();
      }

      setLoading(t('rtc'));
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      dlog('pc created');
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      // Important: client is offerer while server creates the business datachannel.
      // We still create a local negotiation channel so offer SDP contains m=application,
      // otherwise server-initiated datachannel may never arrive at client ondatachannel.
      negotiationChannel = pc.createDataChannel('__negotiation__');
      negotiationChannel.onopen = () => dlog('negotiation dc open');
      negotiationChannel.onclose = () => dlog('negotiation dc close');

      pc.ondatachannel = ev => {
        dlog(`pc ondatachannel label=${ev?.channel?.label || 'n/a'} id=${ev?.channel?.id ?? 'n/a'} ordered=${ev?.channel?.ordered}`);
        setupDataChannel(ev.channel);
      };
      pc.ontrack = (ev) => {
        const kind = ev?.track?.kind || 'unknown';
        const mid = ev?.transceiver?.mid ?? null;
        dlog(`pc ontrack kind=${kind} mid=${mid} streams=${ev?.streams?.length || 0}`);
        if (kind !== 'video' && kind !== 'audio') return;

        // Route track to per-candidate MediaStream using trackMidMap
        const mapping = trackMidMap.get(mid);
        const srcCid = mapping?.candidate_id ?? null;
        if (srcCid) {
          if (!remoteStreams.has(srcCid)) remoteStreams.set(srcCid, new MediaStream());
          const stream = remoteStreams.get(srcCid);
          // Remove any ended tracks of the same kind before adding the new one,
          // so the MediaStream always has at most one live track per kind.
          for (const t of [...stream.getTracks()]) {
            if (t.kind === kind && t.readyState === 'ended') {
              try { stream.removeTrack(t); } catch {}
            }
          }
          try { stream.addTrack(ev.track); } catch {}
        } else {
          dlog(`pc ontrack ignored unmapped ${kind} mid=${mid}`);
          return;
        }

        ev.track.onunmute = () => {
          dlog(`pc ontrack ${kind} unmute mid=${mid}`);
          refreshRemoteVideoBinding();
        };
        ev.track.onended = () => {
          dlog(`pc ontrack ${kind} ended mid=${mid}`);
          // Remove ended track from its stream so stale tracks don't block
          // new ones from rendering in the <video> element.
          if (srcCid) {
            const stream = remoteStreams.get(srcCid);
            if (stream) { try { stream.removeTrack(ev.track); } catch {} }
          }
          refreshRemoteVideoBinding();
        };

        refreshRemoteVideoBinding();
      };
      pc.onconnectionstatechange = () => {
        dlog(`pc ${pc.connectionState}`);
        if (pc.connectionState === 'failed') leaveRoom('connection_failed', '与服务器连接失败');
        else if (pc.connectionState === 'disconnected') leaveRoom('disconnected', t('disconnected'));
      };
      pc.onsignalingstatechange = () => dlog(`pc signaling=${pc.signalingState}`);
      pc.oniceconnectionstatechange = () => dlog(`pc ice-conn=${pc.iceConnectionState}`);
      pc.onicegatheringstatechange = () => dlog(`pc ice-gather=${pc.iceGatheringState}`);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      dlog(`pc local offer type=${pc.localDescription?.type} sdp=${pc.localDescription?.sdp?.length || 0}`);
      await waitIceDone();
      dlog(`pc ice gather complete state=${pc.iceGatheringState}`);

      const payload = { sdp: pc.localDescription.sdp, type: pc.localDescription.type, password: initPw || null, user_name: initUser || null };
      let apiResp;

      if (mode === 'create') {
        if (!initCreateToken) throw new Error('missing create token');
        setLoading(t('creating'));
        const res = await fetch(rtcRoomUrls.create || '/rtc_room/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, token: initCreateToken, name: initName || t('room'), room_type: 'default', close_room_on_creator_left: initCloseRoomOnCreatorLeft }),
        });
        dlog(`api create status=${res.status}`);
        if (!res.ok) throw new Error(await res.text());
        apiResp = await res.json();
        roomName = initName || t('room');
      } else {
        if (!initRoomId && !initJoinToken) throw new Error('missing room id or join token');
        setLoading(t('joining'));
        const res = await fetch(rtcRoomUrls.join || '/rtc_room/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, token: initJoinToken || null, room_id: initRoomId || null }),
        });
        dlog(`api join status=${res.status}`);
        if (!res.ok) throw new Error(await res.text());
        apiResp = await res.json();
        const joinedRoomId = apiResp?.room_info?.id || initRoomId || '';
        roomName = joinedRoomId ? `${t('roomPrefix')}${joinedRoomId.slice(0, 8)}…` : t('room');
      }

      const roomInfo = apiResp?.room_info || null;
      const candidateInfo = apiResp?.candidate_info || null;

      roomId = roomInfo?.id || initRoomId;
      initRoomId = roomId;
      initPw = roomInfo?.password ?? initPw;
      candidateId = candidateInfo?.id || null;
      if (!candidateId) throw new Error('invalid candidate info');
      dlog(`session assigned room=${roomId} candidate=${candidateId}`);
      myName = candidateInfo?.name ?? myName;
      deafenOn = !!candidateInfo?.deafen;
      myReaction = candidateInfo?.reaction ?? null;
      micOn = !(candidateInfo?.muted ?? false);
      camOn = candidateInfo?.cam_on == null ? true : !!candidateInfo?.cam_on;
      applyMicTrackEnabledState('candidate-sync');
      localStream?.getVideoTracks?.().forEach(track => track.enabled = camOn);

      // Store initial track-mid map from server response
      if (apiResp.track_map) {
        for (const [mid, info] of Object.entries(apiResp.track_map)) {
          trackMidMap.set(mid, info);
        }
      }

      await pc.setRemoteDescription({ sdp: apiResp.sdp, type: apiResp.type });
      dlog(`pc remote set type=${apiResp?.type} sdp=${apiResp?.sdp?.length || 0}`);

      enterRoom(roomInfo, candidateInfo);

      window.parent?.postMessage({ type: 'event', event: 'connected', room_id: roomId, candidate_id: candidateId, room_password: initPw || null }, '*');
    }

    function enterRoom(roomInfo = null, candidateInfo = null) {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('room-screen').classList.remove('hidden');
      document.getElementById('room-title').textContent = roomInfo?.name || roomName || t('room');
      const idBtn = document.getElementById('room-id-btn');
      idBtn.textContent = roomId ? `${roomId.slice(0, 12)}…` : '—';
      idBtn.dataset.full = roomId || '';

      const candidates = roomInfo?.candidates || {};
      Object.entries(candidates).forEach(([id, c]) => {
        addOrUpdateParticipant(id, {
          name: c?.name ?? null,
          isAdmin: !!c?.is_admin,
          muted: !!c?.muted,
          mutedBy: c?.muted_by || null,
          deafen: !!c?.deafen,
          camOn: c?.cam_on == null ? true : !!c?.cam_on,
          reaction: c?.reaction ?? null,
          ip: c?.ip ?? null,
          isLocal: id === candidateId,
        });
      });

      addOrUpdateParticipant(candidateId, {
        name: candidateInfo?.name ?? myName,
        isAdmin: !!candidateInfo?.is_admin,
        isLocal: true,
        muted: !micOn,
        mutedBy: candidateInfo?.muted_by || null,
        deafen: deafenOn,
        camOn,
        reaction: myReaction,
        ip: candidateInfo?.ip ?? null,
      });
      setControlIcon('ico-mic', micOn ? 'mic_on' : 'mic_off');
      setControlIcon('ico-cam', camOn ? 'cam_on' : 'cam_off');
      setControlIcon('ico-deafen', deafenOn ? 'deafen_on' : 'deafen_off');
      document.getElementById('btn-mic').classList.toggle('ctrl-btn-on', micOn);
      document.getElementById('btn-mic').classList.toggle('ctrl-btn-off', !micOn);
      document.getElementById('btn-cam').classList.toggle('ctrl-btn-on', camOn);
      document.getElementById('btn-cam').classList.toggle('ctrl-btn-off', !camOn);
      document.getElementById('btn-deafen').classList.toggle('ctrl-btn-on', !deafenOn);
      document.getElementById('btn-deafen').classList.toggle('ctrl-btn-off', deafenOn);
      applyRemotePlaybackState();
      updateReactionButton();
      refreshRemoteVideoBinding();
    }

    async function leaveRoom(reason = 'left', detail = '') {
      if (roomTerminated) return;
      roomTerminated = true;
      dlog('leave');
      sendRtcMsg({ type: 'user_leave' });
      await new Promise(resolve => setTimeout(resolve, 120));
      teardownVAD();
      removeAllSimUsers();
      try { negotiationChannel?.close(); } catch {}
      try { serverChannel?.close(); } catch {}
      try { pc?.close(); } catch {}
      negotiationChannel = null;
      serverChannel = null;
      remoteStreams.clear();
      trackMidMap.clear();
      pc = null;
      if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }

      participants.clear();
      chatMap.clear();
      speakerTimers.clear();
      pendingMediaMeta.clear();
      pendingMediaChunks.clear();
      pendingMediaUi.clear();
      pendingUploadUi.clear();
      document.getElementById('video-grid').innerHTML = '';
      document.getElementById('chat-log').innerHTML = '';
      document.getElementById('side-users').innerHTML = '';
      document.getElementById('side-debug-log').innerHTML = '';
      document.getElementById('sim-user-list').innerHTML = '';
      notifyRoomTerminated(reason, detail);
      showRoomEndModal(reason, detail);
      window.parent?.postMessage({ type: 'event', event: 'disconnected' }, '*');
    }

    // ===================== Simulated Users =====================

    function setAddSimUserPending(pending) {
      simUserAdding = !!pending;
      const btn = document.getElementById('btn-add-sim-user');
      const label = document.getElementById('btn-add-sim-label');
      const icon = document.getElementById('btn-add-sim-icon');
      if (!btn || !label) return;
      btn.disabled = simUserAdding;
      label.textContent = simUserAdding
        ? (language === 'en' ? 'Adding…' : '添加中…')
        : t('addSimUser');
      if (icon) {
        icon.innerHTML = simUserAdding
          ? `<svg class="animate-spin" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.6"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle><path d="M22 12a10 10 0 0 0-10-10" stroke-linecap="round"></path></svg>`
          : `<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>`;
      }
    }

    async function addSimUser() {
      const me = participants.get(candidateId);
      if (!me?.isAdmin) { toast('仅管理员可添加模拟用户'); return; }
      if (!roomId) { toast('Not in a room'); return; }
      if (simUserAdding) return;
      setAddSimUserPending(true);
      const n = simUsers.length + 1;
      const simUserName = `Fake User ${n}`;
      dlog(`sim: creating ${simUserName}`);

      // --- Canvas video: 320x240 showing HH:MM:SS.mmm with slowly-changing background ---
      const canvas = document.createElement('canvas');
      canvas.width = 320; canvas.height = 240;
      const ctx = canvas.getContext('2d');
      let hue = Math.random() * 360;
      const drawInterval = setInterval(() => {
        hue = (hue + 0.4) % 360;
        ctx.fillStyle = `hsl(${Math.round(hue)}, 50%, 32%)`;
        ctx.fillRect(0, 0, 320, 240);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const now = new Date();
        const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
        ctx.fillText(ts, 160, 100);
        ctx.font = '18px sans-serif';
        ctx.fillText(simUserName, 160, 160);
      }, 50);
      const canvasStream = canvas.captureStream(20);

      // --- Test audio: fetch MP3 from server, decode, loop through WebRTC ---
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
      if (audioCtx.state === 'suspended') {
        try { await audioCtx.resume(); } catch (e) { dlog(`sim-${n} audioCtx resume failed: ${e?.message || e}`); }
      }
      const audioDest = audioCtx.createMediaStreamDestination();
      let _ttsAborted = false;
      let _testAudioBuf = null; // cached decoded AudioBuffer

      async function _ttsLoop() {
        // Fetch & decode the test MP3 once
        try {
          const resp = await fetch('/api/test-audio/test.mp3');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const arrayBuf = await resp.arrayBuffer();
          _testAudioBuf = await audioCtx.decodeAudioData(arrayBuf);
        } catch (e) {
          dlog(`sim-${n} failed to load test audio: ${e?.message || e}`);
          return;
        }
        // Loop: play → 1s pause → play → ...
        while (!_ttsAborted && audioCtx.state !== 'closed') {
          try {
            await new Promise((resolve) => {
              const src = audioCtx.createBufferSource();
              src.buffer = _testAudioBuf;
              src.connect(audioDest);
              src.onended = resolve;
              src.start();
            });
          } catch (e) {
            dlog(`sim-${n} audio play error: ${e?.message || e}`);
          }
          if (!_ttsAborted) await new Promise(r => setTimeout(r, 1000));
        }
      }
      _ttsLoop(); // fire-and-forget, loops until _ttsAborted or audioCtx closed

      // --- WebRTC PeerConnection (same flow as the real user) ---
      const simPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      const videoTrack = canvasStream.getVideoTracks()[0];
      if (videoTrack) simPc.addTrack(videoTrack, canvasStream);
      // Add the TTS audio track (goes through WebRTC like a real mic)
      const audioTrack = audioDest.stream.getAudioTracks()[0];
      if (audioTrack) simPc.addTrack(audioTrack, audioDest.stream);

      const simNegCh = simPc.createDataChannel('__negotiation__');
      simNegCh.onopen = () => dlog(`sim-${n} neg-dc open`);
      let simServerCh = null;
      simPc.ondatachannel = (ev) => {
        simServerCh = ev.channel;
        simServerCh.onmessage = async (e) => {
          const raw = String(e.data);
          dlog(`sim-${n} recv: ${raw.slice(0, 60)}`);
          try {
            const msg = JSON.parse(raw);
            if (msg.type === 'renegotiate_needed') {
              try {
                // Add recvonly transceivers for server-added tracks
                if (msg.add_transceivers && Array.isArray(msg.add_transceivers)) {
                  for (const t of msg.add_transceivers) {
                    simPc.addTransceiver(t.kind, { direction: 'recvonly' });
                  }
                }
                const offer = await simPc.createOffer();
                await simPc.setLocalDescription(offer);
                simServerCh.send(JSON.stringify({ type: 'renegotiate_offer', sdp: simPc.localDescription.sdp }));
                dlog(`sim-${n} renegotiation offer sent`);
              } catch (e) { dlog(`sim-${n} renegotiation error: ${e?.message || e}`); }
            } else if (msg.type === 'renegotiate_answer') {
              try {
                await simPc.setRemoteDescription({ sdp: msg.sdp, type: 'answer' });
                dlog(`sim-${n} renegotiation done`);
              } catch (e) { dlog(`sim-${n} renegotiation answer error: ${e?.message || e}`); }
            }
          } catch {}
        };
      };
      simPc.onconnectionstatechange = () => dlog(`sim-${n} conn=${simPc.connectionState}`);
      simPc.oniceconnectionstatechange = () => dlog(`sim-${n} ice=${simPc.iceConnectionState}`);

      try {
        const offer = await simPc.createOffer();
        await simPc.setLocalDescription(offer);
        await new Promise((resolve) => {
          if (simPc.iceGatheringState === 'complete') { resolve(); return; }
          const h = () => { if (simPc.iceGatheringState === 'complete') { simPc.removeEventListener('icegatheringstatechange', h); resolve(); } };
          simPc.addEventListener('icegatheringstatechange', h);
          setTimeout(resolve, 5000);
        });

        const joinRes = await fetch(rtcRoomUrls.join || '/rtc_room/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sdp: simPc.localDescription.sdp,
            type: simPc.localDescription.type,
            token: null,
            room_id: roomId,
            password: initPw || null,
            user_name: simUserName,
          }),
        });
        if (!joinRes.ok) throw new Error(await joinRes.text());
        const joinData = await joinRes.json();
        await simPc.setRemoteDescription({ sdp: joinData.sdp, type: joinData.type });
        dlog(`sim-${n} joined cid=${joinData.candidate_info?.id?.slice(0,8)}`);

        const sim = {
          n, name: simUserName,
          candidateId: joinData.candidate_info?.id || null,
          pc: simPc, canvas, drawInterval, audioCtx,
          _ttsAbort() { _ttsAborted = true; },
        };
        simUsers.push(sim);
        renderSimUserList();
        toast(`${simUserName} joined`);
      } catch (err) {
        dlog(`sim-${n} error: ${err?.message || err}`);
        toast(`Sim user failed: ${err?.message || err}`);
        clearInterval(drawInterval);
        _ttsAborted = true;
        try { audioCtx?.close(); } catch {}
        try { simPc?.close(); } catch {}
      } finally {
        setAddSimUserPending(false);
      }
    }

    function removeSimUser(index) {
      const me = participants.get(candidateId);
      if (!me?.isAdmin) return;
      const sim = simUsers[index];
      if (!sim) return;
      dlog(`sim: removing ${sim.name}`);
      clearInterval(sim.drawInterval);
      if (sim._ttsAbort) sim._ttsAbort();
      try { sim.audioCtx?.close(); } catch {}
      try { sim.pc?.close(); } catch {}
      simUsers.splice(index, 1);
      renderSimUserList();
    }

    function removeAllSimUsers() {
      while (simUsers.length) removeSimUser(0);
    }

    function renderSimUserList() {
      const list = document.getElementById('sim-user-list');
      if (!list) return;
      list.innerHTML = '';
      const me = participants.get(candidateId);
      const iAmAdmin = !!me?.isAdmin;
      simUsers.forEach((sim, idx) => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between bg-slate-100 dark:bg-slate-800 rounded px-2 py-1';
        const label = document.createElement('span');
        label.textContent = `${sim.name} (${(sim.candidateId || '?').slice(0, 8)})`;
        const btn = document.createElement('button');
        btn.className = 'text-xs px-1.5 py-0.5 rounded bg-red-600 text-white hover:bg-red-500';
        btn.textContent = t('removeSimUser');
        btn.onclick = () => removeSimUser(idx);
        row.append(label);
        if (iAmAdmin) row.append(btn);
        list.appendChild(row);
      });
    }

    // ===================== End Simulated Users =====================

    function copyRoomId() {
      const full = document.getElementById('room-id-btn').dataset.full;
      if (!full) return;
      navigator.clipboard.writeText(full).then(() => toast(t('copyOk')));
    }

    function initSidebarResizer() {
      const sidebar = document.getElementById('right-sidebar');
      const resizer = document.getElementById('sidebar-resizer');
      if (!sidebar || !resizer) return;
      let resizing = false;

      const onMove = (e) => {
        if (!resizing) return;
        if (rightSidebarCollapsed) return;
        if (window.innerWidth <= 900) return;
        const x = Number(e.clientX || 0);
        const maxW = Math.min(Math.floor(window.innerWidth * 0.72), 700);
        const minW = 260;
        const w = Math.max(minW, Math.min(maxW, window.innerWidth - x));
        sidebar.style.width = `${w}px`;
      };

      const onUp = () => {
        if (!resizing) return;
        resizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      };

      resizer.addEventListener('mousedown', (e) => {
        if (rightSidebarCollapsed || window.innerWidth <= 900) return;
        e.preventDefault();
        resizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });

      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

    window.addEventListener('message', ev => {
      const data = ev.data;
      if (!data) return;

      if (data.type === 'ui-config') {
        applyUiConfig(data);
        return;
      }

      if (data.type === 'cmd') {
        if (data.cmd === 'leave') leaveRoom();
        if (data.cmd === 'set-dark' && typeof data.value === 'boolean') { darkMode = data.value; applyTheme(); }
        if (data.cmd === 'toggle-dark') { darkMode = !darkMode; applyTheme(); }
        if (data.cmd === 'set-language' && typeof data.value === 'string' && I18N[data.value]) { language = data.value; applyLanguage(); }
        if (data.cmd === 'set-debug' && typeof data.value === 'boolean') { debugMode = data.value; applyDebugUi(); dlog(`debug=${debugMode}`); }
        if (data.cmd === 'set-show-dark-button' && typeof data.value === 'boolean') { showDarkButton = data.value; applyTheme(); }
        if (data.cmd === 'set-show-language-button' && typeof data.value === 'boolean') { showLangButton = data.value; applyLanguage(); }
        ev.source?.postMessage({ type: 'event', event: 'ack', cmd: data.cmd }, '*');
      }
    });

    window.addEventListener('resize', layoutTiles);
    document.addEventListener('click', () => {
      closeContextMenu();
      document.getElementById('reaction-menu').classList.add('hidden');
      document.getElementById('emoji-menu').classList.add('hidden');
    });

    document.getElementById('reaction-menu').addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('reaction-btn').addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('emoji-menu').addEventListener('click', (e) => e.stopPropagation());

    document.getElementById('user-info-modal').addEventListener('click', (e) => {
      if (e.target && e.target.id === 'user-info-modal') closeUserInfoModal();
    });

    document.getElementById('rename-modal').addEventListener('click', (e) => {
      if (e.target && e.target.id === 'rename-modal') closeRenameModal();
    });

    document.getElementById('audio-settings-modal').addEventListener('click', (e) => {
      if (e.target && e.target.id === 'audio-settings-modal') closeSettingsModal();
    });

    document.getElementById('vad-enable-input').addEventListener('change', (e) => {
      vadEnabled = !!e.target?.checked;
      updateVadUiState();
      startVAD();
    });

    document.getElementById('vad-sensitivity-input').addEventListener('input', (e) => {
      const raw = Number(e.target?.value || vadSensitivity);
      vadSensitivity = Math.min(0.08, Math.max(0.003, Number.isFinite(raw) ? raw : vadSensitivity));
      updateVadUiState();
    });

    document.getElementById('mic-gain-input').addEventListener('input', (e) => {
      const val = Number(e.target?.value || 1);
      micGain = Math.max(1, Math.min(3, Number.isFinite(val) ? val : 1));
      document.getElementById('mic-gain-value').textContent = `${micGain.toFixed(1)}x`;
      applyMicGain();
    });

    document.getElementById('speaker-gain-input').addEventListener('input', (e) => {
      const val = Number(e.target?.value || 1);
      speakerGain = Math.max(1, Math.min(3, Number.isFinite(val) ? val : 1));
      document.getElementById('speaker-gain-value').textContent = `${speakerGain.toFixed(1)}x`;
      applyRemotePlaybackState();
    });

    document.getElementById('settings-mic-select').addEventListener('change', (e) => {
      if (e.target?.value) switchDevice('audio', e.target.value);
    });

    document.getElementById('settings-cam-select').addEventListener('change', (e) => {
      if (e.target?.value) switchDevice('video', e.target.value);
    });

    document.getElementById('settings-speaker-select').addEventListener('change', (e) => {
      if (e.target?.value) switchSpeakerDevice(e.target.value);
    });

    document.getElementById('media-preview').addEventListener('click', (e) => {
      if (e.target && e.target.id === 'media-preview') closeMediaPreview();
    });

    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    document.getElementById('chat-input').addEventListener('paste', async (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) {
            e.preventDefault();
            await sendAttachmentFile(file);
            return;
          }
        }
      }
    });

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const input = e.target;
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        await sendAttachmentFile(file);
      } catch (err) {
        console.error(err);
        toast(String(err?.message || err));
      }
      input.value = '';
    });

    (async function init() {
      setSideTab('chat');
      setSettingsTab('devices');
      buildEmojiMenu();
      buildReactionMenu();
      updateVadUiState();
      updateVadTestPanel();
      applyTheme();
      applyLanguage();
      applyDebugUi();
      updateReactionButton();
      initSidebarResizer();
      if (window.innerWidth < 900) {
        rightSidebarCollapsed = true;
        document.getElementById('right-sidebar').classList.add('sidebar-collapsed');
      }
      syncSidebarEdgeToggle();
      window.parent?.postMessage({ type: 'event', event: 'ui_ready' }, '*');
      if (initMode !== 'create' && initMode !== 'join') { showError(t('badParams')); return; }
      try { await startSession(initMode, initAudio, initVideo); }
      catch (e) { console.error(e); showError(e?.message || t('connectFail')); }
    })();
  </script>
</body>
</html>
