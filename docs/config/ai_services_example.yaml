# Framework AI services config example
#
# 加载顺序：
#   1. 环境变量 __AI_SERVICES_CONFIG__
#   2. 自动发现 config/ai_services.{yaml,yml,json,toml}
#   3. 如果都没有，则 AIServicesConfig.Global() 返回 None，业务侧走默认实现/空配置
#
# 这份文件不属于 server.yaml；它由 AIServicesConfig 独立加载。

completion:
  # 每个 service kind 自己维护一份 clients，key 只在本分组内生效，
  # 可以和别的 service kind 重名而不冲突。
  clients:
    openai:
      type: openai
      apikey: ${OPENAI_API_KEY}
      model: gpt-4.1-mini

    # 自定义 adapter 示例：
    # custom-vibe:
    #   type: custom
    #   adapter: file:///C:/Users/name/adapters/sayo.py
    #   model: opus-4.6
    #   x_is_human: ${VIBE_X_IS_HUMAN}
    #   max_tokens: 32000
    #   max_images: 0
    #   max_audios: 0
    #   max_videos: 0

  service:
    default:
      clients:
        - openai
        # service-local client scheduling values live on the binding, not on service init.
        # Omit priority/strategy_lvl to use the client's own defaults.
        # - client: openai
        #   priority: 0.5
        #   strategy_lvl: 1

embedding:
  clients:
    openai:
      type: openai
      apikey: ${OPENAI_API_KEY}
      model: text-embedding-3-small

    thinkthinksyn:
      type: thinkthinksyn
      model: zpoint

    # custom-embedding:
    #   type: custom
    #   adapter: file:///C:/Users/name/adapters/my_embedding.py
    #   max_tokens: 8192
    #   support_image: false
    #   support_audio: false
    #   support_video: false

  service:
    default:
      clients:
        - openai
        # - thinkthinksyn

s2t:
  clients:
    openai:
      type: openai
      apikey: ${OPENAI_API_KEY}
      model: whisper-1

    # OpenRouter 的 transcription 接口使用 JSON + base64 音频格式。
    # openrouter:
    #   type: openrouter
    #   apikey: ${OPENROUTER_API_KEY}
    #   model: openai/whisper-1
  service:
    default:
      clients:
        - openai
        # - openrouter
      # S2T 也可以显式引用 completion service 做适配，由子类自己解析。
      # completion_service: default

t2s:
  clients:
    openai:
      type: openai
      apikey: ${OPENAI_API_KEY}
      model: tts-1
  service:
    default:
      clients:
        - openai
