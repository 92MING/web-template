<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/filled/bank.svg" type="image/svg+xml">
<title>教室聊天室 - 在线课堂</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/data.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
  <script type="module" src="/shared/components/media.js"></script>
  <script type="module" src="/shared/templates/chat.js"></script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top right, color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 90%), transparent 280px),
      linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    color: var(--builtin-color-text, #111827);
    font-family: system-ui, sans-serif;
  }
  .room-shell {
    height: 100vh;
  }
  .room-sidebar {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: color-mix(in srgb, var(--builtin-surface, #ffffff), transparent 8%);
  }
  .sidebar-head {
    padding: 18px 16px;
    border-bottom: 1px solid var(--builtin-border-soft, #e5e7eb);
    display: grid;
    gap: 6px;
  }
  .sidebar-eyebrow {
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--builtin-primary, #2563eb);
    font-weight: 800;
  }
  .sidebar-title {
    font-size: 18px;
    font-weight: 800;
  }
  .sidebar-copy {
    font-size: 13px;
    line-height: 1.6;
    color: var(--builtin-color-muted, #6b7280);
  }
  .room-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    gap: 8px;
    align-content: start;
  }
  .room-row {
    display: grid;
    gap: 4px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid transparent;
    cursor: pointer;
    background: transparent;
    transition: background .16s ease, border-color .16s ease, transform .16s ease;
  }
  .room-row:hover {
    background: rgba(255, 255, 255, 0.78);
    border-color: var(--builtin-border-soft, #e5e7eb);
    transform: translateY(-1px);
  }
  .room-row.active {
    background: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 88%);
    border-color: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 50%);
  }
  .room-name {
    font-size: 14px;
    font-weight: 800;
  }
  .room-preview,
  .room-meta,
  .meeting-dock-meta,
  .member-meta,
  .homework-meta,
  .meeting-meta,
  .timeline-meta,
  .banner-meta,
  .system-event-meta,
  .whiteboard-meta,
  .field-help,
  .meeting-dock-empty,
  .meeting-empty,
  .homework-empty,
  .whiteboard-empty,
  .timeline-empty,
  .thread-empty,
  .search-empty,
  .file-filter-empty {
    font-size: 12px;
    line-height: 1.55;
    color: var(--builtin-color-muted, #6b7280);
  }
  .sidebar-section {
    padding: 10px;
    border-top: 1px solid var(--builtin-border-soft, #e5e7eb);
    display: grid;
    gap: 8px;
  }
  .sidebar-section-head,
  .info-section-head,
  .chat-header,
  .meeting-stage-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .sidebar-section-title,
  .info-label {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--builtin-color-muted, #6b7280);
  }
  .meeting-dock-list,
  .timeline-list,
  .meeting-list,
  .homework-list-panel,
  .homework-review-list,
  .member-list,
  .shared-files,
  .search-results,
  .search-panel {
    display: grid;
    gap: 10px;
  }
  .meeting-dock-item,
  .timeline-card,
  .meeting-card,
  .homework-card,
  .homework-review-card,
  .system-event-card,
  .banner-card,
  .search-result-item {
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.92);
    padding: 12px 14px;
    display: grid;
    gap: 8px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  }
  .meeting-dock-item.live {
    border-color: color-mix(in srgb, #059669, transparent 55%);
    background: color-mix(in srgb, #059669, transparent 92%);
  }
  .meeting-dock-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 42px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 50%);
    background: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 88%);
    color: var(--builtin-primary, #2563eb);
    cursor: pointer;
    font: inherit;
    font-weight: 800;
  }
  .chat-header {
    width: 100%;
    flex-wrap: wrap;
  }
  .chat-header-main {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .chat-title {
    margin: 0;
    font-size: 19px;
    font-weight: 900;
  }
  .chat-subtitle {
    font-size: 12px;
    line-height: 1.5;
    color: var(--builtin-color-muted, #6b7280);
  }
  .chat-header-actions,
  .banner-actions,
  .system-event-actions,
  .meeting-actions,
  .homework-actions,
  .planner-actions,
  .submission-actions,
  .meeting-stage-actions,
  .meeting-tab-row,
  .file-filter-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .ghost-btn,
  .send-btn,
  .logout-btn,
  .file-filter-btn,
  .file-jump-btn {
    min-height: 36px;
    padding: 0 12px;
    border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.94);
    color: var(--builtin-color-text, #111827);
    cursor: pointer;
    font: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-decoration: none;
    box-sizing: border-box;
  }
  .ghost-btn:hover,
  .logout-btn:hover,
  .file-filter-btn:hover,
  .file-jump-btn:hover {
    background: #ffffff;
  }
  .send-btn {
    background: var(--builtin-primary, #2563eb);
    border-color: var(--builtin-primary, #2563eb);
    color: #ffffff;
  }
  .send-btn:hover {
    background: var(--builtin-primary-hover, #1d4ed8);
  }
  .file-filter-btn.active {
    border-color: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 42%);
    background: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 89%);
    color: var(--builtin-primary, #2563eb);
  }
  .thread-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
    background:
      radial-gradient(circle at top right, color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 86%), transparent 260px),
      rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(10px);
  }
  .thread-banner {
    padding: 16px 18px 0;
    display: grid;
    gap: 12px;
  }
  .banner-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .thread-list {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: grid;
    gap: 12px;
    align-content: start;
  }
  .thread-empty {
    padding: 30px 18px;
    text-align: center;
  }
  .message-day-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin: 8px 0 4px;
    color: var(--builtin-color-muted, #6b7280);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .message-day-divider::before,
  .message-day-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: color-mix(in srgb, var(--builtin-border-soft, #e5e7eb), transparent 20%);
  }
  .message-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 88%;
  }
  .message-row.self {
    margin-left: auto;
    flex-direction: row-reverse;
  }
  .message-row.compact {
    margin-top: -4px;
  }
  .message-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 82%);
    color: var(--builtin-primary, #2563eb);
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .message-row.compact .message-avatar {
    visibility: hidden;
  }
  .message-card {
    min-width: 0;
    padding: 12px 14px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
  }
  .message-row.self .message-card {
    background: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 88%);
    border-color: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 55%);
  }
  .message-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .message-author {
    font-size: 13px;
    font-weight: 800;
  }
  .message-time {
    font-size: 11px;
    color: var(--builtin-color-muted, #6b7280);
  }
  .message-body {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message-attachments {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }
  .attachment-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.8);
  }
  .compose-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    flex-wrap: wrap;
  }
  .compose-input-wrap {
    flex: 1;
    min-width: 240px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
  }
  .compose-input {
    flex: 1;
    min-width: 0;
    border: 0;
    outline: 0;
    background: transparent;
    font: inherit;
    color: inherit;
  }
  .file-chip {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 90%);
    color: var(--builtin-primary, #2563eb);
    font-size: 12px;
    font-weight: 700;
  }
  .file-chip.visible {
    display: inline-flex;
  }
  .info-stack {
    display: grid;
    gap: 12px;
  }
  .info-section {
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.9);
    padding: 14px;
    display: grid;
    gap: 10px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
  }
  .info-room-name {
    font-size: 18px;
    font-weight: 900;
  }
  .calendar-shell,
  .whiteboard-preview {
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    border-radius: 18px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.86);
  }
  .whiteboard-preview img,
  .meeting-whiteboard-viewer img {
    display: block;
    width: 100%;
    height: auto;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 24px;
    padding: 0 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .04em;
    text-transform: uppercase;
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    background: rgba(255, 255, 255, 0.92);
  }
  .status-pill.live {
    background: color-mix(in srgb, #059669, transparent 88%);
    color: #047857;
    border-color: color-mix(in srgb, #059669, transparent 55%);
  }
  .status-pill.scheduled {
    background: color-mix(in srgb, #2563eb, transparent 90%);
    color: #1d4ed8;
    border-color: color-mix(in srgb, #2563eb, transparent 52%);
  }
  .status-pill.pending,
  .status-pill.submitted,
  .status-pill.graded,
  .status-pill.ended,
  .status-pill.published {
    color: #374151;
  }
  .search-result-item {
    width: 100%;
    text-align: left;
    cursor: pointer;
    font: inherit;
    box-sizing: border-box;
  }
  .search-result-title {
    font-size: 13px;
    font-weight: 800;
  }
  .search-result-meta {
    font-size: 11px;
    color: var(--builtin-color-muted, #6b7280);
  }
  .homework-review-summary {
    font-size: 13px;
    line-height: 1.6;
    color: var(--builtin-color-muted, #6b7280);
  }
  .drawer-form {
    display: grid;
    gap: 12px;
  }
  .field-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--builtin-color-muted, #6b7280);
    margin-bottom: 6px;
  }
  .field-input,
  .field-textarea,
  .field-select {
    width: 100%;
    min-height: 40px;
    padding: 10px 12px;
    border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: 12px;
    box-sizing: border-box;
    font: inherit;
    color: inherit;
    background: rgba(255, 255, 255, 0.96);
  }
  .field-textarea {
    min-height: 110px;
    resize: vertical;
  }
  .meeting-stage {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: min(760px, calc(100vw - 32px));
    height: min(72vh, 760px);
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 70%);
    background: rgba(255, 255, 255, 0.98);
    box-shadow: 0 28px 90px rgba(15, 23, 42, 0.26);
    z-index: 40;
  }
  .meeting-stage[hidden] {
    display: none;
  }
  .meeting-stage-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--builtin-border-soft, #e5e7eb);
    background: linear-gradient(180deg, color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 91%) 0%, #ffffff 100%);
  }
  .meeting-stage-title {
    font-size: 16px;
    font-weight: 900;
  }
  .meeting-tab-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--builtin-border-soft, #e5e7eb);
  }
  .meeting-stage-body {
    min-height: 0;
    display: grid;
  }
  .meeting-pane {
    display: none;
    min-height: 0;
  }
  .meeting-pane.active {
    display: block;
    height: 100%;
  }
  .meeting-frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: #0f172a;
  }
  .meeting-whiteboard-pane {
    height: 100%;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
  }
  .meeting-whiteboard-body {
    min-height: 0;
    padding: 12px;
  }
  .meeting-whiteboard-viewer {
    border: 1px solid var(--builtin-border-soft, #e5e7eb);
    border-radius: 18px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    padding: 14px;
    box-sizing: border-box;
    min-height: 100%;
    overflow: auto;
  }
  @media (max-width: 960px) {
    .chat-header {
      align-items: stretch;
    }
    .chat-header-actions {
      width: 100%;
    }
  }
  @media (max-width: 720px) {
    .compose-bar {
      align-items: stretch;
    }
    .compose-input-wrap {
      width: 100%;
    }
    .message-row {
      max-width: 100%;
    }
    .meeting-stage {
      right: 8px;
      bottom: 8px;
      width: calc(100vw - 16px);
      height: min(78vh, 720px);
    }
  }
</style>
</head>
<body>
<builtin-tpl-chat-room id="chat-room" class="room-shell" chat-name="教室聊天室" status="Text chat">
  <div slot="sidebar" class="room-sidebar">
    <div class="sidebar-head">
      <div class="sidebar-eyebrow" id="sidebar-eyebrow">文字频道</div>
      <div class="sidebar-title" id="sidebar-title">教室聊天室</div>
      <div class="sidebar-copy" id="sidebar-copy">像 Discord 一样在不同教室切换频道，像 WhatsApp 一样顺手发送文字和附件。</div>
    </div>
    <div id="room-list" class="room-list"></div>
    <section class="sidebar-section">
      <div class="sidebar-section-head">
        <div class="sidebar-section-title" id="meeting-dock-title">课堂会议</div>
        <button id="btn-open-planner" class="ghost-btn" type="button" hidden>
          <builtin-icon name="plus" size="16"></builtin-icon>
          <span id="planner-open-label">安排</span>
        </button>
      </div>
      <div id="meeting-dock-list" class="meeting-dock-list"></div>
      <button id="meeting-minimized-chip" class="meeting-dock-chip" type="button" hidden></button>
    </section>
  </div>

  <div slot="header" class="chat-header">
    <div class="chat-header-main">
      <builtin-icon name="message" size="20"></builtin-icon>
      <div>
        <h1 id="room-title" class="chat-title">教室聊天室</h1>
        <div id="room-subtitle" class="chat-subtitle">加载中...</div>
      </div>
    </div>
    <div class="chat-header-actions">
      <button id="btn-calendar" class="ghost-btn" type="button"><builtin-icon name="calendar" size="16"></builtin-icon><span id="calendar-label">课程日历</span></button>
      <button id="btn-live-class" class="ghost-btn" type="button" hidden><builtin-icon name="video-camera" size="16"></builtin-icon><span id="live-class-label">立即开课</span></button>
      <button id="btn-schedule-class" class="ghost-btn" type="button" hidden><builtin-icon name="schedule" size="16"></builtin-icon><span id="schedule-class-label">预约课堂</span></button>
      <button id="btn-search-toggle" class="ghost-btn" type="button"><builtin-icon name="search" size="16"></builtin-icon><span id="search-label">搜索</span></button>
      <a id="btn-back-link" class="ghost-btn" href="student.html"><builtin-icon name="left" size="16"></builtin-icon><span id="back-label">返回学生端</span></a>
      <builtin-lang-switcher id="lang-switcher" display="buttons" langs='[{"code":"zh-cn","label":"中"},{"code":"en","label":"EN"}]' current="zh-cn"></builtin-lang-switcher>
      <builtin-theme-toggle size="20"></builtin-theme-toggle>
      <button id="btn-logout" class="logout-btn" type="button">退出</button>
    </div>
  </div>

  <div slot="messages" class="thread-shell">
    <div id="thread-banner" class="thread-banner"></div>
    <div id="chat-messages" class="thread-list"></div>
  </div>

  <div slot="footer" class="compose-bar">
    <div class="compose-input-wrap">
      <input id="chat-input" class="compose-input" type="text" placeholder="输入消息...">
      <button id="btn-attach" class="ghost-btn" type="button"><builtin-icon name="paper-clip" size="16"></builtin-icon><span id="attach-label">附件</span></button>
    </div>
    <div id="file-chip" class="file-chip">
      <builtin-icon name="paper-clip" size="14"></builtin-icon>
      <span id="file-chip-name" class="file-chip-name"></span>
    </div>
    <input id="chat-file" type="file" hidden>
    <button id="btn-chat" class="send-btn" type="button"><builtin-icon name="send" size="16"></builtin-icon><span id="send-label">发送</span></button>
  </div>

  <div slot="info" class="info-stack">
    <section class="info-section">
      <div id="info-room-label" class="info-label">房间</div>
      <div id="info-room-name" class="info-room-name">教室聊天室</div>
      <div id="info-room-meta" class="member-meta"></div>
    </section>
    <section class="info-section">
      <div id="info-calendar-label" class="info-label">课程日历</div>
      <div class="calendar-shell">
        <builtin-calendar id="class-calendar" view="month" mode="embedded"></builtin-calendar>
      </div>
    </section>
    <section class="info-section">
      <div id="info-timeline-label" class="info-label">近期安排</div>
      <div id="timeline-list" class="timeline-list"></div>
    </section>
    <section class="info-section">
      <div id="info-homework-label" class="info-label">作业与提交</div>
      <div id="homework-list-panel" class="homework-list-panel"></div>
    </section>
    <section class="info-section">
      <div id="info-meetings-label" class="info-label">会议列表</div>
      <div id="meeting-list" class="meeting-list"></div>
    </section>
    <section class="info-section">
      <div id="info-whiteboard-label" class="info-label">老师白板</div>
      <div id="whiteboard-preview-panel" class="whiteboard-preview"></div>
    </section>
    <section class="info-section">
      <div id="info-members-label" class="info-label">成员</div>
      <div id="member-list" class="member-list"></div>
    </section>
    <section class="info-section">
      <div class="info-section-head">
        <div id="info-files-label" class="info-label">共享文件</div>
        <div id="file-filter-empty" class="file-filter-empty"></div>
      </div>
      <div id="file-filter-row" class="file-filter-row">
        <button type="button" class="file-filter-btn active" data-file-filter="all">全部</button>
        <button type="button" class="file-filter-btn" data-file-filter="image">图片</button>
        <button type="button" class="file-filter-btn" data-file-filter="doc">文档</button>
        <button type="button" class="file-filter-btn" data-file-filter="media">媒体</button>
        <button type="button" class="file-filter-btn" data-file-filter="other">其他</button>
      </div>
      <div id="shared-files" class="shared-files"></div>
    </section>
  </div>
</builtin-tpl-chat-room>

<builtin-drawer id="search-drawer" placement="right" size="360px">
  <span slot="title" id="search-drawer-title">搜索聊天记录</span>
  <div class="search-panel">
    <input id="search-input" class="field-input" type="text" placeholder="搜索...">
    <div id="search-results" class="search-results"></div>
  </div>
</builtin-drawer>

<builtin-drawer id="planner-drawer" placement="right" size="420px">
  <span slot="title" id="planner-drawer-title">安排课堂</span>
  <form id="planner-form" class="drawer-form">
    <label>
      <div id="planner-type-label" class="field-label">安排类型</div>
      <select id="planner-type" class="field-select">
        <option value="homework">作业</option>
        <option value="meeting">线上课堂</option>
      </select>
    </label>
    <label>
      <div id="planner-title-label" class="field-label">标题</div>
      <input id="planner-title" class="field-input" type="text" maxlength="120">
    </label>
    <label>
      <div id="planner-description-label" class="field-label">说明</div>
      <textarea id="planner-description" class="field-textarea"></textarea>
    </label>
    <label id="planner-due-field">
      <div id="planner-due-label" class="field-label">截止时间</div>
      <input id="planner-due-at" class="field-input" type="datetime-local">
    </label>
    <label id="planner-scheduled-field" hidden>
      <div id="planner-scheduled-label" class="field-label">开课时间</div>
      <input id="planner-scheduled-at" class="field-input" type="datetime-local">
    </label>
    <label id="planner-meeting-mode-field" hidden>
      <div id="planner-mode-label" class="field-label">课堂模式</div>
      <select id="planner-meeting-mode" class="field-select">
        <option value="scheduled">预约课堂</option>
        <option value="instant">立即开课</option>
      </select>
    </label>
    <div id="planner-help" class="field-help">老师可以直接从这里把作业和线上课堂放进教室日历。</div>
    <div class="planner-actions">
      <button id="planner-submit" class="send-btn" type="submit">发布</button>
      <button id="planner-cancel" class="ghost-btn" type="button">取消</button>
    </div>
  </form>
</builtin-drawer>

<builtin-drawer id="submission-drawer" placement="right" size="420px">
  <span slot="title" id="submission-drawer-title">提交作业</span>
  <form id="submission-form" class="drawer-form">
    <div id="submission-summary" class="field-help"></div>
    <label>
      <div id="submission-note-label" class="field-label">提交说明</div>
      <textarea id="submission-text" class="field-textarea"></textarea>
    </label>
    <label>
      <div id="submission-file-label" class="field-label">上传文件</div>
      <input id="submission-file" class="field-input" type="file">
    </label>
    <div class="submission-actions">
      <button id="submission-submit" class="send-btn" type="submit">提交</button>
      <button id="submission-cancel" class="ghost-btn" type="button">取消</button>
    </div>
  </form>
</builtin-drawer>

<builtin-drawer id="homework-review-drawer" placement="right" size="420px">
  <span slot="title" id="homework-review-drawer-title">作业提交</span>
  <div class="search-panel">
    <div id="homework-review-summary" class="homework-review-summary"></div>
    <div id="homework-review-list" class="homework-review-list"></div>
  </div>
</builtin-drawer>

<section id="meeting-stage" class="meeting-stage" hidden>
  <div class="meeting-stage-head">
    <div>
      <div id="meeting-stage-title" class="meeting-stage-title">线上课堂</div>
      <div id="meeting-stage-meta" class="meeting-meta"></div>
    </div>
    <div class="meeting-stage-actions">
      <button id="btn-broadcast-whiteboard" class="ghost-btn" type="button" hidden><builtin-icon name="edit" size="16"></builtin-icon><span id="broadcast-whiteboard-label">广播白板</span></button>
      <button id="btn-end-meeting" class="ghost-btn" type="button" hidden><builtin-icon name="phone" size="16"></builtin-icon><span id="end-meeting-label">结束课堂</span></button>
      <button id="btn-minimize-meeting" class="ghost-btn" type="button"><builtin-icon name="fullscreen-exit" size="16"></builtin-icon><span id="minimize-meeting-label">缩到左侧</span></button>
    </div>
  </div>
  <div class="meeting-tab-row">
    <button id="btn-meeting-tab-call" class="ghost-btn" type="button">课堂通话</button>
    <button id="btn-meeting-tab-whiteboard" class="ghost-btn" type="button">白板</button>
  </div>
  <div class="meeting-stage-body">
    <div id="meeting-pane-call" class="meeting-pane active">
      <iframe id="meeting-frame" class="meeting-frame" allow="camera; microphone; display-capture; fullscreen; autoplay"></iframe>
    </div>
    <div id="meeting-pane-whiteboard" class="meeting-pane">
      <div class="meeting-whiteboard-pane">
        <div class="meeting-whiteboard-body">
          <builtin-whiteboard id="meeting-whiteboard" mode="embedded"></builtin-whiteboard>
          <div id="meeting-whiteboard-viewer" class="meeting-whiteboard-viewer" hidden></div>
        </div>
      </div>
    </div>
  </div>
</section>

<script type="module" src="./classroom-app.js?v=20260430-rtc3"></script>
</body>
</html>
