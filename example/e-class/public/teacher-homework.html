<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/filled/bank.svg" type="image/svg+xml">
<title>??????? - ???????</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/data.js"></script>
  <script type="module" src="/shared/components/form.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
<style>
  builtin-app-shell { --builtin-shell-max-width: 1100px; --builtin-shell-secondary-width: 320px; }
</style>
<link rel="stylesheet" href="/eclass-tools.css?v=20260501-1">
</head>
<body>
<builtin-app-shell id="app-shell">
  <section class="card">
    <builtin-schema-form id="hw-form" submit-label="???????" layout="vertical"></builtin-schema-form>
  </section>
  <section class="card list-wrap">
    <h2 style="margin:0 0 1rem;font-size:1.5rem;" data-copy="list_title">????б?</h2>
    <div id="list-state"></div>
    <builtin-data-view id="hw-view" view="cards" page-size="10"></builtin-data-view>
  </section>
  <builtin-card slot="secondary">
    <div slot="header"><strong id="context-title">?????????????</strong></div>
    <builtin-metadata-list id="hw-context" columns="1" compact></builtin-metadata-list>
  </builtin-card>
</builtin-app-shell>

<script type="module">
import { BuiltinToast } from '/shared/components.js?v=20260429-2';
import { createEClassPageShell } from './page-shell.js?v=20260429-2';

const copy = {
  'zh-cn': {
    back: '?????????',
    eyebrow: '????????',
    title: '???????',
    documentTitle: '??????? - ???????',
    lead: '??????????????????????????????????????????',
    list_title: '????б?',
    class_id: '???? ID',
    hw_title: '???????',
    hw_desc: '???????',
    due_at: '??????',
    submit: '???????',
    ok: '????????',
    fill: '????д???? ID ?????',
    contextTitle: '?????????????',
    loadingTitle: '???????????б?',
    loadingDescription: '??????????????????????????',
    emptyTitle: '?????????????',
    emptyDescription: '???????????????????????????????б??',
    errorTitle: '??????????',
    errorDescription: '??????????????????????????',
    classLabel: '???????',
    totalLabel: '???????',
    datedLabel: '?????????',
    undatedLabel: 'δ???????',
    view_labels: {
      search: '????',
      refresh: '???',
      exportCsv: '???? CSV',
      rows: '??',
      page: '??',
      previous: '????',
      next: '????',
      loading: '??????...',
      noData: '???????'
    }
  },
  en: {
    back: 'Back to Teacher',
    eyebrow: 'Teacher Homework',
    title: 'Assign Homework',
    documentTitle: 'Assign Homework - Online Classroom',
    lead: 'Homework creation is split out from home into this dedicated publishing page.',
    list_title: 'Homework List',
    class_id: 'Classroom ID',
    hw_title: 'Homework title',
    hw_desc: 'Description',
    due_at: 'Due date',
    submit: 'Publish homework',
    ok: 'Homework published',
    fill: 'Classroom ID and title are required',
    contextTitle: 'Homework Publish Context',
    loadingTitle: 'Loading homework list',
    loadingDescription: 'Fetching published homework for the selected classroom.',
    emptyTitle: 'No homework published yet',
    emptyDescription: 'Published homework will appear here after you create the first assignment.',
    errorTitle: 'Failed to load homework',
    errorDescription: 'Try again in a moment or return to the teacher workspace.',
    classLabel: 'Classroom',
    totalLabel: 'Homework',
    datedLabel: 'With Deadline',
    undatedLabel: 'Without Deadline',
    view_labels: {
      search: 'Search',
      refresh: 'Refresh',
      exportCsv: 'Export CSV',
      rows: 'rows',
      page: 'page',
      previous: 'Previous',
      next: 'Next',
      loading: 'Loading...',
      noData: 'No homework yet'
    }
  }
};

const shell = createEClassPageShell({
  pageTitleKey: 'eclass.homework',
  translationPath: '/translate.json?v=20260429-2',
  validateRole: (role) => role === 'teacher',
  getInvalidRoleRedirect: () => 'student.html',
  onApplyI18n: async ({ lang: nextLang }) => {
    lang = nextLang;
    applyShellCopy();
    updateForm();
    render();
  },
});

const { $, api } = shell;
const view = $('hw-view');
const form = $('hw-form');
let lang = localStorage.getItem('eclass_lang') || 'zh-cn';

function d() {
  return copy[lang] || copy['zh-cn'];
}

function applyShellCopy() {
  const labels = d();
  document.title = labels.documentTitle;
  const appShell = $('app-shell');
  appShell.eyebrow = labels.eyebrow;
  appShell.title = labels.title;
  appShell.subtitle = labels.lead;
  appShell.backHref = 'teacher.html';
  appShell.backLabel = labels.back;
  appShell.breadcrumbs = [
    { label: labels.back, href: 'teacher.html' },
    { label: labels.title },
  ];
  appShell.userMenuItems = [{ label: lang === 'en' ? 'Sign out' : '???', action: 'logout' }];
  $('context-title').textContent = labels.contextTitle;
}

function renderListState(mode) {
  const labels = d();
  const host = $('list-state');
  if (mode === 'idle') {
    host.innerHTML = '';
    return;
  }
  if (mode === 'loading') {
    host.innerHTML = `<builtin-empty-state preset="loading" heading="${labels.loadingTitle}" description="${labels.loadingDescription}"></builtin-empty-state>`;
    return;
  }
  if (mode === 'error') {
    host.innerHTML = `<builtin-empty-state preset="error" heading="${labels.errorTitle}" description="${labels.errorDescription}" action-label="${labels.back}" action-href="teacher.html"></builtin-empty-state>`;
    return;
  }
  host.innerHTML = `<builtin-empty-state heading="${labels.emptyTitle}" description="${labels.emptyDescription}"></builtin-empty-state>`;
}

function updateContext(list) {
  const classId = (form.getValue()?.class_id) || 'c1';
  const dated = list.filter((item) => !!item.due_at).length;
  $('hw-context').items = [
    { icon: 'book', label: d().classLabel, value: classId },
    { icon: 'unordered-list', label: d().totalLabel, value: String(list.length) },
    { icon: 'calendar', label: d().datedLabel, value: String(dated) },
    { icon: 'clock-circle', label: d().undatedLabel, value: String(Math.max(list.length - dated, 0)) },
  ];
}

function render() {
  document.querySelectorAll('[data-copy]').forEach((el) => {
    el.textContent = d()[el.dataset.copy] || el.textContent;
  });
  view.labels = d().view_labels || {};
  view.emptyText = d().view_labels?.noData || 'No data';
}

function updateForm() {
  const labels = d();
  form.schema = [
    { name: 'class_id', label: labels.class_id, type: 'text', required: true, default: form.getValue()?.class_id || 'c1' },
    { name: 'title', label: labels.hw_title, type: 'text', required: true },
    { name: 'description', label: labels.hw_desc, type: 'textarea', rows: 4 },
    { name: 'due_at', label: labels.due_at, type: 'datetime-local' }
  ];
  form.submitLabel = labels.submit;
}

form.addEventListener('builtin-submit', async (event) => {
  const { class_id, title, description, due_at } = event.detail.value;
  if (!class_id || !title) {
    BuiltinToast.show(d().fill, { type: 'warning' });
    return;
  }

  const payload = await api('/teacher/homework', {
    method: 'POST',
    body: JSON.stringify({ class_id, title, description: description || '', due_at: due_at || null })
  });

  if (!payload) {
    BuiltinToast.show('Failed', { type: 'error' });
    return;
  }

  BuiltinToast.show(payload.ok ? d().ok : 'Failed', { type: payload.ok ? 'success' : 'error' });
  if (payload.ok) {
    form.reset();
    updateForm();
    loadList();
  }
});

async function loadList() {
  renderListState('loading');
  const labels = d();
  const classId = (form.getValue()?.class_id) || 'c1';
  const data = await api(`/teacher/homework?class_id=${encodeURIComponent(classId)}`);
  if (!data) {
    view.setData([]);
    updateContext([]);
    renderListState('error');
    return;
  }

  const list = data.items || [];
  updateContext(list);
  view.setData(list, {
    columns: [
      { key: 'title', label: labels.hw_title },
      { key: 'description', label: labels.hw_desc },
      { key: 'due_at', label: labels.due_at }
    ]
  });
  view.emptyText = labels.view_labels?.noData || 'No data';
  renderListState(list.length ? 'idle' : 'empty');
}

await shell.init();
updateForm();
render();
loadList();
</script>
</body>
</html>
