<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/filled/bank.svg" type="image/svg+xml">
<title>?????? - ???????</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/commerce.js"></script>
  <script type="module" src="/shared/components/data.js"></script>
  <script type="module" src="/shared/components/form.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
<style>
  builtin-app-shell { --builtin-shell-max-width: 980px; --builtin-shell-secondary-width: 300px; }
  .upload-wrap { margin-top: 1rem; }
</style>
<link rel="stylesheet" href="/eclass-tools.css?v=20260501-1">
</head>
<body>
<builtin-app-shell id="app-shell">
  <section class="card">
    <builtin-schema-form id="materials-form" submit-label="??????" layout="vertical"></builtin-schema-form>
    <builtin-file-uploader id="uploader" class="upload-wrap" mode="dropzone" label="??????????????????"></builtin-file-uploader>
  </section>
  <section class="card browser-wrap">
    <h2 style="margin:0 0 1rem;font-size:1.5rem;" data-copy="list_title">????????</h2>
    <div id="list-state"></div>
    <builtin-file-browser id="browser" view="list"></builtin-file-browser>
  </section>
  <builtin-card slot="secondary">
    <div slot="header"><strong id="context-title">????????????</strong></div>
    <builtin-metadata-list id="materials-context" columns="1" compact></builtin-metadata-list>
  </builtin-card>
</builtin-app-shell>

<script type="module">
import { BuiltinToast } from '/shared/components.js?v=20260429-2';
import { createEClassPageShell } from './page-shell.js?v=20260429-2';

const copy = {
  'zh-cn': {
    back: '?????????',
    eyebrow: '???????',
    title: '??????',
    documentTitle: '?????? - ???????',
    lead: '??????????????????????????????????????γ??????',
    list_title: '????????',
    class_id: '???? ID',
    mat_title: '??????',
    submit: '??????',
    ok: '????????', fill: '????д???? ID????????????',
    contextTitle: '????????????',
    classLabel: '???????',
    selectedLabel: '????????',
    totalLabel: '???????',
    uploaderLabel: '??????????????????',
    loadingTitle: '??????????б?',
    loadingDescription: '?????????????????????????',
    emptyTitle: '????н??',
    emptyDescription: '??????????????????????????????б??',
    errorTitle: '?????????',
    errorDescription: '??????????????????????????',
    browser_labels: {
      'files.home': '????б?',
      'files.upload': '??????',
      'files.listView': '?б????',
      'files.gridView': '???????',
      'files.delete': '???',
      'files.name': '????',
      'files.size': '??С',
      'files.modified': '??????',
      'files.empty': '??????'
    }
  },
  en: {
    back: 'Back to Teacher',
    eyebrow: 'Teacher Materials',
    title: 'Upload Materials',
    documentTitle: 'Upload Materials - Online Classroom',
    lead: 'Material uploads are split out from home into this dedicated page.',
    list_title: 'Uploaded Materials',
    class_id: 'Classroom ID',
    mat_title: 'Material title',
    submit: 'Upload material',
    ok: 'Material uploaded', fill: 'Classroom ID, title and file are required',
    contextTitle: 'Material Upload Context',
    classLabel: 'Classroom',
    selectedLabel: 'Queued file',
    totalLabel: 'Materials',
    uploaderLabel: 'Drop files here or click to upload',
    loadingTitle: 'Loading materials',
    loadingDescription: 'Fetching uploaded materials for the selected classroom.',
    emptyTitle: 'No materials yet',
    emptyDescription: 'Uploaded materials will appear here after the first file is added.',
    errorTitle: 'Failed to load materials',
    errorDescription: 'Try again in a moment or return to the teacher workspace.',
    browser_labels: {
      'files.home': 'Materials',
      'files.upload': 'Upload file',
      'files.listView': 'List view',
      'files.gridView': 'Grid view',
      'files.delete': 'Delete',
      'files.name': 'Name',
      'files.size': 'Size',
      'files.modified': 'Modified',
      'files.empty': 'No materials yet'
    }
  }
};

const shell = createEClassPageShell({
  pageTitleKey: 'eclass.upload_material',
  translationPath: '/translate.json?v=20260429-2',
  validateRole: (role) => role === 'teacher',
  getInvalidRoleRedirect: () => 'student.html',
  onApplyI18n: async ({ lang: nextLang }) => {
    lang = nextLang;
    applyShellCopy();
    updateForm();
    render();
  },
});

const { $, api } = shell;
const form = $('materials-form');
let lang = localStorage.getItem('eclass_lang') || 'zh-cn';
let selectedFile = null;
let currentItems = [];

function d() { return copy[lang] || copy['zh-cn']; }

function applyShellCopy() {
  const labels = d();
  document.title = labels.documentTitle;
  const appShell = $('app-shell');
  appShell.eyebrow = labels.eyebrow;
  appShell.title = labels.title;
  appShell.subtitle = labels.lead;
  appShell.backHref = 'teacher.html';
  appShell.backLabel = labels.back;
  appShell.breadcrumbs = [
    { label: labels.back, href: 'teacher.html' },
    { label: labels.title },
  ];
  appShell.userMenuItems = [{ label: lang === 'en' ? 'Sign out' : '???', action: 'logout' }];
  $('context-title').textContent = labels.contextTitle;
}

function updateForm() {
  const labels = d();
  form.schema = [
    { name: 'class_id', label: labels.class_id, type: 'text', required: true, default: form.getValue()?.class_id || 'c1' },
    { name: 'title', label: labels.mat_title, type: 'text', required: true },
  ];
  form.submitLabel = labels.submit;
}

function renderListState(mode) {
  const labels = d();
  const host = $('list-state');
  if (mode === 'idle') {
    host.innerHTML = '';
    return;
  }
  if (mode === 'loading') {
    host.innerHTML = `<builtin-empty-state preset="loading" heading="${labels.loadingTitle}" description="${labels.loadingDescription}"></builtin-empty-state>`;
    return;
  }
  if (mode === 'error') {
    host.innerHTML = `<builtin-empty-state preset="error" heading="${labels.errorTitle}" description="${labels.errorDescription}" action-label="${labels.back}" action-href="teacher.html"></builtin-empty-state>`;
    return;
  }
  host.innerHTML = `<builtin-empty-state heading="${labels.emptyTitle}" description="${labels.emptyDescription}"></builtin-empty-state>`;
}

function updateContext() {
  const classId = form.getValue()?.class_id || 'c1';
  $('materials-context').items = [
    { icon: 'book', label: d().classLabel, value: classId },
    { icon: 'paper-clip', label: d().selectedLabel, value: selectedFile?.name || '-' },
    { icon: 'unordered-list', label: d().totalLabel, value: String(currentItems.length) },
  ];
}

function render() {
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
  document.querySelectorAll('[data-copy]').forEach(el => el.textContent = d()[el.dataset.copy] || el.textContent);
  $('browser').labels = d().browser_labels || {};
  $('uploader').label = d().uploaderLabel;
  updateContext();
}

const uploader = $('uploader');

uploader.addEventListener('builtin-files', (e) => {
  selectedFile = e.detail.files[0] || null;
  if (selectedFile && !form.getValue()?.title) {
    form.setValue({
      class_id: form.getValue()?.class_id || 'c1',
      title: selectedFile.name,
    });
  }
  updateContext();
});

async function loadList() {
  renderListState('loading');
  const classId = form.getValue()?.class_id || 'c1';
  const data = await api(`/student/materials?class_id=${encodeURIComponent(classId)}`);
  if (!data) {
    currentItems = [];
    $('browser').items = [];
    updateContext();
    renderListState('error');
    return;
  }
  currentItems = (data.items || []).map((m) => ({
    name: m.title || m.filename || 'untitled',
    type: 'file',
    size: m.meta?.size ? formatBytes(m.meta.size) : '??',
    modified: m.meta?.last_modified ? new Date(m.meta.last_modified).toLocaleString() : '??'
  }));
  $('browser').items = currentItems;
  updateContext();
  renderListState(currentItems.length ? 'idle' : 'empty');
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

form.addEventListener('builtin-submit', async (event) => {
  const file = selectedFile;
  const classId = event.detail.value.class_id?.trim();
  const title = event.detail.value.title?.trim() || (file ? file.name : '');
  if (!file || !classId || !title) {
    BuiltinToast.show(d().fill, { type: 'warning' });
    return;
  }
  const fd = new FormData();
  fd.append('file', file);
  fd.append('class_id', classId);
  fd.append('title', title);
  const payload = await api('/teacher/materials/upload', { method: 'POST', headers: {}, body: fd });
  if (!payload) {
    BuiltinToast.show('Failed', { type: 'error' });
    return;
  }
  BuiltinToast.show(payload.ok ? d().ok : 'Failed', { type: payload.ok ? 'success' : 'error' });
  if (payload.ok) {
    selectedFile = null;
    form.reset();
    updateForm();
    uploader._files = [];
    uploader.requestUpdate();
    updateContext();
    loadList();
  }
});

await shell.init();
updateForm();
applyShellCopy();
render();
loadList();
</script>
</body>
</html>
