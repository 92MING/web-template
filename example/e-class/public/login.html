<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/filled/bank.svg" type="image/svg+xml">
<title>在线课堂登录</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
  <script type="module" src="/shared/templates/auth.js"></script>
<style>
  :root {
    --bg-a: #f8efe0;
    --bg-b: #dcefe7;
    --ink: #1f2a24;
    --muted: #657267;
    --line: rgba(31, 42, 36, .16);
    --card: rgba(255, 252, 245, .84);
    --field: rgba(255, 255, 255, .72);
    --accent: #127768;
    --accent-2: #d77842;
    --shadow: 0 28px 90px rgba(31, 42, 36, .17);
  }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 15% 20%, rgba(18, 119, 104, .18), transparent 30rem),
      radial-gradient(circle at 90% 12%, rgba(215, 120, 66, .18), transparent 26rem),
      linear-gradient(135deg, var(--bg-a), var(--bg-b));
  }
  .chrome { position: fixed; top: 22px; right: 22px; display: flex; gap: 10px; z-index: 5; align-items: center; }
  .auth-wrap { width: min(420px, 90vw); margin: 0 auto; }
  .mode-switch { display: flex; padding: 4px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.16); margin-bottom: 16px; }
  .mode-switch button { border: 0; border-radius: 999px; padding: 9px 14px; color: var(--muted); background: transparent; cursor: pointer; font: 700 13px system-ui, sans-serif; }
  .mode-switch button.active { color: white; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .form { min-width: 0; display: grid; gap: 14px; }
  .form input, .form select { min-height: 44px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--field); color: var(--ink); font: inherit; width: 100%; }
  .row { min-width: 0; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px; }
  .hidden { display: none !important; }
  .test-box { margin-top: 18px; padding: 14px; border: 1px dashed var(--line); border-radius: 18px; color: var(--muted); font: 13px/1.6 system-ui, sans-serif; background: var(--card); }
  .test-box code { color: var(--ink); }
  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
    font: 700 14px system-ui, sans-serif; cursor: pointer; min-height: 44px;
  }
  @media (max-width: 560px) {
    .chrome { top: 12px; right: 12px; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="chrome">
  <builtin-lang-switcher id="lang-switcher" langs='[{"code":"zh-cn","label":"中"},{"code":"en","label":"EN"}]' current="zh-cn" display="buttons"></builtin-lang-switcher>
  <builtin-theme-toggle></builtin-theme-toggle>
</div>

<builtin-tpl-auth-login id="auth-page" layout="split" title="" subtitle="">
  <div slot="side">
    <div style="display:grid;gap:16px;">
      <div style="display:grid;gap:10px;">
        <div style="font:700 12px/1.4 system-ui,sans-serif;letter-spacing:.16em;text-transform:uppercase;opacity:.82;" data-copy="brand">在线课堂</div>
        <h1 style="margin:0;font-size:clamp(32px,5vw,52px);line-height:1.04;letter-spacing:-.03em;" data-copy="headline">先登录，再进入你的课堂。</h1>
        <p style="margin:0;font:15px/1.7 system-ui,sans-serif;opacity:.88;max-width:34rem;" data-copy="lead">学生和老师使用同一个入口。登录后按身份进入对应工作台，课程、作业、成绩、公告和教室管理分布在独立页面。</p>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;">
        <span style="padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.16);font:600 12px/1.2 system-ui,sans-serif;" data-copy="chip_student">学生课程与作业</span>
        <span style="padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.16);font:600 12px/1.2 system-ui,sans-serif;" data-copy="chip_teacher">老师教室管理</span>
        <span style="padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.16);font:600 12px/1.2 system-ui,sans-serif;" data-copy="chip_i18n">中英文 / 深浅色</span>
      </div>
    </div>
  </div>
  <div slot="form" class="auth-wrap">
    <div class="mode-switch" aria-label="mode">
      <button id="mode-login" class="active" type="button" data-copy="login">登录</button>
      <button id="mode-register" type="button" data-copy="register">注册</button>
    </div>
    <builtin-login-panel id="login-panel" mode="email-password" surface="plain"></builtin-login-panel>
    <form id="register-form" class="form hidden">
      <div class="row">
        <input id="reg-email" type="email" data-placeholder="email" placeholder="邮箱" required />
        <input id="reg-nickname" data-placeholder="nickname" placeholder="昵称" required />
      </div>
      <div class="row">
        <input id="reg-password" type="password" data-placeholder="password" placeholder="密码" required />
        <input id="reg-password2" type="password" data-placeholder="confirm" placeholder="确认密码" required />
      </div>
      <div class="row">
        <select id="reg-role" required>
          <option value="student" data-copy="student">学生端</option>
          <option value="teacher" data-copy="teacher">老师端</option>
        </select>
        <select id="reg-school" required>
          <option value="" data-placeholder="school" data-copy="school">选择学校</option>
        </select>
      </div>
      <select id="reg-grade">
        <option value="" data-placeholder="grade" data-copy="grade">选择年级</option>
        <option value="初一">初一</option>
        <option value="初二">初二</option>
        <option value="初三">初三</option>
        <option value="高一">高一</option>
        <option value="高二">高二</option>
        <option value="高三">高三</option>
      </select>
      <button type="submit" id="btn-register" class="btn-primary" data-copy="register">注册</button>
    </form>
    <div class="test-box">
      <div data-copy="test_accounts">测试账户</div>
      <div><code>student1@example.com / 123456</code></div>
      <div><code>teacher1@example.com / 123456</code></div>
    </div>
  </div>
</builtin-tpl-auth-login>

<script type="module">
import { setSharedTheme, BuiltinToast } from '/shared/components.js?v=20260429-2';

const copy = {
  'zh-cn': {
    brand: '在线课堂', theme: '深色', themeLight: '浅色', headline: '先登录，再进入你的课堂。',
    lead: '学生和老师使用同一个入口。登录后按身份进入对应工作台，课程、作业、成绩、公告和教室管理分布在独立页面。',
    chip_student: '学生课程与作业', chip_teacher: '老师教室管理', chip_i18n: '中英文 / 深浅色',
    login_title: '登录', register_title: '注册', login: '登录', register: '注册', student: '学生端', teacher: '老师端',
    email: '邮箱', password: '密码', nickname: '昵称', confirm: '确认密码', school: '选择学校', grade: '选择年级',
    fill: '请填写必要字段', mismatch: '两次密码不一致', login_failed: '登录失败', register_failed: '注册失败', test_accounts: '测试账户',
    err_email_already_registered: '该邮箱已被注册', err_invalid_credentials: '邮箱或密码错误', err_invalid_action: '不支持的操作'
  },
  en: {
    brand: 'Online Classroom', theme: 'Dark', themeLight: 'Light', headline: 'Sign in before entering class.',
    lead: 'Students and teachers use the same entrance. After sign-in, each role lands in its own workspace; courses, homework, grades, announcements and classroom management are separate pages.',
    chip_student: 'Student courses and homework', chip_teacher: 'Teacher classroom management', chip_i18n: 'Chinese / English and themes',
    login_title: 'Sign in', register_title: 'Create account', login: 'Sign in', register: 'Register', student: 'Student', teacher: 'Teacher',
    email: 'Email', password: 'Password', nickname: 'Nickname', confirm: 'Confirm password', school: 'Select school', grade: 'Select grade',
    fill: 'Please fill in the required fields', mismatch: 'Passwords do not match', login_failed: 'Login failed', register_failed: 'Registration failed', test_accounts: 'Test accounts',
    err_email_already_registered: 'Email already registered', err_invalid_credentials: 'Wrong email or password', err_invalid_action: 'Unsupported action'
  }
};

const token = localStorage.getItem('eclass_token');
if (token) {
  validateExistingSession();
}

const langKey = 'eclass_lang';
const themeKey = 'eclass_theme';
let lang = localStorage.getItem(langKey) || 'zh-cn';
let dark = localStorage.getItem(themeKey) === 'dark';
let mode = 'login';
const $ = id => document.getElementById(id);

function dict() { return copy[lang] || copy['zh-cn']; }

function renderCopy() {
  const d = dict();
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
  document.querySelectorAll('[data-copy]').forEach(el => {
    const key = el.dataset.copy;
    if (d[key]) el.textContent = d[key];
  });
  document.querySelectorAll('[data-placeholder]').forEach(el => {
    const key = el.dataset.placeholder;
    if (d[key]) el.placeholder = d[key];
  });
  const authPage = $('auth-page');
  if (authPage) {
    authPage.title = mode === 'login' ? d.login_title : d.register_title;
    authPage.subtitle = d.lead;
  }
  const panel = $('login-panel');
  if (panel) {
    panel.title = d.login_title;
    panel.labels = {
      'login.title': d.login_title,
      'login.email': d.email,
      'login.password': d.password,
      'login.signIn': d.login,
      'login.loading': d.loading || d.login,
      'login.required': d.fill,
    };
  }
  $('lang-switcher').current = lang;
}

function applyTheme() {
  setSharedTheme(dark);
  localStorage.setItem(themeKey, dark ? 'dark' : 'light');
}

function setMode(nextMode) {
  mode = nextMode;
  $('login-panel').classList.toggle('hidden', mode !== 'login');
  $('register-form').classList.toggle('hidden', mode !== 'register');
  $('mode-login').classList.toggle('active', mode === 'login');
  $('mode-register').classList.toggle('active', mode === 'register');
  renderCopy();
}

function routeByRole(role) {
  location.replace(role === 'teacher' ? 'teacher.html' : 'student.html');
}

function clearSession() {
  localStorage.removeItem('eclass_user');
  localStorage.removeItem('eclass_role');
  localStorage.removeItem('eclass_token');
}

async function validateExistingSession() {
  try {
    const response = await fetch('/api/auth?action=me', {
      headers: { Authorization: `Bearer ${token}` },
    });
    const payload = await response.json();
    if (payload && payload.ok) {
      routeByRole(localStorage.getItem('eclass_role'));
      return;
    }
  } catch (_error) {
  }
  clearSession();
}

async function api(path, opts = {}) {
  const r = await fetch('/api' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  return r.ok ? r.json() : null;
}

document.getElementById('lang-switcher').addEventListener('lang-change', (e) => {
  lang = e.detail.lang;
  localStorage.setItem(langKey, lang);
  renderCopy();
});

$('mode-login').addEventListener('click', () => setMode('login'));
$('mode-register').addEventListener('click', () => setMode('register'));
$('reg-role').addEventListener('change', () => {
  $('reg-grade').classList.toggle('hidden', $('reg-role').value !== 'student');
  $('reg-grade').required = $('reg-role').value === 'student';
});

applyTheme();
setMode('login');

const schools = await api('/auth?action=schools');
$('reg-school').innerHTML = '<option value="" data-copy="school">' + dict().school + '</option>' +
  (schools?.schools || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('');

$('login-panel').addEventListener('builtin-submit', async (e) => {
  const { email, password } = e.detail;
  if (!email || !password) {
    BuiltinToast.show(dict().fill, { type: 'warning' });
    return;
  }
  const res = await api('/auth?action=login', { method: 'POST', body: JSON.stringify({ email, password }) });
  if (!res?.ok) {
    const code = res?.error_code;
    const msg = (code && dict()['err_' + code]) || res?.error || dict().login_failed;
    BuiltinToast.show(msg, { type: 'error' });
    return;
  }
  localStorage.setItem('eclass_user', res.user_id);
  localStorage.setItem('eclass_role', res.role);
  localStorage.setItem('eclass_token', res.token);
  routeByRole(res.role);
});

$('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = $('reg-email').value.trim();
  const nickname = $('reg-nickname').value.trim();
  const password = $('reg-password').value;
  const password2 = $('reg-password2').value;
  const role = $('reg-role').value;
  if (!email || !nickname || !password || !$('reg-school').value) {
    BuiltinToast.show(dict().fill, { type: 'warning' });
    return;
  }
  if (password !== password2) {
    BuiltinToast.show(dict().mismatch, { type: 'error' });
    return;
  }
  const res = await api('/auth?action=register', {
    method: 'POST',
    body: JSON.stringify({
      email, nickname, password, role,
      school_id: $('reg-school').value,
      grade: role === 'student' ? $('reg-grade').value : ''
    })
  });
  if (!res?.ok) {
    const code = res?.error_code;
    const msg = (code && dict()['err_' + code]) || res?.error || dict().register_failed;
    BuiltinToast.show(msg, { type: 'error' });
    return;
  }
  localStorage.setItem('eclass_user', res.user_id);
  localStorage.setItem('eclass_role', res.role);
  localStorage.setItem('eclass_token', res.token);
  routeByRole(res.role);
});
</script>
</body>
</html>
