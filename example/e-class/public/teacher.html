<style>
  body {
    margin: 0;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    background: var(--builtin-header-bg, #f9fafb);
    color: var(--builtin-color-text, #111827);
  }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .logout-btn {
    padding: 6px 12px; border: 1px solid var(--builtin-border, #d1d5db); border-radius: var(--builtin-radius, 6px);
    background: var(--builtin-button-bg, #ffffff); color: var(--builtin-color-text, #111827); cursor: pointer; font: inherit; min-height: 34px;
  }
  .logout-btn:hover { background: var(--builtin-button-hover-bg, #f9fafb); }
  .sidebar-nav { display: grid; gap: 4px; }
  .sidebar-nav a {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--builtin-radius, 6px);
    color: var(--builtin-color-text, #111827); text-decoration: none; font-size: 14px;
  }
  .sidebar-nav a:hover { background: var(--builtin-row-hover-bg, #f9fafb); }
  .workspace-eyebrow {
    display: block;
    color: var(--builtin-primary, #2563eb);
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-size: 12px;
    margin-bottom: 14px;
  }
  .workspace-title {
    display: block;
    margin: 0 0 16px;
    font-size: clamp(28px, 4vw, 48px);
    line-height: .95;
    letter-spacing: -.05em;
    color: var(--builtin-color-text, #111827);
    font-weight: 800;
  }
  .workspace-lead {
    display: block;
    margin: 0;
    color: var(--builtin-color-muted, #6b7280);
    font-size: 16px;
    line-height: 1.7;
  }
  .workspace-profile-name {
    display: block;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -.04em;
    color: var(--builtin-color-text, #111827);
  }
  .workspace-profile-role {
    display: block;
    color: var(--builtin-color-muted, #6b7280);
    font-size: 14px;
    margin-top: 6px;
  }
  .workspace-tile-title { font-size: 20px; font-weight: 800; letter-spacing: -.04em; }
  .workspace-tile-title { color: var(--builtin-color-text, #111827); }
  .workspace-tile-desc { margin: 8px 0 0; color: var(--builtin-color-muted, #6b7280); line-height: 1.55; font-family: system-ui, sans-serif; font-size: 13px; }
  .workspace-tile {
    min-height: 160px;
    padding: 20px;
    border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: var(--builtin-radius-lg, 8px);
    background: var(--builtin-surface, #ffffff);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 14px;
    transition: transform .18s ease, border-color .18s ease;
    box-sizing: border-box;
  }
  .workspace-tile:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 35%);
  }
</style>
</head>

</builtin-tpl-dashboard-workspace>

<script type="module">
import { createPageBootstrap } from '/shared/page-bootstrap.js?v=20260429-2';

const shell = createPageBootstrap({
  pageTitleKey: 'eclass.teacher',
  fallbackProfileName: 'Teacher',
  validateRole: (role) => role === 'teacher',
  getInvalidRoleRedirect: () => 'student.html',
  onApplyI18n: async ({ $, t }) => {
    $('dashboard').labels = {
      'sidebar.title': await t('eclass.title')
    };
  }
});

await shell.init();
</script>
