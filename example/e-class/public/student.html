<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/icons/filled/bank.svg" type="image/svg+xml">
<title>学生端 - 在线课堂</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/data.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
  <script type="module" src="/shared/templates/dashboard.js"></script>
<style>
  body {
    margin: 0;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    background: var(--builtin-header-bg, #f9fafb);
    color: var(--builtin-color-text, #111827);
  }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .logout-btn {
    padding: 6px 12px; border: 1px solid var(--builtin-border, #d1d5db); border-radius: var(--builtin-radius, 6px);
    background: var(--builtin-button-bg, #ffffff); color: var(--builtin-color-text, #111827); cursor: pointer; font: inherit; min-height: 34px;
  }
  .logout-btn:hover { background: var(--builtin-button-hover-bg, #f9fafb); }
  .sidebar-nav { display: grid; gap: 4px; }
  .sidebar-nav a {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--builtin-radius, 6px);
    color: var(--builtin-color-text, #111827); text-decoration: none; font-size: 14px;
  }
  .sidebar-nav a:hover { background: var(--builtin-row-hover-bg, #f9fafb); }
  .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .hero-actions a {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 10px;
    text-decoration: none; font-weight: 600; font-size: 14px;
  }
  .btn-primary { background: linear-gradient(135deg, #127768, #0d5a4d); color: #fff; border: none; }
  .btn-default { background: var(--builtin-button-bg, #fff); color: var(--builtin-color-text, #111827); border: 1px solid var(--builtin-border, #d1d5db); }
  .profile-line { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid var(--builtin-border-soft, #e5e7eb); margin-bottom: 12px; }
  .workspace-eyebrow {
    display: block;
    color: var(--builtin-primary, #2563eb);
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-size: 12px;
    margin-bottom: 14px;
  }
  .workspace-title {
    display: block;
    margin: 0 0 16px;
    font-size: clamp(28px, 4vw, 48px);
    line-height: .95;
    letter-spacing: -.05em;
    color: var(--builtin-color-text, #111827);
    font-weight: 800;
  }
  .workspace-lead {
    display: block;
    margin: 0;
    color: var(--builtin-color-muted, #6b7280);
    font-size: 16px;
    line-height: 1.7;
  }
  .workspace-profile-name {
    display: block;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -.04em;
    color: var(--builtin-color-text, #111827);
  }
  .workspace-profile-role {
    display: block;
    color: var(--builtin-color-muted, #6b7280);
    font-size: 14px;
    margin-top: 6px;
  }
  .workspace-tile-title { font-size: 20px; font-weight: 800; letter-spacing: -.04em; }
  .workspace-tile-title { color: var(--builtin-color-text, #111827); }
  .workspace-tile-desc { margin: 8px 0 0; color: var(--builtin-color-muted, #6b7280); line-height: 1.55; font-family: system-ui, sans-serif; font-size: 13px; }
  .workspace-tile {
    min-height: 160px;
    padding: 20px;
    border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: var(--builtin-radius-lg, 8px);
    background: var(--builtin-surface, #ffffff);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 14px;
    transition: transform .18s ease, border-color .18s ease;
    box-sizing: border-box;
  }
  .workspace-tile:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--builtin-primary, #2563eb), transparent 35%);
  }
</style>
</head>
<body>
<builtin-tpl-dashboard-workspace id="dashboard">
  <div slot="header" class="header-actions">
    <builtin-lang-switcher id="lang-switcher" langs='[{"code":"zh-cn","label":"中"},{"code":"en","label":"EN"}]' current="zh-cn" display="buttons"></builtin-lang-switcher>
    <builtin-theme-toggle></builtin-theme-toggle>
    <button id="btn-logout" class="logout-btn" data-i18n="eclass.logout">退出</button>
  </div>
  <div slot="sidebar" class="sidebar-nav">
    <a href="classroom.html"><builtin-icon name="message" size="16"></builtin-icon> <span data-i18n="eclass.enter_classroom">进入聊天室</span></a>
    <a href="courses.html"><builtin-icon name="book" size="16"></builtin-icon> <span data-i18n="eclass.courses">课程列表</span></a>
    <a href="homework-list.html"><builtin-icon name="file-text" size="16"></builtin-icon> <span data-i18n="eclass.homework">作业列表</span></a>
    <a href="grades.html"><builtin-icon name="bar-chart" size="16"></builtin-icon> <span data-i18n="eclass.grades">成绩</span></a>
    <a href="announcements.html"><builtin-icon name="notification" size="16"></builtin-icon> <span data-i18n="eclass.announcements">通告</span></a>
  </div>
  <div slot="hero">
    <div class="workspace-eyebrow" data-i18n="eclass.student_portal">Student Portal</div>
    <div class="workspace-title" data-i18n="eclass.student_headline">今天的学习，从这里开始。</div>
    <div class="workspace-lead" data-i18n="eclass.student_lead">课程、作业、成绩、公告和教室聊天室都拆分到独立页面。这里是学生端首页，只放入口和状态。</div>
    <div class="workspace-actions hero-actions">
      <a href="classroom.html" class="btn-primary"><builtin-icon name="message" size="16"></builtin-icon> <span data-i18n="eclass.enter_classroom">进入聊天室</span></a>
      <a href="courses.html" class="btn-default"><span data-i18n="eclass.courses">课程列表</span></a>
    </div>
  </div>
  <div slot="profile">
    <div class="profile-line">
      <div>
        <div class="workspace-profile-name" id="profile-name">Student</div>
        <div class="workspace-profile-role" data-i18n="eclass.student">学生端</div>
      </div>
      <builtin-badge id="online-badge" variant="success" pill text="Online" data-i18n-text="eclass.online"></builtin-badge>
    </div>
  </div>
  <div slot="stats" class="workspace-stats-grid">
    <builtin-stat-card id="stat-courses" value="-" label="课程" icon="book" data-i18n-label="eclass.course_count"></builtin-stat-card>
    <builtin-stat-card id="stat-homework" value="-" label="作业" icon="file-text" data-i18n-label="eclass.homework_count"></builtin-stat-card>
    <builtin-stat-card id="stat-notices" value="-" label="公告" icon="notification" data-i18n-label="eclass.notice_count"></builtin-stat-card>
  </div>
  <nav slot="tiles" class="workspace-tile-grid" aria-label="Student pages">
      <a class="workspace-tile" href="classroom.html">
        <builtin-icon name="message" size="28" color="#127768"></builtin-icon>
        <div><div class="workspace-tile-title" data-i18n="eclass.enter_classroom">进入聊天室</div><p class="workspace-tile-desc" data-i18n="eclass.student_chat_desc">进入班级文字聊天室，快速跟上群聊内容。</p></div>
      </a>
      <a class="workspace-tile" href="courses.html">
        <builtin-icon name="book" size="28" color="#127768"></builtin-icon>
        <div><div class="workspace-tile-title" data-i18n="eclass.courses">课程列表</div><p class="workspace-tile-desc" data-i18n="eclass.student_courses_desc">查看课程和课程详情。</p></div>
      </a>
      <a class="workspace-tile" href="homework-list.html">
        <builtin-icon name="file-text" size="28" color="#127768"></builtin-icon>
        <div><div class="workspace-tile-title" data-i18n="eclass.homework">作业列表</div><p class="workspace-tile-desc" data-i18n="eclass.student_homework_desc">提交作业，查看截止时间。</p></div>
      </a>
      <a class="workspace-tile" href="grades.html">
        <builtin-icon name="bar-chart" size="28" color="#127768"></builtin-icon>
        <div><div class="workspace-tile-title" data-i18n="eclass.grades">成绩</div><p class="workspace-tile-desc" data-i18n="eclass.student_grades_desc">查看成绩汇总和单项成绩。</p></div>
      </a>
      <a class="workspace-tile" href="announcements.html">
        <builtin-icon name="notification" size="28" color="#127768"></builtin-icon>
        <div><div class="workspace-tile-title" data-i18n="eclass.announcements">通告</div><p class="workspace-tile-desc" data-i18n="eclass.student_announcements_desc">查看老师发布的课堂通知。</p></div>
      </a>
      <a class="workspace-tile" href="check-in.html">
        <builtin-icon name="check-circle" size="28" color="#127768"></builtin-icon>
        <div><div class="workspace-tile-title" data-i18n="eclass.check_in">今日签到</div><p class="workspace-tile-desc" data-i18n="eclass.student_checkin_desc">输入签到码完成课堂签到。</p></div>
      </a>
    </nav>
</builtin-tpl-dashboard-workspace>

<script type="module">
import { createEClassPageShell } from './page-shell.js?v=20260429-2';

const shell = createEClassPageShell({
  pageTitleKey: 'eclass.student',
  fallbackProfileName: 'Student',
  validateRole: (role) => role !== 'teacher',
  getInvalidRoleRedirect: () => 'teacher.html',
  onApplyI18n: async ({ $, t }) => {
    $('dashboard').labels = {
      'sidebar.title': await t('eclass.title')
    };
  },
  onReady: async ({ $, api }) => {
    const [courses, homework, notices] = await Promise.all([
      api('/classroom/list'),
      api('/student/homework/list'),
      api('/student/announcements/list?page=1&page_size=10')
    ]);
    $('stat-courses').value = (courses?.classrooms || courses?.items || []).length || 0;
    $('stat-homework').value = (homework?.homework || homework?.items || []).length || 0;
    $('stat-notices').value = (notices?.announcements || notices?.items || []).length || 0;
  }
});

await shell.init();
</script>
</body>
