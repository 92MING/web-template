<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f5f5f5">
<title>个人中心 - e-Shop</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
  <script type="module" src="/shared/templates/profile.js"></script>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: var(--builtin-header-bg, #f5f5f5); }
  .header-bar {
    max-width: 960px; margin: 0 auto; padding: 1rem;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .header-bar h1 { margin: 0; font-size: 1.5rem; }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .nav-links a {
    display: inline-flex; align-items: center; gap: 0.25rem;
    padding: 6px 12px; border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: var(--builtin-radius, 6px); background: var(--builtin-button-bg, #ffffff);
    color: var(--builtin-color-text, #111827); text-decoration: none; font-size: 14px;
  }
  .nav-links a:hover { background: var(--builtin-button-hover-bg, #f9fafb); }
  .order-card { margin-bottom: 1rem; }
  .profile-about p { margin: 0.5rem 0; }
  .edit-form { display: grid; gap: 0.75rem; }
  .edit-form input { padding: 8px 12px; border: 1px solid var(--builtin-border, #d1d5db); border-radius: var(--builtin-radius, 6px); background: var(--builtin-input-bg, #ffffff); color: inherit; font: inherit; width: 100%; box-sizing: border-box; }
  .btn-save { display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px; border-radius: var(--builtin-radius, 6px); border: none; background: var(--builtin-primary, #2563eb); color: #fff; font-weight: 600; cursor: pointer; font: inherit; }
  .btn-save:hover { background: var(--builtin-primary-hover, #1d4ed8); }
  @media (max-width: 720px) {
    .header-bar { padding: max(0.5rem, env(safe-area-inset-top)) 0.75rem max(0.5rem, env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div class="header-bar">
  <builtin-icon name="user" size="24" variant="outlined"></builtin-icon>
  <h1 data-i18n="eshop.user_profile">个人中心</h1>
  <div class="header-actions">
    <div class="nav-links">
      <a href="index.html" data-i18n="eshop.back_to_mall">返回商城</a>
      <a href="orders.html" data-i18n="eshop.my_orders">我的订单</a>
      <a href="favorites.html" data-i18n="eshop.favorites">我的收藏</a>
    </div>
    <builtin-lang-switcher id="lang-switcher" langs='[{"code":"zh-cn","label":"中"},{"code":"en","label":"EN"}]' display="buttons"></builtin-lang-switcher>
    <builtin-theme-toggle></builtin-theme-toggle>
  </div>
</div>
<builtin-tpl-profile-personal id="profile-tpl" active-tab="timeline">
  <div slot="about" id="profile-about"></div>
  <div slot="timeline" id="profile-timeline"></div>
  <div slot="footer" style="text-align:center;">
    <div class="nav-links" style="justify-content:center;">
      <a href="index.html" data-i18n="eshop.back_to_mall">返回商城</a>
      <a href="orders.html" data-i18n="eshop.my_orders">我的订单</a>
    </div>
  </div>
</builtin-tpl-profile-personal>
<script type="module">
import { initEshop, api, t, applyI18n, USER_ID, BuiltinToast } from './eshop-utils.js';

await initEshop();

const $ = id => document.getElementById(id);

(async () => {
  const [profileRes, ordersRes] = await Promise.all([
    api('/shop/user/profile?user_id=' + USER_ID),
    api('/shop/user/orders?user_id=' + USER_ID)
  ]);

  const user = (profileRes && profileRes.user) || {};
  const tpl = $('profile-tpl');
  tpl.name = user.name || USER_ID;
  tpl.bio = user.email || '-';
  tpl.stats = {
    posts: (ordersRes && ordersRes.orders && ordersRes.orders.length) || 0,
    followers: '-',
    following: '-',
  };
  tpl.posts = [];

  $('profile-about').innerHTML = `
    <div class="profile-about">
      <div class="edit-form">
        <div><label style="font-size:12px;color:var(--builtin-color-muted);">用户ID</label><input id="edit-user-id" value="${user.user_id || USER_ID}" disabled></div>
        <div><label style="font-size:12px;color:var(--builtin-color-muted);"><span data-i18n="eshop.name">姓名</span></label><input id="edit-name" value="${user.name || ''}"></div>
        <div><label style="font-size:12px;color:var(--builtin-color-muted);"><span data-i18n="eshop.phone">电话</span></label><input id="edit-phone" value="${user.phone || ''}"></div>
        <div><label style="font-size:12px;color:var(--builtin-color-muted);"><span data-i18n="eshop.email">邮箱</span></label><input id="edit-email" value="${user.email || ''}"></div>
        <div><label style="font-size:12px;color:var(--builtin-color-muted);"><span data-i18n="eshop.address">地址</span></label><input id="edit-address" value="${user.address || ''}"></div>
        <button id="btn-save-profile" class="btn-save" data-i18n="eshop.submit_order">保存</button>
      </div>
    </div>
  `;
  await applyI18n();

  $('btn-save-profile').addEventListener('click', async () => {
    try {
      const res = await api('/shop/user/profile?user_id=' + USER_ID, {
        method: 'PUT',
        body: JSON.stringify({
          name: $('edit-name').value,
          phone: $('edit-phone').value,
          email: $('edit-email').value,
          address: $('edit-address').value,
        })
      });
      if (res?.ok) {
        BuiltinToast.show('保存成功', { type: 'success' });
        tpl.name = res.user.name;
        tpl.bio = res.user.email;
      } else {
        BuiltinToast.show(res?.error || '保存失败', { type: 'error' });
      }
    } catch (e) {
      BuiltinToast.show('保存失败', { type: 'error' });
    }
  });

  const orders = (ordersRes && ordersRes.orders) || [];
  if (!orders.length) {
    $('profile-timeline').innerHTML = '<builtin-alert variant="info" data-i18n="eshop.no_orders">暂无订单</builtin-alert>';
    await applyI18n();
    return;
  }

  $('profile-timeline').innerHTML = orders.map(o => {
    const total = o.final_total !== undefined ? o.final_total : o.total;
    const itemsText = o.items.map(i => `${i.name || i.product_id} x${i.quantity}`).join(', ');
    return `
      <builtin-card class="order-card" variant="elevated" style="margin-bottom:1rem;">
        <div slot="header">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span><strong>订单号:</strong> ${o.order_id}</span>
            <builtin-badge variant="success" text="${o.status}"></builtin-badge>
          </div>
        </div>
        <div class="order-items">${itemsText}</div>
        <div style="margin-top:0.5rem;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:0.75rem;color:var(--builtin-color-muted, #6b7280);">${new Date(o.created_at * 1000).toLocaleString()}</span>
          <span style="font-weight:700;color:var(--builtin-primary);">￥${total}</span>
        </div>
        <a href="order-detail.html?order_id=${o.order_id}" style="display:inline-flex;align-items:center;gap:0.25rem;padding:6px 12px;border:1px solid var(--builtin-border,#d1d5db);border-radius:var(--builtin-radius,6px);background:var(--builtin-button-bg,#ffffff);color:var(--builtin-color-text,#111827);text-decoration:none;font-size:14px;margin-top:0.5rem;" data-i18n="eshop.view_details">查看详情</a>
      </builtin-card>
    `;
  }).join('');
  await applyI18n();
})();
</script>
</body>
</html>
