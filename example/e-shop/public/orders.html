<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f5f5f5">
<title>?????? - e-Shop</title>
  <script type="module" src="/shared/components/basic.js"></script>
  <script type="module" src="/shared/components/layout.js"></script>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: var(--builtin-header-bg, #f5f5f5); }
  .container { max-width: 960px; margin: 0 auto; padding: 1rem; }
  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .header h1 { margin: 0; font-size: 1.5rem; }
  .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .nav-links a {
    display: inline-flex; align-items: center; gap: 0.25rem;
    padding: 6px 12px; border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: var(--builtin-radius, 6px); background: var(--builtin-button-bg, #ffffff);
    color: var(--builtin-color-text, #111827); text-decoration: none; font-size: 14px;
  }
  .nav-links a:hover { background: var(--builtin-button-hover-bg, #f9fafb); }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .order-card { margin-bottom: 1rem; }
  .order-items { font-size: 0.875rem; color: var(--builtin-color-muted, #6b7280); }
  .order-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .order-date { font-size: 0.75rem; color: var(--builtin-color-muted, #6b7280); margin-top: 0.5rem; }
  .view-btn {
    display: inline-flex; align-items: center; gap: 0.25rem;
    padding: 6px 12px; border: 1px solid var(--builtin-primary, #2563eb);
    border-radius: var(--builtin-radius, 6px); background: var(--builtin-primary, #2563eb);
    color: #fff; text-decoration: none; font-size: 14px; margin-top: 0.5rem;
  }
  .view-btn:hover { background: var(--builtin-primary-hover, #1d4ed8); }
  @media (max-width: 720px) {
    .container { padding: max(0.5rem, env(safe-area-inset-top)) 0.75rem max(0.5rem, env(safe-area-inset-bottom)); }
    .header h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <builtin-icon name="shopping" size="24" variant="outlined"></builtin-icon>
    <h1 data-i18n="eshop.my_orders">??????</h1>
    <div class="header-actions">
      <div class="nav-links">
        <a href="index.html" data-i18n="eshop.back_to_mall">???????</a>
        <a href="user-profile.html" data-i18n="eshop.user_profile">????????</a>
        <a href="cart.html" data-i18n="eshop.cart">????</a>
      </div>
      <builtin-lang-switcher id="lang-switcher" langs='[{"code":"zh-cn","label":"??"},{"code":"en","label":"EN"}]' display="buttons"></builtin-lang-switcher>
      <builtin-theme-toggle></builtin-theme-toggle>
    </div>
  </div>
  <div id="orders-list" data-i18n="eshop.loading">??????...</div>
</div>
<script type="module">
import { initEshop, api, t, applyI18n, USER_ID } from './eshop-utils.js';

await initEshop();

const apiCall = async (path, opts = {}) => {
  const r = await fetch('/api' + path, { ...opts, headers: { 'Content-Type': 'application/json', ...opts.headers } });
  return r.ok ? r.json() : null;
};

(async () => {
  const r = await apiCall('/shop/orders?user_id=' + USER_ID);
  const orders = (r && r.orders) || [];
  const container = document.getElementById('orders-list');
  if (!orders.length) {
    container.innerHTML = '<builtin-alert variant="info" data-i18n="eshop.no_orders">???????</builtin-alert>';
    await applyI18n();
    return;
  }
  const statusLabels = await Promise.all(orders.map(o => t('eshop.status_' + (o.status || 'pending'))));
  container.innerHTML = orders.map((o, idx) => {
    const itemsText = o.items.map(i => `${i.name || i.product_id} x${i.quantity}`).join(', ');
    const total = o.final_total !== undefined ? o.final_total : o.total;
    return `
      <builtin-card class="order-card" variant="elevated">
        <div slot="header">
          <div class="order-meta">
            <span><strong data-i18n="eshop.order_id">??????:</strong> ${o.order_id}</span>
            <builtin-badge variant="success" text="${statusLabels[idx]}"></builtin-badge>
          </div>
        </div>
        <div class="order-items">${itemsText}</div>
        <div style="margin-top:0.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;">
          <div class="order-date">${new Date(o.created_at * 1000).toLocaleString()}</div>
          <div style="font-weight:700;color:var(--builtin-primary);">??${total}</div>
        </div>
        <a href="order-detail.html?order_id=${o.order_id}" class="view-btn" data-i18n="eshop.view_details">??????</a>
      </builtin-card>
    `;
  }).join('');
  await applyI18n();
})();
</script>
</body>
</html>
