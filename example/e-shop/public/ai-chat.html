<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f5f5f5">
<title>AI 客服 - e-Shop</title>
<script type="module" src="/shared/components.js"></script>
<script type="module" src="/shared/templates.js"></script>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: var(--builtin-header-bg, #f5f5f5); height: 100vh; display: flex; flex-direction: column; }
  .container { max-width: 640px; margin: 0 auto; padding: 1rem; height: 100%; display: flex; flex-direction: column; flex: 1; width: 100%; box-sizing: border-box; }
  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .header h1 { margin: 0; font-size: 1.25rem; }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .nav-links a {
    display: inline-flex; align-items: center; gap: 0.25rem;
    padding: 6px 12px; border: 1px solid var(--builtin-border, #d1d5db);
    border-radius: var(--builtin-radius, 6px); background: var(--builtin-button-bg, #ffffff);
    color: var(--builtin-color-text, #111827); text-decoration: none; font-size: 14px;
  }
  .nav-links a:hover { background: var(--builtin-button-hover-bg, #f9fafb); }
  .chat-area { flex: 1; background: var(--builtin-surface, #ffffff); border-radius: 8px; padding: 1rem; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--builtin-border-soft, #e5e7eb); }
  .msg { margin-bottom: 0.75rem; display: flex; gap: 0.5rem; }
  .msg.user { flex-direction: row-reverse; }
  .msg .bubble { padding: 0.6rem 0.9rem; border-radius: 12px; max-width: 70%; font-size: 0.9rem; line-height: 1.4; white-space: pre-wrap; }
  .msg.ai .bubble { background: var(--builtin-header-bg, #f0f0f0); color: var(--builtin-color-text, #333); }
  .msg.user .bubble { background: var(--builtin-primary, #4f46e5); color: #fff; }
  .typing { font-size: 0.75rem; color: var(--builtin-color-muted, #999); padding: 0.25rem 0; }
  .input-wrap { margin-top: 1rem; }
  @media (max-width: 720px) {
    .container { padding: max(0.5rem, env(safe-area-inset-top)) 0.75rem max(0.5rem, env(safe-area-inset-bottom)); max-width: 100%; }
    .msg .bubble { max-width: 80%; font-size: 0.95rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <builtin-icon name="robot" size="24" variant="outlined"></builtin-icon>
    <h1 style="margin:0;font-size:1.25rem;" data-i18n="eshop.ai_customer_service">AI 客服</h1>
    <div class="header-actions">
      <div class="nav-links">
        <a href="index.html" data-i18n="eshop.back_to_mall">返回商城</a>
      </div>
      <builtin-lang-switcher id="lang-switcher" langs='[{"code":"zh-cn","label":"中"},{"code":"en","label":"EN"}]' display="buttons"></builtin-lang-switcher>
      <builtin-theme-toggle></builtin-theme-toggle>
    </div>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="msg ai">
      <builtin-avatar src="https://placehold.co/32x32?text=AI" size="32" name="AI" shape="rounded"></builtin-avatar>
      <div class="bubble" data-i18n="eshop.ai_greeting_full">您好！我是 e-Shop 的 AI 客服，可以帮您解答商品、价格、发货、售后等问题。</div>
    </div>
  </div>
  <div class="typing" id="typing" style="display:none;" data-i18n="eshop.ai_typing">AI 正在输入...</div>
  <div class="input-wrap">
    <builtin-ai-prompt-input id="chat-input" placeholder="输入您的问题..." data-i18n-placeholder="eshop.input_question"></builtin-ai-prompt-input>
  </div>
</div>
<script type="module">
import { initEshop, api, t } from './eshop-utils.js';

await initEshop();

const $ = id => document.getElementById(id);
const chatArea = $('chat-area');

const addMsg = (role, text) => {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  div.innerHTML = role === 'ai'
    ? `<builtin-avatar src="https://placehold.co/32x32?text=AI" size="32" name="AI" shape="rounded"></builtin-avatar><div class="bubble">${escaped}</div>`
    : `<div class="bubble">${escaped}</div><builtin-avatar src="https://placehold.co/32x32?text=我" size="32" name="我" shape="rounded"></builtin-avatar>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div.querySelector('.bubble');
};

let abortCtrl = null;

const send = async () => {
  const input = $('chat-input');
  const text = input.value.trim();
  if (!text) return;
  if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
  addMsg('user', text);
  input.value = '';
  $('typing').style.display = 'block';

  const bubble = addMsg('ai', '');
  bubble.textContent = '';
  let buffer = '';

  try {
    abortCtrl = new AbortController();
    const r = await fetch('/api/shop/ai-chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
      signal: abortCtrl.signal,
    });
    if (!r.ok || !r.body) throw new Error('HTTP ' + r.status);
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += decoder.decode(value, {stream: true});
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop() || '';
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('data: ')) {
          const jsonStr = line.slice(6);
          try {
            const ev = JSON.parse(jsonStr);
            if (ev.text !== undefined) {
              buffer += ev.text;
              bubble.textContent = buffer;
              chatArea.scrollTop = chatArea.scrollHeight;
            }
            if (ev.done) { i = lines.length; break; }
          } catch(e) {}
        }
      }
    }
    if (!buffer) bubble.textContent = await t('eshop.service_unavailable');
  } catch(e) {
    if (e.name !== 'AbortError') {
      bubble.textContent = await t('eshop.network_error');
    }
  } finally {
    $('typing').style.display = 'none';
    abortCtrl = null;
  }
};

$('chat-input').addEventListener('builtin-submit', send);
</script>
</body>
</html>
